<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SisterSquad Run</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #1e293b;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
            overflow: hidden;
            touch-action: none; /* 모바일에서 화면 스크롤 방지 */
        }
        #game-container {
            position: relative;
            width: 800px;
            max-width: 100%;
            height: 400px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background: linear-gradient(to bottom, #87CEEB, #E0F6FF);
            border-radius: 12px;
            overflow: hidden;
        }
        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }
        .ui-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            text-align: center;
        }
        h1 {
            color: #FFB7D5;
            font-size: clamp(32px, 5vw, 48px);
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        p {
            font-size: clamp(14px, 3vw, 18px);
            margin-bottom: 30px;
            padding: 0 20px;
        }
        .character-select {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .char-btn {
            background: #ffffff;
            border: 4px solid #B8E4FF;
            padding: 15px 30px;
            border-radius: 12px;
            font-size: clamp(16px, 3vw, 20px);
            font-weight: bold;
            color: #1e293b;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .char-btn:active {
            transform: scale(0.95);
        }
        #btn-yuli { border-color: #3b82f6; }
        #btn-jeongi { border-color: #ef4444; }
        .hidden { display: none !important; }
        
        /* 상단 UI (점수, 쿨다운) */
        #hud {
            position: absolute;
            top: 10px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            font-size: clamp(16px, 3vw, 24px);
            font-weight: bold;
            color: #333;
            z-index: 5;
            pointer-events: none;
        }

        /* 모바일 터치 버튼 UI */
        #mobile-controls {
            position: absolute;
            bottom: 20px;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 30px;
            box-sizing: border-box;
            z-index: 5;
            pointer-events: none; /* 빈 공간 터치 무시 */
        }
        .control-btn {
            width: 70px;
            height: 70px;
            background: rgba(255, 255, 255, 0.4);
            border: 3px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 18px;
            font-weight: bold;
            color: #333;
            user-select: none;
            pointer-events: auto; /* 버튼 부분만 터치 활성화 */
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .control-btn:active {
            background: rgba(255, 255, 255, 0.7);
            transform: scale(0.95);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div id="hud" class="hidden">
        <div id="scoreDisplay">점수: 0</div>
        <div id="skillDisplay">스킬: 준비완료</div>
    </div>

    <div id="mobile-controls" class="hidden">
        <div id="btn-skill" class="control-btn">스킬</div>
        <div id="btn-jump" class="control-btn">점프</div>
    </div>

    <div id="start-screen" class="ui-screen">
        <h1>SisterSquad Run</h1>
        <p>캐릭터를 선택하세요! (모바일: 화면 버튼 터치 / PC: Space점프, Z스킬)</p>
        <div class="character-select">
            <button id="btn-yuli" class="char-btn">언니 율이 💙<br><span style="font-size:14px;font-weight:normal;">스킬: 보호막 (1회 방어)</span></button>
            <button id="btn-jeongi" class="char-btn">동생 정이 🔥<br><span style="font-size:14px;font-weight:normal;">스킬: 돌진 (적 파괴)</span></button>
        </div>
    </div>

    <div id="gameover-screen" class="ui-screen hidden">
        <h1 style="color: #ef4444;">Game Over</h1>
        <p>최종 점수: <span id="finalScore">0</span></p>
        <button id="btn-restart" class="char-btn">다시 하기</button>
    </div>
</div>

<script>
    // ==========================================
    // 🎨 이미지 세팅 (요청하신 경로 반영)
    // ==========================================
    const IMAGE_URLS = {
        yuli: "images/game_yul.jpg",
        jeongi: "images/game_jung.jpg",
        enemy: "", // 적이나 요정 이미지도 나중에 images/ 폴더에 넣고 경로를 적어주세요!
        fairy: ""  
    };

    const images = {};
    for (let key in IMAGE_URLS) {
        if(IMAGE_URLS[key]) {
            images[key] = new Image();
            images[key].src = IMAGE_URLS[key];
        }
    }

    // ==========================================
    // 게임 로직
    // ==========================================
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    const startScreen = document.getElementById('start-screen');
    const gameoverScreen = document.getElementById('gameover-screen');
    const hud = document.getElementById('hud');
    const mobileControls = document.getElementById('mobile-controls');
    const scoreDisplay = document.getElementById('scoreDisplay');
    const finalScoreDisplay = document.getElementById('finalScore');
    const skillDisplay = document.getElementById('skillDisplay');

    let gameLoop;
    let isPlaying = false;
    let score = 0;
    let frame = 0;
    let gameSpeed = 5;

    const player = {
        x: 50,
        y: 300,
        width: 50,
        height: 60,
        dy: 0,
        jumpForce: -12,
        originalY: 300,
        grounded: false,
        character: 'yuli',
        shieldActive: false,
        dashActive: false,
        skillCooldown: 0,
        
        draw: function() {
            if (images[this.character] && images[this.character].complete) {
                ctx.drawImage(images[this.character], this.x, this.y, this.width, this.height);
            } else {
                ctx.fillStyle = this.character === 'yuli' ? '#3b82f6' : '#ef4444';
                ctx.fillRect(this.x, this.y, this.width, this.height);
            }

            // 보호막 이펙트
            if (this.shieldActive) {
                ctx.beginPath();
                ctx.arc(this.x + this.width/2, this.y + this.height/2, 40, 0, Math.PI * 2);
                ctx.strokeStyle = '#3b82f6';
                ctx.lineWidth = 4;
                ctx.stroke();
            }
            // 돌진 이펙트
            if (this.dashActive) {
                ctx.fillStyle = 'rgba(239, 68, 68, 0.5)';
                ctx.fillRect(this.x - 50, this.y, 50, this.height);
            }
        },
        
        update: function() {
            this.y += this.dy;
            if (this.y < this.originalY) {
                this.dy += 0.6;
                this.grounded = false;
            } else {
                this.dy = 0;
                this.y = this.originalY;
                this.grounded = true;
            }

            if (this.dashActive) {
                this.dashActive--;
                if(this.dashActive <= 0) this.dashActive = false;
            }

            if (this.skillCooldown > 0) {
                this.skillCooldown--;
                if (this.skillCooldown === 0) skillDisplay.innerText = "스킬: 준비완료!";
            }
        },

        jump: function() {
            if (this.grounded) {
                this.dy = this.jumpForce;
                this.grounded = false;
            }
        },

        useSkill: function() {
            if (this.skillCooldown > 0) return;

            if (this.character === 'yuli') {
                this.shieldActive = true;
                skillDisplay.innerText = "상태: 보호막 켜짐!";
                this.skillCooldown = 300; 
            } else if (this.character === 'jeongi') {
                this.dashActive = 60; 
                skillDisplay.innerText = "상태: 무적 돌진!";
                this.skillCooldown = 300;
            }
        }
    };

    let obstacles = [];
    let fairies = [];

    class Obstacle {
        constructor() {
            this.width = 40;
            this.height = 50;
            this.x = canvas.width;
            this.y = 360 - this.height;
        }
        draw() {
            ctx.fillStyle = '#1e293b';
            ctx.fillRect(this.x, this.y, this.width, this.height);
            ctx.fillStyle = 'white';
            ctx.font = '25px Arial';
            ctx.fillText('🗡️', this.x + 5, this.y + 35);
        }
        update() { this.x -= gameSpeed; }
    }

    class Fairy {
        constructor() {
            this.width = 30;
            this.height = 30;
            this.x = canvas.width;
            this.y = Math.random() * 150 + 100; 
        }
        draw() {
            ctx.fillStyle = '#ffb7d5';
            ctx.beginPath();
            ctx.arc(this.x + 15, this.y + 15, 15, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = 'black';
            ctx.font = '20px Arial';
            ctx.fillText('🧚', this.x + 2, this.y + 22);
        }
        update() { this.x -= gameSpeed; }
    }

    // ==========================================
    // 컨트롤 (PC & 모바일)
    // ==========================================
    // PC 키보드
    window.addEventListener('keydown', (e) => {
        if (!isPlaying) return;
        if (e.code === 'Space' || e.code === 'ArrowUp') player.jump();
        if (e.code === 'KeyZ') player.useSkill();
    });

    // 모바일 터치 버튼
    const btnJump = document.getElementById('btn-jump');
    const btnSkill = document.getElementById('btn-skill');

    // 마우스 및 터치 이벤트 동시 바인딩
    ['touchstart', 'mousedown'].forEach(evt => {
        btnJump.addEventListener(evt, (e) => {
            e.preventDefault(); 
            if (isPlaying) player.jump();
        });
        btnSkill.addEventListener(evt, (e) => {
            e.preventDefault(); 
            if (isPlaying) player.useSkill();
        });
    });

    function initGame(characterChoice) {
        player.character = characterChoice;
        player.y = player.originalY;
        player.dy = 0;
        player.shieldActive = false;
        player.dashActive = false;
        player.skillCooldown = 0;
        obstacles = [];
        fairies = [];
        score = 0;
        frame = 0;
        gameSpeed = 5;
        isPlaying = true;
        
        startScreen.classList.add('hidden');
        gameoverScreen.classList.add('hidden');
        hud.classList.remove('hidden');
        mobileControls.classList.remove('hidden'); // 모바일 버튼 표시
        skillDisplay.innerText = "스킬: 준비완료!";
        
        animate();
    }

    function gameOver() {
        isPlaying = false;
        cancelAnimationFrame(gameLoop);
        finalScoreDisplay.innerText = Math.floor(score);
        gameoverScreen.classList.remove('hidden');
        hud.classList.add('hidden');
        mobileControls.classList.add('hidden'); // 모바일 버튼 숨김
    }

    function checkCollision(rect1, rect2) {
        return (
            rect1.x < rect2.x + rect2.width &&
            rect1.x + rect1.width > rect2.x &&
            rect1.y < rect2.y + rect2.height &&
            rect1.y + rect1.height > rect2.y
        );
    }

    function animate() {
        if (!isPlaying) return;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 바닥 그리기
        ctx.fillStyle = '#65a30d';
        ctx.fillRect(0, 360, canvas.width, 40);

        player.update();
        player.draw();

        if (frame % Math.max(60, 120 - Math.floor(gameSpeed * 5)) === 0) {
            obstacles.push(new Obstacle());
        }

        for (let i = 0; i < obstacles.length; i++) {
            let obs = obstacles[i];
            obs.update();
            obs.draw();

            if (checkCollision(player, obs)) {
                if (player.dashActive) {
                    obstacles.splice(i, 1);
                    score += 50;
                    i--;
                } else if (player.shieldActive) {
                    player.shieldActive = false;
                    obstacles.splice(i, 1);
                    i--;
                } else {
                    gameOver();
                    return;
                }
            }

            if (obs.x + obs.width < 0) {
                obstacles.splice(i, 1);
                i--;
            }
        }

        if (frame % 150 === 0) fairies.push(new Fairy());

        for (let i = 0; i < fairies.length; i++) {
            let f = fairies[i];
            f.update();
            f.draw();

            if (checkCollision(player, f)) {
                score += 100; 
                fairies.splice(i, 1);
                i--;
            } else if (f.x + f.width < 0) {
                fairies.splice(i, 1);
                i--;
            }
        }

        score += 0.1;
        scoreDisplay.innerText = `점수: ${Math.floor(score)}`;
        if (frame % 300 === 0) gameSpeed += 0.2; 
        if (!player.shieldActive && !player.dashActive && player.skillCooldown > 0) {
             skillDisplay.innerText = `쿨다운: ${Math.ceil(player.skillCooldown/60)}초`;
        }

        frame++;
        gameLoop = requestAnimationFrame(animate);
    }

    document.getElementById('btn-yuli').addEventListener('click', () => initGame('yuli'));
    document.getElementById('btn-jeongi').addEventListener('click', () => initGame('jeongi'));
    document.getElementById('btn-restart').addEventListener('click', () => {
        startScreen.classList.remove('hidden');
        gameoverScreen.classList.add('hidden');
    });

</script>
</body>
</html>
