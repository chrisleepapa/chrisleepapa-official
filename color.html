<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>모바일 지렁이 게임</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-color: #f8f9fa;
            font-family: sans-serif;
            touch-action: manipulation; /* 더블탭 확대 방지 */
        }
        .ui { text-align: center; margin-bottom: 10px; }
        .score { font-size: 24px; font-weight: bold; color: #2ecc71; }
        
        #game-container {
            position: relative;
            border: 5px solid #34495e;
            border-radius: 10px;
            background-color: white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        canvas { display: block; max-width: 100%; height: auto; }

        /* 모바일 컨트롤러 스타일 */
        .controls {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(2, 70px);
            gap: 10px;
            margin-top: 20px;
        }
        .btn {
            width: 70px;
            height: 70px;
            background-color: #34495e;
            color: white;
            border: none;
            border-radius: 50%;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn:active { background-color: #2ecc71; transform: scale(0.95); }
        .btn-up { grid-column: 2; }
        .btn-left { grid-column: 1; grid-row: 2; }
        .btn-down { grid-column: 2; grid-row: 2; }
        .btn-right { grid-column: 3; grid-row: 2; }
    </style>
</head>
<body>

    <div class="ui">
        <div class="score">Score: <span id="scoreVal">0</span></div>
    </div>

    <div id="game-container">
        <canvas id="snakeGame" width="300" height="300"></canvas>
    </div>

    <div class="controls">
        <button class="btn btn-up" onclick="changeDir('UP')">▲</button>
        <button class="btn btn-left" onclick="changeDir('LEFT')">◀</button>
        <button class="btn btn-down" onclick="changeDir('DOWN')">▼</button>
        <button class="btn btn-right" onclick="changeDir('RIGHT')">▶</button>
    </div>

    <script>
        const canvas = document.getElementById("snakeGame");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("scoreVal");

        const box = 15; // 모바일을 위해 칸 크기 소폭 조정
        let score = 0;
        let snake = [{ x: 10 * box, y: 10 * box }];
        let food = {
            x: Math.floor(Math.random() * 19) * box,
            y: Math.floor(Math.random() * 19) * box
        };
        let d;

        // 방향 전환 함수 (모바일/PC 공용)
        function changeDir(newDir) {
            if(newDir == "LEFT" && d != "RIGHT") d = "LEFT";
            else if(newDir == "UP" && d != "DOWN") d = "UP";
            else if(newDir == "RIGHT" && d != "LEFT") d = "RIGHT";
            else if(newDir == "DOWN" && d != "UP") d = "DOWN";
        }

        // 키보드 지원
        document.addEventListener("keydown", (e) => {
            if(e.keyCode == 37) changeDir("LEFT");
            else if(e.keyCode == 38) changeDir("UP");
            else if(e.keyCode == 39) changeDir("RIGHT");
            else if(e.keyCode == 40) changeDir("DOWN");
        });

        function collision(head, array) {
            for(let i = 0; i < array.length; i++) {
                if(head.x == array[i].x && head.y == array[i].y) return true;
            }
            return false;
        }

        function draw() {
            ctx.fillStyle = "white";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 지렁이
            for(let i = 0; i < snake.length; i++) {
                ctx.fillStyle = (i == 0) ? "#27ae60" : "#2ecc71";
                ctx.fillRect(snake[i].x, snake[i].y, box, box);
                ctx.strokeStyle = "white";
                ctx.strokeRect(snake[i].x, snake[i].y, box, box);
            }

            // 먹이
            ctx.fillStyle = "#e74c3c";
            ctx.beginPath();
            ctx.arc(food.x + box/2, food.y + box/2, box/2 - 1, 0, Math.PI * 2);
            ctx.fill();

            let snakeX = snake[0].x;
            let snakeY = snake[0].y;

            if( d == "LEFT") snakeX -= box;
            if( d == "UP") snakeY -= box;
            if( d == "RIGHT") snakeX += box;
            if( d == "DOWN") snakeY += box;

            if(snakeX == food.x && snakeY == food.y) {
                score++;
                scoreElement.innerHTML = score;
                food = {
                    x: Math.floor(Math.random() * 19) * box,
                    y: Math.floor(Math.random() * 19) * box
                };
            } else {
                snake.pop();
            }

            let newHead = { x: snakeX, y: snakeY };

            // 벽이나 자기 몸 충돌
            if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
                clearInterval(game);
                alert("게임 오버! 점수: " + score);
                location.reload();
            }

            snake.unshift(newHead);
        }

        let game = setInterval(draw, 120); // 속도 설정
    </script>
</body>
</html>
