<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SisterSquad</title>

<script src="https://cdn.jsdelivr.net/npm/phaser@3.70.0/dist/phaser.min.js"></script>

<style>
body {
  margin:0;
  background:#000;
  overflow:hidden;
}

/* UI */
#ui {
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:space-around;
}

button {
  width:70px;
  height:70px;
  border-radius:50%;
  border:none;
  background:#222;
  color:white;
  font-size:14px;
}

#switchBtn {
  position:absolute;
  top:10px;
  right:10px;
}
</style>
</head>

<body>

<button id="switchBtn">전환</button>

<div id="ui">
  <button onclick="skill1()">S1</button>
  <button onclick="skill2()">S2</button>
</div>

<script>
let scene;

class Game extends Phaser.Scene {

constructor(){ super("game"); }

preload(){

// ✅ 네 구조 기준 (images 폴더)
this.load.spritesheet("yul","images/yul_spritesheet.png",{frameWidth:256,frameHeight:256});
this.load.spritesheet("jeong","images/jeong_spritesheet.png",{frameWidth:256,frameHeight:256});
this.load.spritesheet("fairy","images/fairy.png",{frameWidth:128,frameHeight:128});

// 기본 리소스
this.load.image("bullet","https://labs.phaser.io/assets/sprites/bullets/bullet7.png");
this.load.image("bane","https://labs.phaser.io/assets/sprites/robot.png");
this.load.image("crown","https://labs.phaser.io/assets/sprites/space-baddie.png");

}

create(){

scene = this;

this.current = "yul";

/* 플레이어 */
this.player = this.physics.add.sprite(180,500,"yul").setScale(0.7);

/* 그룹 */
this.bullets = this.physics.add.group();
this.enemyBullets = this.physics.add.group();

/* 상태 */
this.hp = 100;
this.score = 0;
this.baneDead = false;

/* 애니메이션 */
this.createAnim();
this.player.play("yul_run");

/* 요정 */
this.fairy = this.add.sprite(0,0,"fairy").play("fairy_fly");
this.angle = 0;

/* 입력 */
this.input.on("pointerdown", ()=> this.player.setVelocityY(-400));

/* 자동 공격 */
this.time.addEvent({
  delay:600,
  loop:true,
  callback:()=>this.attack()
});

/* 캐릭터 전환 */
document.getElementById("switchBtn").onclick = ()=>this.switchChar();

}

update(){

this.player.x = 180;

/* 요정 orbit */
this.angle += 0.05;
this.fairy.x = this.player.x + Math.cos(this.angle)*40;
this.fairy.y = this.player.y + Math.sin(this.angle)*20;

/* 총알 이동 */
this.bullets.children.iterate(b=> b && (b.x+=8));
this.enemyBullets.children.iterate(b=> b && (b.y+=4));

/* 보스 등장 */
if(this.score>50 && !this.bane) this.spawnBane();
if(this.score>150 && this.baneDead && !this.crown) this.spawnCrown();

}

/* 애니메이션 */
createAnim(){

this.anims.create({
  key:"yul_run",
  frames:this.anims.generateFrameNumbers("yul",{start:0,end:3}),
  frameRate:8, repeat:-1
});

this.anims.create({
  key:"yul_attack",
  frames:this.anims.generateFrameNumbers("yul",{start:1,end:2}),
  frameRate:12
});

this.anims.create({
  key:"jeong_run",
  frames:this.anims.generateFrameNumbers("jeong",{start:0,end:3}),
  frameRate:8, repeat:-1
});

this.anims.create({
  key:"jeong_attack",
  frames:this.anims.generateFrameNumbers("jeong",{start:1,end:2}),
  frameRate:12
});

this.anims.create({
  key:"fairy_fly",
  frames:this.anims.generateFrameNumbers("fairy",{start:0,end:1}),
  frameRate:6, repeat:-1
});

}

/* 공격 */
attack(){

if(this.current==="yul"){
  this.player.play("yul_attack",true);
}else{
  this.player.play("jeong_attack",true);
}

let b = this.bullets.create(this.player.x+20,this.player.y,"bullet");

/* 이펙트 */
this.hitEffect(this.player.x+20,this.player.y);

/* 복귀 */
this.time.delayedCall(200,()=>{
  this.player.play(this.current+"_run");
});

this.score += 1;

}

/* 스킬 */
useSkill1(){
if(this.current==="yul"){
  this.cameras.main.setTint(0x9999ff);
  this.time.delayedCall(800,()=>this.cameras.main.clearTint());
}else{
  this.player.setVelocityX(300);
}
}

useSkill2(){
if(this.current==="yul"){
  let s=this.add.circle(this.player.x,this.player.y,40,0x00ffff,0.3);
  this.tweens.add({targets:s,scale:1.5,alpha:0,duration:500,onComplete:()=>s.destroy()});
}else{
  this.enemyBullets.clear(true,true);
}
}

/* 캐릭터 전환 */
switchChar(){
if(this.current==="yul"){
  this.current="jeong";
  this.player.setTexture("jeong");
  this.player.play("jeong_run");
}else{
  this.current="yul";
  this.player.setTexture("yul");
  this.player.play("yul_run");
}
}

/* -------- 베인 -------- */
spawnBane(){

this.bane = this.physics.add.sprite(300,200,"bane").setScale(2);
this.baneHP = 100;

this.time.addEvent({
  delay:1200,
  loop:true,
  callback:()=>{

    let b=this.enemyBullets.create(this.bane.x,this.bane.y,"bullet");
    this.physics.moveToObject(b,this.player,200);

    this.cameras.main.shake(100,0.01);
  }
});

this.physics.add.overlap(this.bullets,this.bane,(b,e)=>{
  b.destroy();
  this.hitEffect(e.x,e.y);
  this.baneHP -= 5;

  if(this.baneHP<=0){
    this.bane.destroy();
    this.baneDead = true;
  }
});

}

/* -------- 크라운 -------- */
spawnCrown(){

this.crown = this.physics.add.sprite(180,150,"crown").setScale(2);
this.crownHP = 200;
this.phase = 1;

this.cameras.main.shake(300,0.02);

this.time.addEvent({
  delay:1000,
  loop:true,
  callback:()=>this.crownPattern()
});

this.physics.add.overlap(this.bullets,this.crown,(b,c)=>{
  b.destroy();
  this.hitEffect(c.x,c.y);
  this.crownHP -= 5;

  if(this.crownHP<100 && this.phase===1){
    this.phase = 2;
    this.cameras.main.flash(300);
  }

  if(this.crownHP<=0){
    this.victory();
  }
});

}

crownPattern(){

/* 낙하 공격 */
for(let i=0;i<4;i++){
  let b=this.enemyBullets.create(Phaser.Math.Between(0,360),0,"bullet");
  b.setVelocityY(this.phase===1?200:300);
}

/* 추적 */
let b=this.enemyBullets.create(this.crown.x,this.crown.y,"bullet");
this.physics.moveToObject(b,this.player,this.phase===1?200:300);

}

/* 이펙트 */
hitEffect(x,y){
let c=this.add.circle(x,y,8,0xffff00);
this.tweens.add({
  targets:c,
  scale:2,
  alpha:0,
  duration:200,
  onComplete:()=>c.destroy()
});
}

/* 엔딩 */
victory(){
this.scene.pause();
this.add.text(80,300,"🎉 VICTORY",{fontSize:"28px",fill:"#00ffcc"});
}

}

/* Phaser 실행 */
new Phaser.Game({
type:Phaser.AUTO,
width:360,
height:640,
backgroundColor:"#0f172a",
physics:{default:"arcade",arcade:{gravity:{y:900}}},
scene:Game
});

/* UI 연결 */
function skill1(){ scene.useSkill1(); }
function skill2(){ scene.useSkill2(); }

</script>

</body>
</html>
