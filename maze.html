<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏃 Sistersquad: 뒤태 질주! 🏃</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root { --gold: #FFD700; --pink: #FF69B4; --blue: #4A90E2; }
  body { margin: 0; overflow: hidden; background: #87CEEB; font-family: 'Nunito', sans-serif; user-select: none; touch-action: none; }
  
  #game-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
  
  /* 캐릭터 스프라이트 - 뒷모습 느낌을 위해 필터 및 크기 조정 */
  #player-sprite {
    position: absolute; bottom: 15%; left: 50%;
    width: 160px; height: 160px; transform: translateX(-50%);
    background-size: 500% 100%; background-position: 0% 0%;
    z-index: 15; pointer-events: none; display: none;
    filter: drop-shadow(0 15px 10px rgba(0,0,0,0.4));
    transition: bottom 0.3s, transform 0.2s, width 0.2s, height 0.2s;
  }
  .sprite-yul { background-image: url('/images/yul_spritesheet.png'); }
  .sprite-jung { background-image: url('/images/jeong_spritesheet.png'); }

  /* 모바일 조작패드 */
  #controls {
    position: absolute; bottom: 30px; left: 0; width: 100%;
    display: grid; grid-template-areas: ". up ." "left attack right" ". down .";
    justify-content: center; gap: 15px; z-index: 30; pointer-events: none;
  }
  .btn {
    width: 70px; height: 70px; background: rgba(255,255,255,0.25);
    border-radius: 20px; display: flex; align-items: center; justify-content: center;
    color: white; font-size: 24px; border: 2px solid white; backdrop-filter: blur(5px);
    pointer-events: auto; font-weight: bold;
  }
  .btn:active { background: rgba(255,255,255,0.5); transform: scale(0.9); }
  #attack-btn { grid-area: attack; background: var(--pink); border-radius: 50%; width: 85px; height: 85px; }

  /* HUD */
  #hud {
    position: absolute; top: 20px; width: 100%; display: flex;
    justify-content: space-around; z-index: 20; pointer-events: none;
  }
  .info { background: rgba(0,0,0,0.6); color: white; padding: 10px 20px; border-radius: 15px; border: 2px solid var(--gold); }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 100; color: white; }
  .char-btn { padding: 15px 30px; border: 2px solid var(--gold); background: transparent; color: white; cursor: pointer; border-radius: 10px; }
  .char-btn.active { background: var(--gold); color: black; }
</style>
</head>
<body>

<div id="game-canvas"></div>
<div id="player-sprite"></div>

<div id="hud" style="display: none;">
  <div class="info">LIFE: <span id="hp">❤️❤️❤️</span></div>
  <div class="info">🔑 <span id="score">0 / 10</span></div>
</div>

<div id="controls" style="display: none;">
  <div class="btn" style="grid-area: up;" onpointerdown="jump()">JUMP</div>
  <div class="btn" style="grid-area: left;" onpointerdown="moveLane(-1)">◀</div>
  <div id="attack-btn" class="btn" onpointerdown="attack()">HIT</div>
  <div class="btn" style="grid-area: right;" onpointerdown="moveLane(1)">▶</div>
  <div class="btn" style="grid-area: down;" onpointerdown="roll()">ROLL</div>
</div>

<div id="start-modal" class="modal">
  <div style="text-align: center;">
    <h1 style="font-family:'Fredoka One';">SISTERS QUAD RUN</h1>
    <p>점프(위), 숙이기(아래)를 활용해 열쇠를 모으세요!</p>
    <div style="display: flex; gap: 15px; justify-content: center; margin: 25px 0;">
      <button id="btn-yul" class="char-btn active" onclick="selectChar('yul')">율이 (불)</button>
      <button id="btn-jung" class="char-btn" onclick="selectChar('jung')">정이 (빛)</button>
    </div>
    <button onclick="startGame()" style="background:var(--pink); border:none; padding:15px 50px; border-radius:15px; font-size:22px; font-weight:bold; color:white;">RUN!!</button>
  </div>
</div>

<script>
let scene, camera, renderer, clock, isPlaying = false;
let playerHealth = 3, score = 0, currentLane = 0; // -1, 0, 1
let selectedChar = 'yul';
let objects = [], projectiles = [];
let gameSpeed = 50;
let isJumping = false, isRolling = false;
const LANE_WIDTH = 5;

function selectChar(char) {
  selectedChar = char;
  document.getElementById('btn-yul').className = char === 'yul' ? 'char-btn active' : 'char-btn';
  document.getElementById('btn-jung').className = char === 'jung' ? 'char-btn active' : 'char-btn';
}

function startGame() {
  document.getElementById('start-modal').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('controls').style.display = 'grid';
  document.getElementById('player-sprite').style.display = 'block';
  document.getElementById('player-sprite').className = 'sprite-' + selectedChar;
  
  initThree();
  isPlaying = true;
  animate();
}

function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 30, 120);
  
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  // 캐릭터의 뒷모습을 보는 시점으로 카메라 위치 조정
  camera.position.set(0, 6, 15);
  camera.lookAt(0, 3, -10);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('game-canvas').appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1.2);
  light.position.set(5, 20, 10);
  scene.add(light, new THREE.AmbientLight(0xffffff, 0.5));

  // 바닥 (격자 무늬 도로)
  const ground = new THREE.Mesh(new THREE.PlaneGeometry(20, 5000), new THREE.MeshStandardMaterial({ color: 0x333333 }));
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);
  
  const grid = new THREE.GridHelper(5000, 500, 0xffffff, 0x444444);
  grid.position.y = 0.05;
  scene.add(grid);

  clock = new THREE.Clock();

  window.addEventListener('keydown', e => {
    if(e.key === 'ArrowLeft' || e.key === 'a') moveLane(-1);
    if(e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
    if(e.key === 'ArrowUp' || e.key === 'w') jump();
    if(e.key === 'ArrowDown' || e.key === 's') roll();
    if(e.key === ' ') attack();
  });
}

function moveLane(dir) {
  currentLane = Math.max(-1, Math.min(1, currentLane + dir));
}

function jump() {
  if (isJumping || isRolling) return;
  isJumping = true;
  const sprite = document.getElementById('player-sprite');
  sprite.style.bottom = "30%"; // 시각적 점프
  setTimeout(() => {
    sprite.style.bottom = "15%";
    isJumping = false;
  }, 500);
}

function roll() {
  if (isJumping || isRolling) return;
  isRolling = true;
  const sprite = document.getElementById('player-sprite');
  sprite.style.height = "80px"; // 시각적 숙이기
  sprite.style.width = "200px";
  setTimeout(() => {
    sprite.style.height = "160px";
    sprite.style.width = "160px";
    isRolling = false;
  }, 600);
}

function attack() {
  const p = new THREE.Mesh(new THREE.SphereGeometry(0.6), new THREE.MeshBasicMaterial({ color: selectedChar === 'yul' ? 0xff4500 : 0x00ffff }));
  p.position.set(currentLane * LANE_WIDTH, 2, 0);
  scene.add(p);
  projectiles.push(p);
}

function spawnObject() {
  if (Math.random() > 0.94) {
    const lane = Math.floor(Math.random() * 3) - 1;
    const rand = Math.random();
    let obj, type;

    if (rand < 0.2) { // 아이템 (열쇠)
      obj = new THREE.Mesh(new THREE.TorusGeometry(0.6, 0.2), new THREE.MeshStandardMaterial({ color: 0xFFD700 }));
      type = 'key';
      obj.position.y = 2;
    } else if (rand < 0.5) { // 점프해야 하는 장애물 (낮은 허들)
      obj = new THREE.Mesh(new THREE.BoxGeometry(4, 1.5, 1), new THREE.MeshStandardMaterial({ color: 0xff4400 }));
      type = 'jump_obs';
      obj.position.y = 0.75;
    } else if (rand < 0.7) { // 숙여야 하는 장애물 (높은 천장)
      obj = new THREE.Mesh(new THREE.BoxGeometry(5, 2, 1), new THREE.MeshStandardMaterial({ color: 0x444444 }));
      type = 'roll_obs';
      obj.position.y = 4.5;
    } else { // 공격해서 없애야 하는 적
      obj = new THREE.Mesh(new THREE.SphereGeometry(1.5), new THREE.MeshStandardMaterial({ color: 0x330066 }));
      type = 'enemy';
      obj.position.y = 1.5;
    }

    obj.position.x = lane * LANE_WIDTH;
    obj.position.z = -150;
    obj.userData = { type };
    scene.add(obj);
    objects.push(obj);
  }
}

function animate() {
  if (!isPlaying) return;
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  
  spawnObject();

  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    obj.position.z += gameSpeed * delta;

    // 충돌 체크 (z=0 근처)
    if (obj.position.z > -1 && obj.position.z < 2) {
      if (Math.abs(obj.position.x - (currentLane * LANE_WIDTH)) < 2.5) {
        let hit = false;
        const type = obj.userData.type;

        if (type === 'key') {
          score++;
          document.getElementById('score').innerText = `${score} / 10`;
          if (score >= 10) { alert("탈출 성공! 축하합니다."); location.reload(); }
          hit = true;
        } else if (type === 'jump_obs' && !isJumping) {
          hit = true; playerHealth--;
        } else if (type === 'roll_obs' && !isRolling) {
          hit = true; playerHealth--;
        } else if (type === 'enemy') {
          hit = true; playerHealth--;
        }

        if (hit) {
          if (type !== 'key') {
             document.getElementById('hp').innerText = "❤️".repeat(Math.max(0, playerHealth)) + "🖤".repeat(3 - playerHealth);
             if (playerHealth <= 0) { isPlaying = false; alert("게임 오버!"); location.reload(); }
          }
          scene.remove(obj);
          objects.splice(i, 1);
          continue;
        }
      }
    }

    if (obj.position.z > 20) { scene.remove(obj); objects.splice(i, 1); }
  }

  // 투사체 처리
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.position.z -= 80 * delta;
    objects.forEach((obj, objIdx) => {
      if (obj.userData.type === 'enemy' && p.position.distanceTo(obj.position) < 3) {
        scene.remove(obj);
        objects.splice(objIdx, 1);
        p.position.z = -1000;
      }
    });
    if (p.position.z < -150) { scene.remove(p); projectiles.splice(i, 1); }
  }

  // 화면상 스프라이트 위치 업데이트
  const targetX = (window.innerWidth / 2) + (currentLane * 70);
  const currentX = parseFloat(document.getElementById('player-sprite').style.left || targetX);
  document.getElementById('player-sprite').style.left = (currentX + (targetX - currentX) * 0.2) + 'px';
  
  const frame = Math.floor(Date.now() / 100) % 5;
  document.getElementById('player-sprite').style.backgroundPosition = `${frame * 25}% 0`;

  renderer.render(scene, camera);
}
</script>
</body>
</html>
