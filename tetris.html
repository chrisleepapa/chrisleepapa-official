    <title>TETRIS BATTLE - Chrisleepapa</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Cinzel:wght@700;900&family=Exo+2:wght@800;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-neon: #ff007f;
            --c-cyan: #00e5ff;
            --c-gold: #ffcf00;
            --bg-deep: #030305;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-deep);
            color: #fff;
            /* 100dvh 오류 방지를 위해 모바일 화면 크기에 딱 맞추는 설정 */
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100%;
        }

        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05; pointer-events: none;
        }

        #gameWrap {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            margin: 0 auto;
            overflow: hidden;
            z-index: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 30%, #1a0533 0%, var(--bg-deep) 100%);
        }

        /* ─── UI Screens ─── */
        .screen {
            position: absolute; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            padding: max(env(safe-area-inset-top, 30px), 30px) 25px;
            background: radial-gradient(circle at 50% 20%, #151025 0%, var(--bg-deep) 90%);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .screen.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }

        .title-main {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 2.8rem;
            background: linear-gradient(180deg, #fff, #b3b3b3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            margin-bottom: 5px; text-align: center;
        }
        .title-sub {
            font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem;
            color: var(--c-neon); letter-spacing: 4px; margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
        }

        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px 20px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .input-neon {
            width: 100%; text-align: center; font-family: 'Exo 2', sans-serif;
            font-size: 2rem; font-weight: 900; letter-spacing: 0.3em;
            padding: 12px; border-radius: 16px; background: rgba(0,0,0,0.4);
            color: var(--c-cyan); border: 2px solid rgba(0,229,255,0.2);
            outline: none; transition: 0.3s; text-transform: uppercase;
        }
        .input-neon:focus { border-color: var(--c-cyan); box-shadow: 0 0 20px rgba(0,229,255,0.3); }

        .btn-magic {
            width: 100%; border: none; border-radius: 18px; padding: 16px;
            font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem;
            cursor: pointer; transition: all 0.2s ease; color: #fff;
            background: linear-gradient(135deg, #ff007f, #7f00ff);
            box-shadow: 0 10px 30px rgba(255,0,127,0.4);
            margin-top: 15px;
        }
        .btn-magic:active { transform: scale(0.96); opacity: 0.9; }

        .lb-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }

        /* ─── HUD ─── */
        #hud {
            flex: 0 0 auto; /* 크기 고정 */
            padding: max(env(safe-area-inset-top, 15px), 15px) 20px 10px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 50; pointer-events: none; opacity: 0; transition: 0.5s;
        }
        .hud-item {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            padding: 8px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
        }
        .hud-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .hud-val { font-family: 'Exo 2', sans-serif; font-size: 20px; font-weight: 900; color: var(--c-cyan); }

        /* ─── Game Area ─── */
        main { 
            flex: 1 1 0; /* 남은 공간을 모두 차지하되 넘치지 않게 */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 5px 15px; 
            min-height: 0; /* flex 자식 축소 버그 방지 */
            overflow: hidden;
        }
        .canvas-wrapper {
            position: relative; 
            height: 100%; 
            max-width: 100%;
            aspect-ratio: 10 / 20; /* 10:20 테트리스 보드 비율 유지 */
            background: #000; 
            border-radius: 12px; 
            border: 2px solid #ff007f;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.2); 
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* ─── Mobile Controller ─── */
        #controller {
            flex: 0 0 auto; /* 크기 고정 절대 밀리지 않음 */
            padding: 10px 15px max(env(safe-area-inset-bottom, 15px), 15px);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 60;
            background: rgba(0,0,0,0.5);
            border-top: 1px solid rgba(255,255,255,0.1);
            opacity: 0; pointer-events: none; transition: 0.5s;
        }
        
        .ctrl-row { display: flex; justify-content: center; gap: 8px; width: 100%; }

        .ctrl-btn {
            background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 15px; display: flex; align-items: center; justify-content: center;
            font-size: 1.4rem; color: #fff; cursor: pointer; user-select: none;
            box-shadow: 0 4px 0 rgba(0,0,0,0.4); transition: 0.05s;
            flex: 1; height: 55px;
        }
        .ctrl-btn:active { transform: translateY(3px); box-shadow: 0 1px 0 rgba(0,0,0,0.4); background: rgba(255,255,255,0.2); }
        
        .btn-action { background: rgba(0, 229, 255, 0.15); border-color: var(--c-cyan); color: var(--c-cyan); font-weight: 900; font-size: 1.1rem; }
        .btn-drop { background: rgba(255, 0, 127, 0.15); border-color: var(--c-neon); color: var(--c-neon); font-weight: 900; font-size: 1.1rem;}

        /* Game Over */
        #gameover {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 110; backdrop-filter: blur(10px);
        }
        .gameover-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 30px; border-radius: 30px; text-align: center; width: 85%; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; display: inline-block; }

        /* 🦅 Eagle Intro */
        #eagle-wrap {
            position: absolute; top: 15%; left: -100px;
            font-size: 3rem; z-index: 105; pointer-events: none;
            display: none;
        }

        /* ✨ Floating Reactions */
        .floating-reaction {
            position: absolute; left: 50%; top: 40%; transform: translateX(-50%);
            font-family: 'Black Han Sans', sans-serif; font-size: 2rem; font-style: italic;
            color: var(--c-gold); text-shadow: 0 0 15px rgba(0,0,0,0.8);
            z-index: 120; pointer-events: none; opacity: 0;
            white-space: nowrap;
        }
        @keyframes float-reaction {
            0% { transform: translate(-50%, 20px) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, 0) scale(1.1); opacity: 1; }
            80% { transform: translate(-50%, -40px) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -80px) scale(0.8); opacity: 0; }
        }
    </style>
</head>
<body>

<div id="gameWrap">
    <!-- 🦅 독수리 이벤트 -->
    <div id="eagle-wrap">🦅</div>

    <!-- 1. 메인 로그인 화면 -->
    <div id="s-login" class="screen">
        <div style="margin-top: 5vh;">
            <div class="title-main">TETRIS</div>
            <div class="title-sub">NEON BATTLE</div>
        </div>

        <div class="glass-panel" style="margin-bottom: 20px;">
            <div style="font-size:0.7rem; font-weight:700; letter-spacing:2px; opacity:0.6; margin-bottom:10px; text-align:center;">PLAYER INITIALS</div>
            <input id="initialsInput" class="input-neon" maxlength="3" placeholder="AAA" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')"/>
            <button class="btn-magic" onclick="enterArena()">배틀 필드 입장</button>
        </div>

        <div class="glass-panel">
            <div class="lb-header">
                <div style="font-size: 1rem;">👑</div>
                <div style="font-family:'Cinzel',serif; font-weight:900; font-size:1rem; letter-spacing:2px;">HALL OF FAME</div>
                <div id="lbSpinner" class="spinner" style="margin-left:auto;">⟳</div>
            </div>
            <div id="leaderboardList" style="font-size: 0.85rem;"></div>
        </div>
    </div>

    <!-- 2. 게임 HUD -->
    <div id="hud">
        <div class="hud-item">
            <div class="hud-label">Player</div>
            <div id="hudInit" class="hud-val">---</div>
        </div>
        <div class="hud-item" style="text-align: right;">
            <div class="hud-label">Lines</div>
            <div id="hudLines" class="hud-val">0</div>
        </div>
    </div>

    <!-- 3. 게임 영역 (Flex 1로 남는 영역 자동 채움) -->
    <main id="mainGameArea">
        <div class="canvas-wrapper">
            <canvas id="tetris"></canvas>
        </div>
    </main>

    <!-- 4. 고정 컨트롤러 -->
    <div id="controller">
        <div class="ctrl-row">
            <div class="ctrl-btn btn-action" id="btn-up">회전 ↻</div>
            <div class="ctrl-btn btn-drop" id="btn-space">드롭 ⏬</div>
        </div>
        <div class="ctrl-row">
            <div class="ctrl-btn" id="btn-left">◀</div>
            <div class="ctrl-btn" id="btn-down">▼</div>
            <div class="ctrl-btn" id="btn-right">▶</div>
        </div>
    </div>

    <!-- 5. 게임 오버 -->
    <div id="gameover">
        <div class="gameover-card">
            <div style="font-size: 3rem; margin-bottom: 10px;">💀</div>
            <div class="title-main" style="font-size: 2rem; color: #ff007f; -webkit-text-fill-color: #ff007f;">GAME OVER</div>
            <div style="font-size: 1.1rem; margin-bottom: 25px; opacity: 0.8;">최종 기록: <span id="finalLines" style="color:var(--c-cyan); font-weight:900;">0</span>줄</div>
            <button class="btn-magic" onclick="location.reload()">다시 도전</button>
        </div>
    </div>
</div>

<script>
    // ══════════════════════════════════════════════════════
    // SOUND & REACTION
    // ══════════════════════════════════════════════════════
    let audioCtx;
    const REACTIONS = ["폼 미쳤다!", "나이스!", "오우예!", "찢었다!", "레벨업! 🔥", "GOAT!", "완벽해!", "깔끔쓰✨"];

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playSound(type) {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'move') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(200, t);
            gain.gain.setValueAtTime(0.05, t); osc.start(t); osc.stop(t + 0.05);
        } else if (type === 'rotate') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(400, t);
            gain.gain.setValueAtTime(0.05, t); osc.start(t); osc.stop(t + 0.1);
        } else if (type === 'drop') {
            osc.type = 'square'; osc.frequency.setValueAtTime(150, t);
            gain.gain.setValueAtTime(0.1, t); osc.start(t); osc.stop(t + 0.1);
        } else if (type === 'clear') {
            [440, 659].forEach((f, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, t + i * 0.1);
                g.gain.setValueAtTime(0.05, t + i * 0.1); o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.2);
            });
        }
    }

    function showReaction(text) {
        const el = document.createElement('div');
        el.className = 'floating-reaction';
        el.textContent = text || REACTIONS[Math.floor(Math.random() * REACTIONS.length)];
        document.getElementById('mainGameArea').appendChild(el);
        el.style.animation = 'float-reaction 1.2s ease-out forwards';
        setTimeout(() => el.remove(), 1300);
    }

    // ══════════════════════════════════════════════════════
    // SUPABASE & CONFIG
    // ══════════════════════════════════════════════════════
    const SUPA_URL = 'https://cvfmkcxmxkmemmshfttn.supabase.co';
    const SUPA_KEY = 'sb_publishable_Bb_GkRPWRFeAPvIduwPTJg_O1z_sStm';
    const TABLE_NAME = 'tetris_scores';
    let currentInitials = '';
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');

    async function loadLeaderboard() {
        try {
            const res = await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?select=initials,lines&order=lines.desc,timestamp.asc&limit=5`, {
                headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
            });
            const data = await res.json();
            document.getElementById('lbSpinner').style.display = 'none';
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';
            const medals = ['🥇', '🥈', '🥉', '4', '5'];
            data.forEach((e, i) => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:3px; background:rgba(0,0,0,0.2); padding:5px 10px; border-radius:5px;"><span>${medals[i]} <b>${e.initials}</b></span><span>${e.lines} L</span></div>`;
            });
        } catch (e) { document.getElementById('lbSpinner').textContent = '⚠'; }
    }

    async function saveScore(lines) {
        if (!currentInitials || lines <= 0) return;
        try {
            await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}`, {
                method: 'POST',
                headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                body: JSON.stringify({ initials: currentInitials, lines: lines, timestamp: new Date().toISOString() })
            });
        } catch (e) {}
    }

    // ══════════════════════════════════════════════════════
    // TETRIS ENGINE
    // ══════════════════════════════════════════════════════
    const COLS = 10, ROWS = 20, BLOCK_SIZE = 30;
    let arena = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    let player = { pos: {x: 0, y: 0}, matrix: null, lines: 0, gameOver: true };
    let dropCounter = 0, dropInterval = 1000, lastTime = 0;
    let isIntro = false;

    function createPiece(type) {
        if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
        if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
        if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
        if (type === 'O') return [[4,4],[4,4]];
        if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
        if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
        if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
    }

    const colors = [null, '#00e5ff', '#ff8e0d', '#3877ff', '#ffdd00', '#ff007f', '#00ff66', '#b300ff'];

    function draw() {
        const wrapper = document.querySelector('.canvas-wrapper');
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;

        const scale = Math.min(canvas.width / (COLS * BLOCK_SIZE), canvas.height / (ROWS * BLOCK_SIZE));
        const offsetX = (canvas.width - COLS * BLOCK_SIZE * scale) / 2;
        const offsetY = (canvas.height - ROWS * BLOCK_SIZE * scale) / 2;
        
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);
        
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)'; ctx.lineWidth = 0.5;
        for(let x=0; x<=COLS; x++) { ctx.beginPath(); ctx.moveTo(x*BLOCK_SIZE, 0); ctx.lineTo(x*BLOCK_SIZE, ROWS*BLOCK_SIZE); ctx.stroke(); }
        for(let y=0; y<=ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y*BLOCK_SIZE); ctx.lineTo(COLS*BLOCK_SIZE, y*BLOCK_SIZE); ctx.stroke(); }
        
        drawMatrix(arena, {x: 0, y: 0});
        if (player.matrix) drawMatrix(player.matrix, player.pos);
        ctx.restore();
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    const px = (x + offset.x) * BLOCK_SIZE, py = (y + offset.y) * BLOCK_SIZE;
                    ctx.fillStyle = colors[value];
                    ctx.shadowBlur = 10; ctx.shadowColor = colors[value];
                    ctx.fillRect(px + 1, py + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(px+1, py+1, BLOCK_SIZE-2, 4);
                }
            });
        });
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
            });
        });
    }

    function arenaSweep() {
        let count = 0;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) if (arena[y][x] === 0) continue outer;
            arena.unshift(arena.splice(y, 1)[0].fill(0));
            ++y; count++;
        }
        if (count > 0) {
            const oldLevel = Math.floor(player.lines / 10);
            player.lines += count;
            const newLevel = Math.floor(player.lines / 10);
            document.getElementById('hudLines').innerText = player.lines;
            if (newLevel > oldLevel) {
                dropInterval = Math.max(100, 1000 - (newLevel * 100));
                showReaction("LEVEL UP! 🔥");
            } else showReaction();
            playSound('clear');
        }
    }

    function playerDrop() {
        if (isIntro) return;
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--; merge(arena, player); playerReset(); arenaSweep();
        }
        dropCounter = 0;
    }

    function hardDrop() {
        if (player.gameOver || isIntro) return;
        while (!collide(arena, player)) { player.pos.y++; }
        player.pos.y--; merge(arena, player); playerReset(); arenaSweep();
        dropCounter = 0; playSound('drop'); draw();
    }

    function playerMove(dir) {
        if (player.gameOver || isIntro) return;
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
        else { playSound('move'); draw(); }
    }

    function playerRotate() {
        if (player.gameOver || isIntro) return;
        const pos = player.pos.x; let offset = 1;
        rotate(player.matrix);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) { rotate(player.matrix, -1); player.pos.x = pos; return; }
        }
        playSound('rotate'); draw();
    }

    function rotate(matrix, dir = 1) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
        if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0; player.pos.x = (COLS / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) { player.gameOver = true; finishGame(); }
    }

    function finishGame() {
        playSound('gameover');
        document.getElementById('gameover').style.display = 'flex';
        document.getElementById('finalLines').innerText = player.lines;
        saveScore(player.lines);
    }

    function update(time = 0) {
        if (player.gameOver || isIntro) return;
        const deltaTime = time - lastTime; lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) playerDrop();
        draw(); requestAnimationFrame(update);
    }

    // 🦅 Eagle Intro
    function startEagleIntro() {
        isIntro = true;
        const eagle = document.getElementById('eagle-wrap');
        eagle.style.display = 'block';
        eagle.animate([{ left: '-100px' }, { left: '45%' }], { duration: 1500, fill: 'forwards' }).onfinish = () => {
            playerReset(); draw(); playSound('drop'); showReaction("START! 🦅");
            eagle.animate([{ left: '45%' }, { left: '120%' }], { duration: 1000, fill: 'forwards', easing: 'ease-in' }).onfinish = () => {
                eagle.style.display = 'none'; isIntro = false; lastTime = performance.now(); update();
            };
        };
    }

    function enterArena() {
        initAudio();
        const val = document.getElementById('initialsInput').value.trim();
        if (val.length < 1) return;
        currentInitials = val; document.getElementById('hudInit').innerText = currentInitials;
        document.getElementById('s-login').classList.add('hidden');
        document.getElementById('hud').style.opacity = '1';
        document.getElementById('controller').style.opacity = '1';
        document.getElementById('controller').style.pointerEvents = 'auto';
        
        // 캔버스 크기를 정확히 잡기 위한 지연 실행
        setTimeout(startGame, 500); 
    }

    function startGame() {
        arena = Array.from({length: ROWS}, () => Array(COLS).fill(0));
        player.lines = 0; player.gameOver = false; dropInterval = 1000;
        document.getElementById('hudLines').innerText = '0';
        draw();
        startEagleIntro();
    }

    window.addEventListener('keydown', e => {
        if (player.gameOver || isIntro) return;
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
        if (e.key === 'ArrowLeft') playerMove(-1);
        else if (e.key === 'ArrowRight') playerMove(1);
        else if (e.key === 'ArrowDown') playerDrop();
        else if (e.key === 'ArrowUp') playerRotate();
        else if (e.key === ' ') hardDrop();
    });

    function bindBtn(id, action, repeat = false) {
        const btn = document.getElementById(id);
        let timer = null;
        const start = (e) => {
            e.preventDefault(); if(player.gameOver || isIntro) return;
            action(); if(repeat) { clearInterval(timer); timer = setInterval(action, 90); }
        };
        const end = () => clearInterval(timer);
        btn.addEventListener('pointerdown', start);
        btn.addEventListener('pointerup', end);
        btn.addEventListener('pointerleave', end);
        btn.addEventListener('pointercancel', end);
    }

    bindBtn('btn-left', () => playerMove(-1), true);
    bindBtn('btn-right', () => playerMove(1), true);
    bindBtn('btn-down', () => playerDrop(), true);
    bindBtn('btn-up', () => playerRotate());
    bindBtn('btn-space', () => hardDrop());

    // 리사이즈 로직 업데이트 (동적 캔버스 크기 조절)
    window.addEventListener('resize', () => { draw(); });
    loadLeaderboard();
</script>

</body>
</html>
