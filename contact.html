    <script>
        // ── Multilingual System ──
        const i18n = {
            ko: {
                nav_home: "Home",
                nav_worship: "Worship",
                nav_music: "Music",
                nav_book: "Books",
                nav_movie: "Movies",
                nav_share: "SHARE",
                share_title: "SHARE CONTACT",
                share_desc: "비즈니스 제안 페이지를 공유하세요.",
                share_copy: "COPY LINK",
                share_sns: "SNS SHARE",
                share_close: "Close",
                page_title: "CONTACT",
                page_desc: "새로운 비즈니스 제안, 콜라보레이션 등<br>다양한 형태의 협업을 기다리고 있습니다.",
                contact_notice: "⏱ 응답 시간: 24시간 이내",
                footer_text: "© 2026 Chris LEE.PAPA — The Creative Archive",
                toast_copy: "링크가 복사되었습니다 ✓",
                toast_fail: "복사 실패",
                toast_error: "지원하지 않는 브라우저입니다."
            },
            en: {
                nav_home: "Home",
                nav_worship: "Worship",
                nav_music: "Music",
                nav_book: "Books",
                nav_movie: "Movies",
                nav_share: "SHARE",
                share_title: "SHARE CONTACT",
                share_desc: "Share the business proposal page.",
                share_copy: "COPY LINK",
                share_sns: "SNS SHARE",
                share_close: "Close",
                page_title: "CONTACT",
                page_desc: "We look forward to various forms of collaboration,<br>including new business proposals and joint projects.",
                contact_notice: "⏱ Response time: Within 24 hours",
                footer_text: "© 2026 Chris LEE.PAPA — The Creative Archive",
                toast_copy: "Link copied to clipboard ✓",
                toast_fail: "Copy failed",
                toast_error: "Browser not supported."
            }
        };

        let currentLang = 'ko';

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            
            // Save preference
            try { localStorage.setItem('pref-lang', lang); } catch(e) {}

            // Update UI texts (inner HTML to preserve line breaks like <br>)
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.innerHTML = i18n[lang][key];
                }
            });

            // Update active state on language buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // Initialize language
        document.addEventListener('DOMContentLoaded', () => {
            let savedLang = 'ko';
            try { savedLang = localStorage.getItem('pref-lang') || 'ko'; } catch(e) {}
            setLanguage(savedLang);
        });

        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('navLinks');
        menuToggle.addEventListener('click', () => { 
            menuToggle.classList.toggle('active'); 
            navLinks.classList.toggle('active'); 
        });

        const shareOverlay = document.getElementById('shareOverlay');
        const toast = document.getElementById('toast');
        
        function openShareModal() { 
            shareOverlay.style.display = 'flex'; 
            setTimeout(() => shareOverlay.classList.add('active'), 10); 
        }
        function closeShareModal(e) { 
            if (e && e.target !== shareOverlay && e.type !== 'click') return; 
            shareOverlay.classList.remove('active'); 
            setTimeout(() => shareOverlay.style.display = 'none', 300); 
        }

        async function copyURL() {
            const currentUrl = window.location.href;
            let success = false;
            if (navigator.clipboard && window.isSecureContext) { 
                try { await navigator.clipboard.writeText(currentUrl); success = true; } catch (err) {} 
            }
            if (!success) {
                const textArea = document.createElement("textarea"); 
                textArea.value = currentUrl; 
                textArea.id = "temp-copy-area"; 
                textArea.style.position = "fixed"; 
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea); 
                textArea.focus(); 
                textArea.select(); 
                try { success = document.execCommand('copy'); } catch (err) {} 
                document.body.removeChild(textArea);
            }
            if (success) { showToast(i18n[currentLang].toast_copy); } else { showToast(i18n[currentLang].toast_fail); } 
            closeShareModal();
        }

        function shareViaWebAPI() { 
            if (navigator.share) { 
                navigator.share({ 
                    title: 'CONTACT Chris LEE.PAPA', 
                    text: '크리스리와의 협업 및 소통을 위한 공식 아카이브입니다.', 
                    url: window.location.href 
                }).catch(console.error); 
            } else { 
                showToast(i18n[currentLang].toast_error); 
            } 
        }

        function showToast(msg) { 
            toast.textContent = msg; 
            toast.style.display = 'block'; 
            setTimeout(() => { toast.style.display = 'none'; }, 2500); 
        }

        // ── 보안 스크립트 ──
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        document.addEventListener('copy', e => {
            if (e.target.id !== 'temp-copy-area' && window.getSelection().toString().length > 0) {
                e.preventDefault();
            }
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) e.preventDefault();
            if (e.ctrlKey && (e.key === 'c' || e.key === 's' || e.key === 'p')) {
                if (e.target.id !== 'temp-copy-area' && window.getSelection().toString().length > 0) e.preventDefault();
            }
            if (e.key === 'PrintScreen') navigator.clipboard.writeText('');
        });
    </script>
