<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Sistersquad 1인칭 대모험 (v2.0) ✨</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root { --gold: #FFD700; --dark: #110828; --char-hover: #FFFACD; --ui-purple: #C9A6FF; }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { overflow: hidden; background: var(--dark); font-family: 'Nunito', sans-serif; user-select: none; }
  
  #game-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
  
  /* 조준점 */
  #crosshair {
    position: absolute; top: 50%; left: 50%; width: 10px; height: 10px;
    background: white; border-radius: 50%; transform: translate(-50%, -50%);
    z-index: 10; pointer-events: none; mix-blend-mode: difference;
    display: none;
  }
  
  /* 1인칭 캐릭터 스프라이트 오버레이 (게임 중 화면 우하단) */
  #player-sprite {
    position: absolute; bottom: -20px; right: 15%; width: 400px; height: 400px;
    background-size: 500% 100%; background-position: 0% 0%; background-repeat: no-repeat;
    z-index: 15; pointer-events: none; display: none;
    filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
  }

  /* 캐릭터별 스프라이트 이미지 매핑 - (실제 파일명으로 교체) */
  .sprite-yul { background-image: url('yul_spritesheet.png'); }
  .sprite-jung { background-image: url('jeong_spritesheet.png'); }

  /* UI 오버레이 (상단 HUD) */
  #ui-layer {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    z-index: 20; pointer-events: none; padding: 20px; display: none;
  }
  .hud-top { display: flex; justify-content: space-between; align-items: flex-start; }
  .hud-box {
    background: rgba(17, 8, 40, 0.85); border: 2px solid rgba(255, 215, 0, 0.5);
    border-radius: 16px; padding: 12px 24px; text-align: center; color: white;
  }
  .hud-box small { font-size: 12px; font-weight: 700; color: #AAA; display: block; margin-bottom: 2px; }
  .score-text { font-family: 'Fredoka One', cursive; font-size: 24px; color: var(--gold); }
  
  /* 화면 데미지 이펙트 */
  #damage-overlay {
    position: absolute; inset: 0; background: red; opacity: 0;
    pointer-events: none; z-index: 50; transition: opacity 0.2s;
  }
  
  /* 모달 (팝업창) */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: linear-gradient(160deg, #1E0B4E, #0A1F55);
    border: 3px solid rgba(255, 215, 0, 0.5); border-radius: 24px;
    padding: 40px; text-align: center; max-width: 550px; width: 90%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.8);
  }
  .modal h2 { font-family: 'Fredoka One', cursive; font-size: 32px; color: var(--gold); margin-bottom: 20px; text-shadow: 0 2px 10px rgba(0,0,0,0.3); }
  .modal p.controls { color: #E8D5FF; font-size: 14px; line-height: 1.6; margin-bottom: 30px; font-weight: 600; }
  
  /* 캐릭터 선택 UI (가장 중요) */
  .char-select { display: flex; justify-content: center; gap: 30px; margin-bottom: 35px; }
  .char-card {
    background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2);
    border-radius: 20px; padding: 10px 15px; cursor: pointer; transition: all 0.3s;
    width: 180px; text-align: center; position: relative;
    overflow: hidden; /* 이미지 돌출 방지 */
  }
  .char-card:hover, .char-card.selected {
    transform: translateY(-5px); border-color: var(--gold); background: rgba(255,215,0,0.1);
    box-shadow: 0 5px 25px rgba(255, 215, 0, 0.3);
  }
  
  /* 카드 내 캐릭터 스프라이트 미리보기 */
  .char-card .img-preview-box {
    width: 100%; height: 160px; /* 고정 높이 */
    overflow: hidden; /* 스프라이트 프레임만 보이게 */
    position: relative; margin-bottom: 10px;
  }
  .char-card img.char-spritesheet {
    position: absolute; left: 0; top: 0;
    height: 100%; /* 카드 높이에 맞춤 */
    width: auto; /* 비율 유지 */
    transform: translateX(0); /* 기본: 첫 프레임 */
  }
  
  /* 호버 시 율이 스프라이트 애니메이션 시뮬레이션 (간단하게) */
  .char-card#card-yul:hover img.char-spritesheet {
    animation: yul-card-anim 0.4s steps(2) infinite; /* 2프레임 반복 */
  }
  @keyframes yul-card-anim {
    to { transform: translateX(-40%); } /* 프레임 너비 비율에 따라 조정 필요 */
  }

  .char-card h3 { color: white; font-family: 'Fredoka One', cursive; margin-bottom: 5px; }
  .char-card .ability { font-size: 12px; font-weight: 800; color: #BBB; }
  
  /* 선택된 상태 표시 */
  .char-card::after {
    content: '✓'; position: absolute; top: -5px; right: -5px;
    width: 25px; height: 25px; background: var(--gold); color: #111;
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    font-weight: bold; opacity: 0; transition: opacity 0.3s;
  }
  .char-card.selected::after { opacity: 1; }

  button.action-btn {
    background: linear-gradient(135deg, #FF69B4, #9B59B6); border: none; border-radius: 12px;
    color: white; font-size: 20px; font-weight: 900; padding: 16px 50px; cursor: pointer;
    box-shadow: 0 5px 20px rgba(233, 30, 99, 0.4); text-transform: uppercase; letter-spacing: 1px;
  }
  button.action-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 8px 30px rgba(233, 30, 99, 0.6); }

  #pause-screen, #game-over-screen, #win-screen { display: none; }
</style>
</head>
<body>

<div id="game-canvas"></div>
<div id="crosshair"></div>
<div id="player-sprite"></div>
<div id="damage-overlay"></div>

<div id="ui-layer">
  <div class="hud-top">
    <div class="hud-box">
      <small style="color: #FF9999;">체력 (HP)</small>
      <div class="score-text" id="hp-display">❤️❤️❤️</div>
    </div>
    <div class="hud-box">
      <small style="color: #FFFACD;">수집한 황금 열쇠</small>
      <div class="score-text" id="score-display">🔑 0 / 5</div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="start-screen">
  <div class="modal">
    <h2>✨ Sistersquad 1인칭 대모험 ✨</h2>
    <p class="controls">[W, A, S, D] 이동 | [마우스] 시점 전환 | [클릭] 마법 공격<br>
       미로에서 5개의 황금 열쇠를 모아 포털로 탈출하세요!
    </p>
    
    <div class="char-select">
      <div class="char-card selected" id="card-yul" onclick="selectChar('yul')">
        <div class="img-preview-box">
          <img src="yul_spritesheet.png" class="char-spritesheet" alt="Yul Sprite">
        </div>
        <h3>율이 (Yul)</h3>
        <p class="ability">강력한 불의 마법</p>
      </div>
      
      <div class="char-card" id="card-jung" onclick="selectChar('jung')">
        <div class="img-preview-box">
          <img src="jeong_spritesheet.png" class="char-spritesheet" style="height: 110%; bottom: -5px;" alt="Jung Sprite"> </div>
        <h3>정이 (Jung)</h3>
        <p class="ability">빛의 방패와 구체</p>
      </div>
    </div>
    
    <button class="action-btn" onclick="initGame()">게임 시작! (화면 고정)</button>
  </div>
</div>

<div class="modal-overlay" id="pause-screen">
  <div class="modal">
    <h2>⏸ 일시 정지</h2>
    <p>화면을 클릭하면 게임으로 돌아갑니다.</p>
  </div>
</div>

<div class="modal-overlay" id="game-over-screen">
  <div class="modal">
    <h2 style="color: #FF416C;">💀 게임 오버 💀</h2>
    <p>어둠의 병사들에게 당하고 말았습니다...</p>
    <button class="action-btn" onclick="location.reload()">다시 시작</button>
  </div>
</div>

<div class="modal-overlay" id="win-screen">
  <div class="modal">
    <h2 style="color: #00B4DB;">🏆 탈출 성공! 🏆</h2>
    <p>완벽한 자매의 승리입니다!<br>모든 황금 열쇠를 찾고 차원문을 통과했습니다!</p>
    <button class="action-btn" onclick="location.reload()">다시 플레이하기</button>
  </div>
</div>

<script>
// --- 전역 상태 ---
let scene, camera, renderer, clock;
let isPlaying = false;
let playerHealth = 3;
let collectedKeys = 0;
const MAX_KEYS = 5;

// 캐릭터 설정 (실제 투사체 색상은 동일)
let selectedChar = 'yul';
const spriteColors = { yul: 0xFF6900, jung: 0xFFDD00 }; 

// 맵 & 물리
const TILE_SIZE = 4;
const WALL_HEIGHT = 4;
let mapGrid = [];
let walls = [];
let keysList = []; // 아이템(열쇠) 리스트
let enemies = [];
let projectiles = [];
let portal = null;

// 입력 상태
const keysInput = { w: false, a: false, s: false, d: false };
let yaw = 0; 
let pitch = 0;
let isAttacking = false;

// 레벨 데이터 (S: 황금열쇠, E: 어둠의 병사)
const levelData = [
  "111111111111111",
  "1@000100S000001",
  "101101011111101",
  "101000000E00101",
  "101011111110101",
  "1000E000S010001",
  "111111011011101",
  "100000010000001",
  "101111010111101",
  "10S0010001E0S01",
  "101101111101111",
  "1010000E00000P1",
  "111111111111111"
];

// --- 캐릭터 선택 UI ---
function selectChar(char) {
  selectedChar = char;
  document.getElementById('card-yul').classList.remove('selected');
  document.getElementById('card-jung').classList.remove('selected');
  document.getElementById('card-' + char).classList.add('selected');
}

// --- 게임 초기화 ---
function initGame() {
  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('crosshair').style.display = 'block';
  document.getElementById('ui-layer').style.display = 'block';
  
  const spriteEl = document.getElementById('player-sprite');
  spriteEl.style.display = 'block';
  spriteEl.className = selectedChar === 'yul' ? 'sprite-yul' : 'sprite-jung';

  // Three.js 씬 구성
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x050510);
  scene.fog = new THREE.Fog(0x050510, 2, 35);
  
  clock = new THREE.Clock();
  camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 100);
  
  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.shadowMap.enabled = true;
  document.getElementById('game-canvas').appendChild(renderer.domElement);

  // 조명 (미로 분위기)
  scene.add(new THREE.AmbientLight(0xffffff, 0.25));
  const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
  dirLight.position.set(20, 50, 20);
  dirLight.castShadow = true;
  scene.add(dirLight);

  buildLevel();

  // 이벤트 리스너
  document.addEventListener('keydown', e => { if(keysInput.hasOwnProperty(e.key.toLowerCase())) keysInput[e.key.toLowerCase()] = true; });
  document.addEventListener('keyup', e => { if(keysInput.hasOwnProperty(e.key.toLowerCase())) keysInput[e.key.toLowerCase()] = false; });
  
  document.body.addEventListener('mousemove', e => {
    if (document.pointerLockElement === document.body) {
      yaw -= e.movementX * 0.0025;
      pitch -= e.movementY * 0.0025;
      pitch = Math.max(-Math.PI/2 + 0.1, Math.min(Math.PI/2 - 0.1, pitch));
      camera.rotation.set(pitch, yaw, 0, 'YXZ');
    }
  });

  document.body.addEventListener('mousedown', () => {
    if (document.pointerLockElement === document.body) {
      playerAttack();
    } else if (isPlaying) {
      document.body.requestPointerLock();
    }
  });

  document.addEventListener('pointerlockchange', () => {
    if (document.pointerLockElement === document.body) {
      isPlaying = true;
      document.getElementById('pause-screen').style.display = 'none';
    } else {
      isPlaying = false;
      if (playerHealth > 0 && collectedKeys < MAX_KEYS) {
        document.getElementById('pause-screen').style.display = 'flex';
      }
    }
  });

  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  document.body.requestPointerLock();
  animate();
}

// --- 레벨 빌드 ---
function buildLevel() {
  const floorGeo = new THREE.PlaneGeometry(levelData[0].length * TILE_SIZE, levelData.length * TILE_SIZE);
  const floorMat = new THREE.MeshStandardMaterial({ color: 0x1A2530, roughness: 0.9, metalness: 0.2 });
  const floor = new THREE.Mesh(floorGeo, floorMat);
  floor.rotation.x = -Math.PI / 2;
  floor.position.set((levelData[0].length * TILE_SIZE)/2, 0, (levelData.length * TILE_SIZE)/2);
  floor.receiveShadow = true;
  scene.add(floor);

  const wallGeo = new THREE.BoxGeometry(TILE_SIZE, WALL_HEIGHT, TILE_SIZE);
  const wallMat = new THREE.MeshStandardMaterial({ color: 0x24394F, roughness: 1 });

  for(let z=0; z<levelData.length; z++) {
    mapGrid[z] = [];
    for(let x=0; x<levelData[z].length; x++) {
      const char = levelData[z][x];
      mapGrid[z][x] = char === '1' ? 1 : 0;
      
      const px = x * TILE_SIZE + TILE_SIZE/2;
      const pz = z * TILE_SIZE + TILE_SIZE/2;

      if(char === '1') {
        const wall = new THREE.Mesh(wallGeo, wallMat);
        wall.position.set(px, WALL_HEIGHT/2, pz);
        wall.castShadow = true; wall.receiveShadow = true;
        scene.add(wall);
        walls.push(new THREE.Box3().setFromObject(wall));
      } else if(char === '@') {
        camera.position.set(px, 1.8, pz); // 플레이어 눈높이
      } else if(char === 'S') {
        spawnGoldenKey(px, pz); // 별 대신 황금 열쇠 소환
      } else if(char === 'E') {
        spawnShadowSoldier(px, pz); // 공 대신 어둠의 병사 소환
      } else if(char === 'P') {
        spawnPortal(px, pz);
      }
    }
  }
}

// --- 새로운 아이템: 황금 열쇠 (정교한 모양) 소환 ---
function spawnGoldenKey(x, z) {
  const group = new THREE.Group();
  
  const goldMat = new THREE.MeshStandardMaterial({ color: 0xFFD700, metalness: 0.9, roughness: 0.1 });
  
  // 열쇠 머리 (고리)
  const headGeo = new THREE.TorusGeometry(0.5, 0.15, 8, 32);
  const head = new THREE.Mesh(headGeo, goldMat);
  head.rotation.x = Math.PI/2;
  group.add(head);
  
  // 열쇠 몸통 (대)
  const shaftGeo = new THREE.CylinderGeometry(0.12, 0.12, 1.2, 16);
  const shaft = new THREE.Mesh(shaftGeo, goldMat);
  shaft.rotation.x = Math.PI/2;
  shaft.position.z = -0.7; // 고리 아래로 연장
  group.add(shaft);
  
  // 열쇠 날 (Bit - 아래로 돌출)
  const bitGeo = new THREE.BoxGeometry(0.25, 0.5, 0.08);
  const bit = new THREE.Mesh(bitGeo, goldMat);
  bit.position.set(0, -0.3, -1.1); // 대 끝부분 옆
  group.add(bit);
  
  const bit2 = bit.clone();
  bit2.position.z = -0.9; // 작은 날
  bit2.scale.set(0.8, 0.7, 1);
  group.add(bit2);

  group.position.set(x, 1.4, z); // 둥둥 뜨게
  group.rotation.y = Math.PI/2; // 기본 방향
  scene.add(group);
  keysList.push({ mesh: group, active: true, box: new THREE.Box3().setFromObject(group) });
}

// --- 새로운 적: 어둠의 병사 소환 ---
function spawnShadowSoldier(x, z) {
  const group = new THREE.Group();
  
  const shadowMat = new THREE.MeshStandardMaterial({ color: 0x110528, emissive: 0x440055, roughness: 1, metalness: 0.3 });
  const headMat = new THREE.MeshStandardMaterial({ color: 0x110528, emissive: 0xFF00FF, roughness: 1 }); // 눈 부위는 보라색 발광
  
  // 몸통 (어두운 실루엣의 큐브 조합)
  const torso = new THREE.Mesh(new THREE.BoxGeometry(1, 1.6, 0.8), shadowMat);
  torso.position.y = 1.3;
  group.add(torso);
  
  // 머리 (약간 뿔 같은 모양의 콘)
  const head = new THREE.Mesh(new THREE.ConeGeometry(0.4, 0.9, 4), shadowMat);
  head.position.y = torso.position.y + 0.8 + 0.45;
  head.rotation.y = Math.PI/4; // 정육면체로 보이게
  group.add(head);
  
  // 눈 (빛나는 작은 큐브)
  const eye = new THREE.Mesh(new THREE.BoxGeometry(0.15, 0.15, 0.1), headMat);
  eye.position.set(0.15, 0.15, 0.4); // 몸통 앞쪽 상단
  torso.add(eye);
  const eye2 = eye.clone(); eye2.position.x = -0.15; torso.add(eye2); // 왼쪽 눈

  // 창/무기 (어둠의 기운)
  const weapon = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 2.8, 8), shadowMat);
  weapon.position.set(0.7, 0.7, -0.2); // 오른손에 들고
  weapon.rotation.x = Math.PI/4;
  group.add(weapon);
  
  const wPoint = new THREE.Mesh(new THREE.ConeGeometry(0.15, 0.6, 4), headMat);
  wPoint.position.y = 1.4 + 0.3; group.add(weapon); weapon.add(wPoint); weapon.add(wPoint); weapon.add(wPoint); weapon.add(wPoint); weapon.add(wPoint); weapon.add(wPoint); weapon.add(wPoint); weapon.add(wPoint); weapon.add(wPoint); weapon.add(wPoint);
  
  weapon.add(new THREE.PointLight(0xFF00FF, 0.3, 2));

  group.position.set(x, 0, z); // 바닥에 서 있게
  group.castShadow = true;
  scene.add(group);
  enemies.push({ mesh: group, health: 3, speed: 3.5, box: new THREE.Box3(), state: 'idle' });
}

function spawnPortal(x, z) {
  const portalGeo = new THREE.TorusGeometry(1.5, 0.35, 16, 64);
  const portalMat = new THREE.MeshBasicMaterial({ color: 0x555555, transparent: true, opacity: 0.3 });
  portal = new THREE.Mesh(portalGeo, portalMat);
  portal.position.set(x, 2, z);
  portal.userData = { isOpen: false };
  scene.add(portal);
  
  const pLight = new THREE.PointLight(0x9B59B6, 0, 8); // 열리기 전엔 불 꺼짐
  portal.add(pLight);
}

// --- 공격 및 스프라이트 애니메이션 (율이/정이 동일하게 적용) ---
function playerAttack() {
  if (isAttacking) return;
  isAttacking = true;
  const spriteEl = document.getElementById('player-sprite');
  let frame = 0;
  
  const animInterval = setInterval(() => {
    frame++;
    if (frame >= 5) {
      clearInterval(animInterval);
      spriteEl.style.backgroundPosition = "0% 0%"; // Idle 상태
      isAttacking = false;
    } else {
      spriteEl.style.backgroundPosition = `${frame * 25}% 0%`;
      if (frame === 2) spawnProjectile(); // 손 뻗는 프레임에서 발사
    }
  }, 80);
}

function spawnProjectile() {
  const geo = new THREE.SphereGeometry(0.35, 8, 8);
  const mat = new THREE.MeshBasicMaterial({ color: spriteColors[selectedChar], transparent: true, opacity: 0.9 });
  const mesh = new THREE.Mesh(geo, mat);
  
  const dir = new THREE.Vector3();
  camera.getWorldDirection(dir);
  
  mesh.position.copy(camera.position).add(dir.clone().multiplyScalar(1.5));
  mesh.position.y -= 0.4;
  scene.add(mesh);
  
  // 전방 및 상하 투사체
  projectiles.push({ mesh: mesh, velocity: dir.multiplyScalar(22), life: 1.8 });
  
  const pLight = new THREE.PointLight(spriteColors[selectedChar], 1, 6);
  mesh.add(pLight);
}

// --- 충돌 감지 (벽) ---
function checkWallCollision(newPos) {
  const playerBox = new THREE.Box3(
    new THREE.Vector3(newPos.x - 0.4, 0, newPos.z - 0.4),
    new THREE.Vector3(newPos.x + 0.4, WALL_HEIGHT, newPos.z + 0.4)
  );
  for (let box of walls) {
    if (playerBox.intersectsBox(box)) return true;
  }
  return false;
}

// --- 메인 게임 루프 ---
function animate() {
  requestAnimationFrame(animate);
  const delta = clock.getDelta();

  if (isPlaying) {
    // 1. 플레이어 이동
    const moveSpeed = 9.0 * delta;
    const forward = new THREE.Vector3(Math.sin(yaw), 0, Math.cos(yaw)).normalize();
    const right = new THREE.Vector3(Math.sin(yaw - Math.PI/2), 0, Math.cos(yaw - Math.PI/2)).normalize();
    
    let moveDir = new THREE.Vector3(0,0,0);
    if (keysInput.w) moveDir.sub(forward);
    if (keysInput.s) moveDir.add(forward);
    if (keysInput.a) moveDir.sub(right);
    if (keysInput.d) moveDir.add(right);
    
    if (moveDir.lengthSq() > 0) {
      moveDir.normalize().multiplyScalar(moveSpeed);
      const newPos = camera.position.clone().add(moveDir);
      
      if (!checkWallCollision(new THREE.Vector3(newPos.x, camera.position.y, camera.position.z))) {
        camera.position.x = newPos.x;
      }
      if (!checkWallCollision(new THREE.Vector3(camera.position.x, camera.position.y, newPos.z))) {
        camera.position.z = newPos.z;
      }
      // 걷는 효과 (Y bobbing)
      camera.position.y = 1.8 + Math.sin(clock.getElapsedTime() * 11) * 0.15;
    }

    // 2. 투사체 업데이트
    for (let i = projectiles.length - 1; i >= 0; i--) {
      let p = projectiles[i];
      p.mesh.position.add(p.velocity.clone().multiplyScalar(delta));
      p.life -= delta;
      
      // 어둠의 병사 타격 확인
      let hit = false;
      for (let e of enemies) {
        if (e.health > 0 && p.mesh.position.distanceTo(e.mesh.position.clone().add(new THREE.Vector3(0, 1.3, 0))) < 1.6) {
          e.health -= 1;
          e.mesh.children[0].material.emissive.setHex(0xFFFFFF); // 몸통 피격 번쩍임
          setTimeout(() => { if(e.mesh && e.mesh.children[0]) e.mesh.children[0].material.emissive.setHex(0x440055); }, 100);
          hit = true;
          break;
        }
      }

      if (hit || p.life <= 0) {
        scene.remove(p.mesh);
        projectiles.splice(i, 1);
      }
    }

    // 3. 적 업데이트 (어둠의 병사 추적 및 공격)
    for (let e of enemies) {
      if (e.health <= 0) {
        scene.remove(e.mesh);
        e.mesh.position.y = -100;
        continue;
      }
      
      const distToPlayer = e.mesh.position.distanceTo(new THREE.Vector3(camera.position.x, 0, camera.position.z));
      
      // 가까워지면 추적
      if (distToPlayer < 14) {
        const dir = new THREE.Vector3().subVectors(camera.position, e.mesh.position).normalize();
        dir.y = 0;
        e.mesh.position.add(dir.multiplyScalar(e.speed * delta));
        e.mesh.lookAt(camera.position.x, 0, camera.position.z); // 플레이어 항상 쳐다봄
        e.mesh.position.y = Math.abs(Math.sin(clock.getElapsedTime() * 8 + e.mesh.position.x)) * 0.2; // 둥둥
        
        // 플레이어 타격
        if (distToPlayer < TILE_SIZE * 0.8 && e.state === 'idle') {
          takeDamage();
          e.state = 'cooldown';
          setTimeout(() => e.state = 'idle', 1200); // 공격 쿨타임
        }
      }
    }

    // 4. 아이템(황금 열쇠) 획득
    keysList.forEach(s => {
      if (s.active) {
        s.mesh.rotation.y += 2.5 * delta;
        if (camera.position.distanceTo(s.mesh.position) < 2.0) {
          s.active = false;
          scene.remove(s.mesh);
          collectedKeys++;
          document.getElementById('score-display').innerText = `🔑 ${collectedKeys} / ${MAX_KEYS}`;
          
          if (collectedKeys >= MAX_KEYS) {
            portal.userData.isOpen = true;
            portal.material.color.setHex(0x9B59B6);
            portal.material.opacity = 1;
            portal.children[0].intensity = 2; // 불 켜짐
          }
        }
      }
    });

    // 5. 차원문 업데이트
    if (portal && portal.userData.isOpen) {
      portal.rotation.y += 3 * delta;
      portal.rotation.z += 1 * delta;
      const sc = 1 + Math.sin(clock.getElapsedTime() * 6) * 0.15;
      portal.scale.set(sc, sc, sc);
      
      if (camera.position.distanceTo(portal.position) < 2.0) {
        isPlaying = false;
        document.exitPointerLock();
        document.getElementById('win-screen').style.display = 'flex';
      }
    }
  }

  renderer.render(scene, camera);
}

// --- 데미지 처리 ---
function takeDamage() {
  playerHealth--;
  let hpStr = "";
  for(let i=0; i<playerHealth; i++) hpStr += "❤️";
  for(let i=playerHealth; i<3; i++) hpStr += "🖤";
  document.getElementById('hp-display').innerText = hpStr;

  const dmgOverlay = document.getElementById('damage-overlay');
  dmgOverlay.style.opacity = '0.5';
  setTimeout(() => { dmgOverlay.style.opacity = '0'; }, 200);

  if (playerHealth <= 0) {
    isPlaying = false;
    document.exitPointerLock();
    document.getElementById('game-over-screen').style.display = 'flex';
  }
}
</script>
