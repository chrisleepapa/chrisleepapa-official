<!DOCTYPE html>
<html lang="ko">
<head>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3207219520058740"
     crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NBGELYQ4TZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-NBGELYQ4TZ');
      gtag('config', 'GT-5MJDBTR2');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아빠의 서재 - 책 쌓기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #111;
            font-family: sans-serif;
        }

        #game-container {
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        canvas {
            display: block;
        }

        #ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px;
            z-index: 10;
            display: flex;
            gap: 15px;
            align-items: flex-start;
        }

        .hud-panel {
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            padding: 14px;
            color: white;
        }

        .modal {
            position: absolute;
            inset: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-box {
            width: 320px;
            background: #1f1f1f;
            color: white;
            border-radius: 16px;
            padding: 30px;
            text-align: center;
        }

        button {
            width: 100%;
            border: none;
            padding: 14px;
            border-radius: 10px;
            cursor: pointer;
            background: gold;
            font-weight: bold;
            margin-top: 15px;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: none;
            margin-top: 10px;
            text-align: center;
            font-size: 24px;
            text-transform: uppercase;
        }
    </style>
</head>

<body>

<div id="game-container">

    <div id="ui-layer">

        <div>
            <div class="hud-panel">
                <div>높이: <span id="score">0</span> 권</div>
                <div style="margin-top:8px;">
                    최고 기록:
                    <span id="best-score">0</span>
                </div>
            </div>

            <div class="hud-panel" style="margin-top:12px;">
                <div style="color:gold;font-weight:bold;margin-bottom:10px;">
                    🏆 TOP 5
                </div>

                <div id="leaderboard"></div>
            </div>
        </div>

    </div>

    <div id="start-modal" class="modal">

        <div class="modal-box">

            <h1 style="font-size:34px;">
                아빠의 서재
            </h1>

            <p style="margin-top:10px;">
                이니셜 3글자를 입력하세요
            </p>

            <input
                type="text"
                id="player-initials"
                maxlength="3"
                placeholder="AAA"
            >

            <button id="btn-start">
                게임 시작
            </button>

        </div>

    </div>

    <div id="gameover-modal"
         class="modal"
         style="display:none;">

        <div class="modal-box">

            <h2 style="font-size:30px;">
                무너졌습니다!
            </h2>

            <p style="margin-top:20px;">
                최종 점수:
                <span id="final-score">0</span>
                권
            </p>

            <button id="btn-restart">
                다시 시작
            </button>

        </div>

    </div>

</div>

<script>

const Engine = Matter.Engine;
const Render = Matter.Render;
const Runner = Matter.Runner;
const Bodies = Matter.Bodies;
const Composite = Matter.Composite;
const Body = Matter.Body;

let engine;
let render;
let runner;

let books = [];
let currentBook = null;

let score = 0;

let bestScore =
    localStorage.getItem('studyRoomBookBest') || 0;

let leaderboard =
    JSON.parse(
        localStorage.getItem('studyRoomLeaderboard') || '[]'
    );

let playerInitials = 'AAA';

const width = window.innerWidth;
const height = window.innerHeight;

const scoreEl =
    document.getElementById('score');

const bestScoreEl =
    document.getElementById('best-score');

const finalScoreEl =
    document.getElementById('final-score');

const leaderboardEl =
    document.getElementById('leaderboard');

const initialsInput =
    document.getElementById('player-initials');

const startModal =
    document.getElementById('start-modal');

const gameoverModal =
    document.getElementById('gameover-modal');

bestScoreEl.textContent = bestScore;

function renderLeaderboard() {

    leaderboardEl.innerHTML = '';

    if (leaderboard.length === 0) {

        leaderboardEl.innerHTML =
            '<div style="opacity:0.6;">기록 없음</div>';

        return;
    }

    leaderboard
        .sort((a, b) => b.score - a.score)
        .slice(0, 5)
        .forEach((entry, index) => {

            const row = document.createElement('div');

            row.style.marginBottom = '6px';

            row.innerHTML = `
                <span style="color:gold;">
                    ${index + 1}.
                </span>

                <span style="margin:0 8px;font-weight:bold;">
                    ${entry.name}
                </span>

                <span>
                    ${entry.score}권
                </span>
            `;

            leaderboardEl.appendChild(row);
        });
}

renderLeaderboard();

function initPhysics() {

    engine = Engine.create();

    render = Render.create({
        element: document.getElementById('game-container'),
        engine: engine,
        options: {
            width: width,
            height: height,
            wireframes: false,
            background: '#111'
        }
    });

    const ground = Bodies.rectangle(
        width / 2,
        height - 40,
        500,
        80,
        {
            isStatic: true,
            render: {
                fillStyle: '#5b3a29'
            }
        }
    );

    Composite.add(engine.world, [ground]);

    Render.run(render);

    runner = Runner.create();

    Runner.run(runner, engine);

    spawnBook();
}

function spawnBook() {

    const w = 140;
    const h = 30;

    currentBook = Bodies.rectangle(
        width / 2,
        120,
        w,
        h,
        {
            isStatic: true,
            friction: 0.8,
            render: {
                fillStyle: '#8b4513'
            }
        }
    );

    Composite.add(engine.world, currentBook);

    books.push(currentBook);
}

function dropBook() {

    if (!currentBook) return;

    Body.setStatic(currentBook, false);

    currentBook = null;

    score++;

    scoreEl.textContent = score;

    setTimeout(() => {

        checkGameOver();

        if (gameoverModal.style.display === 'none') {
            spawnBook();
        }

    }, 1000);
}

function checkGameOver() {

    for (let book of books) {

        if (book.position.y > height + 100) {

            gameOver();

            break;
        }
    }
}

function gameOver() {

    const finalScore = Math.max(0, score - 1);

    finalScoreEl.textContent = finalScore;

    leaderboard.push({
        name: playerInitials,
        score: finalScore
    });

    leaderboard = leaderboard
        .sort((a, b) => b.score - a.score)
        .slice(0, 5);

    localStorage.setItem(
        'studyRoomLeaderboard',
        JSON.stringify(leaderboard)
    );

    renderLeaderboard();

    if (finalScore > bestScore) {

        bestScore = finalScore;

        localStorage.setItem(
            'studyRoomBookBest',
            bestScore
        );

        bestScoreEl.textContent = bestScore;
    }

    gameoverModal.style.display = 'flex';
}

function startGame() {

    playerInitials = initialsInput.value
        .toUpperCase()
        .replace(/[^A-Z0-9]/g, '')
        .slice(0, 3);

    if (playerInitials.length === 0) {
        playerInitials = 'AAA';
    }

    startModal.style.display = 'none';
    gameoverModal.style.display = 'none';

    score = 0;
    scoreEl.textContent = '0';

    books = [];

    if (render) {

        Render.stop(render);
        Runner.stop(runner);

        render.canvas.remove();
    }

    initPhysics();
}

document
    .getElementById('btn-start')
    .addEventListener('click', startGame);

document
    .getElementById('btn-restart')
    .addEventListener('click', startGame);

window.addEventListener('pointermove', (e) => {

    if (currentBook) {

        Body.setPosition(currentBook, {
            x: e.clientX,
            y: 120
        });
    }
});

window.addEventListener('pointerup', () => {

    dropBook();
});

</script>

</body>
</html>
