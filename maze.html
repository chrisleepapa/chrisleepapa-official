<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏃 Sistersquad: 2D 사이드 런 🏃</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<style>
  :root { --gold: #FFD700; --pink: #FF69B4; }
  body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; user-select: none; touch-action: none; }
  
  /* 게임 배경 (스크롤 애니메이션) */
  #game-container {
    position: relative; width: 100vw; height: 100vh;
    background: linear-gradient(to bottom, #87CEEB 0%, #E0F7FA 100%);
    overflow: hidden;
  }
  
  /* 바닥 */
  #ground {
    position: absolute; bottom: 0; width: 200%; height: 20%;
    background: repeating-linear-gradient(90deg, #4CAF50, #4CAF50 50px, #388E3C 50px, #388E3C 100px);
    animation: scroll-ground 2s linear infinite;
  }
  @keyframes scroll-ground { from { left: 0; } to { left: -100px; } }

  /* 캐릭터 스프라이트 */
  #player {
    position: absolute; bottom: 20%; left: 100px;
    width: 120px; height: 120px;
    background-size: 500% 100%; background-repeat: no-repeat;
    z-index: 10; transition: transform 0.1s;
  }
  .sprite-yul { background-image: url('/images/yul_spritesheet.png'); }
  .sprite-jung { background-image: url('/images/jeong_spritesheet.png'); }

  /* 장애물 및 아이템 */
  .obstacle { position: absolute; background: #5D4037; border-radius: 8px; z-index: 5; }
  .key { position: absolute; width: 40px; height: 40px; background: var(--gold); border-radius: 50%; border: 3px solid #fff; z-index: 5; line-height: 40px; text-align: center; font-weight: bold; }

  /* 컨트롤러 */
  #controls {
    position: absolute; bottom: 30px; width: 100%;
    display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; z-index: 100;
  }
  .btn {
    width: 100px; height: 100px; background: rgba(0,0,0,0.4); color: white;
    border: 3px solid white; border-radius: 50%; font-size: 20px; font-weight: 900;
    display: flex; align-items: center; justify-content: center; pointer-events: auto;
  }
  .btn:active { transform: scale(0.9); background: rgba(255,105,180,0.6); }

  /* HUD */
  #hud {
    position: absolute; top: 20px; left: 20px; right: 20px;
    display: flex; justify-content: space-between; z-index: 100;
  }
  .hud-item { background: rgba(0,0,0,0.6); color: white; padding: 10px 20px; border-radius: 20px; border: 2px solid var(--gold); font-weight: bold; }

  .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; z-index: 200; color: white; text-align: center; }
</style>
</head>
<body>

<div id="game-container">
  <div id="ground"></div>
  <div id="player" class="sprite-yul"></div>
  
  <div id="hud" style="display:none;">
    <div class="hud-item">HP: <span id="hp-val">❤️❤️❤️</span></div>
    <div class="hud-item">🔑 <span id="score-val">0 / 10</span></div>
  </div>

  <div id="controls" style="display:none;">
    <div id="btn-jump" class="btn">JUMP</div>
    <div id="btn-slide" class="btn">SLIDE</div>
  </div>
</div>

<div id="start-modal" class="modal">
  <div style="background: #333; padding: 40px; border-radius: 20px; border: 3px solid var(--gold);">
    <h1 style="font-family:'Fredoka One';">SISTERS SIDE-RUN!</h1>
    <p>점프(2단 점프 가능)와 슬라이딩으로 열쇠를 모으세요!</p>
    <div style="margin: 20px 0;">
      <button onclick="selectChar('yul')" id="sel-yul" style="padding:10px 20px; background:var(--pink); border:none; color:white; font-weight:bold;">율이</button>
      <button onclick="selectChar('jung')" id="sel-jung" style="padding:10px 20px; background:#555; border:none; color:white; font-weight:bold;">정이</button>
    </div>
    <button onclick="startGame()" style="background:var(--gold); border:none; padding:15px 40px; font-size:20px; font-weight:900; border-radius:10px;">START</button>
  </div>
</div>

<script>
let isPlaying = false;
let score = 0, hp = 3;
let selectedChar = 'yul';
let jumpCount = 0;
let isSliding = false;
let playerY = 0;
let playerVelocityY = 0;
const gravity = 0.8;
const jumpStrength = -16;

const player = document.getElementById('player');
const scoreDisplay = document.getElementById('score-val');
const hpDisplay = document.getElementById('hp-val');

function selectChar(char) {
  selectedChar = char;
  player.className = 'sprite-' + char;
  document.getElementById('sel-yul').style.background = char === 'yul' ? '#FF69B4' : '#555';
  document.getElementById('sel-jung').style.background = char === 'jung' ? '#FF69B4' : '#555';
}

function startGame() {
  document.getElementById('start-modal').style.display = 'none';
  document.getElementById('hud').style.display = 'flex';
  document.getElementById('controls').style.display = 'flex';
  isPlaying = true;
  gameLoop();
  spawnManager();
}

function handleJump() {
  if (jumpCount < 2) { // 2단 점프
    playerVelocityY = jumpStrength;
    jumpCount++;
    isSliding = false;
  }
}

function handleSlide(active) {
  if (playerY === 0) { // 바닥일 때만 슬라이딩 가능
    isSliding = active;
    if (active) {
      player.style.height = "60px";
      player.style.transform = "translateY(60px)";
    } else {
      player.style.height = "120px";
      player.style.transform = "translateY(0)";
    }
  }
}

// 터치 및 키보드 이벤트
document.getElementById('btn-jump').onpointerdown = (e) => { e.preventDefault(); handleJump(); };
document.getElementById('btn-slide').onpointerdown = (e) => { e.preventDefault(); handleSlide(true); };
document.getElementById('btn-slide').onpointerup = (e) => { e.preventDefault(); handleSlide(false); };

window.onkeydown = (e) => {
  if (e.code === 'ArrowUp' || e.code === 'Space') handleJump();
  if (e.code === 'ArrowDown') handleSlide(true);
};
window.onkeyup = (e) => {
  if (e.code === 'ArrowDown') handleSlide(false);
};

function gameLoop() {
  if (!isPlaying) return;

  // 중력 및 점프 처리
  playerVelocityY += gravity;
  playerY += playerVelocityY;

  if (playerY > 0) {
    playerY = 0;
    playerVelocityY = 0;
    jumpCount = 0;
  }

  player.style.bottom = (20 - (playerY / 5)) + "%";

  // 스프라이트 애니메이션
  const frame = Math.floor(Date.now() / 100) % 5;
  player.style.backgroundPosition = `${frame * 25}% 0`;

  // 오브젝트 이동 및 충돌
  const obstacles = document.querySelectorAll('.obstacle, .key');
  obstacles.forEach(obj => {
    let x = parseFloat(obj.style.left);
    x -= 8; // 속도
    obj.style.left = x + 'px';

    // 충돌 체크
    const pRect = player.getBoundingClientRect();
    const oRect = obj.getBoundingClientRect();

    if (pRect.right - 20 > oRect.left && pRect.left + 20 < oRect.right &&
        pRect.bottom - 10 > oRect.top && pRect.top + 10 < oRect.bottom) {
      if (obj.classList.contains('key')) {
        score++;
        scoreDisplay.innerText = score + " / 10";
        obj.remove();
        if (score >= 10) { alert("열쇠를 모두 모았습니다! 탈출 성공!"); location.reload(); }
      } else {
        hp--;
        hpDisplay.innerText = "❤️".repeat(hp) + "🖤".repeat(3-hp);
        obj.remove();
        if (hp <= 0) { isPlaying = false; alert("게임 오버!"); location.reload(); }
      }
    }

    if (x < -100) obj.remove();
  });

  requestAnimationFrame(gameLoop);
}

function spawnManager() {
  if (!isPlaying) return;
  const rand = Math.random();
  const container = document.getElementById('game-container');

  if (rand > 0.97) { // 장애물 혹은 키 생성
    const type = Math.random();
    if (type > 0.4) { // 지상 장애물 (점프 필요)
      const obs = document.createElement('div');
      obs.className = 'obstacle';
      obs.style.width = '50px';
      obs.style.height = '60px';
      obs.style.bottom = '20%';
      obs.style.left = '110vw';
      container.appendChild(obs);
    } else if (type > 0.2) { // 공중 장애물 (슬라이딩 필요)
      const obs = document.createElement('div');
      obs.className = 'obstacle';
      obs.style.width = '80px';
      obs.style.height = '50px';
      obs.style.bottom = '35%';
      obs.style.left = '110vw';
      container.appendChild(obs);
    } else { // 열쇠
      const key = document.createElement('div');
      key.className = 'key';
      key.innerText = '🔑';
      key.style.bottom = (Math.random() > 0.5 ? '40%' : '25%');
      key.style.left = '110vw';
      container.appendChild(key);
    }
  }
  setTimeout(spawnManager, 100);
}
</script>
</body>
</html>
