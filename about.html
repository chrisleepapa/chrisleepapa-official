    <script>
        const menuToggle = document.getElementById('mobile-menu'); const navLinks = document.getElementById('navLinks');
        menuToggle.addEventListener('click', () => { menuToggle.classList.toggle('active'); navLinks.classList.toggle('active'); });

        const shareOverlay = document.getElementById('shareOverlay'); const toast = document.getElementById('toast');
        function openShareModal() { shareOverlay.style.display = 'flex'; setTimeout(() => shareOverlay.classList.add('active'), 10); }
        function closeShareModal(e) { if (e && e.target !== shareOverlay && e.type !== 'click') return; shareOverlay.classList.remove('active'); setTimeout(() => shareOverlay.style.display = 'none', 300); }

        async function copyURL() {
            const currentUrl = window.location.href; let success = false;
            if (navigator.clipboard && window.isSecureContext) { try { await navigator.clipboard.writeText(currentUrl); success = true; } catch (err) {} }
            if (!success) {
                const textArea = document.createElement("textarea"); textArea.value = currentUrl; textArea.id = "temp-copy-area"; textArea.style.position = "fixed"; textArea.style.left = "-9999px";
                document.body.appendChild(textArea); textArea.focus(); textArea.select(); try { success = document.execCommand('copy'); } catch (err) {} document.body.removeChild(textArea);
            }
            if (success) { showToast('Link copied to clipboard!'); } else { showToast('Copy failed. Please copy manually.'); } closeShareModal();
        }

        function shareViaWebAPI() { if (navigator.share) { navigator.share({ title: 'ABOUT Chris LEE.PAPA', text: '크리스리의 새로운 도전과 창조의 기록들을 만나보세요.', url: window.location.href }).catch(console.error); } else { showToast('Sharing is not supported.'); } }
        function showToast(msg) { toast.textContent = msg; toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 2500); }

        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => { if (e.target.id !== 'temp-copy-area' && window.getSelection().toString().length > 0) { e.preventDefault(); } });
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) e.preventDefault();
            if (e.ctrlKey && (e.key === 'c' || e.key === 's' || e.key === 'p')) { if (e.target.id !== 'temp-copy-area' && window.getSelection().toString().length > 0) e.preventDefault(); }
            if (e.key === 'PrintScreen') navigator.clipboard.writeText('');
        });
    </script>
