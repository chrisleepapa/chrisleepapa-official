    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TETRIS BATTLE - Chrisleepapa</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Cinzel:wght@700;900&family=Exo+2:wght@800;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-neon: #ff007f;
            --c-cyan: #00e5ff;
            --c-gold: #ffcf00;
            --bg-deep: #030305;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-deep);
            color: #fff;
        }

        /* 시네마틱 노이즈 텍스처 */
        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05; pointer-events: none;
        }

        #gameWrap {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            margin: auto;
            overflow: hidden;
            z-index: 1;
            background: radial-gradient(circle at 50% 30%, #1a0533 0%, var(--bg-deep) 100%);
        }

        canvas {
            width: 100%;
            height: 100%;
            display: block;
            touch-action: none;
            filter: drop-shadow(0 0 20px rgba(255, 0, 127, 0.2));
        }

        /* ─── UI Screens ─── */
        .screen {
            position: absolute; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            padding: max(env(safe-area-inset-top, 30px), 30px) 25px;
            background: radial-gradient(circle at 50% 20%, #151025 0%, var(--bg-deep) 90%);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .screen.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }

        .title-main {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 3rem;
            background: linear-gradient(180deg, #fff, #b3b3b3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            margin-bottom: 5px; text-align: center;
        }

        .title-sub {
            font-family: 'Black Han Sans', sans-serif; font-size: 1.5rem;
            color: var(--c-neon); letter-spacing: 4px; margin-bottom: 40px;
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
        }

        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 30px 24px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .input-neon {
            width: 100%; text-align: center; font-family: 'Exo 2', sans-serif;
            font-size: 2.2rem; font-weight: 900; letter-spacing: 0.3em;
            padding: 15px; border-radius: 16px; background: rgba(0,0,0,0.4);
            color: var(--c-cyan); border: 2px solid rgba(0,229,255,0.2);
            outline: none; transition: 0.3s; text-transform: uppercase;
        }

        .input-neon:focus {
            border-color: var(--c-cyan);
            box-shadow: 0 0 30px rgba(0,229,255,0.3), inset 0 0 15px rgba(0,229,255,0.1);
        }

        .btn-magic {
            width: 100%; border: none; border-radius: 18px; padding: 18px;
            font-family: 'Black Han Sans', sans-serif; font-size: 1.4rem;
            cursor: pointer; transition: all 0.2s ease; color: #fff;
            background: linear-gradient(135deg, #ff007f, #7f00ff);
            box-shadow: 0 10px 30px rgba(255,0,127,0.4);
            margin-top: 20px;
        }

        .btn-magic:active { transform: scale(0.96); opacity: 0.9; }

        /* Leaderboard */
        .lb-header {
            display: flex; align-items: center; gap: 10px; margin-bottom: 15px;
            border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px;
        }

        .lb-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 16px; border-radius: 12px; background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.05); margin-bottom: 8px;
        }

        .lb-medal { width: 30px; font-size: 1.2rem; }
        .lb-initials { font-family: 'Exo 2', sans-serif; font-weight: 800; font-size: 1.1rem; color: #fff; }
        .lb-val { font-family: 'Exo 2', sans-serif; font-weight: 900; color: var(--c-gold); }

        /* HUD */
        #hud {
            position: absolute; top: max(env(safe-area-inset-top, 20px), 20px);
            left: 0; width: 100%; padding: 0 20px;
            display: flex; justify-content: space-between; align-items: center;
            z-index: 50; pointer-events: none; display: none;
        }

        .hud-item {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            padding: 10px 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1);
        }

        .hud-label { font-size: 11px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .hud-val { font-family: 'Exo 2', sans-serif; font-size: 24px; font-weight: 900; color: var(--c-cyan); }

        /* Game Over Overlay */
        #gameover {
            position: absolute; inset: 0; background: rgba(0,0,0,0.85);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 110; backdrop-filter: blur(10px);
        }

        .gameover-card {
            background: var(--glass); border: 1px solid var(--glass-border);
            padding: 40px; border-radius: 30px; text-align: center; width: 85%;
        }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; display: inline-block; }

    </style>
</head>
<body>

<div id="gameWrap">
    <!-- 1. 메인 로그인/이니셜 스크린 -->
    <div id="s-login" class="screen">
        <div style="margin-top: 5vh;">
            <div class="title-main">TETRIS</div>
            <div class="title-sub">NEON BATTLE</div>
        </div>

        <div class="glass-panel" style="margin-bottom: 25px;">
            <div style="font-size:0.8rem; font-weight:700; letter-spacing:2px; opacity:0.6; margin-bottom:15px; text-align:center;">PLAYER INITIALS</div>
            <input id="initialsInput" class="input-neon" maxlength="3" placeholder="AAA" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')"/>
            <button class="btn-magic" onclick="enterArena()">배틀 필드 입장</button>
        </div>

        <div class="glass-panel">
            <div class="lb-header">
                <div style="font-size: 1.3rem;">👑</div>
                <div style="font-family:'Cinzel',serif; font-weight:900; font-size:1.2rem; letter-spacing:2px;">HALL OF FAME</div>
                <div id="lbSpinner" class="spinner" style="margin-left:auto;">⟳</div>
            </div>
            <div id="leaderboardList"></div>
        </div>
    </div>

    <!-- 2. 게임 HUD -->
    <div id="hud">
        <div class="hud-item">
            <div class="hud-label">Initials</div>
            <div id="hudInit" class="hud-val">---</div>
        </div>
        <div class="hud-item" style="text-align: right;">
            <div class="hud-label">Lines</div>
            <div id="hudLines" class="hud-val">0</div>
        </div>
    </div>

    <!-- 3. 게임 캔버스 -->
    <canvas id="tetris"></canvas>

    <!-- 4. 게임 오버 팝업 -->
    <div id="gameover">
        <div class="gameover-card">
            <div style="font-size: 4rem; margin-bottom: 10px;">💀</div>
            <div class="title-main" style="font-size: 2.5rem; color: #ff007f; -webkit-text-fill-color: #ff007f;">GAME OVER</div>
            <div style="font-size: 1.2rem; margin-bottom: 30px; opacity: 0.8;">당신의 기록은 <span id="finalLines" style="color:var(--c-cyan); font-weight:900;">0</span>줄 입니다.</div>
            <button class="btn-magic" onclick="location.reload()">메인 메뉴로</button>
        </div>
    </div>
</div>

<script>
    // ══════════════════════════════════════════════════════
    // DB & CONFIG
    // ══════════════════════════════════════════════════════
    const SUPA_URL = 'https://cvfmkcxmxkmemmshfttn.supabase.co';
    const SUPA_KEY = 'sb_publishable_Bb_GkRPWRFeAPvIduwPTJg_O1z_sStm';
    const TABLE_NAME = 'tetris_scores';

    let currentInitials = '';
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');

    // ══════════════════════════════════════════════════════
    // LEADERBOARD LOGIC
    // ══════════════════════════════════════════════════════
    async function loadLeaderboard() {
        const list = document.getElementById('leaderboardList');
        try {
            const res = await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?select=initials,lines&order=lines.desc,timestamp.asc&limit=5`, {
                headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
            });
            const data = await res.json();
            document.getElementById('lbSpinner').style.display = 'none';
            list.innerHTML = '';
            if (!data || !data.length) {
                list.innerHTML = '<div style="text-align:center; opacity:0.4; padding:20px;">기록이 없습니다.</div>';
                return;
            }
            const medals = ['🥇', '🥈', '🥉', '4', '5'];
            data.forEach((e, i) => {
                list.innerHTML += `
                    <div class="lb-row">
                        <div style="display:flex; gap:15px; align-items:center;">
                            <div class="lb-medal">${medals[i]}</div>
                            <div class="lb-initials">${e.initials}</div>
                        </div>
                        <div class="lb-val">${e.lines} LINES</div>
                    </div>`;
            });
        } catch (e) {
            document.getElementById('lbSpinner').textContent = '⚠';
            list.innerHTML = '<div style="text-align:center; opacity:0.4; padding:20px;">서버 연결 오류</div>';
        }
    }

    async function saveScore(lines) {
        if (!currentInitials || lines <= 0) return;
        try {
            await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}`, {
                method: 'POST',
                headers: {
                    apikey: SUPA_KEY,
                    Authorization: `Bearer ${SUPA_KEY}`,
                    'Content-Type': 'application/json',
                    'Prefer': 'return=minimal'
                },
                body: JSON.stringify({ 
                    initials: currentInitials, 
                    lines: lines,
                    timestamp: new Date().toISOString()
                })
            });
        } catch (e) { console.error("점수 저장 실패", e); }
    }

    // ══════════════════════════════════════════════════════
    // TETRIS ENGINE
    // ══════════════════════════════════════════════════════
    const COLS = 10;
    const ROWS = 20;
    const BLOCK_SIZE = 30; // 논리적 크기
    
    let arena = createMatrix(COLS, ROWS);
    let player = { pos: {x: 0, y: 0}, matrix: null, lines: 0, gameOver: true };
    let dropCounter = 0;
    let dropInterval = 1000;
    let lastTime = 0;

    function createMatrix(w, h) {
        const matrix = [];
        while (h--) matrix.push(new Array(w).fill(0));
        return matrix;
    }

    function createPiece(type) {
        if (type === 'I') return [[0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0], [0, 1, 0, 0]];
        if (type === 'L') return [[0, 2, 0], [0, 2, 0], [0, 2, 2]];
        if (type === 'J') return [[0, 3, 0], [0, 3, 0], [3, 3, 0]];
        if (type === 'O') return [[4, 4], [4, 4]];
        if (type === 'Z') return [[5, 5, 0], [0, 5, 5], [0, 0, 0]];
        if (type === 'S') return [[0, 6, 6], [6, 6, 0], [0, 0, 0]];
        if (type === 'T') return [[0, 7, 0], [7, 7, 7], [0, 0, 0]];
    }

    const colors = [null, '#00e5ff', '#ff8e0d', '#3877ff', '#ffdd00', '#ff007f', '#00ff66', '#b300ff'];

    function draw() {
        // 캔버스 크기 대응
        const scale = Math.min(canvas.width / (COLS * BLOCK_SIZE), canvas.height / (ROWS * BLOCK_SIZE)) * 0.95;
        const offsetX = (canvas.width - COLS * BLOCK_SIZE * scale) / 2;
        const offsetY = (canvas.height - ROWS * BLOCK_SIZE * scale) / 2;

        ctx.fillStyle = '#000';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.save();
        ctx.translate(offsetX, offsetY);
        ctx.scale(scale, scale);

        // 보드 격자
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
        ctx.lineWidth = 1;
        for(let x=0; x<=COLS; x++) { ctx.beginPath(); ctx.moveTo(x*BLOCK_SIZE, 0); ctx.lineTo(x*BLOCK_SIZE, ROWS*BLOCK_SIZE); ctx.stroke(); }
        for(let y=0; y<=ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y*BLOCK_SIZE); ctx.lineTo(COLS*BLOCK_SIZE, y*BLOCK_SIZE); ctx.stroke(); }

        drawMatrix(arena, {x: 0, y: 0});
        if (player.matrix) drawMatrix(player.matrix, player.pos);
        ctx.restore();
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    const px = (x + offset.x) * BLOCK_SIZE;
                    const py = (y + offset.y) * BLOCK_SIZE;
                    
                    ctx.fillStyle = colors[value];
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = colors[value];
                    ctx.fillRect(px + 1, py + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                    
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)';
                    ctx.fillRect(px + 1, py + 1, BLOCK_SIZE - 2, 4);
                }
            });
        });
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
            });
        });
    }

    function arenaSweep() {
        let count = 0;
        outer: for (let y = arena.length - 1; y > 0; --y) {
            for (let x = 0; x < arena[y].length; ++x) {
                if (arena[y][x] === 0) continue outer;
            }
            const row = arena.splice(y, 1)[0].fill(0);
            arena.unshift(row);
            ++y;
            count++;
        }
        if (count > 0) {
            player.lines += count;
            document.getElementById('hudLines').innerText = player.lines;
            dropInterval = Math.max(100, 1000 - (player.lines * 30));
        }
    }

    function playerDrop() {
        player.pos.y++;
        if (collide(arena, player)) {
            player.pos.y--;
            merge(arena, player);
            playerReset();
            arenaSweep();
        }
        dropCounter = 0;
    }

    function playerMove(dir) {
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
    }

    function playerRotate() {
        const pos = player.pos.x;
        let offset = 1;
        rotate(player.matrix);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) {
                rotate(player.matrix, -1);
                player.pos.x = pos;
                return;
            }
        }
    }

    function rotate(matrix, dir = 1) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
        if (dir > 0) matrix.forEach(row => row.reverse());
        else matrix.reverse();
    }

    function playerReset() {
        const pieces = 'ILJOTSZ';
        player.matrix = createPiece(pieces[pieces.length * Math.random() | 0]);
        player.pos.y = 0;
        player.pos.x = (COLS / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) {
            player.gameOver = true;
            finishGame();
        }
    }

    function finishGame() {
        document.getElementById('gameover').style.display = 'flex';
        document.getElementById('finalLines').innerText = player.lines;
        saveScore(player.lines);
    }

    function update(time = 0) {
        if (player.gameOver) return;
        const deltaTime = time - lastTime;
        lastTime = time;
        dropCounter += deltaTime;
        if (dropCounter > dropInterval) playerDrop();
        draw();
        requestAnimationFrame(update);
    }

    // ══════════════════════════════════════════════════════
    // FLOW CONTROL
    // ══════════════════════════════════════════════════════
    function enterArena() {
        const val = document.getElementById('initialsInput').value.trim();
        if (val.length < 1) {
            document.getElementById('initialsInput').style.borderColor = 'red';
            return;
        }
        currentInitials = val;
        document.getElementById('hudInit').innerText = currentInitials;
        document.getElementById('s-login').classList.add('hidden');
        document.getElementById('hud').style.display = 'flex';
        
        startGame();
    }

    function startGame() {
        arena.forEach(row => row.fill(0));
        player.lines = 0;
        player.gameOver = false;
        document.getElementById('hudLines').innerText = '0';
        playerReset();
        lastTime = performance.now();
        update();
    }

    window.addEventListener('resize', () => {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        draw();
    });

    window.addEventListener('keydown', e => {
        if (player.gameOver) return;
        if (e.key === 'ArrowLeft') playerMove(-1);
        else if (e.key === 'ArrowRight') playerMove(1);
        else if (e.key === 'ArrowDown') playerDrop();
        else if (e.key === 'ArrowUp') playerRotate();
    });

    // 초기 설정
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    loadLeaderboard();
    draw();

</script>

</body>
</html>
