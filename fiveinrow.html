<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>럭셔리 오목 - 캐릭터 대전 (Supabase 랭킹)</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --wood-dark: #8b5a2b;
            --wood-light: #dcb35c;
            --bg-color: #e0d7c6;
            --panel-bg: rgba(255, 255, 255, 0.95);
            --primary: #2c3e50;
        }

        body {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; margin: 0; background-color: var(--bg-color);
            font-family: 'Pretendard', 'Apple SD Gothic Neo', sans-serif;
            touch-action: manipulation; overflow-x: hidden;
            padding: 20px 0; box-sizing: border-box;
        }

        /* 🏆 랭킹 보드 (배경 투명 & 가독성 대폭 개선) */
        .leaderboard-wrapper {
            position: fixed; top: 15px; left: 15px;
            padding: 10px 15px; background: transparent; /* 배경 완전 투명 */
            width: 180px; text-align: left;
            z-index: 90; pointer-events: auto;
            /* 글씨가 어떤 배경에서도 잘 보이도록 강한 그림자 추가 */
            text-shadow: 1px 2px 4px rgba(0,0,0,0.95), 0 0 4px rgba(0,0,0,1), 0 0 10px rgba(0,0,0,0.8);
        }

        .leaderboard-wrapper h3 { 
            margin: 0 0 8px 0; color: #f1c40f; font-size: 14px; font-weight: 900; 
            border-bottom: 1px solid rgba(241, 196, 15, 0.4); padding-bottom: 4px;
        }
        .leaderboard-list { list-style: none; padding: 0; margin: 0; }
        .leaderboard-item {
            display: flex; justify-content: space-between; padding: 5px 0;
            font-weight: bold; color: #fff; font-size: 13px;
        }
        .leaderboard-item .rank { width: 35px; text-align: left; color: #ddd; font-weight: 900;}
        .leaderboard-item .ini { flex: 1; text-align: center; color: #fff; font-size: 14px; letter-spacing: 1px; font-weight: 900;}
        .leaderboard-item .wins { color: #f1c40f; width: 35px; text-align: right; font-weight: 900; }

        @media (max-width: 800px) {
            .leaderboard-wrapper {
                top: 10px; left: 10px;
                width: 150px; padding: 8px 10px;
            }
            .leaderboard-wrapper h3 { font-size: 12px; margin-bottom: 6px; }
            .leaderboard-item { font-size: 11px; padding: 3px 0; }
            .leaderboard-item .rank { width: 25px; }
            .leaderboard-item .ini { font-size: 12px; }
            .leaderboard-item .wins { font-size: 12px; width: 25px; }
        }

        /* 캐릭터 선택 화면 (Intro) */
        #intro-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(135deg, #e0d7c6, #c2b59b);
            z-index: 100; display: flex; flex-direction: column;
            align-items: center; justify-content: flex-start;
            padding: 40px 20px; box-sizing: border-box; transition: opacity 0.5s;
            overflow-y: auto;
        }

        .intro-inner {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            width: 100%; min-height: 100%; margin: auto 0;
        }

        .intro-title {
            font-size: 32px; font-weight: 900; color: #333;
            margin-bottom: 15px; text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            text-align: center;
        }

        .intro-mode-selector { display: flex; gap: 10px; margin-bottom: 25px; }
        .intro-mode-btn {
            padding: 10px 24px; border-radius: 30px; border: 2px solid var(--wood-dark);
            background: transparent; color: #555; font-weight: 800; font-size: 16px;
            cursor: pointer; transition: 0.3s;
        }
        .intro-mode-btn.active { background: var(--wood-dark); color: #fff; box-shadow: 0 5px 15px rgba(139,90,43,0.4); }
        .intro-instruction { font-size: 18px; font-weight: bold; color: #555; margin-bottom: 20px; text-align: center; }

        .char-grid {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;
            max-width: 500px; width: 100%; margin-bottom: 25px;
        }

        @media (max-width: 500px) {
            .char-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .intro-title { font-size: 26px; }
            .intro-mode-btn { padding: 8px 18px; font-size: 14px; }
        }

        .char-card {
            background: #fff; border-radius: 16px; padding: 15px 10px; position: relative;
            text-align: center; cursor: pointer; box-shadow: 0 8px 20px rgba(0,0,0,0.08);
            transition: all 0.2s; border: 3px solid transparent;
        }
        .char-card:hover { transform: translateY(-5px); box-shadow: 0 12px 25px rgba(0,0,0,0.15); }

        .char-badge {
            position: absolute; top: -10px; padding: 4px 10px; border-radius: 12px;
            font-size: 12px; font-weight: 900; color: #fff; box-shadow: 0 4px 10px rgba(0,0,0,0.2);
            display: none; z-index: 5;
        }
        .p1-badge { left: -5px; background: #2c3e50; }
        .p2-badge { right: -5px; background: #e67e22; }

        .char-card.selected-p1 .p1-badge { display: block; }
        .char-card.selected-p2 .p2-badge { display: block; }
        .char-card.selected-p1 { border-color: #2c3e50; transform: scale(1.05); background: #f8fbff; }
        .char-card.selected-p2 { border-color: #e67e22; transform: scale(1.05); background: #fffdf8; }
        .char-card.selected-p1.selected-p2 { border: 3px dashed #333; }

        .char-img-wrapper {
            width: 60px; height: 60px; margin: 0 auto 10px;
            border-radius: 50%; overflow: hidden; background: #f0f0f0;
            display: flex; align-items: center; justify-content: center;
            font-size: 35px; box-shadow: inset 0 2px 5px rgba(0,0,0,0.1);
        }
        .char-img-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .char-name { font-weight: 700; color: #444; font-size: 15px; }

        .initial-form-container {
            background: rgba(255, 255, 255, 0.5); padding: 20px; border-radius: 12px; border: 1px solid rgba(139,90,43,0.3);
            text-align: center; width: 100%; max-width: 300px; transition: 0.3s;
        }
        .initial-form-container label { display: block; font-size: 14px; font-weight: bold; color: #555; margin-bottom: 8px; }
        .initials-input {
            padding: 12px 0; font-size: 24px; text-align: center; border: none; border-bottom: 3px solid rgba(139,90,43,0.5);
            background: transparent; width: 100%; text-transform: uppercase; font-weight: 900; outline: none;
            color: var(--wood-dark); letter-spacing: 4px; transition: 0.3s;
        }
        .initials-input:focus { border-color: var(--wood-dark); }
        .initials-input::placeholder { color: #aaa; font-weight: 500; letter-spacing: normal; font-size: 18px; }
        .initial-error { color: #e74c3c; font-size: 12px; margin-top: 8px; font-weight: bold; display: none; }

        .start-btn {
            margin-top: 25px; padding: 15px 50px; background: var(--wood-dark);
            color: #fff; border: none; border-radius: 50px; font-size: 20px;
            font-weight: 800; cursor: pointer; box-shadow: 0 10px 20px rgba(139,90,43,0.3);
            transition: 0.3s; opacity: 0.5; pointer-events: none;
        }
        .start-btn.active { opacity: 1; pointer-events: auto; }
        .start-btn.active:hover { background: #6f4722; transform: scale(1.05); }

        @media (max-height: 750px) {
            .intro-title { margin-bottom: 10px; font-size: 22px; }
            .intro-mode-selector { margin-bottom: 15px; }
            .intro-instruction { margin-bottom: 10px; font-size: 15px; }
            .char-grid { margin-bottom: 15px; }
            .char-card { padding: 10px 5px; }
            .char-img-wrapper { width: 50px; height: 50px; margin-bottom: 8px; }
            .char-name { font-size: 13px; }
            .initial-form-container { padding: 15px; margin-bottom: 10px; }
            .initials-input { padding: 8px 0; font-size: 20px; }
            .start-btn { margin-top: 10px; padding: 12px 40px; font-size: 18px; }
        }

        /* 메인 게임 UI */
        #game-screen {
            display: none; flex-direction: column; align-items: center;
            width: 100%; max-width: 500px; position: relative; z-index: 10;
        }

        .header { text-align: center; margin-bottom: 5px; width: 100%; padding: 0 10px; }

        .vs-banner {
            display: flex; align-items: center; justify-content: center; gap: 8px;
            margin-bottom: 10px; padding: 10px; background: transparent;
        }

        .player-profile { display: flex; flex-direction: column; align-items: center; width: 110px; }

        .profile-img-wrap {
            width: 75px; height: 75px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; font-size: 40px;
            overflow: hidden; border: 4px solid;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            opacity: 0.6; filter: grayscale(30%); transform: scale(0.9);
        }
        .p1-profile .profile-img-wrap { border-color: #2c3e50; background: #111; box-shadow: inset 0 0 10px rgba(0,0,0,0.8); }
        .p2-profile .profile-img-wrap { border-color: #f1f2f6; background: #fff; box-shadow: inset 0 0 10px rgba(0,0,0,0.2); }

        .profile-img-wrap img { width: 100%; height: 100%; object-fit: cover; }

        .profile-img-wrap.active-turn {
            opacity: 1; filter: grayscale(0%); transform: scale(1.3); z-index: 10;
        }
        @keyframes pulse-p1 {
            0% { box-shadow: 0 0 10px rgba(44, 62, 80, 0.8); }
            50% { box-shadow: 0 0 25px rgba(44, 62, 80, 1); }
            100% { box-shadow: 0 0 10px rgba(44, 62, 80, 0.8); }
        }
        .p1-profile .profile-img-wrap.active-turn { animation: pulse-p1 1.5s infinite; border-color: #000; }

        @keyframes pulse-p2 {
            0% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
            50% { box-shadow: 0 0 25px rgba(255, 255, 255, 1); }
            100% { box-shadow: 0 0 10px rgba(255, 255, 255, 0.8); }
        }
        .p2-profile .profile-img-wrap.active-turn { animation: pulse-p2 1.5s infinite; border-color: #fff; }

        .player-name-lbl {
            font-size: 14px; font-weight: 900; color: #555; margin-top: 15px;
            text-align: center; line-height: 1.3; text-shadow: 1px 1px 0px rgba(255,255,255,0.8);
            transition: all 0.3s;
        }
        .active-turn ~ .player-name-lbl { color: #000; transform: scale(1.1); text-shadow: 0 0 5px rgba(255,255,255,1); }

        .vs-text {
            font-size: 24px; font-weight: 900; color: #a67c52; font-style: italic;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.5); margin: 0 5px;
        }

        .timer-container {
            width: 100%; max-width: 250px; margin: 0 auto 5px; text-align: center;
        }
        .timer-text { font-size: 18px; font-weight: 900; color: #f1c40f; margin-bottom: 4px; text-shadow: 1px 1px 2px rgba(0,0,0,0.3); }
        .timer-bar-bg { width: 100%; height: 8px; background: rgba(0,0,0,0.2); border-radius: 4px; overflow: hidden; border: 1px solid rgba(255,255,255,0.3); }
        .timer-bar-fill { height: 100%; width: 100%; background: #f1c40f; transition: width 0.1s linear, background-color 0.3s; }

        /* 바둑판 */
        #board-wrapper {
            position: relative; padding: 10px; background: var(--wood-dark);
            border-radius: 8px; box-shadow: 0 15px 40px rgba(0,0,0,0.25);
            background: linear-gradient(145deg, #a67c52, #6f4722);
            margin-top: 5px;
            /* 이펙트를 위해 transition 추가 */
            transition: box-shadow 0.1s, transform 0.1s; 
        }
        #board-container {
            position: relative; background: var(--wood-light);
            background-image: repeating-linear-gradient(45deg, rgba(255,255,255,0.05) 0px, rgba(255,255,255,0.05) 2px, transparent 2px, transparent 10px);
            line-height: 0; border: 1px solid rgba(0,0,0,0.2); overflow: hidden;
        }
        canvas { cursor: pointer; max-width: 92vw; max-height: 92vw; border-radius: 2px; }

        /* 복기 컨트롤러 UI */
        .review-controls {
            display: none; align-items: center; justify-content: center; gap: 10px;
            margin-top: 15px; padding: 12px 20px; background: var(--wood-dark);
            border-radius: 30px; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            width: 100%; max-width: 350px; box-sizing: border-box;
        }
        .review-controls button {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3); color: white; 
            padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s;
        }
        .review-controls button:hover { background: rgba(255,255,255,0.4); }
        .review-controls .exit-btn { background: #e74c3c; border-color: #c0392b; margin-left: 10px; }
        .review-controls .exit-btn:hover { background: #c0392b; }
        #review-step-text { font-size: 16px; font-weight: 900; min-width: 65px; text-align: center; color: #f1c40f; }

        /* 플로팅 멘트 */
        @keyframes floatChat {
            0% { opacity: 0; transform: translateY(20px) scale(0.5) rotate(-10deg); }
            20% { opacity: 1; transform: translateY(0px) scale(1.2) rotate(5deg); }
            40% { opacity: 1; transform: translateY(-10px) scale(1) rotate(0deg); }
            80% { opacity: 1; transform: translateY(-20px) scale(1); }
            100% { opacity: 0; transform: translateY(-40px) scale(0.8); }
        }
        .floating-chat {
            position: absolute; pointer-events: none; z-index: 50;
            font-size: 26px; font-weight: 900; font-family: 'Comic Sans MS', 'Pretendard', sans-serif;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            animation: floatChat 1.8s ease-out forwards; white-space: nowrap;
        }
        .chat-player { color: #f1c40f; }
        .chat-opp { color: #e74c3c; }

        /* 결과 모달 */
        #result-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            display: none; align-items: center; justify-content: center; z-index: 200;
        }
        .result-box {
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 25px 50px rgba(0,0,0,0.4), inset 0 0 20px rgba(255,255,255,0.1);
            padding: 40px; border-radius: 20px; text-align: center;
            transform: scale(0.8); opacity: 0; transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            width: 85%; max-width: 400px;
        }
        .result-box.show { transform: scale(1); opacity: 1; }

        .result-title { font-size: 45px; font-weight: 900; margin: 0 0 10px 0; word-break: keep-all; }
        .win-text { color: #f1c40f; text-shadow: 2px 2px 5px rgba(211, 84, 0, 0.8); }
        .lose-text { color: #85c1e9; text-shadow: 2px 2px 5px rgba(41, 128, 185, 0.8); }
        .timeout-text { color: #e74c3c; text-shadow: 2px 2px 5px rgba(192, 57, 43, 0.8); font-size: 38px; }

        .result-sub { font-size: 18px; color: #fff; margin-bottom: 20px; font-weight: 600; text-shadow: 1px 1px 3px rgba(0,0,0,0.8); word-break: keep-all; line-height: 1.4; }

        .win-count-display {
            background: rgba(0,0,0,0.3);
            border-radius: 15px; padding: 15px; margin-bottom: 25px;
            border: 1px solid rgba(241, 196, 15, 0.4);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
        }
        .win-count-display .label { font-size: 1.1rem; color: #ddd; font-weight: bold; }
        .win-count-display .number {
            font-size: 4rem; color: #f1c40f; font-weight: 900;
            text-shadow: 0 0 20px rgba(241, 196, 15, 0.7);
            display: inline-block; margin: 0 10px; line-height: 1;
        }

        .btn-group { display: flex; flex-wrap: wrap; justify-content: center; gap: 8px; }
        .btn-group button {
            padding: 12px 18px; border: none; border-radius: 12px;
            cursor: pointer; font-size: 15px; font-weight: bold; transition: 0.2s;
        }
        .btn-review { background: rgba(142, 68, 173, 0.9); color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); }
        .btn-review:hover { background: rgba(115, 45, 145, 1); transform: translateY(-2px); }
        .btn-replay { background: rgba(44, 62, 80, 0.9); color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.3); border: 1px solid rgba(255,255,255,0.2); }
        .btn-replay:hover { background: rgba(26, 37, 47, 1); transform: translateY(-2px); }
        .btn-char { background: rgba(255, 255, 255, 0.8); color: #333; border: 1px solid rgba(255,255,255,0.5); }
        .btn-char:hover { background: #fff; transform: translateY(-2px); }

        #loadingCloud { font-size: 10px; color: #ccc; font-weight: normal; margin-left: 5px; }
    </style>
</head>
<body>

    <!-- 🏆 랭킹 보드 (개선됨) -->
    <div class="leaderboard-wrapper" style="display:none;" id="leaderboardWrapper">
        <h3>🏆 TOP 5 <span id="loadingCloud"></span></h3>
        <ul class="leaderboard-list" id="leaderboardList"></ul>
    </div>

    <!-- 캐릭터 선택 화면 -->
    <div id="intro-screen">
        <div class="intro-inner">
            <div class="intro-title">오목 대전 설정</div>
            <div class="intro-mode-selector">
                <button id="btnIntroCom" class="intro-mode-btn active" onclick="setIntroMode('COM')">VS 컴퓨터</button>
                <button id="btnIntro1v1" class="intro-mode-btn" onclick="setIntroMode('1vs1')">1 VS 1 대전</button>
            </div>
            <div id="introInstruction" class="intro-instruction">내 캐릭터(흑돌)를 선택하세요</div>
            <div class="char-grid" id="charGrid"></div>
            <div class="initial-form-container" id="initialForm">
                <label>랭킹 등록용 이니셜 (영문 3자리)</label>
                <input type="text" id="initialsInput" class="initials-input" placeholder="AAA" maxlength="3" autocomplete="off">
                <div id="initial-error" class="initial-error">영문 3자리를 정확히 입력해주세요.</div>
            </div>
            <button class="start-btn" id="startBtn" onclick="startGame()">게임 시작</button>
        </div>
    </div>

    <!-- 게임 화면 -->
    <div id="game-screen">
        <div class="header">
            <div class="vs-banner">
                <div class="player-profile p1-profile">
                    <div class="profile-img-wrap active-turn" id="p1AvatarWrap">
                        <span id="playerAvatar">👧</span>
                    </div>
                    <div class="player-name-lbl" id="playerNameTxt">플레이어</div>
                </div>
                <div class="vs-text">VS</div>
                <div class="player-profile p2-profile">
                    <div class="profile-img-wrap" id="p2AvatarWrap">
                        <span id="oppAvatar">🤖</span>
                    </div>
                    <div class="player-name-lbl" id="oppNameTxt">인공지능</div>
                </div>
            </div>
            <div class="timer-container">
                <div class="timer-text" id="timerText">30초</div>
                <div class="timer-bar-bg">
                    <div class="timer-bar-fill" id="timerBar"></div>
                </div>
            </div>
        </div>

        <div id="board-wrapper">
            <div id="board-container">
                <canvas id="omokBoard" width="450" height="450"></canvas>
            </div>
        </div>

        <!-- 복기 컨트롤러 -->
        <div id="review-controls" class="review-controls">
            <button onclick="reviewJump('start')">|◀</button>
            <button onclick="reviewMove(-1)">◀</button>
            <span id="review-step-text">0 / 0</span>
            <button onclick="reviewMove(1)">▶</button>
            <button onclick="reviewJump('end')">▶|</button>
            <button class="exit-btn" onclick="exitReview()">종료</button>
        </div>
    </div>

    <!-- 승패 결과 모달 -->
    <div id="result-modal">
        <div class="result-box" id="resultBox">
            <h1 class="result-title win-text" id="resultTitle">You Win!</h1>
            <p class="result-sub" id="resultSub">멋진 승부였습니다.</p>

            <div id="winCountContainer" class="win-count-display" style="display: none;">
                <span class="label">현재까지 총</span><br>
                <span class="number" id="resultCurrentWins">...</span><span class="label">승 달성!</span>
            </div>

            <div class="btn-group">
                <button class="btn-review" onclick="startReview()">복기하기</button>
                <button class="btn-replay" onclick="closeResultAndReplay()">다시 하기</button>
                <button class="btn-char" onclick="goToIntro()">처음으로</button>
            </div>
        </div>
    </div>

    <script>
        const SUPA_URL = 'https://cvfmkcxmxkmemmshfttn.supabase.co';
        const SUPA_KEY = 'sb_publishable_Bb_GkRPWRFeAPvIduwPTJg_O1z_sStm';
        const TABLE_NAME = 'omok_ranking';

        async function loadLeaderboard() {
            const listEl = document.getElementById('leaderboardList');
            document.getElementById('loadingCloud').innerText = "🔄";
            try {
                const res = await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?select=*&order=wins.desc&limit=5`, {
                    headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
                });
                if (!res.ok) throw new Error("테이블 정보 없음");
                const data = await res.json();
                document.getElementById('loadingCloud').innerText = "";
                listEl.innerHTML = '';
                if (!Array.isArray(data) || data.length === 0) {
                    listEl.innerHTML = '<li class="leaderboard-item" style="justify-content:center;color:#888;">아직 기록이 없습니다.</li>';
                    return;
                }
                data.forEach((entry, idx) => {

        let audioCtx;
        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function playStoneSound() {
            if(!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sine'; osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(100, audioCtx.currentTime + 0.05);
            gain.gain.setValueAtTime(1, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
        function playWinSound() {
            if(!audioCtx) return;
            [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.type = 'triangle'; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.5, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                }, i * 120);
            });
        }
        function playLoseSound() {
            if(!audioCtx) return;
            [349.23, 329.63, 311.13, 293.66].forEach((freq, i) => {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
                    osc.type = 'sawtooth'; osc.frequency.value = freq;
                    gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
                    osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.4);
                }, i * 250);
            });
        }

        const canvas = document.getElementById("omokBoard");
        const ctx = canvas.getContext("2d");
        const boardContainer = document.getElementById('board-container');

        const size = 15; const padding = 25; const cellSize = (canvas.width - padding * 2) / (size - 1);
        let board = Array.from(Array(size), () => Array(size).fill(0));
        let turn = 1; let gameOver = false;
        
        let moveHistory = [];
        let isReviewMode = false;
        let currentReviewStep = 0;

        let turnStartTime = 0; let timerInterval = null; let currentTimeLimit = 30;

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            if (gameOver || isReviewMode) return;
            
            const moves = moveHistory.length;
            if (moves >= 50) currentTimeLimit = 10;
            else if (moves >= 20) currentTimeLimit = 20;
            else currentTimeLimit = 30;

            turnStartTime = Date.now();
            const timerText = document.getElementById('timerText'); const timerBar = document.getElementById('timerBar');

            timerInterval = setInterval(() => {
                if(gameOver || isReviewMode) { clearInterval(timerInterval); return; }
                const elapsedTurn = (Date.now() - turnStartTime) / 1000;
                const remaining = Math.max(0, currentTimeLimit - elapsedTurn);
                timerText.innerText = Math.ceil(remaining) + "초";
                const pct = (remaining / currentTimeLimit) * 100;
                timerBar.style.width = pct + "%";
                if (remaining <= 5) { timerBar.style.background = "#e74c3c"; timerText.style.color = "#e74c3c"; } 
                else { timerBar.style.background = "#f1c40f"; timerText.style.color = "#f1c40f"; }
                if (remaining <= 0) { clearInterval(timerInterval); handleTimeout(); }
            }, 50);
        }

        function stopTimer() {
            if (timerInterval) clearInterval(timerInterval);
            document.getElementById('timerText').innerText = "-";
            document.getElementById('timerBar').style.width = "0%";
        }

        function handleTimeout() {
            if (gameOver) return;
            const winner = (turn === 1) ? 2 : 1;
            triggerWinEffects(winner, true);
        }

        function drawBoard() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.beginPath(); ctx.strokeStyle = "rgba(0,0,0,0.5)"; ctx.lineWidth = 1;
            for (let i = 0; i < size; i++) {
                ctx.moveTo(padding, padding + i * cellSize); ctx.lineTo(canvas.width - padding, padding + i * cellSize);
                ctx.moveTo(padding + i * cellSize, padding); ctx.lineTo(padding + i * cellSize, canvas.height - padding);
            }
            ctx.stroke();

            const stars = [3, 7, 11]; ctx.fillStyle = "rgba(0,0,0,0.8)";
            stars.forEach(r => stars.forEach(c => {
                ctx.beginPath(); ctx.arc(padding + c * cellSize, padding + r * cellSize, 4, 0, Math.PI * 2); ctx.fill();
            }));

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] !== 0) drawStone(r, c, board[r][c]);
                }
            }

            if (!isReviewMode && moveHistory.length >= 10) {
                const lastMove = moveHistory[moveHistory.length - 1];
                if (lastMove) {
                    drawLastMoveMarker(lastMove.row, lastMove.col);
                }
            }
        }

        function drawStone(row, col, color) {
            const x = padding + col * cellSize; const y = padding + row * cellSize;
            ctx.shadowBlur = 6; ctx.shadowColor = "rgba(0,0,0,0.4)"; ctx.shadowOffsetX = 2; ctx.shadowOffsetY = 2;
            ctx.beginPath(); ctx.arc(x, y, cellSize * 0.44, 0, Math.PI * 2);
            const grad = ctx.createRadialGradient(x - cellSize*0.15, y - cellSize*0.15, cellSize*0.05, x, y, cellSize*0.45);
            if (color === 1) { grad.addColorStop(0, "#555"); grad.addColorStop(1, "#111"); } 
            else { grad.addColorStop(0, "#fff"); grad.addColorStop(1, "#ccc"); }
            ctx.fillStyle = grad; ctx.fill();
            ctx.shadowBlur = 0; ctx.shadowOffsetX = 0; ctx.shadowOffsetY = 0;
        }

        function playCoolStoneEffect(row, col, color) {
            const rect = canvas.getBoundingClientRect();
            const cx = padding + col * cellSize;
            const cy = padding + row * cellSize;
            
            const screenX = rect.left + cx * (rect.width / canvas.width);
            const screenY = rect.top + cy * (rect.height / canvas.height);
            
            const originX = Math.max(0, Math.min(1, screenX / window.innerWidth));
            const originY = Math.max(0, Math.min(1, screenY / window.innerHeight));

            confetti({
                particleCount: 25,
                spread: 60,
                startVelocity: 15,
                origin: { x: originX, y: originY },
                colors: color === 1 ? ['#111111', '#555555', '#f1c40f'] : ['#ffffff', '#cccccc', '#f1c40f'],
                zIndex: 150,
                ticks: 70,
                scalar: 0.8,
                disableForReducedMotion: true
            });

            const boardWrapper = document.getElementById('board-wrapper');
            boardWrapper.style.transform = 'scale(1.02)';
            boardWrapper.style.boxShadow = color === 1 
                ? '0 0 40px rgba(0,0,0,0.8)' 
                : '0 0 40px rgba(255,255,255,0.9)';
                
            setTimeout(() => {
                boardWrapper.style.transform = 'scale(1)';
                boardWrapper.style.boxShadow = '0 15px 40px rgba(0,0,0,0.25)';
            }, 150);
        }

        function showFloatingChat(isPlayer) {
            if (Math.random() > 0.4 || isReviewMode) return;
            const msgArray = isPlayer ? chatterPlayer : chatterOpp;
            const text = msgArray[Math.floor(Math.random() * msgArray.length)];
            const chatEl = document.createElement('div');
            chatEl.className = 'floating-chat ' + (isPlayer ? 'chat-player' : 'chat-opp');

            setTimeout(() => { if (chatEl.parentElement) chatEl.remove(); }, 1800);
        }

        canvas.addEventListener("click", (e) => {
            if (isReviewMode) return; 
            if (gameOver || (introMode === 'COM' && turn === 2)) return;

            const rect = canvas.getBoundingClientRect();
            const x = (e.clientX - rect.left) * (canvas.width / rect.width);
            const y = (e.clientY - rect.top) * (canvas.height / rect.height);
            const col = Math.round((x - padding) / cellSize);
            const row = Math.round((y - padding) / cellSize);

            if (row >= 0 && row < size && col >= 0 && col < size && board[row][col] === 0) {
                initAudio();
                const isPlayerTurn = turn === 1;
                placeStone(row, col);
                if(!gameOver) showFloatingChat(isPlayerTurn);
                if (!gameOver && introMode === 'COM' && turn === 2) setTimeout(smartAiMove, 600);
            }
        });

        function placeStone(row, col) {
            moveHistory.push({ row, col, color: turn });
            board[row][col] = turn;
            
            if (moveHistory.length >= 20) {
                playCoolStoneEffect(row, col, turn);
            }

            playStoneSound(); 
            drawBoard();

            if (checkWin(row, col, turn)) {
                triggerWinEffects(turn);
            } else {
                turn = (turn === 1) ? 2 : 1;
                updateStatusUI();
                startTimer();

                title.innerText = isTimeout ? "Time Out!" : `${winnerName} 승리!`; title.className = "result-title win-text";
                sub.innerText = messageBase + winMessages[Math.floor(Math.random() * winMessages.length)];

        function fireConfetti() {
            const duration = 2.5 * 1000; const end = Date.now() + duration;
            (function frame() {
                confetti({ particleCount: 4, angle: 60, spread: 55, origin: { x: 0 }, zIndex: 300 });
                confetti({ particleCount: 4, angle: 120, spread: 55, origin: { x: 1 }, zIndex: 300 });

        }

        function updateReviewBoard() {
            document.getElementById('review-step-text').innerText = `${currentReviewStep} / ${moveHistory.length}`;
            board = Array.from(Array(size), () => Array(size).fill(0));
            for (let i = 0; i < currentReviewStep; i++) {
                const move = moveHistory[i];
                board[move.row][move.col] = move.color;
            }
            drawBoard(); 
            
            if (currentReviewStep > 0) {
                const lastMove = moveHistory[currentReviewStep - 1];
                drawLastMoveMarker(lastMove.row, lastMove.col);
            }
        }

        function drawLastMoveMarker(row, col) {
            const x = padding + col * cellSize;
            const y = padding + row * cellSize;
            ctx.beginPath();
            ctx.arc(x, y, cellSize * 0.15, 0, Math.PI * 2);
            ctx.fillStyle = "#e74c3c";
            ctx.fill();
        }

        function smartAiMove() {
            if(gameOver || isReviewMode) return; 
            let bestScore = -1; let moves = [];
            let mistakeChance = 0;
            if (currentAi) {
                if (currentAi.level === 1) mistakeChance = 0.35;
                if (currentAi.level === 2) mistakeChance = 0.15;
            }

            if (Math.random() < mistakeChance) {
                let emptySpots = [];
                for (let r = 0; r < size; r++) {
                    for (let c = 0; c < size; c++) {
                        if (board[r][c] === 0) emptySpots.push({r, c});
                    }
                }
                if (emptySpots.length > 0) {
                    let move = emptySpots[Math.floor(Math.random() * emptySpots.length)];
                    placeStone(move.r, move.c);
                    if(!gameOver) showFloatingChat(false);
                    return;
                }
            }

            for (let r = 0; r < size; r++) {
                for (let c = 0; c < size; c++) {
                    if (board[r][c] === 0) {
                        let defWeight = 1.0; let atkWeight = 1.2;
                        if (currentAi && currentAi.level === 4) defWeight = 1.5;
                        let score = evaluateSpot(r, c, 2) * atkWeight + evaluateSpot(r, c, 1) * defWeight;
                        if (score > bestScore) { bestScore = score; moves = [{r, c}]; } 
                        else if (score === bestScore) { moves.push({r, c}); }
                    }
                }
            }

            if(bestScore === 0) {
                moves = [{r:7, c:7}, {r:7, c:8}, {r:8, c:7}, {r:8, c:8}];
                moves = moves.filter(m => board[m.r][m.c] === 0);
            }

            if (moves.length > 0) {
                const move = moves[Math.floor(Math.random() * moves.length)];
                placeStone(move.r, move.c);
                if(!gameOver) showFloatingChat(false);
            }
        }

        function evaluateSpot(r, c, p) {
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            let total = 0;
            for (let [dr, dc] of dirs) {
                let count = 1, blocked = 0;
                for (let sign of [1, -1]) {
                    for (let i = 1; i < 5; i++) {
                        let nr = r + dr*i*sign, nc = c + dc*i*sign;
                        if (nr>=0 && nr<size && nc>=0 && nc<size) {
                            if (board[nr][nc] === p) count++;
                            else if (board[nr][nc] !== 0) { blocked++; break; }
                            else break;
                        } else { blocked++; break; }
                    }
                }
                if (count >= 5) total += 100000;
                else if (count === 4) total += (blocked === 0 ? 10000 : 2000);
                else if (count === 3) total += (blocked === 0 ? 1000 : 200);
                else if (count === 2) total += (blocked === 0 ? 100 : 20);
            }
            return total;
        }

        function checkWin(r, c, p) {
            const dirs = [[0,1],[1,0],[1,1],[1,-1]];
            for (let [dr, dc] of dirs) {
                let cnt = 1;
                for (let s of [1, -1]) {
                    for (let i=1; i<5; i++) {
                        let nr=r+dr*i*s, nc=c+dc*i*s;
                        if (nr>=0 && nr<size && nc>=0 && nc<size && board[nr][nc]===p) cnt++; else break;
                    }
                }
                if (cnt >= 5) return true;
            }
            return false;
        }

        function resetGame() {
            board = Array.from(Array(size), () => Array(size).fill(0));
            turn = 1; gameOver = false;
            
            moveHistory = [];
            isReviewMode = false;
            document.getElementById('review-controls').style.display = 'none';

            startTimer();
            updateStatusUI(); drawBoard();
        }

    </script>
</body>
