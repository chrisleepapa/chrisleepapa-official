<style>
:root{
  --c-fairy: #ff2a85;
  --c-fairy-glow: #ff7eb3;
  --c-dark: #6a00ff;
  --c-dark-glow: #a855f7;
  --c-ice: #00e5ff;
  --c-gold: #ffcf00;
  --bg-deep: #030305;
  --bg-mid: #0a0a12;
  --glass: rgba(15, 15, 25, 0.7);
  --glass-border: rgba(255, 255, 255, 0.15);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent; margin:0; padding:0;}

body{
  overflow:hidden;
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg-deep);
  color:#fff;
}

/* ─── Cinematic Texture ─── */
body::before{
  content:''; position:fixed; inset:0; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  opacity: 0.04; pointer-events:none;
}

/* PC 대응 확장 Wrap */
#gameWrap{
  position:relative; 
  width:100%; 
  max-width: 800px; 
  height: 100dvh;
  margin:auto; overflow:hidden; z-index:1;
  box-shadow: 0 0 50px rgba(0,0,0,0.8);
}

canvas{width:100%; height:100%; display:block; touch-action:none; position:absolute; inset:0; object-fit: contain;}
#gameCanvas { z-index:2; }
#effectCanvas { z-index:6; pointer-events:none; }
#particleCanvas { z-index:7; pointer-events:none; }

/* ─── UI Screens ─── */
.screen{
  position:absolute; inset:0; z-index:80;
  display:flex; flex-direction:column; align-items:center;
  padding: max(env(safe-area-inset-top, 24px), 24px) 20px max(env(safe-area-inset-bottom, 20px), 20px);
  overflow-y:auto; overflow-x:hidden;
  background:radial-gradient(circle at 50% 20%, #151025 0%, var(--bg-deep) 80%);
  transition:opacity .5s ease, transform .5s cubic-bezier(.175,.885,.32,1.275);
}
.screen.hidden{opacity:0; transform:scale(.95) translateY(20px); pointer-events:none;}
.screen.out{opacity:0; transform:scale(1.05) translateY(-20px); pointer-events:none;}

/* ─── Typography ─── */
.title-main {
  font-family:'Cinzel', serif; font-weight:900; font-size:clamp(2.2rem, 8vw, 3.5rem);
  text-align:center; line-height:1.1; margin-bottom:5px;
  background: linear-gradient(180deg, #fff, #b3b3b3);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 15px rgba(255,255,255,0.2));
}
.title-sub {
  font-family:'Black Han Sans', sans-serif; font-size:clamp(1.5rem, 5vw, 2.2rem);
  text-align:center; letter-spacing:2px;
  background: linear-gradient(90deg, var(--c-fairy-glow), var(--c-ice), var(--c-gold));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(0,229,255,0.4)); margin-bottom: 20px;
}

/* ─── Glass & Components ─── */
.glass-panel{
  background:var(--glass); border:1px solid var(--glass-border);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-radius:24px; box-shadow:0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
}

.input-neon{
  width:100%; text-align:center; font-family:'Exo 2',sans-serif;
  font-size:2rem; font-weight:900; letter-spacing:0.2em;
  padding:15px; border-radius:16px; background:rgba(0,0,0,0.3);
  color:var(--c-ice); border:2px solid rgba(0,229,255,0.2);
  outline:none; transition:0.3s; text-transform:uppercase;
}
.input-neon:focus{
  border-color:var(--c-ice); box-shadow:0 0 30px rgba(0,229,255,0.3), inset 0 0 15px rgba(0,229,255,0.1);
}

.btn-magic{
  width:100%; border:none; border-radius:18px; padding:16px 20px;
  font-family:'Black Han Sans', sans-serif; font-size:1.3rem; cursor:pointer;
  transition:all 0.3s cubic-bezier(.175,.885,.32,1.275); color:#fff; letter-spacing:2px;
  background:linear-gradient(135deg, #00d2ff, #3a7bd5);
  box-shadow:0 10px 30px rgba(0,210,255,0.4), inset 0 0 10px rgba(255,255,255,0.3);
}
.btn-magic:hover:not(:disabled){transform:translateY(-4px); box-shadow:0 15px 40px rgba(0,210,255,0.6), inset 0 0 10px rgba(255,255,255,0.5);}
.btn-magic:disabled{background:#333; box-shadow:none; color:#888; cursor:not-allowed;}

/* ─── Leaderboard ─── */
.lb-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 16px; border-radius:12px; background:rgba(0,0,0,0.4);
  border:1px solid rgba(255,255,255,0.05); transition:0.2s; margin-bottom:8px;
}
.lb-row:hover{background:rgba(255,255,255,0.08); transform:translateX(5px);}
.lb-medal{width:30px; font-size:1.2rem; text-shadow: 0 0 10px rgba(255,255,255,0.5);}
.lb-initials{font-family:'Exo 2',sans-serif; font-weight:800; font-size:1.1rem; letter-spacing:0.15em;}
.lb-wins{font-family:'Exo 2',sans-serif; font-weight:900; color:var(--c-gold); font-size:1rem;}

/* ─── Team Select ─── */
.team-card{
  flex:1; position:relative; border-radius:24px; overflow:hidden;
  cursor:pointer; transition:all 0.4s cubic-bezier(.175,.885,.32,1.275);
  border:2px solid transparent; min-height:110px; /* 잘림 방지 높이 축소 */
}
.team-card:hover{transform:scale(1.05) translateY(-5px); z-index:2;}
.team-card.fairy:hover{border-color:var(--c-fairy); box-shadow:0 15px 40px rgba(255,42,133,0.5);}
.team-card.dark:hover{border-color:var(--c-dark); box-shadow:0 15px 40px rgba(106,0,255,0.5);}
.team-card.family:hover{border-color:var(--c-gold); box-shadow:0 15px 40px rgba(255,207,0,0.5);}
.team-bg{
  position:absolute; inset:0; background-size:cover; background-position:center;
  background-color: #222;
  transition:transform 0.6s ease; filter:brightness(0.7) contrast(1.2);
}
.team-card:hover .team-bg{transform:scale(1.15) rotate(2deg); filter:brightness(1) contrast(1.2);}
.team-overlay{
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
  display:flex; flex-direction:column; justify-content:flex-end; align-items:center; padding-bottom:15px;
}
.team-label{font-family:'Black Han Sans', sans-serif; font-size:1.8rem; text-shadow:0 5px 20px rgba(0,0,0,1);}

/* ─── Order Select Slots ─── */
.order-slot{
  width: 65px; height: 65px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden; flex: none;
}

/* ★ 개편된 캐릭터 카드 버튼 ★ */
.char-btn{
  position: relative;
  background: rgba(0,0,0,0.8); 
  border: 2px solid rgba(255,255,255,0.1);
  border-radius: 20px; 
  text-align: center; cursor: pointer;
  transition: all 0.3s cubic-bezier(.175,.885,.32,1.275);
  display: flex; flex-direction: column; justify-content: flex-end;
  min-height: 190px;
  overflow: hidden;
  padding: 0;
}
.char-btn:hover:not(.sel){
  border-color: var(--c-ice); transform: translateY(-5px) scale(1.02);
  box-shadow: 0 15px 30px rgba(0,229,255,0.3);
}
.char-btn.sel{
  border-color: var(--c-ice); 
  box-shadow: 0 0 20px rgba(0,229,255,0.4);
  opacity: 0.5; transform: scale(0.95);
}
.char-btn-img {
  position: absolute; inset: 0; width: 100%; height: 100%;
  object-fit: cover; z-index: 0;
  filter: brightness(0.65) contrast(1.1);
  transition: 0.4s ease;
}
.char-btn:hover:not(.sel) .char-btn-img {
  filter: brightness(0.95) contrast(1.1); transform: scale(1.1);
}
.char-btn-overlay {
  position: relative; z-index: 1;
  background: linear-gradient(to top, rgba(0,0,0,1) 0%, rgba(0,0,0,0.6) 50%, transparent 100%);
  width: 100%; padding: 30px 10px 15px;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.char-btn-name {
  font-family: 'Black Han Sans', sans-serif; font-size: 1.4rem;
  color: #fff; text-shadow: 0 2px 10px #000; line-height: 1;
}
.skill-tag {
  font-size: 0.75rem; font-weight: 900; background: linear-gradient(90deg, #ff007a, #7a00ff);
  padding: 4px 10px; border-radius: 12px; color: #fff; letter-spacing: 0.5px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.2);
}

/* ★ 개편된 In-Game HUD ★ */
#inGameUI {
  position: absolute; top: max(env(safe-area-inset-top, 15px), 15px); left: 0; width: 100%;
  display: flex; flex-direction: column; gap: 15px; z-index: 20; pointer-events: none;
}
.hud-top { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
.set-score {
  font-family: 'Cinzel', serif; font-size: 1.8rem; font-weight: 900;
  display: flex; align-items: center; gap: 8px;
  background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);
  box-shadow: 0 5px 15px rgba(0,0,0,0.5);
}
.set-score.fairy { color: var(--c-fairy-glow); }
.set-score.dark { color: var(--c-dark-glow); }
.set-score.family { color: var(--c-gold); }

.round-info { text-align: center; }
.round-info .best-of { font-size: 0.7rem; font-weight: 900; letter-spacing: 2px; color: rgba(255,255,255,0.8); text-shadow: 0 1px 3px #000; margin-bottom: 2px; }
.round-info .round-num { font-family: 'Cinzel', serif; font-size: 1.6rem; font-weight: 900; text-shadow: 0 2px 8px #000; }

.hud-bottom { display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
.rt-score {
  font-family: 'Black Han Sans', sans-serif; font-size: 1.4rem; text-shadow: 0 2px 5px #000;
  background: rgba(0,0,0,0.5); padding: 6px 16px; border-radius: 14px;
  border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);
  min-width: 70px; text-align: center;
}
.rt-score.fairy { color: var(--c-fairy-glow); }
.rt-score.dark { color: var(--c-dark-glow); }
.rt-score.family { color: var(--c-gold); }

.turn-box {
  padding: 8px 24px; border-radius: 20px; font-family: 'Black Han Sans', sans-serif; font-size: 1.2rem;
  background: rgba(0,0,0,0.8); border: 2px solid; text-shadow: 0 2px 5px #000;
  box-shadow: 0 5px 15px rgba(0,0,0,0.5); transition: all 0.3s;
}

/* ─── Skill & Action UI ─── */
#skillContainer {
  position:absolute; bottom: calc(env(safe-area-inset-bottom, 20px) + 70px); 
  width:100%; display:flex; justify-content:center; z-index:30;
}
.skill-btn {
  position:relative; width:220px; height:50px; border-radius:30px; border:none;
  background:rgba(0,0,0,0.6); border:2px solid rgba(255,255,255,0.2);
  color:#fff; font-family:'Black Han Sans', sans-serif; font-size:1.2rem; letter-spacing:2px;
  cursor:pointer; overflow:hidden; backdrop-filter:blur(10px); pointer-events:auto;
  transition:all 0.3s cubic-bezier(.175,.885,.32,1.275);
}
.skill-btn .fill {
  position:absolute; top:0; left:0; height:100%; background:linear-gradient(90deg, #ff007a, #7a00ff);
  width:0%; transition:width 0.4s ease; z-index:1; opacity:0.8;
}
.skill-btn span { position:relative; z-index:2; text-shadow:0 2px 5px rgba(0,0,0,0.8); }
.skill-btn.ready { border-color:#fff; box-shadow:0 0 30px rgba(255,0,122,0.6); animation:pulseSkill 1s infinite alternate; }
.skill-btn.ready .fill { background:linear-gradient(90deg, #00e5ff, #0055ff); opacity:1; }
.skill-btn.ready:hover { transform:scale(1.08); box-shadow:0 0 40px rgba(0,229,255,0.8); }

@keyframes pulseSkill { from {box-shadow:0 0 15px rgba(0,229,255,0.4);} to {box-shadow:0 0 35px rgba(0,229,255,0.8);} }

#bottomGuide{
  position:absolute; bottom: env(safe-area-inset-bottom, 20px); 
  width:100%; display:none; justify-content:center; z-index:20; pointer-events:none;
}
.guide-pill{
  padding:10px 24px; border-radius:30px; font-size:1rem; font-weight:800;
  background:rgba(0,0,0,0.8); border:1px solid var(--c-ice);
  color:#fff; box-shadow:0 0 20px rgba(0,0,0,0.5); letter-spacing:1px;
}

/* ★ 턴 시작을 알리는 컷인 UI 추가 ★ */
#turnCutin {
  position: absolute; top: 25%; left: 0; width: 100%; z-index: 85;
  display: none; align-items: center; justify-content: center; pointer-events: none;
}
.turn-card-container {
  display: flex; align-items: center; gap: 15px;
  background: linear-gradient(90deg, transparent, rgba(0,0,0,0.8) 20%, rgba(0,0,0,0.8) 80%, transparent);
  padding: 15px 40px; width: 100%; justify-content: center;
  opacity: 0; transform: scale(0.8) translateY(20px);
}
#turnCutin.play .turn-card-container {
  animation: turnPop 1.5s cubic-bezier(.175,.885,.32,1.275) forwards;
}
.turn-portrait {
  width: 75px; height: 75px; border-radius: 50%; object-fit: cover;
  border: 3px solid #fff; box-shadow: 0 0 20px rgba(0,0,0,0.5);
  background-color: #333;
}
.turn-text { display: flex; flex-direction: column; align-items: flex-start; }
.turn-name { font-family: 'Black Han Sans', sans-serif; font-size: 1.5rem; line-height: 1.1; color: #fff; text-shadow: 0 4px 10px #000; }
.turn-shout { font-family: 'Noto Sans KR', sans-serif; font-weight: 900; font-size: 1rem; color: #ffcf00; text-shadow: 0 2px 5px #000; letter-spacing: 1px; }

@keyframes turnPop {
  0% { opacity: 0; transform: scale(0.8) translateX(-100px) skewX(-15deg); }
  15% { opacity: 1; transform: scale(1.1) translateX(10px) skewX(5deg); }
  30% { opacity: 1; transform: scale(1) translateX(0) skewX(0); }
  80% { opacity: 1; transform: scale(1) translateX(0) skewX(0); }
  100% { opacity: 0; transform: scale(0.8) translateX(100px) skewX(15deg); }
}

/* ★ 스킬 시네마틱 컷인 ★ */
#skillCutin {
  position:absolute; inset:0; background:rgba(0,0,0,0.6); z-index:100;
  display:none; overflow:hidden; backdrop-filter:blur(8px); -webkit-backdrop-filter:blur(8px);
}
.cutin-bg-slash {
  position:absolute; top: -10%; left: -20%; width: 140%; height: 120%;
  transform-origin: center; mix-blend-mode: color-dodge; opacity: 0;
}
.cutin-card-wrap {
  position: absolute; left: 5%; top: 50%; 
  width: 45%; max-width: 280px; aspect-ratio: 2/3;
  border-radius: 20px; overflow: hidden;
  border: 4px solid #fff; box-shadow: 0 0 50px rgba(255,255,255,0.5);
  transform: translate(-150%, -50%) rotate(-20deg); opacity: 0; z-index: 2;
  background-color: #222;
}
.cutin-card-img { width: 100%; height: 100%; object-fit: cover; }
.cutin-text-wrap {
  position: absolute; right: 5%; top: 50%; transform: translateY(-50%);
  display: flex; flex-direction: column; align-items: flex-end;
  width: 70%; z-index: 3;
}
.cutin-name {
  font-family: 'Black Han Sans', sans-serif; font-size: clamp(2rem, 8vw, 4rem);
  color: #fff; text-shadow: 0 10px 30px rgba(0,0,0,1);
  line-height: 1; margin-bottom: 10px; text-align: right; opacity: 0;
}
.cutin-skillname {
  font-family: 'Noto Sans KR', sans-serif; font-weight: 900; font-size: clamp(1.2rem, 4vw, 2rem);
  color: #fff; letter-spacing: 3px; text-align: right;
  background: rgba(0,0,0,0.8); padding: 8px 25px; border-radius: 40px;
  border: 3px solid var(--c-gold); box-shadow: 0 0 30px var(--c-gold);
  transform: scale(3); opacity: 0; filter: blur(10px);
}

#skillCutin.play .cutin-bg-slash { animation: cutinBg 2s cubic-bezier(.175,.885,.32,1) forwards; }
#skillCutin.play .cutin-card-wrap { animation: cutinCard 2s cubic-bezier(.175,.885,.32,1) forwards; }
#skillCutin.play .cutin-name { animation: cutinName 2s cubic-bezier(.175,.885,.32,1) forwards; }
#skillCutin.play .cutin-skillname { animation: cutinSkill 2s cubic-bezier(.175,.885,.32,1) forwards; }

@keyframes cutinBg {
  0% { transform: rotate(-25deg) scaleY(0); opacity: 0; }
  10% { transform: rotate(-25deg) scaleY(1); opacity: 0.9; }
  90% { transform: rotate(-25deg) scaleY(1); opacity: 0.9; }
  100% { transform: rotate(-25deg) scaleY(0); opacity: 0; }
}
@keyframes cutinCard {
  0% { transform: translate(-150%, -50%) rotate(-20deg); opacity: 0; }
  15% { transform: translate(0%, -50%) rotate(-8deg); opacity: 1; }
  85% { transform: translate(5%, -50%) rotate(-5deg); opacity: 1; }
  100% { transform: translate(150%, -50%) rotate(10deg); opacity: 0; }
}
@keyframes cutinName {
  0% { transform: translateX(100vw); opacity: 0; }
  20% { transform: translateX(-20px); opacity: 1; }
  25% { transform: translateX(0); opacity: 1; }
  85% { transform: translateX(20px); opacity: 1; }
  100% { transform: translateX(-100vw); opacity: 0; }
}
@keyframes cutinSkill {
  0% { transform: scale(3); opacity: 0; filter: blur(10px); }
  25% { transform: scale(1); opacity: 1; filter: blur(0px); }
  85% { transform: scale(1.05); opacity: 1; }
  100% { transform: scale(0); opacity: 0; }
}

/* ─── Screen Flash & Buff ─── */
#screenFlash { position:absolute; inset:0; background:#fff; z-index:110; opacity:0; pointer-events:none; }
#buffAlert {
  position:absolute; top:35%; left:50%; transform:translate(-50%, -50%);
  font-family:'Black Han Sans', sans-serif; font-size:2.5rem; color:var(--c-gold);
  text-shadow:0 0 30px #ff007a; z-index:40; opacity:0; pointer-events:none; width:100%; text-align:center;
}
@keyframes popAlert { 0%{transform:translate(-50%, -30%) scale(0.5); opacity:0;} 50%{transform:translate(-50%, -50%) scale(1.2); opacity:1;} 100%{transform:translate(-50%, -70%) scale(1); opacity:0;} }

/* ★ Floating Messages ★ */
.floating-reaction {
  position: absolute; 
  font-family: 'Black Han Sans', sans-serif; 
  font-size: clamp(1.8rem, 6vw, 2.5rem); 
  font-style: italic; 
  font-weight: 900; 
  text-shadow: 0 4px 10px rgba(0,0,0,0.9), 0 0 10px rgba(0,0,0,0.8);
  -webkit-text-stroke: 1px #000;
  pointer-events: none; 
  z-index: 60; 
  opacity: 0; 
  white-space: nowrap;
  animation: floatUp 1.8s ease-out forwards;
}

@keyframes floatUp {
  0% { opacity: 0; transform: translate(-50%, 20px) scale(0.5) rotate(-10deg); }
  20% { opacity: 1; transform: translate(-50%, -10px) scale(1.2) rotate(5deg); }
  80% { opacity: 1; transform: translate(-50%, -40px) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translate(-50%, -80px) scale(0.8) rotate(5deg); }
}

.floating-center-msg {

let audioCtx;
function initAudio() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

function playSound(type) {
  try {
    initAudio();
    const t = audioCtx.currentTime;
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    
    osc.connect(gain);
    gain.connect(audioCtx.destination);

    if (type === 'click') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(800, t);
      gain.gain.setValueAtTime(0.1, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
      osc.start(t); osc.stop(t + 0.1);
    } else if (type === 'slide') {
      osc.type = 'triangle'; osc.frequency.setValueAtTime(200, t);
      osc.frequency.exponentialRampToValueAtTime(50, t + 0.4);
      gain.gain.setValueAtTime(0.15, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
      osc.start(t); osc.stop(t + 0.4);
    } else if (type === 'hit') {
      osc.type = 'square'; osc.frequency.setValueAtTime(150, t);
      osc.frequency.exponentialRampToValueAtTime(40, t + 0.1);
      gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
      osc.start(t); osc.stop(t + 0.1);
    } else if (type === 'skill') {
      osc.type = 'sine'; osc.frequency.setValueAtTime(600, t);
      osc.frequency.linearRampToValueAtTime(1200, t + 0.2);
      gain.gain.setValueAtTime(0.1, t); gain.gain.linearRampToValueAtTime(0.15, t + 0.1); gain.gain.linearRampToValueAtTime(0.01, t + 0.5);
      osc.start(t); osc.stop(t + 0.5);
      
      const osc2 = audioCtx.createOscillator();
      const gain2 = audioCtx.createGain();
      osc2.type = 'sine'; osc2.frequency.setValueAtTime(1200, t+0.1);
      gain2.gain.setValueAtTime(0, t); gain2.gain.setValueAtTime(0.1, t+0.1); gain2.gain.exponentialRampToValueAtTime(0.01, t + 0.4);
      osc2.connect(gain2); gain2.connect(audioCtx.destination);
      osc2.start(t+0.1); osc2.stop(t+0.5);
    } else if (type === 'win') {

      osc.start(t); osc.stop(t + 1.0);
    }
  } catch(e) {}
}

let particles = [];

class Particle {
  constructor(x, y, color, type='spark', speedMult=1) {
    this.x = x; this.y = y; this.color = color; this.type = type;
    const a = Math.random() * Math.PI * 2;
    const s = (Math.random() * 5 + 2) * speedMult;
    this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s;
    this.life = 1; this.decay = 0.02 + Math.random() * 0.04;
    this.size = 3 + Math.random() * 6;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life -= this.decay;
    this.vx *= 0.92; this.vy *= 0.92; this.size *= 0.95;
  }
  draw(c) {
    c.globalAlpha = Math.max(0, this.life); c.fillStyle = this.color;
    c.shadowColor = this.color; c.shadowBlur = 10;
    c.beginPath(); c.arc(this.x, this.y, this.size, 0, Math.PI*2); c.fill();
    c.globalAlpha = 1; c.shadowBlur = 0;
  }
}
function spawnSparks(x, y, color, count=15, speed=1) {
  for(let i=0; i<count; i++) particles.push(new Particle(x, y, color, 'spark', speed));
}

      await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?initials=eq.${state.playerInitials}`, { 
        method:'PATCH', 
        headers:{ apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json', 'Prefer': 'return=minimal' }, 
        body: JSON.stringify({ wins }) 
      });
    } else {
      await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}`, { 
        method:'POST', 
        headers:{ apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json', 'Prefer': 'return=minimal' }, 
        body: JSON.stringify({ initials: state.playerInitials, wins: 1 }) 
      });
    }
    loadLeaderboard(); 
    return wins;
  } catch (e) { console.error(e); return 0; }
}

// STONE CLASS
// ══════════════════════════════════════════════════════
class Stone {
  constructor(x, y, team) {
    this.x = x; this.y = y; this.vx = 0; this.vy = 0;
    this.team = team; this.r = STONE_R; this.move = false;
    this.glow = 0;
  }
  draw() {
    ctx.beginPath(); ctx.arc(this.x + 5, this.y + 5, this.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.2)'; ctx.fill();

    const grad = ctx.createRadialGradient(this.x-6, this.y-6, 3, this.x, this.y, this.r);
    grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, this.team.color); grad.addColorStop(1, this.team.border);
    
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.lineWidth = 4; ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.stroke();
    
    if(this.glow > 0) {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.r + 6, 0, Math.PI*2);
      ctx.strokeStyle = '#ffcf00'; ctx.lineWidth = 3; ctx.globalAlpha = 0.6 + Math.sin(Date.now()/100)*0.4;
      ctx.stroke(); ctx.globalAlpha = 1;
    }

    ctx.font = '22px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(this.team.icon, this.x, this.y + 2);
  }
  update() {
    const speed = Math.hypot(this.vx, this.vy);
    if (speed > 0.05) {
      this.move = true;
      if (Math.random() < 0.3) spawnSparks(this.x, this.y, this.team.color, 1);
      const ns = Math.max(0, speed - 0.025);
      this.vx *= ns/speed; this.vy *= ns/speed;
      this.x += this.vx; this.y += this.vy;

      if (this.x-this.r < 0) { this.x=this.r; this.vx*=-0.8; spawnSparks(this.x,this.y,this.team.color,5); if (Date.now() - lastHitTime > 100) { playSound('hit'); lastHitTime = Date.now(); } }
      if (this.x+this.r > LOGICAL_W) { this.x=LOGICAL_W-this.r; this.vx*=-0.8; spawnSparks(this.x,this.y,this.team.color,5); if (Date.now() - lastHitTime > 100) { playSound('hit'); lastHitTime = Date.now(); } }
      if (this.y-this.r < 0) { this.y=this.r; this.vy*=-0.8; spawnSparks(this.x,this.y,this.team.color,5); if (Date.now() - lastHitTime > 100) { playSound('hit'); lastHitTime = Date.now(); } }
      if (this.y+this.r > LOGICAL_H) { this.y=LOGICAL_H-this.r; this.vy*=-0.8; spawnSparks(this.x,this.y,this.team.color,5); if (Date.now() - lastHitTime > 100) { playSound('hit'); lastHitTime = Date.now(); } }
    } else { this.vx = 0; this.vy = 0; this.move = false; }
  }
}

function getActiveMember(team = state.currentTeam) {
  const turn = Math.min(4 - state.stonesLeft[team.id], 3);
  return team.id === state.playerTeam.id ? team.members[state.playerOrder[turn]] : team.members[state.aiOrder[turn]];
}

  const t = document.getElementById('turnBox');

  t.style.borderColor = state.currentTeam.color;
  t.style.boxShadow = `0 0 15px ${state.currentTeam.color}`;

  const charge = state.skillCharge[state.currentTeam.id] || 0;
  const btn = document.getElementById('skillBtn');
  const fill = document.getElementById('skillFill');
  const txt = document.getElementById('skillBtnText');

  fill.style.width = (charge * 50) + '%';

  }

  const guideContainer = document.getElementById('bottomGuide');

    if (state.isAiTurn) guideText.innerHTML = "🤖 <span style='opacity:0.7'>상대가 마법을 준비 중...</span>";
    else guideText.textContent = state.powerBuff[state.currentTeam.id] > 0 ? "🔥 파워 버프 활성화! 뒤로 당겨 발사!" : "🎯 드래그하여 발사!";
  } else {
    guideContainer.style.display = 'none';
  }
}

function updateRealtimeScore() {
  if (state.phase === 'setup' || state.phase === 'turn_intro') return;
  let p1Score = 0; let p2Score = 0;
  
  state.stones.forEach(s => {
    const dist = Math.hypot(s.x - HOUSE.x, s.y - HOUSE.y);
    let pts = 0;
    if (dist <= HOUSE.r * 0.2) pts = 10;
    else if (dist <= HOUSE.r * 0.45) pts = 5;
    else if (dist <= HOUSE.r * 0.75) pts = 3;
    else if (dist <= HOUSE.r) pts = 1;
    
    if(pts > 0) {
      if(s.team.id === state.playerTeam.id) p1Score += pts;
      else if(s.team.id === state.aiTeam.id) p2Score += pts;
    }
  });

  document.getElementById('rtP1').textContent = p1Score + "점";
  document.getElementById('rtP2').textContent = p2Score + "점";
}

window.activateSkill = function() {
  const team = state.currentTeam;
  if (state.skillCharge[team.id] < 2 || state.phase !== 'aim') return;
  
  playSound('skill');
  const member = getActiveMember(team);
  state.skillCharge[team.id] = 0;
  state.phase = 'skill'; 
  
  if (state.activeStone) {
    state.stones = state.stones.filter(s => s !== state.activeStone);
    state.activeStone = null;
  }
  state.stonesLeft[team.id]--;
  
  updateUI();
  showSkillCutin(member, team);
  setTimeout(() => { executeSkillEffect(member.id, team); }, 1500); 
}

function applyImpulse(targetRule, conditionRule, magnitude) {
  state.stones.forEach(s => {
    const isAlly = s.team.id === state.currentTeam.id;
    if((targetRule==='enemy' && !isAlly) || (targetRule==='ally' && isAlly) || targetRule==='all') {
      const dist = Math.hypot(s.x - HOUSE.x, s.y - HOUSE.y);
      if(conditionRule==='in_house' && dist <= HOUSE.r + STONE_R) {
        const angle = Math.atan2(s.y - HOUSE.y, s.x - HOUSE.x);
        s.vx += Math.cos(angle) * magnitude; s.vy += Math.sin(angle) * magnitude; s.move = true;
      }
    }
  });
}

function executeSkillEffect(skillId, team) {
  flashScreen(team.color);
  shakeMag = 15; shakeTime = 20; 

  switch(skillId) {
    case 'pretty': spawnSparks(HOUSE.x, HOUSE.y, '#00e5ff', 50, 2); applyImpulse('enemy', 'in_house', 12); break;
    case 'cuty': state.powerBuff[team.id] = 2; spawnSparks(START.x, START.y, '#ff69b4', 40, 1.5); showBuffAlert(); break;
    case 'brook': shakeMag = 25; shakeTime = 30; spawnSparks(HOUSE.x, HOUSE.y, '#ff4500', 60, 3); applyImpulse('enemy', 'in_house', 18); break;
    case 'elion': activeForces.push({ teamId: team.id, target:'ally', cond:'out_house', type:'pull', life:120 }); break;
    case 'knight': state.powerBuff[team.id] = 1; spawnSparks(START.x, START.y, '#6a00ff', 40, 1.5); showBuffAlert(); break;
    case 'vane': shakeMag = 20; shakeTime = 25; applyImpulse('enemy', 'in_house', 15); break;
    case 'crown': shakeMag = 35; shakeTime = 40; spawnSparks(HOUSE.x, HOUSE.y, '#333', 80, 4); applyImpulse('enemy', 'in_house', 25); break;
    case 'angel': activeForces.push({ teamId: team.id, target:'ally', cond:'all', type:'pull', life:150 }); break;
    case 'mom': activeForces.push({ teamId: team.id, target:'ally', cond:'all', type:'pull', life:150 }); break;
    case 'dad': 
      shakeMag = 25; shakeTime = 50;
      let dadStone = new Stone(START.x, START.y, team);
      dadStone.glow = 1; state.stones.push(dadStone);
      activeForces.push({ teamId: team.id, target:'enemy', cond:'all', type:'dad_dash', life:180, dadStone: dadStone });
      break;
    case 'yul': 
      shakeMag = 20; shakeTime = 25;
      spawnSparks(HOUSE.x, HOUSE.y, '#ff4500', 60, 3); applyImpulse('enemy', 'in_house', 22);
      break;
    case 'jung': 
      let jungStone = new Stone(START.x, START.y, team);
      state.stones.push(jungStone);
      const jdx = HOUSE.x - START.x; const jdy = HOUSE.y - START.y; const jang = Math.atan2(jdy, jdx);
      jungStone.vx = Math.cos(jang) * 16; jungStone.vy = Math.sin(jang) * 16; jungStone.move = true;
      spawnSparks(START.x, START.y, '#00e5ff', 50, 2);
      break;
  }
  
  state.phase = 'move'; 
}

function showBuffAlert() {
  const a = document.getElementById('buffAlert');
  a.style.animation = 'none'; void a.offsetWidth; a.style.animation = 'popAlert 2s forwards';

function spawnStone() {
  if (state.stonesLeft[state.currentTeam.id] <= 0) { endRound(); return; }
  
  state.phase = 'turn_intro';
  const member = getActiveMember();
  showTurnCutin(member, state.currentTeam);
  
  setTimeout(() => {
    state.activeStone = new Stone(START.x, START.y, state.currentTeam);
    if(state.powerBuff[state.currentTeam.id] > 0) state.activeStone.glow = 1;
    state.stones.push(state.activeStone);
    
    state.phase = 'aim';
    state.isAiTurn = state.currentTeam.id === state.aiTeam.id;
    updateUI();
    
    if (state.isAiTurn) {
      setTimeout(() => {
        if(state.skillCharge[state.currentTeam.id] >= 2) activateSkill(); 
        else executeAIThrow(); 
      }, 1000); 
    }
  }, 1500);
}

function executeAIThrow() {
  if (state.phase !== 'aim') return;

  let targetX = HOUSE.x; let targetY = HOUSE.y;
  let enemiesInHouse = []; let alliesShort = []; 

  state.stones.forEach(s => {
    if(s === state.activeStone) return;
    const distToHouse = Math.hypot(s.x - HOUSE.x, s.y - HOUSE.y);
    if(s.team.id !== state.currentTeam.id) {
      if (distToHouse < HOUSE.r + STONE_R) enemiesInHouse.push(s);
    } else {
      if (s.y > HOUSE.y + HOUSE.r) alliesShort.push(s); 
    }
  });

  let powerMult = 1.0;

  if (enemiesInHouse.length > 0 && Math.random() < 0.75) {
    enemiesInHouse.sort((a,b) => Math.hypot(a.x-HOUSE.x, a.y-HOUSE.y) - Math.hypot(b.x-HOUSE.x, b.y-HOUSE.y));
    const target = enemiesInHouse[0];
    targetX = target.x + (Math.random() - 0.5) * 20; targetY = target.y + (Math.random() - 0.5) * 20;
    powerMult = 1.4 + Math.random() * 0.3; 
  }
  else if (alliesShort.length > 0 && Math.random() < 0.4) {
    alliesShort.sort((a,b) => a.y - b.y);
    const target = alliesShort[0];
    targetX = target.x; targetY = target.y;
    powerMult = 1.15; 
  }
  else {
    const randomAngle = Math.random() * Math.PI * 2;
    const randomDist = Math.random() * (HOUSE.r * 0.6); 
    targetX = HOUSE.x + Math.cos(randomAngle) * randomDist; targetY = HOUSE.y + Math.sin(randomAngle) * randomDist;
    powerMult = 0.95 + Math.random() * 0.1; 
  }

  const dx = targetX - START.x; const dy = targetY - START.y;
  const angle = Math.atan2(dy, dx); const dist = Math.hypot(dx, dy);

  let power = Math.sqrt(dist * 0.05) * powerMult;

  if (state.powerBuff[state.currentTeam.id] > 0) {
    power *= 1.5; state.powerBuff[state.currentTeam.id]--;
  }

  state.activeStone.vx = Math.cos(angle) * power;
  state.activeStone.vy = Math.sin(angle) * power;
  finishThrow();
}

function getPos(e) { 
  const r = canvas.getBoundingClientRect(); 
  return { x: (e.clientX - r.left) * (LOGICAL_W / r.width), y: (e.clientY - r.top) * (LOGICAL_H / r.height) }; 
}

canvas.addEventListener('pointerdown', e => {
  if (state.phase !== 'aim' || state.isAiTurn) return;
  const pos = getPos(e);
  if (pos.y > LOGICAL_H * 0.6 || Math.hypot(pos.x - state.activeStone.x, pos.y - state.activeStone.y) < 200) { 
    state.dragging = true; state.dragStart = pos; state.dragNow = pos; 
  }
});
canvas.addEventListener('pointermove', e => { if (state.dragging) state.dragNow = getPos(e); });
window.addEventListener('pointerup', () => {
  if (!state.dragging || state.isAiTurn) return;
  state.dragging = false;
  const dx = state.dragStart.x - state.dragNow.x, dy = state.dragStart.y - state.dragNow.y;
  const dist = Math.hypot(dx, dy);
  if (dist > 10) {
    let power = Math.min(dist, 350) * 0.12;
    if(state.powerBuff[state.currentTeam.id] > 0) { power *= 1.5; state.powerBuff[state.currentTeam.id]--; }
    const angle = Math.atan2(dy, dx);
    state.activeStone.vx = Math.cos(angle) * power; state.activeStone.vy = Math.sin(angle) * power;
    finishThrow();
  }
});

function finishThrow() {
  playSound('slide');
  state.phase = 'move';
  state.activeStone.glow = 0;
  state.stonesLeft[state.currentTeam.id]--;
  state.skillCharge[state.currentTeam.id] = Math.min(2, state.skillCharge[state.currentTeam.id] + 1);
  updateUI();
}

function resolveCollisions() {
  for (let i = 0; i < state.stones.length; i++) {
    for (let j = i + 1; j < state.stones.length; j++) {
      const a = state.stones[i], b = state.stones[j];
      const dx = b.x - a.x, dy = b.y - a.y, dist = Math.hypot(dx, dy), min = a.r + b.r;
      if (dist < min && dist > 0) {
        const nx = dx/dist, ny = dy/dist, overlap = min - dist;
        a.x -= nx*overlap/2; b.x += nx*overlap/2; a.y -= ny*overlap/2; b.y += ny*overlap/2;
        const p = 2 * (nx*(a.vx-b.vx) + ny*(a.vy-b.vy)) / 2;
        a.vx = (a.vx - p*nx)*0.9; a.vy = (a.vy - p*ny)*0.9; b.vx = (b.vx + p*nx)*0.9; b.vy = (b.vy + p*ny)*0.9;
        spawnSparks((a.x+b.x)/2, (a.y+b.y)/2, '#00e5ff', 5);
        if (Date.now() - lastHitTime > 100) { playSound('hit'); lastHitTime = Date.now(); }
      }
    }
  }
}

function applyContinuousForces() {
  activeForces.forEach(f => {
    f.life--;
    if(f.life % 5 === 0 && f.type === 'pull') spawnSparks(HOUSE.x, HOUSE.y, '#a855f7', 2); 
    
    if (f.type === 'dad_dash' && f.dadStone) {
      let nearest = null; let minDist = Infinity;
      state.stones.forEach(s => {
         if (s.team.id !== f.teamId && s !== f.dadStone) {
            let d = Math.hypot(s.x - f.dadStone.x, s.y - f.dadStone.y);
            if (d < minDist) { minDist = d; nearest = s; }
         }
      });
      if (nearest) {
         let dx = nearest.x - f.dadStone.x; let dy = nearest.y - f.dadStone.y; let angle = Math.atan2(dy, dx);
         f.dadStone.vx += Math.cos(angle) * 2.0; f.dadStone.vy += Math.sin(angle) * 2.0; f.dadStone.move = true;
      }
      if(f.life % 4 === 0) spawnSparks(f.dadStone.x, f.dadStone.y, '#ffcf00', 4);
    } else {
      state.stones.forEach(s => {
        const isAlly = s.team.id === f.teamId;
        if((f.target==='ally' && isAlly) || f.target==='all') {
          const dx = HOUSE.x - s.x, dy = HOUSE.y - s.y, dist = Math.hypot(dx, dy);
          if(f.cond==='out_house' && dist < HOUSE.r) return;
          if(dist > 10 && f.type === 'pull') {
            s.vx += (dx/dist) * 0.3; s.vy += (dy/dist) * 0.3; s.move = true;
          }
        }
      });
    }
  });
  activeForces = activeForces.filter(f => f.life > 0);
}

function endRound() {
  state.phase = 'end'; 
  
  let p1Score = 0; let p2Score = 0;
  
  state.stones.forEach(s => {
    const dist = Math.hypot(s.x - HOUSE.x, s.y - HOUSE.y);
    let pts = 0;
    if (dist <= HOUSE.r * 0.2) pts = 10;
    else if (dist <= HOUSE.r * 0.45) pts = 5;
    else if (dist <= HOUSE.r * 0.75) pts = 3;
    else if (dist <= HOUSE.r) pts = 1;
    
    if(pts > 0) {
      if(s.team.id === state.playerTeam.id) p1Score += pts;
      else if(s.team.id === state.aiTeam.id) p2Score += pts;
    }
  });
  
  let roundWinner = null;
  if (p1Score > p2Score) { state.p1Wins++; roundWinner = state.playerTeam; } 
  else if (p2Score > p1Score) { state.p2Wins++; roundWinner = state.aiTeam; }
  
  if (roundWinner) {
    playSound('win');
    spawnSparks(HOUSE.x, HOUSE.y, roundWinner.color, 40, 3);
    showFloatingMsg(`${roundWinner.name}<br>라운드 승리!`, roundWinner.color);
  } else { showFloatingMsg(`라운드 무승부!`, '#aaa'); }
  
  updateUI();

  setTimeout(() => {
    if (state.p1Wins >= 2 || state.p2Wins >= 2 || state.round >= 3) { 
      let overallWinner = null;
      if (state.p1Wins > state.p2Wins) overallWinner = state.playerTeam;
      else if (state.p2Wins > state.p1Wins) overallWinner = state.aiTeam;
      
      showWinner(overallWinner); 
      return; 
    }
    
    state.round++; state.stones = []; 
    state.stonesLeft[state.playerTeam.id] = 4; state.stonesLeft[state.aiTeam.id] = 4;
    state.currentTeam = state.playerTeam; 
    spawnStone();
  }, 3000);
}

function showWinner(team) {
  // ★ BGM 일시정지 (우승 사운드를 위해)
  if (isYtReady && ytPlayer) ytPlayer.pauseVideo();

  const modal = document.getElementById('winnerModal'); modal.style.display = 'flex';
  
  if (!team) {
    document.getElementById('winEmoji').textContent = '🤝';
    document.getElementById('winTitle').textContent = `무승부!`;
    document.getElementById('winTitle').style.color = '#fff';
    document.getElementById('winDesc').innerHTML = `치열한 접전 끝에<br>무승부로 끝났습니다.`;
  } else {
    playSound('win');
    const isP = team.id === state.playerTeam.id;
    document.getElementById('winEmoji').textContent = isP ? '🏆' : '💀';
    document.getElementById('winTitle').textContent = `${team.name} 승리!`;
    document.getElementById('winTitle').style.color = team.color;
    
    if (isP) {
      document.getElementById('winDesc').innerHTML = `최고의 플레이어 <b>${state.playerInitials}</b>!<br>빛나는 우승을 차지했습니다.<br><br><span style="color:var(--c-gold); font-size:0.9rem;" id="saveStatus">기록 동기화 중...</span>`;
      recordWin().then(w => {
        const el = document.getElementById('saveStatus');
        if(el) el.innerHTML = w > 0 ? `<b style="color:var(--c-gold);">총 ${w}승 달성!</b>` : `<span style="color:red;">기록 실패</span>`;
      });
    } else { document.getElementById('winDesc').innerHTML = `전투에서 패배했습니다...<br>다시 도전하세요.`; }
  }
}

function resetToMain() {
  playSound('click');

  // ★ BGM 초기화 화면에서 일시정지
  if (isYtReady && ytPlayer) ytPlayer.pauseVideo();

  document.getElementById('winnerModal').style.display = 'none'; document.getElementById('inGameUI').style.display = 'none';
  document.getElementById('bottomGuide').style.display = 'none'; document.getElementById('skillContainer').style.display = 'none';
  
  document.querySelectorAll('.floating-reaction').forEach(el => el.remove());
  document.querySelectorAll('.floating-center-msg').forEach(el => el.remove());
  
  state.phase='setup'; state.stones=[]; state.round=1;
  loadLeaderboard(); showScreen('s-login');
}

// ══════════════════════════════════════════════════════
// DRAW ARENA
// ══════════════════════════════════════════════════════
function drawArena() {
  ctx.clearRect(0,0,LOGICAL_W,LOGICAL_H);

  const bgGrad = ctx.createLinearGradient(0, 0, 0, LOGICAL_H);
  bgGrad.addColorStop(0, '#e2e8f0'); bgGrad.addColorStop(0.5, '#ffffff'); bgGrad.addColorStop(1, '#f8fafc');
  ctx.fillStyle = bgGrad; ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);

  ctx.save(); ctx.strokeStyle = 'rgba(0,0,0,0.03)'; ctx.lineWidth = 1;
  for(let i=0; i<15; i++) {
    ctx.beginPath(); ctx.moveTo(Math.random()*LOGICAL_W, Math.random()*LOGICAL_H);
    ctx.lineTo(Math.random()*LOGICAL_W, Math.random()*LOGICAL_H); ctx.stroke();
  }
  ctx.restore();

  const rings = [ 
    {r:HOUSE.r, c:'#1d4ed8'}, {r:HOUSE.r*0.75, c:'#ffffff'}, 
    {r:HOUSE.r*0.45, c:'#ef4444'}, {r:HOUSE.r*0.2, c:'#ffffff'}   
  ];
  
  rings.forEach(ring => {
    ctx.beginPath(); ctx.arc(HOUSE.x, HOUSE.y, ring.r, 0, Math.PI*2);
    ctx.fillStyle = ring.c; ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.2)'; ctx.lineWidth=1; ctx.stroke();
  });

  ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.font = '900 16px "Black Han Sans"';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText('1', HOUSE.x, HOUSE.y - HOUSE.r * 0.87);
  ctx.fillText('3', HOUSE.x, HOUSE.y - HOUSE.r * 0.6);
  ctx.fillText('5', HOUSE.x, HOUSE.y - HOUSE.r * 0.32);
  ctx.fillStyle = 'rgba(200,0,0,0.7)'; ctx.fillText('10', HOUSE.x, HOUSE.y);

  ctx.strokeStyle='rgba(0,0,0,0.08)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(HOUSE.x, 0); ctx.lineTo(HOUSE.x, LOGICAL_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, HOUSE.y); ctx.lineTo(LOGICAL_W, HOUSE.y); ctx.stroke();

  ctx.beginPath(); ctx.arc(START.x, START.y, 60, 0, Math.PI*2);
  ctx.strokeStyle='rgba(0,0,0,0.15)'; ctx.lineWidth=2; ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);

  if(state.phase !== 'setup' && state.phase !== 'turn_intro') {
    let p1Score = 0; let p2Score = 0;
    state.stones.forEach(s => {
      const dist = Math.hypot(s.x - HOUSE.x, s.y - HOUSE.y);
      let pts = 0;
      if (dist <= HOUSE.r * 0.2) pts = 10;
      else if (dist <= HOUSE.r * 0.45) pts = 5;
      else if (dist <= HOUSE.r * 0.75) pts = 3;
      else if (dist <= HOUSE.r) pts = 1;
      
      if(pts > 0) {
        if(s.team.id === state.playerTeam.id) p1Score += pts;
        else if(s.team.id === state.aiTeam.id) p2Score += pts;
      }
    });

    ctx.font = '900 28px "Black Han Sans"';
    ctx.fillStyle = state.playerTeam.color; ctx.textAlign = 'left';
    ctx.fillText(`${state.playerTeam.name}: ${p1Score}점`, 20, 110);
    
    ctx.fillStyle = state.aiTeam.color; ctx.textAlign = 'right';
    ctx.fillText(`${state.aiTeam.name}: ${p2Score}점`, LOGICAL_W - 20, 110);
  }

  if (state.dragging && state.dragStart && state.dragNow && !state.isAiTurn && state.activeStone) {
    const dx = state.dragStart.x - state.dragNow.x, dy = state.dragStart.y - state.dragNow.y;
    const angle = Math.atan2(dy, dx);
    let dist = Math.min(Math.hypot(dx, dy), 350);
    if(state.powerBuff[state.currentTeam.id] > 0) dist *= 1.5; 
    
    const ex = state.activeStone.x + Math.cos(angle)*dist*1.2, ey = state.activeStone.y + Math.sin(angle)*dist*1.2;
    const grad = ctx.createLinearGradient(state.activeStone.x, state.activeStone.y, ex, ey);
    grad.addColorStop(0, state.currentTeam.color); grad.addColorStop(1, 'transparent');
    
    ctx.save(); ctx.beginPath(); ctx.moveTo(state.activeStone.x, state.activeStone.y); ctx.lineTo(ex,ey);
    ctx.strokeStyle=grad; ctx.lineWidth=8; ctx.lineCap='round'; ctx.stroke();
    
    ctx.translate(ex, ey); ctx.rotate(angle);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-20,-12); ctx.lineTo(-20,12); ctx.closePath();
    ctx.fillStyle = state.currentTeam.color; ctx.shadowBlur=15; ctx.shadowColor=ctx.fillStyle; ctx.fill();
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════════════
function gameLoop() {
  ctx.save(); pCtx.save();
  if (shakeTime > 0) {
    const sx = (Math.random()-0.5) * shakeMag; const sy = (Math.random()-0.5) * shakeMag;
    ctx.translate(sx, sy); pCtx.translate(sx, sy); shakeTime--;
  }

  drawArena();
  
  if (state.phase !== 'setup' && state.phase !== 'end') {
    applyContinuousForces();
    let moving = false;
    state.stones.forEach(s => { s.update(); if (s.move) moving = true; });
    resolveCollisions();
    
    if (moving && state.phase === 'move') {
      if (Date.now() - lastShoutTime > 1200 && Math.random() < 0.05) {
        showCurlingShout(); lastShoutTime = Date.now();
      }
    }
    
    if (!moving && state.phase === 'move') {
      if(!state.isAiTurn) showReaction(); 
      state.currentTeam = state.currentTeam.id === state.playerTeam.id ? state.aiTeam : state.playerTeam;
      updateRealtimeScore();
      spawnStone();
    }
    
    state.stones.forEach(s => s.draw());
  } else if (state.phase === 'end') {
    state.stones.forEach(s => s.draw());
  }

  pCtx.clearRect(0,0,LOGICAL_W,LOGICAL_H);
  for(let i=particles.length-1; i>=0; i--) { particles[i].update(); particles[i].draw(pCtx); if(particles[i].life<=0) particles.splice(i,1); }
  
  ctx.restore(); pCtx.restore();
  requestAnimationFrame(gameLoop);
}

loadLeaderboard();
requestAnimationFrame(gameLoop);
</script>
