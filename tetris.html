<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#030305">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/favicon.png">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3207219520058740" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NBGELYQ4TZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TETRIS BATTLE - Chrisleepapa</title>
    <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Cinzel:wght@700;900&family=Exo+2:wght@800;900&family=Poppins:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --c-neon: #ff007f;
            --c-cyan: #00e5ff;
            --c-gold: #ffcf00;
            --bg-deep: #030305;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.15);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }

        body {
            overflow: hidden;
            font-family: 'Poppins', sans-serif;
            background: var(--bg-deep);
            color: #fff;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100vw; height: 100%;
        }

        body::before {
            content: ''; position: fixed; inset: 0; z-index: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
            opacity: 0.05; pointer-events: none;
        }

        #gameWrap {
            position: relative;
            width: 100%;
            max-width: 500px;
            height: 100%;
            margin: 0 auto;
            overflow: hidden;
            z-index: 1;
            display: flex;
            flex-direction: column;
            background: radial-gradient(circle at 50% 30%, #1a0533 0%, var(--bg-deep) 100%);
        }

        /* ─── UI Screens ─── */
        .screen {
            position: absolute; inset: 0; z-index: 100;
            display: flex; flex-direction: column; align-items: center;
            padding: max(env(safe-area-inset-top, 30px), 30px) 25px;
            background: radial-gradient(circle at 50% 20%, #151025 0%, var(--bg-deep) 90%);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .screen.hidden { opacity: 0; transform: scale(0.95); pointer-events: none; }

        .title-main {
            font-family: 'Cinzel', serif; font-weight: 900; font-size: 2.8rem;
            background: linear-gradient(180deg, #fff, #b3b3b3);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.2));
            margin-bottom: 5px; text-align: center;
        }
        .title-sub {
            font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem;
            color: var(--c-neon); letter-spacing: 4px; margin-bottom: 30px;
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
        }

        .glass-panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 25px 20px;
            width: 100%;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .input-neon {
            width: 100%; text-align: center; font-family: 'Exo 2', sans-serif;
            font-size: 2rem; font-weight: 900; letter-spacing: 0.3em;
            padding: 12px; border-radius: 16px; background: rgba(0,0,0,0.4);
            color: var(--c-cyan); border: 2px solid rgba(0,229,255,0.2);
            outline: none; transition: 0.3s; text-transform: uppercase;
        }
        .input-neon:focus { border-color: var(--c-cyan); box-shadow: 0 0 20px rgba(0,229,255,0.3); }

        .btn-magic {
            width: 100%; border: none; border-radius: 18px; padding: 16px;
            font-family: 'Black Han Sans', sans-serif; font-size: 1.3rem;
            cursor: pointer; transition: all 0.2s ease; color: #fff;
            background: linear-gradient(135deg, #ff007f, #7f00ff);
            box-shadow: 0 10px 30px rgba(255,0,127,0.4);
            margin-top: 15px;
        }
        .btn-magic:active { transform: scale(0.96); opacity: 0.9; }

        .lb-header { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px; }

        /* ─── HUD Area ─── */
        #hud {
            flex: 0 0 auto;
            padding: max(env(safe-area-inset-top, 15px), 15px) 20px 10px;
            display: flex; justify-content: space-between; align-items: flex-start;
            z-index: 50; pointer-events: none; opacity: 0; transition: 0.5s;
        }
        .hud-item {
            background: rgba(0,0,0,0.6); backdrop-filter: blur(10px);
            padding: 8px 15px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1);
        }
        .hud-label { font-size: 10px; color: #aaa; text-transform: uppercase; letter-spacing: 1px; }
        .hud-val { 
            font-family: 'Exo 2', sans-serif; font-size: 20px; font-weight: 900; color: var(--c-cyan); 
            display: inline-block; transition: all 0.3s;
        }

        #btn-pause {
            background: rgba(255,255,255,0.1); border: 1px solid var(--c-neon); border-radius: 8px;
            color: var(--c-neon); font-size: 1.2rem; cursor: pointer; padding: 5px 10px;
            margin-top: 5px; pointer-events: auto; text-shadow: 0 0 10px var(--c-neon);
            box-shadow: 0 0 10px rgba(255,0,127,0.3); transition: 0.2s;
        }
        #btn-pause:active { transform: scale(0.9); }

        /* ─── Main Game Area ─── */
        main { 
            flex: 1 1 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 5px 15px 15px; 
            min-height: 0; 
            overflow: hidden;
            position: relative;
        }
        .canvas-wrapper {
            position: relative; 
            height: 100%; 
            max-width: 100%;
            aspect-ratio: 10 / 20;
            background: #000; 
            border-radius: 12px; 
            border: 2px solid #ff007f;
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.2); 
            overflow: hidden;
        }
        canvas { width: 100%; height: 100%; display: block; }

        /* ─── ★ 수정된 거대 투명 컨트롤러 ─── */
        #touch-dpad {
            position: absolute; inset: 0;
            z-index: 60; opacity: 0; pointer-events: none; transition: 0.5s;
        }
        .t-btn {
            position: absolute;
            background: rgba(255, 255, 255, 0.015); /* 거의 희미하게 */
            border: 1px solid rgba(255, 255, 255, 0.03); /* 경계선 아주 얇게 */
            display: flex; align-items: center; justify-content: center;
            font-size: 3.5rem; color: rgba(255, 255, 255, 0.15); /* 텍스트도 투명하게 */
            cursor: pointer; user-select: none;
            transition: 0.1s;
        }
        .t-btn:active { background: rgba(255, 255, 255, 0.08); }
        .t-btn.btn-drop { color: rgba(255,0,127,0.2); border-color: rgba(255,0,127,0.05); }
        .t-btn.btn-action { color: rgba(0,229,255,0.2); border-color: rgba(0,229,255,0.05); }

        /* 좌측 중앙 구역 */
        #t-left { top: 15%; left: 0; width: 30%; height: 65%; border-radius: 0 20px 20px 0; }
        /* 우측 중앙 구역 */
        #t-right { top: 15%; right: 0; width: 30%; height: 65%; border-radius: 20px 0 0 20px; }
        /* 중앙 회전 구역 */
        #t-up { top: 15%; left: 30%; width: 40%; height: 65%; border-radius: 20px; font-size: 4.5rem; }
        /* 하단 왼쪽 (소프트 드롭) */
        #t-down { bottom: 0; left: 0; width: 50%; height: 20%; border-radius: 0 20px 0 0; }
        /* 하단 오른쪽 (하드 드롭) */
        #t-space { bottom: 0; right: 0; width: 50%; height: 20%; border-radius: 20px 0 0 0; font-size: 3rem; }

        /* Game Over */
        #gameover {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 110; backdrop-filter: blur(10px);
        }
        .gameover-card { background: var(--glass); border: 1px solid var(--glass-border); padding: 30px; border-radius: 30px; text-align: center; width: 85%; }

        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .spinner { animation: spin 1s linear infinite; display: inline-block; }

        /* 🦅 Eagle Intro */
        #eagle-wrap {
            position: absolute; top: 15%; left: -100px;
            font-size: 3rem; z-index: 105; pointer-events: none;
            display: none;
        }

        /* ✨ Floating Reactions */
        .floating-reaction {
            position: absolute; left: 50%; top: 40%; transform: translateX(-50%);
            font-family: 'Black Han Sans', sans-serif; font-size: 2rem; font-style: italic;
            color: #fff; text-shadow: 0 0 15px var(--c-cyan), 0 5px 10px rgba(0,0,0,0.8);
            z-index: 120; pointer-events: none; opacity: 0;
            white-space: nowrap;
        }
        @keyframes float-reaction {
            0% { transform: translate(-50%, 20px) scale(0.5); opacity: 0; }
            20% { transform: translate(-50%, 0) scale(1.1); opacity: 1; }
            80% { transform: translate(-50%, -40px) scale(1); opacity: 1; }
            100% { transform: translate(-50%, -80px) scale(0.8); opacity: 0; }
        }

        /* 🌟 Level Up Animation Element */
        .level-up-anim {
            position: absolute;
            text-align: center;
            font-family: 'Black Han Sans', sans-serif;
            font-size: 2.2rem;
            color: var(--c-gold);
            text-shadow: 0 0 20px var(--c-neon), 0 5px 10px rgba(0,0,0,0.8);
            z-index: 150;
            pointer-events: none;
            line-height: 1.1;
        }
    </style>
</head>
<body>

<div id="gameWrap">
    <!-- 🦅 독수리 이벤트 -->
    <div id="eagle-wrap">🦅</div>

    <!-- 1. 메인 로그인 화면 -->
    <div id="s-login" class="screen">
        <div style="margin-top: 5vh;">
            <div class="title-main">TETRIS</div>
            <div class="title-sub">NEON BATTLE</div>
        </div>

        <div class="glass-panel" style="margin-bottom: 20px;">
            <div style="font-size:0.7rem; font-weight:700; letter-spacing:2px; opacity:0.6; margin-bottom:10px; text-align:center;">PLAYER INITIALS</div>
            <input id="initialsInput" class="input-neon" maxlength="3" placeholder="AAA" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')"/>
            <button class="btn-magic" onclick="enterArena()">배틀 필드 입장</button>
        </div>

        <div class="glass-panel">
            <div class="lb-header">
                <div style="font-size: 1rem;">👑</div>
                <div style="font-family:'Cinzel',serif; font-weight:900; font-size:1rem; letter-spacing:2px;">HALL OF FAME</div>
                <div id="lbSpinner" class="spinner" style="margin-left:auto;">⟳</div>
            </div>
            <div id="leaderboardList" style="font-size: 0.85rem;"></div>
        </div>
    </div>

    <!-- 2. 게임 HUD -->
    <div id="hud">
        <div class="hud-item" style="flex: 1;">
            <div class="hud-label">Player</div>
            <div id="hudInit" class="hud-val">---</div>
        </div>
        
        <!-- NEXT 미리보기 캔버스 -->
        <div class="hud-item" style="flex: 1; text-align: center; margin: 0 10px;">
            <div class="hud-label">NEXT</div>
            <canvas id="nextCanvas" width="60" height="90" style="margin: 0 auto; display: block;"></canvas>
        </div>

        <div class="hud-item" style="flex: 1; text-align: right; display: flex; flex-direction: column; align-items: flex-end;">
            <div class="hud-label">LEVEL</div>
            <div id="hudLevel" class="hud-val">1</div>
            <!-- 일시정지 버튼 -->
            <button id="btn-pause" onclick="togglePause()">⏸️</button>
        </div>
    </div>

    <!-- 3. 게임 영역 -->
    <main id="mainGameArea">
        <div class="canvas-wrapper">
            <canvas id="tetris"></canvas>
            
            <!-- 4. ★ 수정된 영역 분할 컨트롤러 -->
            <div id="touch-dpad">
                <div class="t-btn" id="t-left">◀</div>
                <div class="t-btn btn-action" id="t-up">↻</div>
                <div class="t-btn" id="t-right">▶</div>
                <div class="t-btn" id="t-down">▼</div>
                <div class="t-btn btn-drop" id="t-space">⏬</div>
            </div>
        </div>
    </main>

    <!-- 5. 게임 오버 -->
    <div id="gameover">
        <div class="gameover-card">
            <div style="font-size: 3rem; margin-bottom: 10px;">💀</div>
            <div class="title-main" style="font-size: 2rem; color: #ff007f; -webkit-text-fill-color: #ff007f;">GAME OVER</div>
            <div style="font-size: 1.1rem; margin-bottom: 25px; opacity: 0.8;">최종 도달: <span style="color:var(--c-gold); font-weight:900;">LV.<span id="finalLevel">1</span></span></div>
            <button class="btn-magic" onclick="location.reload()">다시 도전</button>
        </div>
    </div>
</div>

<script>
    // ══════════════════════════════════════════════════════
    // SOUND & REACTION
    // ══════════════════════════════════════════════════════
    let audioCtx;
    const REACTIONS = ["폼 미쳤다!", "나이스!", "오우예!", "찢었다!", "GOAT!", "완벽해!", "깔끔쓰✨"];

    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playSound(type) {
        if (!audioCtx) return;
        const t = audioCtx.currentTime;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        if (type === 'move') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(200, t);
            gain.gain.setValueAtTime(0.05, t); osc.start(t); osc.stop(t + 0.05);
        } else if (type === 'rotate') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(400, t);
            gain.gain.setValueAtTime(0.05, t); osc.start(t); osc.stop(t + 0.1);
        } else if (type === 'drop') {
            osc.type = 'square'; osc.frequency.setValueAtTime(150, t);
            gain.gain.setValueAtTime(0.1, t); osc.start(t); osc.stop(t + 0.1);
        } else if (type === 'clear') {
            [440, 659].forEach((f, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, t + i * 0.1);
                g.gain.setValueAtTime(0.05, t + i * 0.1); o.start(t + i * 0.1); o.stop(t + i * 0.1 + 0.2);
            });
        } else if (type === 'levelup') {
            [440, 554, 659, 880].forEach((f, i) => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type = 'triangle'; o.connect(g); g.connect(audioCtx.destination);
                o.frequency.setValueAtTime(f, t + i * 0.15);
                g.gain.setValueAtTime(0.1, t + i * 0.15); o.start(t + i * 0.15); o.stop(t + i * 0.15 + 0.3);
            });
        }
    }

    function showReaction(text) {
        const el = document.createElement('div');
        el.className = 'floating-reaction';
        el.textContent = text || REACTIONS[Math.floor(Math.random() * REACTIONS.length)];
        document.getElementById('mainGameArea').appendChild(el);
        el.style.animation = 'float-reaction 1.2s ease-out forwards';
        setTimeout(() => el.remove(), 1300);
    }

    function showLevelUpAnimation(level) {
        playSound('levelup');
        const el = document.createElement('div');
        el.className = 'level-up-anim';
        el.innerHTML = `LEVEL UP!<br><span style="font-size:4rem">${level}</span>`;
        document.getElementById('gameWrap').appendChild(el);
        
        const hud = document.getElementById('hudLevel');
        const hudRect = hud.getBoundingClientRect();
        const wrapRect = document.getElementById('gameWrap').getBoundingClientRect();
        
        const targetX = (hudRect.left - wrapRect.left) + (hudRect.width / 2);
        const targetY = (hudRect.top - wrapRect.top) + (hudRect.height / 2);
        const startX = wrapRect.width / 2;
        const startY = wrapRect.height / 2;
        
        el.style.left = startX + 'px';
        el.style.top = startY + 'px';
        
        const anim = el.animate([
            { transform: 'translate(-50%, -50%) scale(0)', opacity: 0, offset: 0 },
            { transform: 'translate(-50%, -50%) scale(1.2)', opacity: 1, offset: 0.15 },
            { transform: 'translate(-50%, -50%) scale(1)', opacity: 1, offset: 0.7 },
            { transform: `translate(calc(-50% + ${targetX - startX}px), calc(-50% + ${targetY - startY}px)) scale(0.2)`, opacity: 0.5, offset: 1 }
        ], { duration: 1800, easing: 'ease-in-out' });
        
        anim.onfinish = () => {
            el.remove();
            hud.innerText = level;
            hud.style.color = '#ffcf00';
            hud.style.transform = 'scale(1.5)';
            setTimeout(() => {
                hud.style.transform = 'scale(1)';
                hud.style.color = 'var(--c-cyan)';
            }, 300);
        };
    }

    // ══════════════════════════════════════════════════════
    // SUPABASE & CONFIG
    // ══════════════════════════════════════════════════════
    const SUPA_URL = 'https://cvfmkcxmxkmemmshfttn.supabase.co';
    const SUPA_KEY = 'sb_publishable_Bb_GkRPWRFeAPvIduwPTJg_O1z_sStm';
    const TABLE_NAME = 'tetris_scores';
    let currentInitials = '';
    const canvas = document.getElementById('tetris');
    const ctx = canvas.getContext('2d');
    let maxReachedLevel = 1;

    async function loadLeaderboard() {
        try {
            const res = await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?select=initials,level&order=level.desc,timestamp.asc&limit=5`, {
                headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
            });
            const data = await res.json();
            document.getElementById('lbSpinner').style.display = 'none';
            const list = document.getElementById('leaderboardList');
            list.innerHTML = '';
            const medals = ['🥇', '🥈', '🥉', '4', '5'];
            data.forEach((e, i) => {
                list.innerHTML += `<div style="display:flex; justify-content:space-between; margin-bottom:3px; background:rgba(0,0,0,0.2); padding:5px 10px; border-radius:5px;"><span>${medals[i]} <b>${e.initials}</b></span><span style="color:var(--c-gold); font-weight:900;">LV.${e.level}</span></div>`;
            });
        } catch (e) { document.getElementById('lbSpinner').textContent = '⚠'; }
    }

    async function saveScore(level) {
        if (!currentInitials) return;
        try {
            const checkRes = await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?select=level&initials=eq.${currentInitials}`, {
                headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}` }
            });
            const existing = await checkRes.json();

            if (existing && existing.length > 0) {
                if (level > existing[0].level) {
                    await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?initials=eq.${currentInitials}`, {
                        method: 'PATCH',
                        headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                        body: JSON.stringify({ level: level, timestamp: new Date().toISOString() })
                    });
                }
            } else {
                await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}`, {
                    method: 'POST',
                    headers: { apikey: SUPA_KEY, Authorization: `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
                    body: JSON.stringify({ initials: currentInitials, level: level, timestamp: new Date().toISOString() })
                });
            }
        } catch (e) { console.error("Save Error", e); }
    }

    // ══════════════════════════════════════════════════════
    // TETRIS ENGINE
    // ══════════════════════════════════════════════════════
    const COLS = 10, ROWS = 20, BLOCK_SIZE = 30;
    let arena = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    let player = { pos: {x: 0, y: 0}, matrix: null, lines: 0, level: 1, gameOver: true };
    
    let dropCounter = 0, dropInterval = 1000, lastTime = 0;
    let baseDropInterval = 1000;
    let speedPhase = 'FAST'; 
    let speedPhaseTime = 0;
    
    let isIntro = false;
    let isPaused = false; // 일시정지 상태 변수

    // 다다음 블록까지 저장할 배열
    let nextPieces = [];

    function getRandomPieceMatrix() {
        const pieces = 'ILJOTSZ';
        return createPiece(pieces[pieces.length * Math.random() | 0]);
    }

    function createPiece(type) {
        if (type === 'I') return [[0,1,0,0],[0,1,0,0],[0,1,0,0],[0,1,0,0]];
        if (type === 'L') return [[0,2,0],[0,2,0],[0,2,2]];
        if (type === 'J') return [[0,3,0],[0,3,0],[3,3,0]];
        if (type === 'O') return [[4,4],[4,4]];
        if (type === 'Z') return [[5,5,0],[0,5,5],[0,0,0]];
        if (type === 'S') return [[0,6,6],[6,6,0],[0,0,0]];
        if (type === 'T') return [[0,7,0],[7,7,7],[0,0,0]];
    }

    const colors = [null, '#00e5ff', '#ff8e0d', '#3877ff', '#ffdd00', '#ff007f', '#00ff66', '#b300ff'];

    // 미리보기 캔버스 그리기
    function drawNextPieces() {
        const nc = document.getElementById('nextCanvas');
        const nctx = nc.getContext('2d');
        nctx.clearRect(0, 0, nc.width, nc.height);
        
        const bSize = 12; // 미리보기 블록 크기
        nextPieces.forEach((matrix, index) => {
            const offsetY = index * 45; // 첫번째와 두번째 블록 사이 간격
            const offsetX = (nc.width - matrix[0].length * bSize) / 2; // 중앙 정렬
            
            matrix.forEach((row, y) => {
                row.forEach((value, x) => {
                    if (value !== 0) {
                        const px = offsetX + x * bSize;
                        const py = offsetY + y * bSize;
                        nctx.fillStyle = colors[value];
                        nctx.shadowBlur = 5; nctx.shadowColor = colors[value];
                        nctx.fillRect(px, py, bSize - 1, bSize - 1);
                        nctx.shadowBlur = 0;
                    }
                });
            });
        });
    }

    function draw() {
        const wrapper = document.querySelector('.canvas-wrapper');
        canvas.width = wrapper.clientWidth;
        canvas.height = wrapper.clientHeight;

        const scale = Math.min(canvas.width / (COLS * BLOCK_SIZE), canvas.height / (ROWS * BLOCK_SIZE));
        const offsetX = (canvas.width - COLS * BLOCK_SIZE * scale) / 2;
        const offsetY = (canvas.height - ROWS * BLOCK_SIZE * scale) / 2;
        
        ctx.fillStyle = '#000'; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.save(); ctx.translate(offsetX, offsetY); ctx.scale(scale, scale);
        
        ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)'; ctx.lineWidth = 0.5;
        for(let x=0; x<=COLS; x++) { ctx.beginPath(); ctx.moveTo(x*BLOCK_SIZE, 0); ctx.lineTo(x*BLOCK_SIZE, ROWS*BLOCK_SIZE); ctx.stroke(); }
        for(let y=0; y<=ROWS; y++) { ctx.beginPath(); ctx.moveTo(0, y*BLOCK_SIZE); ctx.lineTo(COLS*BLOCK_SIZE, y*BLOCK_SIZE); ctx.stroke(); }
        
        drawMatrix(arena, {x: 0, y: 0});
        if (player.matrix) drawMatrix(player.matrix, player.pos);
        ctx.restore();
    }

    function drawMatrix(matrix, offset) {
        matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) {
                    const px = (x + offset.x) * BLOCK_SIZE, py = (y + offset.y) * BLOCK_SIZE;
                    ctx.fillStyle = colors[value];
                    ctx.shadowBlur = 10; ctx.shadowColor = colors[value];
                    ctx.fillRect(px + 1, py + 1, BLOCK_SIZE - 2, BLOCK_SIZE - 2);
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.fillRect(px+1, py+1, BLOCK_SIZE-2, 4);
                }
            });
        });
    }

    function collide(arena, player) {
        const [m, o] = [player.matrix, player.pos];
        for (let y = 0; y < m.length; ++y) {
            for (let x = 0; x < m[y].length; ++x) {
                if (m[y][x] !== 0 && (arena[y + o.y] && arena[y + o.y][x + o.x]) !== 0) return true;
            }
        }
        return false;
    }

    function merge(arena, player) {
        player.matrix.forEach((row, y) => {
            row.forEach((value, x) => {
                if (value !== 0) arena[y + player.pos.y][x + player.pos.x] = value;
            });
        });
    }

    // ★ 산산조각 떨어지는 캐스케이드(중력) 및 청소 로직
    function arenaSweep() {
        let totalCleared = 0;
        let boardChanged = true;
        
        while (boardChanged) {
            boardChanged = false;
            
            // 1. 캐스케이드 (중력) 적용: 허공에 뜬 블록들을 바닥/다른 블록에 닿을 때까지 내림
            // 방금 닿은 블록이라도 허공에 뜬 부분은 이 로직에 의해 분리되어 떨어집니다.
            let moved;
            do {
                moved = false;
                for (let y = ROWS - 2; y >= 0; y--) {
                    for (let x = 0; x < COLS; x++) {
                        if (arena[y][x] !== 0 && arena[y + 1][x] === 0) {
                            arena[y + 1][x] = arena[y][x];
                            arena[y][x] = 0;
                            moved = true;
                            boardChanged = true;
                        }
                    }
                }
            } while (moved);

            // 2. 라인 클리어 체크
            let clearedThisRound = 0;
            for (let y = ROWS - 1; y >= 0; y--) {
                let isFull = true;
                for (let x = 0; x < COLS; x++) {
                    if (arena[y][x] === 0) { isFull = false; break; }
                }
                if (isFull) {
                    arena[y].fill(0);
                    clearedThisRound++;
                    boardChanged = true;
                }
            }
            totalCleared += clearedThisRound;
        }

        // 3. 점수 및 레벨업 정산
        if (totalCleared > 0) {
            const oldLevel = player.level;
            player.lines += totalCleared;
            player.level = Math.floor(player.lines / 5) + 1;
            maxReachedLevel = Math.max(maxReachedLevel, player.level);
            
            if (player.level > oldLevel) {
                baseDropInterval = Math.max(100, 1000 - ((player.level - 1) * 150));
                dropInterval = baseDropInterval;
                if (player.level >= 6) { speedPhase = 'FAST'; speedPhaseTime = 0; }
                showLevelUpAnimation(player.level);
            } else {
                playSound('clear');
                showReaction();
            }
        }
    }

    function playerDrop() {
        if (isIntro || isPaused) return;
        player.pos.y++;
        if (collide(arena, player)) {
            // ★ 수정: 배열 합치기 -> 캐스케이드 발동 -> 새 조각 소환 순으로 변경하여
            // 방금 닿은 블록이 즉각적으로 쪼개지며 떨어지게 설계
            player.pos.y--; 
            merge(arena, player); 
            arenaSweep(); 
            playerReset(); 
        }
        dropCounter = 0;
    }

    function hardDrop() {
        if (player.gameOver || isIntro || isPaused) return;
        while (!collide(arena, player)) { player.pos.y++; }
        player.pos.y--; 
        merge(arena, player); 
        arenaSweep(); 
        playerReset(); 
        dropCounter = 0; playSound('drop'); draw();
    }

    function playerMove(dir) {
        if (player.gameOver || isIntro || isPaused) return;
        player.pos.x += dir;
        if (collide(arena, player)) player.pos.x -= dir;
        else { playSound('move'); draw(); }
    }

    function playerRotate() {
        if (player.gameOver || isIntro || isPaused) return;
        const pos = player.pos.x; let offset = 1;
        rotate(player.matrix);
        while (collide(arena, player)) {
            player.pos.x += offset;
            offset = -(offset + (offset > 0 ? 1 : -1));
            if (offset > player.matrix[0].length) { rotate(player.matrix, -1); player.pos.x = pos; return; }
        }
        playSound('rotate'); draw();
    }

    function rotate(matrix, dir = 1) {
        for (let y = 0; y < matrix.length; ++y) {
            for (let x = 0; x < y; ++x) [matrix[x][y], matrix[y][x]] = [matrix[y][x], matrix[x][y]];
        }
        if (dir > 0) matrix.forEach(row => row.reverse()); else matrix.reverse();
    }

    function playerReset() {
        // 큐에 블록이 부족하면 채워넣기
        while(nextPieces.length < 2) {
            nextPieces.push(getRandomPieceMatrix());
        }
        // 제일 앞의 블록을 가져오고 새 블록 추가
        player.matrix = nextPieces.shift();
        nextPieces.push(getRandomPieceMatrix());
        drawNextPieces(); // UI 갱신

        player.pos.y = 0; player.pos.x = (COLS / 2 | 0) - (player.matrix[0].length / 2 | 0);
        if (collide(arena, player)) { player.gameOver = true; finishGame(); }
    }

    function finishGame() {
        playSound('gameover');
        document.getElementById('gameover').style.display = 'flex';
        document.getElementById('finalLevel').innerText = maxReachedLevel;
        saveScore(maxReachedLevel);
    }

    // 일시정지 토글 함수
    function togglePause() {
        if (player.gameOver || isIntro) return;
        isPaused = !isPaused;
        document.getElementById('btn-pause').innerText = isPaused ? '▶️' : '⏸️';
        
        if (isPaused) {
            showReaction("PAUSE ⏸️");
        } else {
            lastTime = performance.now(); // 재개 시 시간 오차 보정
            update();
        }
    }

    function update(time = 0) {
        if (player.gameOver || isIntro || isPaused) return; // 일시정지 시 루프 건너뛰기
        const deltaTime = time - lastTime; lastTime = time;
        
        if (player.level >= 6) {
            speedPhaseTime += deltaTime;
            if (speedPhase === 'FAST' && speedPhaseTime >= 3000) {
                speedPhase = 'SLOW'; speedPhaseTime = 0; dropInterval = 1000; showReaction("휴식 타임! 😌");
            } else if (speedPhase === 'SLOW' && speedPhaseTime >= 10000) {
                speedPhase = 'FAST'; speedPhaseTime = 0; dropInterval = baseDropInterval; showReaction("다시 달린다! 🔥");
            }
        } else {
            dropInterval = baseDropInterval;
        }

        dropCounter += deltaTime;
        if (dropCounter > dropInterval) playerDrop();
        
        draw(); 
        requestAnimationFrame(update);
    }

    // 🦅 Eagle Intro
    function startEagleIntro() {
        isIntro = true;
        const eagle = document.getElementById('eagle-wrap');
        eagle.style.display = 'block';
        eagle.animate([{ left: '-100px' }, { left: '45%' }], { duration: 1500, fill: 'forwards' }).onfinish = () => {
            playerReset(); draw(); playSound('drop'); showReaction("START! 🦅");
            eagle.animate([{ left: '45%' }, { left: '120%' }], { duration: 1000, fill: 'forwards', easing: 'ease-in' }).onfinish = () => {
                eagle.style.display = 'none'; isIntro = false; lastTime = performance.now(); update();
            };
        };
    }

    function enterArena() {
        initAudio();
        const val = document.getElementById('initialsInput').value.trim();
        if (val.length < 1) return;
        currentInitials = val; document.getElementById('hudInit').innerText = currentInitials;
        document.getElementById('s-login').classList.add('hidden');
        document.getElementById('hud').style.opacity = '1';
        
        // 투명 컨트롤러 활성화
        document.getElementById('touch-dpad').style.opacity = '1';
        document.getElementById('touch-dpad').style.pointerEvents = 'auto';
        
        setTimeout(startGame, 500); 
    }

    function startGame() {
        arena = Array.from({length: ROWS}, () => Array(COLS).fill(0));
        player.lines = 0; 
        player.level = 1; 
        maxReachedLevel = 1; 
        player.gameOver = false; 
        isPaused = false;
        document.getElementById('btn-pause').innerText = '⏸️';
        
        baseDropInterval = 1000; dropInterval = 1000;
        speedPhase = 'FAST'; speedPhaseTime = 0;
        nextPieces = []; // 초기화
        
        document.getElementById('hudLevel').innerText = '1';
        draw();
        startEagleIntro();
    }

    window.addEventListener('keydown', e => {
        // 단축키로 일시정지 (P 또는 Esc)
        if (e.key.toLowerCase() === 'p' || e.key === 'Escape') togglePause();
        
        if (player.gameOver || isIntro || isPaused) return;
        if (['ArrowLeft', 'ArrowRight', 'ArrowUp', 'ArrowDown', ' '].includes(e.key)) e.preventDefault();
        
        if (e.key === 'ArrowLeft') playerMove(-1);
        else if (e.key === 'ArrowRight') playerMove(1);
        else if (e.key === 'ArrowDown') playerDrop();
        else if (e.key === 'ArrowUp') playerRotate();
        else if (e.key === ' ') hardDrop();
    });

    function bindBtn(id, action, repeat = false) {
        const btn = document.getElementById(id);
        let timer = null;
        const start = (e) => {
            e.preventDefault(); if(player.gameOver || isIntro || isPaused) return;
            action(); if(repeat) { clearInterval(timer); timer = setInterval(action, 90); }
        };
        const end = () => clearInterval(timer);
        btn.addEventListener('pointerdown', start);
        btn.addEventListener('pointerup', end);
        btn.addEventListener('pointerleave', end);
        btn.addEventListener('pointercancel', end);
    }

    // 컨트롤러 ID로 이벤트 바인딩
    bindBtn('t-left', () => playerMove(-1), true);
    bindBtn('t-right', () => playerMove(1), true);
    bindBtn('t-down', () => playerDrop(), true);
    bindBtn('t-up', () => playerRotate());
    bindBtn('t-space', () => hardDrop());

    window.addEventListener('resize', () => { draw(); });
    loadLeaderboard();
</script>

</body>
</html>
