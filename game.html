<style>
:root{--gold:#FFD700;--pink:#FF69B4;--purple:#9B59B6;--blue:#4A90D9;--dark:#0b081a;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
/* 브라우저 바운스 효과 방지 및 화면 100% 고정 */
html,body{height:100%;overflow:hidden;touch-action:manipulation;background:var(--dark);overscroll-behavior:none;}
body{font-family:'Nunito',sans-serif;color:#fff;position:relative;}

/* 배경 효과 */
.sf{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(30,10,70,.8),transparent 55%),radial-gradient(ellipse at 80% 80%,rgba(5,20,50,.9),transparent 55%),#0b081a;}
.sl{position:fixed;inset:0;z-index:0;pointer-events:none;}
.st{position:absolute;border-radius:50%;background:#fff;animation:twk var(--d,3s) ease-in-out var(--dl,0s) infinite;}
@keyframes twk{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:1;transform:scale(1.8);}}
#fx{position:fixed;inset:0;pointer-events:none;z-index:55;}

/* === 풀스크린 보드게임 레이아웃 === */
.wr{position:relative;z-index:1;display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;padding:4dvh 12px;} 

/* 🌟 보드판 (은하수 강물 애니메이션 적용) 🌟 */
.board{
    display:grid; grid-template-columns:repeat(7,1fr); grid-template-rows:repeat(7,1fr); gap:1.2vw;
    width:100%; max-width:850px; aspect-ratio: 1;
    max-height: 95vh;
    background:#080416; /* 은하수가 돋보이도록 어두운 배경 */
    border-radius:24px; padding:1.5%; border:3px solid rgba(255,215,0,.3);
    position: relative;
    z-index: 1;
    overflow: hidden; /* 강물이 판 밖으로 나가지 않게 */
    animation: boardGlow 6s ease-in-out infinite; /* 전체 판 테두리 호흡 효과 */
}

/* 판 테두리가 부드럽게 색이 변하며 빛나는 효과 */
@keyframes boardGlow {
    0%, 100% { box-shadow: 0 0 60px rgba(155,89,182,.5), inset 0 0 40px rgba(0,0,0,.6); border-color: rgba(255,215,0,.3); }
    50% { box-shadow: 0 0 80px rgba(74,144,217,.7), inset 0 0 50px rgba(155,89,182,.4); border-color: rgba(255,105,180,.6); }
}

/* 타일 밑으로 흐르는 은하수 강물 그라데이션 */
.board::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, 
        rgba(8, 4, 22, 0.9) 0%, 
        rgba(45, 15, 80, 0.85) 25%, 
        rgba(105, 55, 180, 0.7) 45%, 
        rgba(74, 144, 217, 0.8) 50%, 
        rgba(255, 105, 180, 0.7) 55%, 
        rgba(45, 15, 80, 0.85) 75%, 
        rgba(8, 4, 22, 0.9) 100%
    );
    background-size: 300% 300%;
    animation: flowRiver 10s ease-in-out infinite;
    z-index: 0; pointer-events: none;
}

/* 강물 위를 반짝이며 흘러가는 별가루 파티클 */
.board::after {
    content: ''; position: absolute; inset: 0;
    background-image: 
        radial-gradient(1.5px 1.5px at 20px 30px, #fff, transparent),
        radial-gradient(2.5px 2.5px at 60px 80px, #FFD700, transparent),
        radial-gradient(1px 1px at 100px 20px, #fff, transparent),
        radial-gradient(3px 3px at 150px 100px, #4A90D9, transparent),
        radial-gradient(2px 2px at 10px 120px, #FF69B4, transparent),
        radial-gradient(1.5px 1.5px at 80px 150px, #fff, transparent),
        radial-gradient(2px 2px at 130px 170px, #9B59B6, transparent);
    background-size: 200px 200px; 
    animation: twinkleRiver 15s linear infinite;
    z-index: 0; pointer-events: none;
    mix-blend-mode: screen;
.wr{
    position:relative; z-index:1; display:flex; align-items:center; justify-content:center;
    height:100vh; height:100dvh; width: 100vw; padding:2vmin;
}

.board {
    display:grid; 
    /* minmax(0, 1fr)로 설정하여 내용물 때문에 그리드 크기가 팽창하는 것을 방지 */
    grid-template-columns:repeat(7, minmax(0, 1fr)); 
    grid-template-rows:repeat(7, minmax(0, 1fr)); 
    gap:1.5vmin; /* 간격 살짝 축소 */
    width:100%; height:100%; 
    max-width: 900px; 
    max-height: 1200px; 
    background:rgba(13, 10, 35, 0.85); 
    border-radius:24px; padding:1.5vmin; 
    border:2px solid rgba(255,215,0,.3);
    box-shadow:0 0 60px rgba(0,0,0,.8), inset 0 0 40px rgba(0,0,0,.8);
}

@keyframes flowRiver {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
}

@keyframes twinkleRiver {
    0% { background-position: 0px 0px; opacity: 0.3; }
    25% { opacity: 0.8; }
    50% { opacity: 0.4; }
    75% { opacity: 0.9; }
    100% { background-position: -200px -200px; opacity: 0.3; }
}


@media (max-width: 600px) {

.cell:hover{transform:scale(1.08);z-index:10;box-shadow:0 0 16px rgba(255,255,255,.35);}

    .wr { padding: 4px; }
    /* 모바일에서는 갭과 패딩을 최소화하여 공간 확보 */
    .board { gap: 1.5vw; padding: 1.5vw; border-radius: 15px; border-width: 1px; }
}

.cell {

    border: 2px solid rgba(255, 255, 255, 0.4);

.cell::after {

.cell::before {
    content: ''; position: absolute; inset: 0;

    pointer-events: none; z-index: 1;
}

.cell:hover{transform:scale(1.08);z-index:10;box-shadow:0 0 20px rgba(255,255,255,.5);}
.cell.corner{border-radius:15px;border-width:2px;}

/* 타일 종류별 색상 */
.tc { background: linear-gradient(135deg, #FFD700 0%, #B8860B 100%); border-color: #FFFACD; box-shadow: 0 0 10px rgba(255,215,0,0.5); }
.te { background: linear-gradient(135deg, #2ECC71 0%, #196F3D 100%); border-color: #A9DFBF; box-shadow: 0 0 10px rgba(46,204,113,0.5); }
.tt { background: linear-gradient(135deg, #E74C3C 0%, #7B241C 100%); border-color: #F5B7B1; box-shadow: 0 0 10px rgba(231,76,60,0.5); }
.tb { background: linear-gradient(135deg, #3498DB 0%, #1A5276 100%); border-color: #AED6F6; box-shadow: 0 0 10px rgba(52,152,219,0.5); }
.tm { background: linear-gradient(135deg, #9B59B6 0%, #512E5F 100%); border-color: #D7BDE2; box-shadow: 0 0 10px rgba(155,89,182,0.5); }

/* 글자 넘침 방지 및 폰트 크기 조절 */
.cem { font-size: clamp(12px, 3.5vmin, 32px); line-height: 1.1; margin-bottom: 2px; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.7)); position: relative; z-index: 5; flex-shrink: 0; }
.cnm { font-size: clamp(7px, 1.8vmin, 14px); font-weight: 900; color: #fff; text-align: center; line-height: 1.1; word-break: break-word; overflow-wrap: anywhere; text-shadow: 1px 1px 3px rgba(0,0,0,0.9), 0 0 5px rgba(0,0,0,0.8); position: relative; z-index: 5; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

.ctk{position:absolute;inset:0;display:flex;flex-direction:row;align-items:center;justify-content:center;gap:2px;pointer-events:none;z-index:20;}
.tok{display:block;transition:filter .3s;}
.tok.a0{filter:drop-shadow(0 0 6px #4A90D9) drop-shadow(0 0 12px #4A90D9);animation:tbounce .6s ease-in-out infinite;}
.tok.a1{filter:drop-shadow(0 0 6px #FF69B4) drop-shadow(0 0 12px #FF69B4);animation:tbounce .6s ease-in-out .3s infinite;}

@keyframes tbounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-5px) rotate(-3deg);}40%{transform:translateX(5px) rotate(3deg);}60%{transform:translateX(-3px);}80%{transform:translateX(3px);}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
.cell.shk{animation:shake .5s;}
.cell.lnd{animation:pulse .4s;}
.board.shk{animation:shake .6s !important;} /* 흔들림 우선 적용 */

/* === 중앙 UI === */
.cp{
    grid-column:2/7; grid-row:2/7;
    background:linear-gradient(160deg,rgba(18,6,46,.98),rgba(6,22,52,.98)); /* 은하수가 너무 비치지 않게 투명도 조정 */

    z-index: 2; /* 타일보다 위, 은하수 덮어주기 */
/* 중앙 상태 패널 */
.cp {
    grid-column: 2/7; grid-row: 2/7;
    background: radial-gradient(ellipse at center, #1b2046 0%, #0d0f24 100%);

}

.cp::after {

        radial-gradient(rgba(255,255,255,0.15) 1px, transparent 1px),

    pointer-events: none; opacity: 0.6;
}

.ctit {
    position: relative; z-index: 5;

}
.ctit::before { content: '✨ '; }

/* 점수판 디자인 */
.scs { display: flex; gap: 8px; width: 100%; justify-content: center; position: relative; z-index: 5; }
.sc {
    background: rgba(10, 15, 40, 0.6);

}

.spi { display: block; transition: transform .3s; margin-bottom: 2px; }

.spn { color: #fff; font-size: clamp(10px, 2.2vmin, 15px); font-weight: 900; white-space: nowrap; }

#turn-indicator { position: relative; z-index: 5; font-family: 'Fredoka One', cursive; font-size: clamp(12px, 3vmin, 20px); color: #FFD700; text-shadow: 0 2px 4px rgba(0,0,0,0.8); text-align: center; }

.dcr { display: flex; justify-content: center; gap: 12px; position: relative; z-index: 5; margin: 2px 0; }

#lgp {

.ov{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;padding:10px;opacity:0;pointer-events:none;transition:opacity .3s;}

/* 팝업 창들도 잘리지 않도록 높이 제한 및 스크롤 추가 */

/* 3D 사진 카드 연출 */
.ecard.photo-card { transform: perspective(1500px) rotateY(90deg) scale(0.2) translateY(200px); opacity: 0; border: 3px solid #FFD700; position: relative; transition: none; max-width: 440px; overflow-x: hidden; }
.ov.vis .ecard.photo-card { animation: epicCardReveal 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
.ov.vis .ecard.photo-card.photo-evil { animation: epicCardRevealEvil 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; border-color: #E74C3C; }
.ov.vis .ecard.photo-card.photo-green { animation: epicCardRevealGreen 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; border-color: #2ECC71; }
.ov.vis .ecard.photo-card.photo-magic { animation: epicCardRevealMagic 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; border-color: #9B59B6; }

@keyframes epicCardReveal { 0% { transform: perspective(1500px) rotateY(90deg) rotateX(10deg) scale(0.2) translateY(200px); opacity: 0; box-shadow: 0 0 0 transparent; } 45% { transform: perspective(1500px) rotateY(-360deg) rotateX(-5deg) scale(1.05) translateY(-20px); opacity: 1; box-shadow: 0 0 80px #FFD700, 0 0 40px #fff; } 100% { transform: perspective(1500px) rotateY(0deg) rotateX(0deg) scale(1) translateY(0); opacity: 1; box-shadow: 0 20px 40px rgba(0,0,0,0.9), 0 0 30px rgba(255,215,0,0.5); } }

var fx=document.getElementById('fx'),ctx=fx.getContext('2d'),parts=[];
function rsz(){fx.width=innerWidth;fx.height=innerHeight;}
window.addEventListener('resize',rsz);rsz();
function star5(c,x,y,r){
  c.beginPath();
  for(var i=0;i<5;i++){
    var a=(i*Math.PI*2/5)-Math.PI/2,ai=a+Math.PI/5;
    if(i===0)c.moveTo(x+r*Math.cos(a),y+r*Math.sin(a)); else c.lineTo(x+r*Math.cos(a),y+r*Math.sin(a));
    c.lineTo(x+r*0.4*Math.cos(ai),y+r*0.4*Math.sin(ai));
  }
  c.closePath();c.fill();
}
function spawnStars(x,y,n,col){
  n=n||14;col=col||'#FFD700';
  for(var i=0;i<n;i++){
    var a=(Math.PI*2/n)*i+Math.random()*0.5,sp=2+Math.random()*5;
    parts.push({x:x,y:y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:1,dec:0.02+Math.random()*0.02,sz:3+Math.random()*6,col:col,t:Math.random()>0.5?'star':'circ'});
  }
}
function spawnConfetti(){
  var cs=['#FFD700','#FF69B4','#C9A6FF','#4A90D9','#FF6B6B','#69FF69','#FFB347'];
  for(var i=0;i<70;i++){
    parts.push({x:Math.random()*fx.width,y:-10,vx:(Math.random()-0.5)*6,vy:2+Math.random()*4,life:1,dec:0.007+Math.random()*0.008,sz:5+Math.random()*8,col:cs[Math.floor(Math.random()*cs.length)],t:'rect',rot:Math.random()*Math.PI*2,rs:(Math.random()-0.5)*0.2});
  }
}
function animParts(){
  ctx.clearRect(0,0,fx.width,fx.height);
  parts=parts.filter(function(p){return p.life>0;});
  parts.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.12;p.life-=p.dec;
    if(p.rot!==undefined)p.rot+=p.rs;
    ctx.save();ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;
    if(p.t==='star'){star5(ctx,p.x,p.y,p.sz);} else if(p.t==='rect'){ctx.translate(p.x,p.y);ctx.rotate(p.rot||0);ctx.fillRect(-p.sz/2,-p.sz/4,p.sz,p.sz/2);} else{ctx.beginPath();ctx.arc(p.x,p.y,p.sz/2,0,Math.PI*2);ctx.fill();}
    ctx.restore();
  });
  requestAnimationFrame(animParts);
}

];

var pos=[0,0], stars=[0,0], cur=0, dice=[1,2], skip=[false,false], powerUp=[false,false];
var rolling=false, ev=null, over=false, moving=false;
var totalTurns = 1;
var MAX_EVENT_CHAIN = 6;
var eventChain = null;

var totalRolls = 0;
var nextDKTarget = 10;
var dkActive = false;
var dkPos = 0;
var dkStepsTaken = 0;
var encActive = false;
var dkAnimating = false;

var cinematicPlaying = false;
var encTargetPos = 0;
var encFromMove = false;

var cfxCanvas = null;
var cfxCtx = null;
var cfxRunning = false;
var cfxParts = [];
var cineNext = null;
var cineTimeout = null;
      
function shuffleBoard() {
  var startSpace = SP[0];
  var restSpaces = SP.slice(1);
  for (var i = restSpaces.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = restSpaces[i]; restSpaces[i] = restSpaces[j]; restSpaces[j] = temp;
  }
  SP = [startSpace].concat(restSpaces);
  SP.forEach(function(sp, idx) { sp.id = idx; });
  if (dkActive) {
    dkActive = false;
    dkAnimating = false;
    dkPos = 0;
    dkStepsTaken = 0;
    addLog('🌪️ 마법의 바람에 어둠의 기사도 사라졌습니다!');
  }
}

function rebuildBoardDOM() {
  var b = document.getElementById('board');
  var cells = b.querySelectorAll('.cell');
  for (var i = 0; i < cells.length; i++) cells[i].remove();
  
  SP.forEach(function(sp) {
    var g = GR[sp.id], d = document.createElement('div');
    d.className = 'cell ' + TC[sp.t] + (sp.t === 'c' ? ' corner' : '');
    d.id = 'c' + sp.id;
    d.style.cssText = 'grid-column:' + g.c + ';grid-row:' + g.r + ';';
    d.innerHTML = '<div class="cem">' + sp.em + '</div><div class="cnm">' + sp.nm + '</div><div class="ctk" id="tk' + sp.id + '"></div>';
    b.insertBefore(d, b.querySelector('.cp'));
  });
  renderAll();
}

function resetEventChain() { eventChain = null; }
function registerEventVisit(sid) {
  if (!eventChain) eventChain = { count: 0, seen: {} };
  if (eventChain.seen[sid]) return '같은 카드 지시가 반복되어 연쇄 이동을 멈췄어요.';
  eventChain.seen[sid] = true; eventChain.count++;
  if (eventChain.count > MAX_EVENT_CHAIN) return '카드 지시가 너무 길게 이어져 안전하게 멈췄어요.';
  return '';
}

function finalizeTurn() {
    if (!dkActive && totalRolls >= nextDKTarget) {
        nextDKTarget += 10;
        spawnDK();
    } else if (dkActive) {
        playDKTurn();
    } else {
        nextPlayerTurn();
    }
}

function nextPlayerTurn() {
    var nx = 1 - cur;
    addLog(PL[nx].ic + ' ' + PL[nx].nm + ' 차례!');
    cur = nx;
    advanceTurn();
}

function endTurnAfterEventChain(reason) {
  ev = null; moving = false; rolling = false; resetEventChain();
  addLog('🌀 ' + reason);
  if (stars[cur] >= WIN) { renderAll(); setTimeout(showWin, 400); return; }
  finalizeTurn();
  renderAll();
}

function advanceTurn() {
  resetEventChain();
  totalTurns++;
  if (totalTurns % 10 === 0) {
    addLog('🌪️ 10번째 턴! 마법의 바람이 불어 보드가 섞입니다!');
    shuffleBoard(); rebuildBoardDOM();
    var b = document.getElementById('board');
    b.classList.add('shk'); setTimeout(function() { b.classList.remove('shk'); }, 600); sTrap();
  }
}

function buildBoard(){
  rebuildBoardDOM();
  document.getElementById('isvg0').innerHTML=SV.yul; document.getElementById('isvg1').innerHTML=SV.jung;
  renderAll();
}

function renderAll(){
  SP.forEach(function(sp){
    var tk=document.getElementById('tk'+sp.id); if(!tk)return; tk.innerHTML='';
    
    if (dkActive && dkPos === sp.id) {
        var sdk = document.createElement('div');
        sdk.className = 'tok a2';
        sdk.style.filter = 'drop-shadow(0 0 6px #E74C3C) drop-shadow(0 0 12px #E74C3C)';
        sdk.style.zIndex = '3';
        sdk.innerHTML = '<div class="tok-img-wrap" style="border-color:#E74C3C;"><div class="sprite-char sprite-dk sprite-anim"></div></div>';
        tk.appendChild(sdk);
    }
    
    if(pos[0]===sp.id){
      var s=document.createElement('div'); s.className='tok'+(cur===0&&!moving&&!dkAnimating?' a0':'');
      s.style.zIndex = '5';
      s.innerHTML='<div class="tok-img-wrap"><div class="sprite-char sprite-yul sprite-anim"></div></div>'; tk.appendChild(s);
    }
    if(pos[1]===sp.id){
      var s2=document.createElement('div'); s2.className='tok'+(cur===1&&!moving&&!dkAnimating?' a1':'');
      s2.style.zIndex = '5';
      s2.innerHTML='<div class="tok-img-wrap"><div class="sprite-char sprite-jeong sprite-anim"></div></div>'; tk.appendChild(s2);
    }
  });
  
  [0,1].forEach(function(i){
    document.getElementById('sc'+i).className='sc'+(i===cur?' cur':'')+(powerUp[i]?' pwr':'');
    document.getElementById('ss'+i).textContent='⭐'+stars[i];
    document.getElementById('pb'+i).style.width=Math.min(100,stars[i]/WIN*100)+'%';
    document.getElementById('ssk'+i).style.display=skip[i]?'inline':'none';
  });
  
  var p=PL[cur];
  var ti = document.getElementById('turn-indicator');
  if(ti) ti.textContent = p.ic + ' ' + p.nm + ' 차례!' + (powerUp[cur] ? ' ⚡ 파워 업!' : '') + (skip[cur] ? ' (쉬는 중)' : '');

  var rollsLeft = nextDKTarget - totalRolls;
  document.getElementById('roll-counter').innerText = '🔥 어둠의 기사 출현까지: ' + rollsLeft + '회';

  document.getElementById('d0').textContent=DICE[dice[0]];
  document.getElementById('d1').textContent=DICE[dice[1]];
  document.getElementById('d0').className='die'+(rolling?' rl':'');
  document.getElementById('d1').className='die'+(rolling?' rl':'');

  var btn=document.getElementById('rb');
  var can = !rolling && !ev && !over && !moving && !encActive && !dkAnimating && !cinematicPlaying;
  btn.disabled=!can;
  btn.textContent=skip[cur]?'⏭️ 턴 넘기기':rolling?'🎲 굴리는 중...':(powerUp[cur]?'🔥 파워 굴리기 (x2)':'🎲 주사위 굴리기');
}

function addLog(msg){
  var lp=document.getElementById('lgp');
  if(lp) lp.innerHTML='<div class="lge fr" style="animation: cfu 0.3s ease-out;">'+msg+'</div>';
}

function handleRoll(){
  if(rolling||ev||over||moving||encActive||dkAnimating||cinematicPlaying)return;
  resetEventChain();
  
  if(skip[cur]){
    skip[cur]=false; 
    addLog(PL[cur].ic+' '+PL[cur].nm+' 쉬는 중...');
    totalRolls++; 
    finalizeTurn(); renderAll(); return;
  }
  
  totalRolls++; 
  rolling=true;renderAll();sDice();
  var t=0;
  var iv=setInterval(function(){
    dice=[Math.ceil(Math.random()*6),Math.ceil(Math.random()*6)];
    renderAll();t++;
    if(t>=12){
      clearInterval(iv);
      var f1=Math.ceil(Math.random()*6),f2=Math.ceil(Math.random()*6);
      dice=[f1,f2];rolling=false;renderAll();
      var steps = f1+f2; var isPwr = powerUp[cur];
      if(isPwr){ steps *= 2; powerUp[cur] = false; }
      setTimeout(function(){movePlayer(pos[cur], steps, isPwr);},200);
    }
  },80);
}

function handleLanding(targetPos, fromMove) {
    var collisionWithDK = (dkActive && targetPos === dkPos);
    var collisionWithSister = (pos[0] === pos[1] && targetPos !== 0);

    if (collisionWithDK) {
        var cine = {
            type: 'evil', img: './images/darknight.png', tag: '🚨 DANGER 🚨',
            name: '어둠의 기사 조우!', sub: PL[cur].nm + '님이 어둠의 기사와 만났습니다!\n운명을 건 가위바위보를 시작합니다!'
        };
        cineShow(cine, function() {
            startDKRPS([cur], collisionWithSister, targetPos, fromMove);
        });
    } else if (collisionWithSister) {
        startEncounterRPS(targetPos, fromMove);
    } else {
        checkAndTriggerEvent(targetPos, fromMove);
    }
}

function movePlayer(from, steps, isPwr){
  moving=true;renderAll();
  if(isPwr) addLog(PL[cur].ic+' 파워 업 발동! 🚀 '+(dice[0]+dice[1])+'x2 = '+steps+'칸!');
  else addLog(PL[cur].ic+' '+PL[cur].nm+' 주사위: '+steps+'칸!');
  var step=0;
  var iv=setInterval(function(){
    step++;pos[cur]=(from+step)%24;renderAll();sStep();
    if(pos[cur] === 0 && step < steps) { addLog(PL[cur].ic + ' 출발점을 지나갔어요. 정확히 멈추면 각성합니다!'); }
    var cell=document.getElementById('c'+pos[cur]);
    if(cell){cell.classList.add('lnd');setTimeout(function(){cell.classList.remove('lnd');},380);}
    if(step>=steps){
      clearInterval(iv);moving=false;
      setTimeout(function(){handleLanding(pos[cur],false);},300);
    }
  },280);
}

    encActive = true;

    document.getElementById('enc-p1-nm').innerText = '👧 정이';

    document.getElementById('enc-h1').innerText = '❔';

}

function playEncounterRPS() {
    var h0 = document.getElementById('enc-h0'), h1 = document.getElementById('enc-h1'), res = document.getElementById('enc-res');
    var rollCnt = 0;
    sDice();
    
    var iv = setInterval(function() {
        h0.innerText = RPS_EMOJI[Math.floor(Math.random() * 3)];
        h1.innerText = RPS_EMOJI[Math.floor(Math.random() * 3)];
        rollCnt++;
        if(rollCnt > 12) {
            clearInterval(iv);
            var c0 = Math.floor(Math.random() * 3);
            var c1 = Math.floor(Math.random() * 3);
            
            h0.innerText = RPS_EMOJI[c0]; h0.classList.add('pop');
            h1.innerText = RPS_EMOJI[c1]; h1.classList.add('pop');
            setTimeout(function(){ h0.classList.remove('pop'); h1.classList.remove('pop'); }, 300);

            if (c0 === c1) {
                res.innerText = '앗! 비겼어요! 다시 한 번!'; 
                res.style.color = '#C9A6FF';
                sTrap(); setTimeout(playEncounterRPS, 1000);
            } else {
                var w = -1;
                if ((c0 === 0 && c1 === 2) || (c0 === 1 && c1 === 0) || (c0 === 2 && c1 === 1)) { w = 0; } else { w = 1; }
                
                var l = 1 - w; 
                if (stars[l] > 0) {
                    stars[w]++; stars[l]--;
                    res.innerText = PL[w].nm + ' 승리! 별 1개를 빼앗았습니다!';
                    addLog('⚔️ 배틀 승리! ' + PL[w].nm + '이(가) 별을 뺏었습니다!');
                } else {
                    res.innerText = PL[w].nm + ' 승리! 하지만 뺏을 별이 없네요!';
                    addLog('⚔️ 배틀 승리! ' + PL[w].nm + '이(가) 이겼습니다!');
                }
                
                res.style.color = w === 0 ? '#4A90D9' : '#FF69B4';
                sStar();
                document.getElementById('enc-btn').style.display = 'block';
                renderAll();
            }
        }
    }, 80);
}

function endEncounterRPS() {
    document.getElementById('enc-ov').classList.remove('vis');
    encActive = false;
    if (stars[0] >= WIN || stars[1] >= WIN) { renderAll(); setTimeout(showWin, 400); return; }
    setTimeout(function() { checkAndTriggerEvent(encTargetPos, encFromMove); }, 400);
}

function playDKRPS(caughtPlayers, alsoSisterCollision, targetPos, fromMove) {
    var h0 = document.getElementById('enc-h0'), h1 = document.getElementById('enc-h1'), res = document.getElementById('enc-res');
    var rollCnt = 0;
    sDice();

    var iv = setInterval(function() {
        h0.innerText = RPS_EMOJI[Math.floor(Math.random() * 3)];
        h1.innerText = RPS_EMOJI[Math.floor(Math.random() * 3)];
        rollCnt++;
        if(rollCnt > 12) {
            clearInterval(iv);
            var c0 = Math.floor(Math.random() * 3);
            var c1 = Math.floor(Math.random() * 3);

            h0.innerText = RPS_EMOJI[c0]; h0.classList.add('pop');
            h1.innerText = RPS_EMOJI[c1]; h1.classList.add('pop');
            setTimeout(function(){ h0.classList.remove('pop'); h1.classList.remove('pop'); }, 300);

            if (c0 === c1) {
                res.innerText = '앗! 비겼어요! 다시 한 번!';
                res.style.color = '#C9A6FF';
                sTrap(); setTimeout(function(){ playDKRPS(caughtPlayers, alsoSisterCollision, targetPos, fromMove); }, 1000);
            } else {
                var playerWins = false;
                if ((c0 === 0 && c1 === 2) || (c0 === 1 && c1 === 0) || (c0 === 2 && c1 === 1)) { playerWins = true; }

                if (playerWins) {
                    res.innerText = '🎉 승리! 어둠의 기사를 물리쳤습니다!';
                    addLog('🦇 어둠의 기사 배틀 승리! 무사히 피했습니다.');
                    res.style.color = '#FFD700';
                    sStar();
                } else {
                    res.innerText = '💀 패배... 별 2개를 빼앗깁니다!';
                    caughtPlayers.forEach(function(p) {
                        stars[p] = Math.max(0, stars[p] - 2);
                    });
                    addLog('💀 어둠의 기사에게 패배! 별 -2');
                    res.style.color = '#FF6B6B';
                    sTrap();
                    spawnStars(window.innerWidth/2,window.innerHeight/2,10,'#FF6B6B');
                }

                document.getElementById('enc-btn').style.display = 'block';
                document.getElementById('enc-btn').onclick = function() {
                    endDKRPS(alsoSisterCollision, targetPos, fromMove);
                };
                renderAll();
            }
        }
    }, 80);
}

function endDKRPS(alsoSisterCollision, targetPos, fromMove) {
    document.getElementById('enc-ov').classList.remove('vis');
    encActive = false;

    document.getElementById('enc-title').innerText = '⚔️ 같은 칸에서 만났다! ⚔️';
    document.getElementById('enc-desc').innerText = '가위바위보 승리 시 별 1개를 빼앗습니다!';
    document.getElementById('enc-p0-nm').innerText = '👩 율이';
    document.getElementById('enc-p1-nm').innerText = '👧 정이';
    document.getElementById('enc-btn').onclick = endEncounterRPS;

    if (stars[0] >= WIN || stars[1] >= WIN) { renderAll(); setTimeout(showWin, 400); return; }

    if (alsoSisterCollision) {
        startEncounterRPS(targetPos, fromMove);
    } else if (targetPos !== undefined) {
        checkAndTriggerEvent(targetPos, fromMove);
    } else {
        checkDKRetreat();
    }
}

function spawnDK() {
    cinematicPlaying = true; 
    cinematicPlaying = true;
    dkActive = true;
    dkPos = 0;
    dkStepsTaken = 0;
    var cine = {
        type: 'evil',
        img: './images/darknight.png',
        tag: '⚠️ WARNING ⚠️',
        name: '어둠의 기사 출현!',
        sub: '주사위를 '+(nextDKTarget-10)+'번 던진 대가로...\n어둠의 기사가 추격을 시작합니다!\n잡히면 별을 2개 빼앗깁니다!'
    };
    sTrap();

    });

function playDKTurn() {
    dkAnimating = true;
    addLog('🦇 어둠의 기사 차례!');
    renderAll();
    sBattleRoll();
    
    setTimeout(function() {
        var d1 = Math.ceil(Math.random()*6);
        var d2 = Math.ceil(Math.random()*6);
        var steps = d1 + d2;
        addLog('🦇 어둠의 기사 주사위: ' + steps + '칸!');
        moveDK(steps);
    }, 800);
}

function moveDK(steps) {
    var step = 0;
    var from = dkPos;
    var iv = setInterval(function() {
        step++;
        dkPos = (from + step) % 24;
        dkStepsTaken++;
        renderAll();
        sStep();

        if (step >= steps) {
            clearInterval(iv);
            setTimeout(function() {
                resolveDKLanding();
            }, 400);
        }
    }, 280);
}

function resolveDKLanding() {
    var caught = [];
    if (dkPos === pos[0]) caught.push(0);
    if (dkPos === pos[1]) caught.push(1);

    if (caught.length > 0) {
        var names = caught.map(function(p){ return PL[p].nm; }).join('와(과) ');
        var cine = {
            type: 'evil', img: './images/darknight.png', tag: '🚨 CAUGHT! 🚨',
            name: '어둠의 기사 습격!', sub: names + '님이 어둠의 기사에게 잡혔습니다!\n운명을 건 가위바위보를 시작합니다!'
        };
        cineShow(cine, function() {
            startDKRPS(caught, false, undefined, false);
        });
    } else {
        checkDKRetreat();
    }
}

function checkDKRetreat() {
    if (dkStepsTaken >= 24) {
        dkActive = false;
        addLog('🦇 어둠의 기사가 한 바퀴를 돌아 사라졌습니다.');
    }
    dkAnimating = false;
    renderAll();
    setTimeout(nextPlayerTurn, 500);
}

function preloadImage(src){
  var img=new Image(); img.decoding='async'; img.loading='eager';
  img.src=src; if(img.decode){img.decode().catch(function(){});} return img;
}

function cfxInit(){
  cfxCanvas=document.getElementById('cfx'); cfxCtx=cfxCanvas.getContext('2d');
  cfxCanvas.width=innerWidth; cfxCanvas.height=innerHeight;
  window.addEventListener('resize',function(){if(cfxCanvas){cfxCanvas.width=innerWidth;cfxCanvas.height=innerHeight;}});
}

function cfxLoop(){
  if(!cfxRunning)return; cfxCtx.clearRect(0,0,cfxCanvas.width,cfxCanvas.height);
  cfxParts=cfxParts.filter(function(p){return p.l>0;});
  cfxParts.forEach(function(p){
    p.x+=p.vx;p.y+=p.vy;p.vy+=p.g||0;p.l-=p.d;
    if(p.r!==undefined)p.r+=p.rs||0;
    cfxCtx.save();cfxCtx.globalAlpha=Math.max(0,p.l);cfxCtx.fillStyle=p.c;
    if(p.s==='heart'){cfxCtx.font=p.sz+'px serif';cfxCtx.textAlign='center';cfxCtx.fillText('♥',p.x,p.y);}
    else if(p.s==='skull'){cfxCtx.font=p.sz+'px serif';cfxCtx.textAlign='center';cfxCtx.fillText('💀',p.x,p.y);}
    else if(p.s==='spark'){cfxCtx.translate(p.x,p.y);cfxCtx.rotate(p.r||0);cfxCtx.fillRect(-p.sz*.3,-p.sz*1.5,p.sz*.6,p.sz*3);}
    else{cfxCtx.beginPath();cfxCtx.arc(p.x,p.y,p.sz,0,Math.PI*2);cfxCtx.fill();}
    cfxCtx.restore();
  }); requestAnimationFrame(cfxLoop);
}

function cfxSpawn(type){
  cfxParts=[]; var W=innerWidth,H=innerHeight;
  if(type==='good'){
    for(var i=0;i<35;i++)cfxParts.push({x:Math.random()*W,y:H+20,vx:(Math.random()-.5)*2.5,vy:-(1.5+Math.random()*3.5),l:1,d:.004+Math.random()*.005,sz:14+Math.random()*18,c:['#FF69B4','#FFD700','#FF9ECD','#FFCCE5'][i%4],s:'heart',g:-.03});
    for(var j=0;j<60;j++)cfxParts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5),vy:(Math.random()-.5),l:.5+Math.random()*.5,d:.006+Math.random()*.01,sz:1.5+Math.random()*3,c:'rgba(255,215,0,.9)',s:'circ'});
  } else {
    for(var k=0;k<20;k++)cfxParts.push({x:Math.random()*W,y:-30,vx:(Math.random()-.5)*3,vy:1.5+Math.random()*4,l:1,d:.006+Math.random()*.009,sz:12+Math.random()*14,c:'rgba(200,0,0,.8)',s:'skull',g:.06});
    for(var m=0;m<80;m++){var a=Math.random()*Math.PI*2,sp=2+Math.random()*6;cfxParts.push({x:W/2,y:H/2,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,l:1,d:.012+Math.random()*.02,sz:1+Math.random()*3,c:['#FF2200','#880000','#FF6600'][m%3],s:'spark',r:a,rs:(Math.random()-.5)*.3,g:.03});}
  }
}

function cineShow(cfg, callback) {
    if(!cfxCanvas) cfxInit();

    cinematicPlaying = true;
    renderAll(); 

    if(cineTimeout) clearTimeout(cineTimeout);

    cineNext = callback;
    
    var el = document.getElementById('cine');
    el.className = cfg.type;
    
    var imgEl = document.getElementById('cine-img');
    imgEl.style.display = 'block';
    preloadImage(cfg.img);
    imgEl.style.backgroundImage = 'url("'+cfg.img+'")';
    
    document.getElementById('cine-tag').textContent = cfg.tag;
    document.getElementById('cine-name').textContent = cfg.name;
    
    var subEl = document.getElementById('cine-sub');
    subEl.innerHTML = '';
    var lines = cfg.sub.split('\n');
    lines.forEach(function(line, idx) {
        var d = document.createElement('div');
        d.textContent = line;
        d.style.opacity = '0';
        d.style.animation = 'cfu 0.6s ' + (1.1 + idx * 0.9) + 's forwards';
        subEl.appendChild(d);
    });

    if(cfg.type === 'good') {
        [523,659,784,880,1047].forEach(function(f,i){setTimeout(function(){tone(f,.25,'sine',.18);},i*80);});
    } else {
        [120,100,80].forEach(function(f,i){setTimeout(function(){tone(f,.35,'sawtooth',.25);},i*110);});
        setTimeout(function(){[350,280,200].forEach(function(f,i){setTimeout(function(){tone(f,.2,'square',.2);},i*70);});},550);
    }
    
    cfxSpawn(cfg.type);
    if (!cfxRunning) {
        cfxRunning = true;
        cfxLoop();
    }
    
    requestAnimationFrame(function(){
        requestAnimationFrame(function(){ el.classList.add('on'); });
    });

    cineTimeout = setTimeout(function() {
        cineDismiss();
    }, 4000);
}

function cineDismiss() {
    if(!cineNext) return;
    if(cineTimeout) { clearTimeout(cineTimeout); cineTimeout = null; }
    
    var el = document.getElementById('cine');
    el.classList.remove('on');
    cfxRunning = false;
    cfxParts = [];
    if(cfxCtx) cfxCtx.clearRect(0,0,cfxCanvas.width,cfxCanvas.height);
    
    var cb = cineNext;
    cineNext = null;

    setTimeout(function(){
        cinematicPlaying = false; 
        renderAll();              
        cb();                     
    }, 550);
}

function checkAndTriggerEvent(sid, fromMove) {
    var stopReason = registerEventVisit(sid);
    if (stopReason) { endTurnAfterEventChain(stopReason); return; }
    
    var sp = SP[sid];
    var isAwake = (sid === 0);
    var mc = null;
    
    if(sp.magic) { mc = MAGIC_CARDS[Math.floor(Math.random() * MAGIC_CARDS.length)]; }
    
    if(isAwake){
       powerUp[cur] = true;
       var awaken = {
         char: cur === 0 ? 'superyul' : 'superjung', cn: PL[cur].nm, name: PL[cur].nm + ' 각성!',
         cd: '출발점에 정확히 멈춰 각성했어요! 별 1개와 다음 주사위 이동 2배를 얻습니다!',
         cine: { 
             type: 'good', 
             img: cur === 0 ? './images/superyul.jpeg' : './images/superjung.jpeg',
             tag: '⚡ AWAKENING ⚡', name: PL[cur].nm + ' 각성!', 
             sub: '출발점에 정확히 멈췄어요!\n별 1개를 얻고\n다음 주사위 이동이 2배가 됩니다! 🔥' 
         }
       };
       addLog(PL[cur].ic + ' ' + PL[cur].nm + ' 출발점 도착! 각성! ⭐ +1 & 주사위 x2 🚀');
       cineShow(awaken.cine, function(){ triggerEvent(sid, fromMove, awaken, mc); });
    } else {
       triggerEvent(sid, fromMove, null, mc);
    }
}

function triggerEvent(sid,fromMove,awaken,mc){
  var sp=SP[sid];
  if(!fromMove)addLog(PL[cur].ic+' → '+sp.em+' '+sp.nm);
  ev={sid:sid, awaken:awaken||null, mc:mc||null};  
      
  var cData = awaken ? null : CINE_DATA[sp.nm];
  if(cData){ cineShow(cData, function(){ openEventCard(); }); } 
  else { openEventCard(); }
}

function openEventCard(){
  var sp=SP[ev.sid];
  var awakeCard=ev.awaken;
  var mcCard = ev.mc;
  var cardChar=awakeCard?awakeCard.char:sp.char;
  
  if(sp.t==='t'){ var c=document.getElementById('c'+ev.sid); if(c){c.classList.add('shk');setTimeout(function(){c.classList.remove('shk');},500);} sTrap(); } 
  else {sStar();}
  
  var ec=document.getElementById('ec');
  var baseClass = 'ecard' + (sp.t==='t'?' tt2':sp.t==='b'?' tb2':sp.t==='c'?' tc2':sp.t==='m'?' tm2':'');
  
  var photoChars = ['mom', 'dad', 'bain', 'crown', 'darkknight', 'town', 'fairytail', 'brook', 'fairytown', 'grandmagic', 'angel', 'magicbook', 'team', 'superyul', 'superjung'];  
  var evilChars = ['bain', 'crown', 'darkknight'];
  var magicChars = ['magicbook'];
  
  if (photoChars.includes(cardChar)) {
    baseClass += ' photo-card';
    if (evilChars.includes(cardChar)) baseClass += ' photo-evil';
    else if (magicChars.includes(cardChar) && sp.magic) baseClass += ' photo-magic';
    else baseClass += ' photo-green';
  }
  ec.className = baseClass;
  
  document.getElementById('ehbg').style.background=sp.bg;
  
  var charHtml=SV[cardChar]||SV.luna;
  document.getElementById('ech').innerHTML=charHtml;

  document.getElementById('ecnm').textContent=awakeCard?awakeCard.cn:sp.cn;
  
  if(mcCard) {
      document.getElementById('esem').textContent=mcCard.em;
      document.getElementById('esnm').textContent=mcCard.nm;
      document.getElementById('edlg').textContent=mcCard.ds;
  } else {
      document.getElementById('esem').textContent=sp.em;
      document.getElementById('esnm').textContent=awakeCard?awakeCard.name:sp.nm;
      document.getElementById('edlg').textContent=awakeCard?awakeCard.cd:sp.cd;
  }
  
  var efx=document.getElementById('efx');efx.innerHTML='';
  var btn = document.getElementById('ecBtn');
  btn.className = 'cbtn'; btn.innerHTML = '✨ 계속하기!'; btn.onclick = confirmEvent;
  
  if(!mcCard) {
      if(sp.st&&sp.st!==0){var b=document.createElement('div');b.className='efb '+(sp.st>0?'sp':'sn');b.textContent='⭐ '+(sp.st>0?'+':'')+sp.st+'개';efx.appendChild(b);}
      if(sp.xr){var b2=document.createElement('div');b2.className='efb ex';b2.textContent='🎲 한 번 더!';efx.appendChild(b2);}
      if(sp.sk){var b3=document.createElement('div');b3.className='efb sk';b3.textContent='⏸️ 1턴 쉬기';efx.appendChild(b3);}
      if(sp.mv){var b4=document.createElement('div');b4.className='efb '+(sp.mv>0?'mp':'mn');b4.textContent=(sp.mv>0?'⬆️':'⬇️')+' '+Math.abs(sp.mv)+'칸 이동';efx.appendChild(b4);}
  }
  
  if(sp.boss) {
      efx.innerHTML = '<div class="efb sn">⚔️ 주사위를 굴려 4 이상이면 승리, 3 이하면 패배!</div>';
      btn.className = 'cbtn battle-btn';
      btn.innerHTML = '🎲 전투 주사위 굴리기!';
      btn.onclick = executeBossBattle;
  }
  
  document.getElementById('eov').classList.add('vis'); renderAll();
}

function executeBossBattle() {
    var btn = document.getElementById('ecBtn');
    btn.disabled = true; btn.innerHTML = '굴리는 중...'; btn.className = 'cbtn';
    sBattleRoll();
    
    var efx = document.getElementById('efx');
    var rollCnt = 0;
    var resultRoll = Math.ceil(Math.random() * 6);
    
    var rollIv = setInterval(function() {
        efx.innerHTML = '<div style="font-size:35px; color:#fff; text-shadow:0 0 10px gold; text-align:center; width:100%; margin-bottom:10px;">🎲 ' + Math.ceil(Math.random() * 6) + '</div>';
        rollCnt++;
        if(rollCnt > 12) {
            clearInterval(rollIv);
            var isWin = resultRoll >= 4;
            efx.innerHTML = '<div style="font-size:35px; color:#fff; text-shadow:0 0 10px gold; text-align:center; width:100%; margin-bottom:10px;">🎲 ' + resultRoll + '</div>';
            
            if(isWin) {
                efx.innerHTML += '<div class="efb sp">🎉 배틀 승리! 방어 성공 & 별 1개 획득!</div>';
                ev.battleResult = 1; sStar();
            } else {
                efx.innerHTML += '<div class="efb sn">💀 배틀 패배... 별 2개를 빼앗깁니다.</div>';
                ev.battleResult = -2; sTrap();
            }
            
            btn.disabled = false; btn.innerHTML = '✨ 결과 확인하고 계속하기';
            btn.onclick = confirmEvent;
        }
    }, 60);
}

function confirmEvent(){
  if(!ev)return;
  var sid=ev.sid, sp=SP[sid];
  var mc = ev.mc;
  var battleResult = ev.battleResult;
  ev=null;
  document.getElementById('eov').classList.remove('vis');
  
  var extraRoll=false,hasMoved=false;
  
  if(mc) {
      if(mc.st) {
         stars[cur] = Math.max(0, stars[cur] + mc.st);
         if(mc.st > 0) { sStar(); addLog(PL[cur].ic+' 마법의 힘! ⭐ +'+mc.st); showStarPop(window.innerWidth/2, window.innerHeight/2, '+'+mc.st+'⭐');}
         else { sTrap(); addLog(PL[cur].ic+' 마법의 저주... ⭐ '+mc.st); spawnStars(window.innerWidth/2,window.innerHeight/2,10,'#FF6B6B'); }
      }
      if(mc.swap) {
         var temp = pos[0]; pos[0] = pos[1]; pos[1] = temp;
         addLog('🌪️ 위치가 서로 바뀌었습니다!'); sTrap();
      }
      if(mc.steal) {
         var opp = 1 - cur;
         if(stars[opp] > 0) { stars[opp]--; stars[cur]++; addLog('🐈 상대방의 별 1개를 뺏었습니다!'); sStar(); } 
         else { addLog('🐈 상대방의 별이 없어 뺏지 못했습니다.'); }
      }
      if(mc.toStart) {
         pos[cur] = 0; addLog('🧹 출발점으로 날아갑니다!'); hasMoved = true;
         setTimeout(function(){ handleLanding(0, true); }, 600);
      }
  } 
  else if(battleResult !== undefined) {
      stars[cur] = Math.max(0, stars[cur] + battleResult);
      if(battleResult > 0) {
          addLog(PL[cur].ic+' 보스 배틀 승리! ⭐ +1');
          showStarPop(window.innerWidth/2, window.innerHeight/2, '+1⭐');
      } else {
          addLog(PL[cur].ic+' 보스 배틀 패배... ⭐ -2');
          spawnStars(window.innerWidth/2,window.innerHeight/2,10,'#FF6B6B');
      }
  }
  else {
      if(sp.st&&sp.st!==0){
        stars[cur]=Math.max(0,stars[cur]+sp.st);
        if(sp.st>0){
          sStar(); var cell=document.getElementById('c'+sid);
          if(cell){var r=cell.getBoundingClientRect();spawnStars(r.left+r.width/2,r.top+r.height/2,18,'#FFD700');showStarPop(r.left+r.width/2,r.top,'+'+sp.st+'⭐');}
        } else {spawnStars(window.innerWidth/2,window.innerHeight/2,10,'#FF6B6B');}
        addLog(PL[cur].ic+' ⭐ '+(sp.st>0?'+':'')+sp.st+' → 총 '+stars[cur]+'개');
      }
      if(sp.sk){skip[cur]=true;addLog(PL[cur].ic+' 다음 턴 쉬어야 해요! 😢');}
      if(sp.xr){extraRoll=true;addLog(PL[cur].ic+' 한 번 더 굴려요! 🎲');}
      if(sp.mv){
        hasMoved=true; var dest=((sid+sp.mv)%24+24)%24; var dsp=SP[dest];
        addLog(PL[cur].ic+' '+Math.abs(sp.mv)+'칸 '+(sp.mv>0?'앞으로':'뒤로')+'! → '+dsp.em+' '+dsp.nm);
        var from2=sid,dir=sp.mv>0?1:-1,steps2=Math.abs(sp.mv),step2=0;
        setTimeout(function(){
          moving=true;renderAll();
          var iv2=setInterval(function(){
            step2++;pos[cur]=((from2+dir*step2)%24+24)%24;renderAll();sStep();
            if(dir > 0 && pos[cur] === 0 && step2 < steps2) {
                stars[cur] += 2; powerUp[cur] = true; addLog(PL[cur].ic + ' 출발점 통과! ⭐ +2 & 파워 업! 🚀'); sStar();
                var c0 = document.getElementById('c0');
                if(c0){ var r=c0.getBoundingClientRect(); spawnStars(r.left+r.width/2, r.top+r.height/2, 18, '#FFD700'); showStarPop(r.left+r.width/2, r.top, '+2⭐'); }
            }
            var c2=document.getElementById('c'+pos[cur]);
            if(c2){c2.classList.add('lnd');setTimeout(function(){c2.classList.remove('lnd');},380);}
            if(step2>=steps2){
              clearInterval(iv2);moving=false;
              setTimeout(function(){handleLanding(pos[cur],true);},300);
            }
          },280);
        },300);
      }
  }
  
  if(stars[cur]>=WIN){renderAll();setTimeout(showWin,400);return;}
  if(!extraRoll&&!hasMoved){
    resetEventChain(); 
    finalizeTurn(); 
  }
  renderAll();
}

function showStarPop(x,y,txt){
  var d=document.createElement('div'); d.className='starpop';d.textContent=txt;
  d.style.cssText='left:'+(x-20)+'px;top:'+(y-10)+'px;'; document.body.appendChild(d); setTimeout(function(){d.remove();},950);
}

function showWin(){
  over=true;sWin();spawnConfetti();
  if (isYtReady && ytPlayer) ytPlayer.pauseVideo();

  var w=stars[0]>=WIN?0:1;
  document.getElementById('wpr').innerHTML=SV[PL[w].char];
  document.getElementById('wnm').textContent=PL[w].nm+' 승리! 🎉';
  document.getElementById('wdc').textContent='별 '+stars[w]+'개를 모아서 이겼어요!';
  document.getElementById('fsr').innerHTML=PL.map(function(p,i){
    var charHtml = '<div class="tok-img-wrap" style="width:40px;height:40px;margin-bottom:6px;border-width:2px;border-color:'+(i===0?'#4A90D9':'#FF69B4')+';">' + SV[p.char] + '</div>';
    return '<div class="fc'+(i===w?' wc':'')+'">'+charHtml+'<div class="fpn">'+p.nm+'</div><div class="fps">⭐'+stars[i]+'</div>'+(i===w?'<div class="fpc">👑 우승!</div>':'')+'</div>';
  }).join('');
  document.getElementById('gov').classList.add('vis');
  setTimeout(spawnConfetti,800);setTimeout(spawnConfetti,1600);
}

function resetGame(){
  pos=[0,0];stars=[0,0];cur=0;dice=[1,2];skip=[false,false];powerUp=[false,false];
  rolling=false;ev=null;over=false;moving=false; resetEventChain(); totalTurns=1;
  
  totalRolls = 0; nextDKTarget = 10; dkActive = false; dkPos = 0; dkStepsTaken = 0;
  encActive = false; dkAnimating = false;
  cinematicPlaying = false;
  cfxRunning = false; cfxParts = [];
  if(cfxCtx && cfxCanvas) cfxCtx.clearRect(0,0,cfxCanvas.width,cfxCanvas.height);
  if(cineTimeout){ clearTimeout(cineTimeout); cineTimeout = null; }
  cineNext = null;
  document.getElementById('cine').classList.remove('on');

  if (isYtReady && ytPlayer) ytPlayer.pauseVideo();

  document.getElementById('gov').classList.remove('vis');
  document.getElementById('eov').classList.remove('vis');
  document.getElementById('enc-ov').classList.remove('vis');
  
  shuffleBoard(); rebuildBoardDOM();
  document.querySelector('.icp').style.display = 'flex';
  document.getElementById('init-btn').style.display = '';
  document.getElementById('rps-ui').style.display = 'none';
  document.getElementById('final-start-btn').style.display = 'none';
  document.getElementById('yul-hand').innerText = '❔'; document.getElementById('jeong-hand').innerText = '❔'; document.getElementById('rps-result').innerText = '';
  document.querySelector('.it2').innerText = '놀라운 자매들의 대모험 — 별 10개를 먼저 모으면 승리! 🌟';
  
  var isScreen = document.getElementById('is'); isScreen.style.display = 'flex';
  setTimeout(function(){isScreen.classList.remove('hd');}, 50);
}

var RPS_EMOJI = ['✊', '✋', '✌️'];
var isRpsPlaying = false;
function startAutoRPS() {
  document.querySelector('.icp').style.display = 'none'; document.getElementById('init-btn').style.display = 'none';
  document.getElementById('rps-ui').style.display = 'flex'; document.querySelector('.it2').innerText = '누가 먼저 출발할까요? 가위~ 바위~ 보!'; sStep(); playAutoRPS();
}
function playAutoRPS() {
  if(isRpsPlaying) return; isRpsPlaying = true; sDice();
  var yHand = document.getElementById('yul-hand'), jHand = document.getElementById('jeong-hand'), resEl = document.getElementById('rps-result');
  yHand.innerText = '🤔'; jHand.innerText = '🤔'; resEl.innerText = '결과를 정하는 중...'; resEl.style.color = '#fff';

  var rollCnt = 0;
  var rollIv = setInterval(function(){
    yHand.innerText = RPS_EMOJI[Math.floor(Math.random() * 3)]; jHand.innerText = RPS_EMOJI[Math.floor(Math.random() * 3)];
    rollCnt++;
    if(rollCnt > 10) { clearInterval(rollIv); finalizeRPS(Math.floor(Math.random() * 3), Math.floor(Math.random() * 3), yHand, jHand, resEl); }
  }, 80);
}

function finalizeRPS(y, j, yHand, jHand, resEl) {
  yHand.innerText = RPS_EMOJI[y]; yHand.classList.add('pop');
  jHand.innerText = RPS_EMOJI[j]; jHand.classList.add('pop');
  setTimeout(function(){ yHand.classList.remove('pop'); jHand.classList.remove('pop'); }, 300);

  if (y === j) {
    resEl.innerText = '⚔️ 앗! 두 자매의 마법이 부딪혀 비겼어요! 다시 한 번!'; resEl.style.color = '#C9A6FF';
    isRpsPlaying = false; sTrap(); setTimeout(playAutoRPS, 1000);
  } else if ((y === 0 && j === 2) || (y === 1 && j === 0) || (y === 2 && j === 1)) {
    resEl.innerText = '🧭 용감한 탐험가 율이가 길을 찾아내어 선공을 차지했어요!'; resEl.style.color = '#FFD700'; cur = 0;
    isRpsPlaying = false; sStar(); document.getElementById('final-start-btn').style.display = 'block';
  } else {
    resEl.innerText = '✨ 신비한 마법사 정이가 주문으로 길을 엽니다! 정이 선공!'; resEl.style.color = '#FF69B4'; cur = 1;
    isRpsPlaying = false; sStar(); document.getElementById('final-start-btn').style.display = 'block';
  }
}

function startGame(){
  document.getElementById('is').classList.add('hd');
  setTimeout(function(){document.getElementById('is').style.display='none';},520);
  addLog('✨ 모험 시작! ' + PL[cur].ic + ' ' + PL[cur].nm + ' 차례입니다.'); renderAll();
  if (isYtReady && ytPlayer) { ytPlayer.setShuffle(true); ytPlayer.setLoop(true); ytPlayer.nextVideo(); ytPlayer.playVideo(); }
}

shuffleBoard(); buildBoard();
