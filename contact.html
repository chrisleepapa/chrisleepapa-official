            animation: fadeUp 1s ease both;

        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .title { font-family: 'Cinzel', serif; font-size: 3rem; font-weight: 600; letter-spacing: 0.2em; color: var(--cyan-light); margin-bottom: 30px; text-shadow: 0 0 20px rgba(74, 144, 226, 0.4); }

    <script>
        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('navLinks');
        menuToggle.addEventListener('click', () => {
            menuToggle.classList.toggle('active');
            navLinks.classList.toggle('active');
        });

        // ── 공유 로직 (보안 설정 우회 및 하이브리드 로직) ──
        const shareOverlay = document.getElementById('shareOverlay');
        const toast = document.getElementById('toast');

        function openShareModal() {
            shareOverlay.style.display = 'flex';
            setTimeout(() => shareOverlay.classList.add('active'), 10);
        }

        function closeShareModal(e) {
            if (e && e.target !== shareOverlay && e.type !== 'click') return;
            shareOverlay.classList.remove('active');
            setTimeout(() => shareOverlay.style.display = 'none', 300);
        }

        async function copyURL() {
            const currentUrl = window.location.href;
            let success = false;

            // 1. 우선적으로 최신 API 시도
            if (navigator.clipboard && window.isSecureContext) {
                try {
                    await navigator.clipboard.writeText(currentUrl);
                    success = true;
                } catch (err) {}
            }

            // 2. Fallback: Textarea를 생성하여 복사 (보안 스크립트 충돌 방지용 ID 부여)
            if (!success) {
                const textArea = document.createElement("textarea");
                textArea.value = currentUrl;
                textArea.id = "temp-copy-area"; // 고유 ID 부여
                textArea.style.position = "fixed";
                textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus();
                textArea.select();
                try {
                    success = document.execCommand('copy');
                } catch (err) {}
                document.body.removeChild(textArea);
            }

            if (success) {
                showToast('Link copied to clipboard!');
            } else {
                showToast('Copy failed. Please copy manually.');
            }
            closeShareModal();
        }

        function shareViaWebAPI() {
            if (navigator.share) {
                navigator.share({
                    title: 'CONTACT Chris LEE.PAPA',
                    text: '크리스리와의 협업 및 소통을 위한 공식 아카이브입니다.',
                    url: window.location.href
                }).catch(console.error);
            } else {
                showToast('Sharing is not supported.');
            }
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.style.display = 'block';
            setTimeout(() => { toast.style.display = 'none'; }, 2500);
        }

        // ── 보안 스크립트 (충돌 해결 버전) ──
        document.addEventListener('contextmenu', e => e.preventDefault());
        
        document.addEventListener('copy', e => {
            // 시스템이 생성한 임시 텍스트 영역(temp-copy-area)이 아닐 때만 차단
            if (e.target.id !== 'temp-copy-area' && window.getSelection().toString().length > 0) {
                e.preventDefault();
            }
        });

        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) e.preventDefault();
            if (e.ctrlKey && (e.key === 'c' || e.key === 's' || e.key === 'p')) {
                // 시스템 복사가 아닐 때만 Ctrl+C 차단
                if (e.target.id !== 'temp-copy-area' && window.getSelection().toString().length > 0) e.preventDefault();
            }
            if (e.key === 'PrintScreen') navigator.clipboard.writeText('');
        });
    </script>
