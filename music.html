    <script>
        // ── Multilingual System ──
        const i18n = {
            ko: {
                nav_home: "Home",
                nav_worship: "Worship",
                nav_music: "Music",
                nav_book: "Books",
                nav_movie: "Movies",
                nav_share: "SHARE",
                share_title: "SHARE MUSIC ARCHIVE",
                share_desc: "이곳의 선율과 감동을 소중한 사람들에게 전하세요.",
                share_copy: "COPY LINK",
                share_sns: "SNS SHARE",
                share_close: "Close",
                header_title: "MUSIC ARCHIVE",
                header_slogan: "AI가 만들어낸 선율, 영혼을 울리는 멜로디",
                btn_spotify: "Spotify에서 전곡 듣기 ›",
                playlist_title: "TRACKLIST",
                footer_text: "© 2026 Chris LEE.PAPA — The Creative Archive",
                toast_copy: "링크가 복사되었습니다 ✓",
                toast_error: "지원하지 않는 브라우저입니다."
            },
            en: {
                nav_home: "Home",
                nav_worship: "Worship",
                nav_music: "Music",
                nav_book: "Books",
                nav_movie: "Movies",
                nav_share: "SHARE",
                share_title: "SHARE MUSIC ARCHIVE",
                share_desc: "Share the melodies and emotions here with your loved ones.",
                share_copy: "COPY LINK",
                share_sns: "SNS SHARE",
                share_close: "Close",
                header_title: "MUSIC ARCHIVE",
                header_slogan: "Melodies created by AI, touching the soul",
                btn_spotify: "Listen all on Spotify ›",
                playlist_title: "TRACKLIST",
                footer_text: "© 2026 Chris LEE.PAPA — The Creative Archive",
                toast_copy: "Link copied to clipboard ✓",
                toast_error: "Browser not supported."
            }
        };

        // ── Dynamic Music Data with Translations ──
        const musicData = [
            { title_ko: 'To Rise', title_en: 'To Rise', type_ko: '연주곡', type_en: 'Instrumental', albumId: '2OSKuof7gooLElmFYvoygK', cover: 'images/music.jpg', embedUrl: 'https://open.spotify.com/embed/album/2OSKuof7gooLElmFYvoygK?utm_source=generator' },
            { title_ko: '2026 앨범', title_en: '2026 Album', type_ko: '정규 앨범', type_en: 'Album', albumId: '2AzUPgjWYDodUqFTNjPU1l', cover: 'images/music.jpg', embedUrl: 'https://open.spotify.com/embed/album/2AzUPgjWYDodUqFTNjPU1l?utm_source=generator' },
            { title_ko: '벽력일섬', title_en: 'Thunderclap', type_ko: '정규 앨범', type_en: 'Album', albumId: '25T549XyXnmiZhqGn7p4x4', cover: 'images/music.jpg', embedUrl: 'https://open.spotify.com/embed/album/25T549XyXnmiZhqGn7p4x4?utm_source=generator' },
            { title_ko: '영역전개', title_en: 'Domain Expansion', type_ko: '정규 앨범', type_en: 'Album', albumId: '6rZBdEFTJ5mLwINtn9C8KZ', cover: 'images/music.jpg', embedUrl: 'https://open.spotify.com/embed/album/6rZBdEFTJ5mLwINtn9C8KZ?utm_source=generator' },
            { title_ko: '사랑한다고', title_en: 'I Love You', type_ko: '보컬 트랙', type_en: 'Vocal', albumId: '2s7tJtoaxDT8KUkJ3OL8DD', cover: 'images/music.jpg', embedUrl: 'https://open.spotify.com/embed/album/2s7tJtoaxDT8KUkJ3OL8DD?utm_source=generator' }
        ];

        let currentLang = 'ko';
        let activeTrackIndex = 0; // 현재 재생 중인 트랙 인덱스 저장

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            
            // Save preference
            try { localStorage.setItem('pref-lang', lang); } catch(e) {}

            // Update UI texts
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) {
                    el.innerHTML = i18n[lang][key];
                }
            });

            // Update active state on language buttons
            document.querySelectorAll('.lang-btn').forEach(btn => {
                if (btn.getAttribute('data-lang') === lang) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });

            // 플레이리스트 및 현재 재생 정보 다국어 즉시 업데이트
            renderPlaylist();
            updateActiveTrackDisplay();
        }

        // Initialize language
        document.addEventListener('DOMContentLoaded', () => {
            let savedLang = 'ko';
            try { savedLang = localStorage.getItem('pref-lang') || 'ko'; } catch(e) {}
            setLanguage(savedLang);
        });

        // ── DOM Elements ──
        const playlistContainer = document.getElementById('playlist-container');
        const mainCover = document.getElementById('main-cover');
        const mainTitle = document.getElementById('main-title');
        const mainType = document.getElementById('main-type');
        const mainSpotify = document.getElementById('main-spotify');
        const mainExternalLink = document.getElementById('main-external-link');

        async function fetchSpotifyCovers() {
            await Promise.all(musicData.map(async (track) => {
                try {
                    const response = await fetch(`https://open.spotify.com/oembed?url=spotify:album:${track.albumId}`);
                    if (response.ok) { const data = await response.json(); track.cover = data.thumbnail_url; }
                } catch (e) {}
            }));
            renderPlaylist();
            // 첫 번째 곡 로드 (초기 1회)
            if(playlistContainer.firstChild && mainTitle.textContent === "To Rise") {
                loadTrack(0, playlistContainer.firstChild, true);
            }
        }

        function renderPlaylist() {
            playlistContainer.innerHTML = '';
            musicData.forEach((track, index) => {
                const item = document.createElement('div');
                item.className = `track-item ${index === activeTrackIndex ? 'active' : ''}`;
                
                const displayTitle = track[`title_${currentLang}`];
                const displayType = track[`type_${currentLang}`];

                item.innerHTML = `
                    <div class="track-thumb" style="background-image: url('${track.cover}');"></div>
                    <div class="track-details">
                        <h4>${displayTitle}</h4>
                        <p>${displayType}</p>
                    </div>
                `;
                item.addEventListener('click', () => loadTrack(index, item, false));
                playlistContainer.appendChild(item);
            });
        }

        function updateActiveTrackDisplay() {
            const track = musicData[activeTrackIndex];
            mainTitle.textContent = track[`title_${currentLang}`];
            mainType.textContent = track[`type_${currentLang}`];
        }

        function loadTrack(index, element, isInit = false) {
            activeTrackIndex = index;
            const track = musicData[index];
            
            mainCover.style.backgroundImage = `url('${track.cover}')`;
            updateActiveTrackDisplay();
            
            if (!isInit) {
                // iframe 교체 시 불필요한 깜빡임 방지
                if (mainSpotify.src !== track.embedUrl) {
                    mainSpotify.src = track.embedUrl;
                }
            }
            mainExternalLink.href = `https://open.spotify.com/album/${track.albumId}`;
            
            document.querySelectorAll('.track-item').forEach(el => el.classList.remove('active'));
            if(element) element.classList.add('active');
        }

        fetchSpotifyCovers();

        function safeNavigate(url) { if (url && url.trim() !== "") { window.location.assign(url); } }

        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('navLinks');
        menuToggle.addEventListener('click', () => { 
            menuToggle.classList.toggle('active'); 
            navLinks.classList.toggle('active'); 
        });

        const shareOverlay = document.getElementById('shareOverlay');
        const toast = document.getElementById('toast');
        function openShareModal() { shareOverlay.style.display = 'flex'; setTimeout(() => shareOverlay.classList.add('active'), 10); }
        function closeShareModal(e) { if (e && e.target !== shareOverlay && e.type !== 'click') return; shareOverlay.classList.remove('active'); setTimeout(() => shareOverlay.style.display = 'none', 300); }

        async function copyURL() {
            const currentUrl = window.location.href;
            let success = false;
            if (navigator.clipboard && window.isSecureContext) { try { await navigator.clipboard.writeText(currentUrl); success = true; } catch (err) {} }
            if (!success) {
                const textArea = document.createElement("textarea");
                textArea.value = currentUrl;
                textArea.id = "temp-copy-area";
                textArea.style.position = "fixed"; textArea.style.left = "-9999px";
                document.body.appendChild(textArea);
                textArea.focus(); textArea.select();
                try { success = document.execCommand('copy'); } catch (err) {}
                document.body.removeChild(textArea);
            }
            if (success) { showToast(i18n[currentLang].toast_copy); }
            closeShareModal();
        }

        function shareViaWebAPI() {
            if (navigator.share) { navigator.share({ title: 'Chris LEE.PAPA - MUSIC', text: 'AI와 영혼이 만나 탄생한 선율입니다.', url: window.location.href }); }
            else { showToast(i18n[currentLang].toast_error); }
        }
        function showToast(msg) { toast.textContent = msg; toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 2500); }

        const canvas = document.getElementById('stars-canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function resize() { canvas.width = window.innerWidth; canvas.height = 300; initStars(); }
        function initStars() { stars = []; const count = (canvas.width * canvas.height) / 6000; for (let i = 0; i < count; i++) { stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5 + 0.2, opacity: Math.random(), speed: Math.random() * 0.02 + 0.005 }); } }
        function draw() { ctx.clearRect(0, 0, canvas.width, canvas.height); stars.forEach(s => { s.opacity += s.speed; if (s.opacity > 1 || s.opacity < 0) s.speed = -s.speed; ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, s.opacity)})`; ctx.fill(); }); requestAnimationFrame(draw); }
        window.addEventListener('resize', resize); resize(); draw();

        // ── 보안 스크립트 (충돌 해결 버전) ──
        document.addEventListener('contextmenu', e => e.preventDefault());
        document.addEventListener('copy', e => {
            if (e.target.id !== 'temp-copy-area' && window.getSelection().toString().length > 0) {
                e.preventDefault();
            }
        });
        document.addEventListener('keydown', e => {
            if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J')) || (e.ctrlKey && e.key === 'U')) e.preventDefault();
            if (e.ctrlKey && (e.key === 'c' || e.key === 's' || e.key === 'p')) {
                if (e.target.id !== 'temp-copy-area' && window.getSelection().toString().length > 0) e.preventDefault();
            }
            if (e.key === 'PrintScreen') navigator.clipboard.writeText('');
        });
    </script>
</body>
</html>
