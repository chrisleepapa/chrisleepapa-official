<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sister Squad Runner</title>

  <link rel="stylesheet" href="/sister-squad-runner/style.css" />
</head>
<body>

<div id="hud">
  <div class="hud-pill">SCORE <span id="score">0</span></div>
  <div class="hud-pill">COMBO <span id="combo">0</span></div>

  <div id="feverBar">
    <div id="feverFill"></div>
  </div>

  <div id="skillUI">Z : SKILL</div>
</div>

<div id="warning">WARNING</div>

<canvas id="game"></canvas>

<div id="characterSelect" aria-label="캐릭터 선택">
  <div class="character-panel">
    <p class="selector-kicker">PLAYER SELECT</p>
    <h1>캐릭터를 선택하세요</h1>
    <div class="character-buttons">
      <button type="button" class="character-card" data-character="jeong">
        <img src="/images/jeong_spritesheet.png" alt="동생 정이" />
        <span>동생 정이</span>
      </button>
      <button type="button" class="character-card" data-character="yul">
        <img src="/images/yul_spritesheet.png" alt="언니 율이" />
        <span>언니 율이</span>
      </button>
    </div>
    <p class="selector-help">선택한 캐릭터의 스프라이트로 게임이 시작됩니다.</p>
  </div>
</div>


<script src="/sister-squad-runner/effects.js"></script>
<script src="/sister-squad-runner/player.js"></script>
<script src="/sister-squad-runner/boss.js"></script>
<script src="/sister-squad-runner/save.js"></script>
<script src="/sister-squad-runner/game.js"></script>
<script src="/sister-squad-runner/ui.js"></script>

</body>
</html>
