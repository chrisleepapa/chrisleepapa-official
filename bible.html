        nav {

        .nav-links { display: flex; gap: 30px; }

        .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
        .nav-links a:hover, .nav-links a.active { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }
        
        .lang-dropdown-wrapper { position: relative; font-family: 'Cinzel', serif; font-size: 0.8rem; color: #a0a0b5; z-index: 1001; }
        .lang-current { cursor: pointer; display: flex; align-items: center; gap: 4px; padding: 6px; transition: color 0.3s; font-weight: 600; letter-spacing: 1px; }
        .lang-current:hover, .lang-dropdown-wrapper.active .lang-current { color: var(--gold-light); text-shadow: 0 0 8px rgba(201,168,76,0.5); }
        .lang-current svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; transition: transform 0.3s; }
        .lang-dropdown-wrapper.active .lang-current svg { transform: rotate(180deg); }
        .lang-dropdown-menu {
            position: absolute; top: calc(100% + 10px); right: -10px; background: rgba(10, 10, 15, 0.95);
            border: 1px solid rgba(201,168,76,0.3); border-radius: 12px; display: flex; flex-direction: column;
            overflow: hidden; opacity: 0; pointer-events: none; transform: translateY(-10px);
            transition: opacity 0.3s, transform 0.3s; box-shadow: 0 10px 30px rgba(0,0,0,0.8); backdrop-filter: blur(10px); min-width: 100px;
        }
        .lang-dropdown-wrapper.active .lang-dropdown-menu { opacity: 1; pointer-events: auto; transform: translateY(0); }
        .lang-btn { padding: 12px 20px; cursor: pointer; transition: 0.3s; letter-spacing: 1px; text-align: center; color: #a0a0b5; }
        .lang-btn:not(:last-child) { border-bottom: 1px solid rgba(255,255,255,0.05); }
        .lang-btn:hover, .lang-btn.active { color: var(--gold-light); background: rgba(201,168,76,0.1); }

        .share-trigger {
            cursor: pointer; display: flex; align-items: center; justify-content: center; width: 38px; height: 38px;
            border: 1px solid rgba(201,168,76,0.3); border-radius: 50%; color: var(--gold-light); transition: 0.3s; z-index: 1001;
        }
        .share-trigger svg { width: 16px; height: 16px; stroke: currentColor; fill: none; }
        .share-trigger:hover { background: rgba(201,168,76,0.1); border-color: var(--gold-light); box-shadow: 0 0 12px rgba(201,168,76,0.2); transform: translateY(-2px); }

        .menu-toggle { display: none; flex-direction: column; justify-content: space-between; width: 26px; height: 18px; cursor: pointer; z-index: 1001; }
        .menu-toggle span { width: 100%; height: 2px; background-color: var(--gold-light); transition: 0.3s; border-radius: 2px; }
        .menu-toggle.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; transform: scaleX(0); }
        .menu-toggle.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); backdrop-filter: blur(8px); z-index: 2000; display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s; }

        .toast-msg { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%) translateY(0); background: var(--gold); color: #000; padding: 12px 30px; border-radius: 30px; font-size: 0.85rem; font-weight: 700; z-index: 3000; display: none; animation: toastUp 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); box-shadow: 0 10px 30px rgba(0,0,0,0.5); }

        .bible-container { max-width: 1200px; margin: 0 auto; padding: 0 20px 100px; }

        /* --- 선택 패널 --- */
        .selector-panel {
            background: var(--bg-panel);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 28px;
            padding: 30px;
            margin-bottom: 50px;
            backdrop-filter: blur(25px);
            box-shadow: 0 30px 70px rgba(0,0,0,0.8);
            position: relative;
            z-index: 10;
        }

        .testament-row {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 30px;
        }
        .testament-tab {
            flex: 1;
            max-width: 200px;
            padding: 12px 0;
            font-family: 'Noto Serif KR', serif;
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-muted);
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 40px;
            cursor: pointer;
            transition: 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            letter-spacing: 2px;
        }
        .testament-tab.active {
            background: var(--gold);
            color: #000;
            border-color: var(--gold);
            box-shadow: 0 0 25px var(--gold-glow);
        }

        .book-list-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px;
            padding: 15px;
            max-height: 350px;
            overflow-y: auto;
            border-radius: 18px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            margin-bottom: 30px;
        }
        .book-list-grid::-webkit-scrollbar { width: 4px; }
        .book-list-grid::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 10px; }

        .book-item {
            padding: 12px 15px;
            border-radius: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            color: rgba(240,236,228,0.6);
            font-family: 'Noto Serif KR', serif;
            font-size: 0.95rem;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: space-between;
            align-items: center;

        .book-item span.en { font-family: 'Cinzel', serif; font-size: 0.65rem; opacity: 0.35; letter-spacing: 1px; }
        .book-item:hover { background: rgba(201,168,76,0.1); color: #fff; border-color: rgba(201,168,76,0.3); }
        .book-item.active {
            background: rgba(201,168,76,0.1);
            color: var(--gold-light);
            border-color: var(--gold);
            font-weight: 600;
            box-shadow: inset 0 0 10px rgba(201,168,76,0.1);
        }

        .chapter-grid-row {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            padding-top: 25px;
            border-top: 1px solid rgba(255,255,255,0.05);
        }
        .chapter-btn {
            width: 44px;
            height: 44px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
            color: var(--text-muted);
            font-family: 'Cinzel', serif;
            font-size: 1rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .chapter-btn:hover { border-color: var(--gold); color: #fff; }
        .chapter-btn.active {
            background: var(--gold);
            color: #000;
            font-weight: 800;
            border-color: var(--gold);
            box-shadow: 0 0 15px rgba(201,168,76,0.4);
        }

        .bible-reader {
            background: var(--bg-panel);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 32px;
            padding: 80px 60px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            backdrop-filter: blur(20px);
            min-height: 700px;

        .chapter-heading { text-align: center; margin-bottom: 70px; }

        .chapter-heading .en-sub { display: block; font-family: 'Cinzel', serif; font-size: 1rem; color: var(--gold); letter-spacing: 0.4em; margin-top: 12px; text-transform: uppercase; opacity: 0.6; }

        .verse-container { max-width: 850px; margin: 0 auto; transition: opacity 0.8s; }
        .verse-row { display: flex; gap: 30px; padding: 25px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        .verse-num { font-family: 'Cinzel', serif; font-size: 1.1rem; font-weight: 700; color: var(--gold); min-width: 45px; text-align: right; padding-top: 6px; opacity: 0.5; }
        .verse-text { font-family: 'Noto Serif KR', serif; font-size: var(--base-font-size); line-height: 2.3; color: rgba(240,236,228,0.95); word-break: keep-all; }

        #loadingSpinner { text-align: center; padding: 120px 20px; color: var(--gold-light); font-family: 'Cinzel', serif; letter-spacing: 5px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0.3; } 50% { opacity: 1; } }

        @media (max-width: 900px) {
            nav { padding: 0 20px; }
            .nav-links { display: none; }
            .nav-links.active { display: flex; position: fixed; top: var(--nav-height); left: 0; width: 100%; height: calc(100vh - var(--nav-height)); background: rgba(3, 3, 5, 0.98); flex-direction: column; align-items: center; justify-content: center; gap: 28px; z-index: 1002; }
            .menu-toggle { display: flex; }
            .book-list-grid { grid-template-columns: repeat(2, 1fr); }
            .bible-reader { padding: 60px 20px; border-radius: 24px; }
            .chapter-heading h2 { font-size: 2.2rem; }
            .verse-text { font-size: 1.15rem; line-height: 2.1; }
            #mouse-orb { display: none; }
        }
    </style>
</head>

            {id:52, name:"데살로니가전서", kr_short:"살전", en:"1 Thessalonians", abbrev:"1TH", type:"nt", max:5}, {id:53, name:"데살로니가후서", kr_short:"살후", en:"2 Thessalonians", abbrev:"2TH", type:"nt", max:3},
            {id:54, name:"디모데전서", kr_short:"딤전", en:"1 Timothy", abbrev:"1TI", type:"nt", max:6}, {id:55, name:"디모데후서", kr_short:"딤후", en:"2 Timothy", abbrev:"2TI", type:"nt", max:4},
            {id:56, name:"디도서", kr_short:"딛", en:"Titus", abbrev:"TIT", type:"nt", max:3}, {id:57, name:"빌레몬서", kr_short:"몬", en:"Philemon", abbrev:"PHM", type:"nt", max:1},
            {id:58, name:"히브리서", kr_short:"히", en:"Hebrews", abbrev:"HEB", type:"nt", max:13}, {id:59, name:"야고보서", kr_short:"야", en:"James", abbrev:"JAS", type:"nt", max:5},
            {id:60, name:"베드로전서", kr_short:"벧전", en:"1 Peter", abbrev:"1PE", type:"nt", max:5}, {id:61, name:"베드로후서", kr_short:"벧후", en:"2 Peter", abbrev:"2PE", type:"nt", max:3},
            {id:62, name:"요한일서", kr_short:"요일", en:"1 John", abbrev:"1JN", type:"nt", max:5}, {id:63, name:"요한이서", kr_short:"요이", en:"2 John", abbrev:"2JN", type:"nt", max:1},
            {id:64, name:"요한삼서", kr_short:"요삼", en:"3 John", abbrev:"3JN", type:"nt", max:1}, {id:65, name:"유다서", kr_short:"유", en:"Jude", abbrev:"JUD", type:"nt", max:1},
            {id:66, name:"요한계시록", kr_short:"계", en:"Revelation", abbrev:"REV", type:"nt", max:22}
        ];

        let globalBibleData = [];
        let currentBookId = 1;
        let currentChapter = 1;
        let currentTestament = 'ot';
        let isDataReady = false;

        const i18n = {
            ko: {
                nav_home: "Home", nav_bible: "Bible", nav_worship: "Worship", nav_music: "Music", nav_book: "Books", nav_movie: "Movies",
                share_title: "SHARE ARCHIVE", share_desc: "이곳의 기록과 영감을 소중한 사람들에게 전하세요.",
                share_copy: "COPY LINK", share_sns: "SNS SHARE", share_close: "Close",
                footer_text: "© 2026 Chris LEE.PAPA — The Creative Archive",
                toast_copy: "링크가 복사되었습니다 ✓", toast_error: "지원하지 않는 브라우저입니다."
            },
            en: {
                nav_home: "Home", nav_bible: "Bible", nav_worship: "Worship", nav_music: "Music", nav_book: "Books", nav_movie: "Movies",
                share_title: "SHARE ARCHIVE", share_desc: "Share the records and inspiration here with your loved ones.",
                share_copy: "COPY LINK", share_sns: "SNS SHARE", share_close: "Close",
                footer_text: "© 2026 Chris LEE.PAPA — The Creative Archive",
                toast_copy: "Link copied to clipboard ✓", toast_error: "Browser not supported."
            }
        };

        let currentLang = 'ko';

        function setLanguage(lang) {
            currentLang = lang;
            document.documentElement.lang = lang;
            try { localStorage.setItem('pref-lang', lang); } catch(e) {}
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (i18n[lang][key]) el.innerHTML = i18n[lang][key];
            });
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.getAttribute('data-lang') === lang));
            document.getElementById('currentLangText').textContent = lang === 'ko' ? 'KOR' : 'ENG';
            document.getElementById('langWrapper').classList.remove('active');
            renderContent(); // 타이틀 언어 갱신
        }

        function toggleLangDropdown() { document.getElementById('langWrapper').classList.toggle('active'); }
        document.addEventListener('click', (e) => { if (!document.getElementById('langWrapper').contains(e.target)) document.getElementById('langWrapper').classList.remove('active'); });

        async function init() {
            const spinner = document.getElementById('loadingSpinner');
            let savedLang = 'ko';
            try { savedLang = localStorage.getItem('pref-lang') || 'ko'; } catch(e) {}
            setLanguage(savedLang);

            try {
                const response = await fetch('https://raw.githubusercontent.com/stranger828/bibleAPI/main/bible_structured.json');
                if(!response.ok) throw new Error("Fetch Failed");
                globalBibleData = await response.json();
                isDataReady = true;
                spinner.style.display = 'none';
                renderBooks('ot');
                selectBook(1); 
            } catch (e) {
                spinner.innerHTML = "CONNECTION FAILED.<br><small>데이터를 불러올 수 없습니다.</small>";
            }
        }

        function changeTestament(type) {
            currentTestament = type;
            document.getElementById('ot-tab').classList.toggle('active', type === 'ot');
            document.getElementById('nt-tab').classList.toggle('active', type === 'nt');
            renderBooks(type);
            const firstBook = BIBLE_BOOKS.find(b => b.type === type);
            if(firstBook) selectBook(firstBook.id);
        }

        function renderBooks(type) {
            const list = document.getElementById('bookList');
            list.innerHTML = '';
            BIBLE_BOOKS.filter(b => b.type === type).forEach(book => {
                const btn = document.createElement('div');
                btn.className = `book-item ${currentBookId === book.id ? 'active' : ''}`;
                btn.innerHTML = `<span>${book.name}</span> <span class="en">${book.abbrev}</span>`;
                btn.onclick = () => selectBook(book.id);
                list.appendChild(btn);
            });
        }

        function selectBook(id) {
            currentBookId = id;
            currentChapter = 1;
            const bookInfo = BIBLE_BOOKS.find(b => b.id === id);
            document.querySelectorAll('.book-item').forEach(el => el.classList.toggle('active', el.textContent.includes(bookInfo.name)));
            renderChapterGrid();
            renderContent();
        }

        function renderChapterGrid() {
            const book = BIBLE_BOOKS.find(b => b.id === currentBookId);
            const grid = document.getElementById('chapterGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= book.max; i++) {
                const btn = document.createElement('button');
                btn.className = `chapter-btn ${currentChapter === i ? 'active' : ''}`;
                btn.textContent = i;
                btn.onclick = () => { currentChapter = i; renderChapterGrid(); renderContent(); };
                grid.appendChild(btn);
            }
        }

        function renderContent() {
            const book = BIBLE_BOOKS.find(b => b.id === currentBookId);
            if(!book) return;
            document.getElementById('headerTitle').textContent = `${book.name} ${currentChapter}`;
            document.getElementById('enSub').textContent = `${book.en} Chapter ${currentChapter}`;
            const container = document.getElementById('verseContainer');
            container.style.opacity = 0;
            if (!isDataReady) return;

            const verses = globalBibleData.filter(v => {
                const b = String(v.book).trim();
                const matchBook = b === String(book.id) || b === book.name || b === book.kr_short || b === book.en || b.toUpperCase() === book.abbrev;
                return matchBook && Number(v.chapter) === Number(currentChapter);
            });

            setTimeout(() => {
                if (verses.length > 0) {
                    verses.sort((a, b) => Number(a.verse) - Number(b.verse));
                    container.innerHTML = verses.map(v => `<div class="verse-row"><div class="verse-num">${v.verse}</div><div class="verse-text">${v.content || v.text || ""}</div></div>`).join('');
                } else {
                    container.innerHTML = `<div style="text-align:center; padding:150px 20px; color:var(--gold); opacity:0.6;"><p>데이터를 불러올 수 없습니다.</p></div>`;
                }
                container.style.opacity = 1;
            }, 100);
            
            const readerOffset = document.querySelector('.bible-reader').offsetTop - 120;
            window.scrollTo({top: readerOffset, behavior: 'smooth'});
        }

        const menuToggle = document.getElementById('mobile-menu');
        const navLinks = document.getElementById('navLinks');
        menuToggle.addEventListener('click', () => {
            const isOpen = menuToggle.classList.toggle('active');
            navLinks.classList.toggle('active', isOpen);
        });

        const shareOverlay = document.getElementById('shareOverlay');
        const toast = document.getElementById('toast');
        function openShareModal() { shareOverlay.style.display = 'flex'; setTimeout(() => shareOverlay.classList.add('active'), 10); }
        function closeShareModal(e) { if (e && e.target !== shareOverlay) return; shareOverlay.classList.remove('active'); setTimeout(() => shareOverlay.style.display = 'none', 300); }
        async function copyURL() {
            const url = window.location.href; let ok = false;
            if (navigator.clipboard && window.isSecureContext) { try { await navigator.clipboard.writeText(url); ok = true; } catch(e) {} }
            if (!ok) {
                const ta = document.createElement('textarea'); ta.value = url; ta.style.cssText = 'position:fixed;left:-9999px'; document.body.appendChild(ta); ta.select();
                try { ok = document.execCommand('copy'); } catch(e) {} document.body.removeChild(ta);
            }
            if (ok) showToast(i18n[currentLang].toast_copy);
            closeShareModal({ target: shareOverlay });
        }
        function shareViaWebAPI() { if (navigator.share) { navigator.share({ title: 'Chris LEE.PAPA', url: window.location.href }); } else showToast(i18n[currentLang].toast_error); }
        function showToast(msg) { toast.textContent = msg; toast.style.display = 'block'; setTimeout(() => { toast.style.display = 'none'; }, 2500); }

        window.addEventListener('scroll', () => {
            const scrollTop = window.scrollY;
            const docHeight = document.body.scrollHeight - window.innerHeight;
            document.getElementById('scroll-progress').style.width = (scrollTop / (docHeight || 1) * 100) + '%';
            document.getElementById('main-nav').classList.toggle('scrolled', scrollTop > 40);
        }, { passive: true });

        const orb = document.getElementById('mouse-orb');
        document.addEventListener('mousemove', e => { orb.style.left = e.clientX + 'px'; orb.style.top = e.clientY + 'px'; }, { passive: true });

        document.addEventListener('DOMContentLoaded', init);
    </script>
