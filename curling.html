<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>SISTER SQUAD HYPER CURLING</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Exo+2:ital,wght@0,400;0,700;0,900;1,900&family=Nanum+Gothic:wght@700;800&display=swap" rel="stylesheet"/>

<style>
:root{
  --c-fairy:#ff4da6;
  --c-dark:#9b5cff;
  --c-ice:#00f0ff;
  --c-gold:#ffd447;
  --bg-deep:#04091c;
  --bg-mid:#080f2a;
  --glass:rgba(255,255,255,.07);
  --glass-border:rgba(255,255,255,.14);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}

body{
  overflow:hidden;
  font-family:'Nanum Gothic',sans-serif;
  background:var(--bg-deep);
  color:#fff;
}

/* ─── Scanline overlay ─── */
body::after{
  content:'';
  position:fixed;inset:0;z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);
  pointer-events:none;
}

#gameWrap{
  position:relative;
  width:100%;max-width:520px;height:100dvh;
  margin:auto;overflow:hidden;
}

/* ─── Canvas ─── */
canvas{width:100%;height:100%;display:block;touch-action:none;}

/* ─── Shared screen base ─── */
.screen{
  position:absolute;inset:0;z-index:80;
  display:flex;flex-direction:column;align-items:center;
  padding:24px 20px 20px;
  overflow-y:auto;overflow-x:hidden;
  background:radial-gradient(ellipse at 50% 0%, #0e1e4a 0%, var(--bg-deep) 60%);
  transition:opacity .45s ease, transform .45s cubic-bezier(.4,0,.2,1);
}
.screen.hidden{opacity:0;transform:scale(.97) translateY(8px);pointer-events:none;}
.screen.out{opacity:0;transform:scale(1.04) translateY(-8px);pointer-events:none;}

/* ─── Neon heading ─── */
.neon-title{
  font-family:'Exo 2',sans-serif;font-weight:900;font-style:italic;
  background:linear-gradient(90deg,var(--c-ice),var(--c-fairy),var(--c-gold));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 16px rgba(0,240,255,.5));
  letter-spacing:-1px;line-height:1.05;
}

/* ─── Glass card ─── */
.glass{
  background:var(--glass);
  border:1px solid var(--glass-border);
  backdrop-filter:blur(20px);
  box-shadow:0 12px 40px rgba(0,0,0,.4);
}
.glass-hi{
  background:rgba(255,255,255,.11);
  border:1px solid rgba(255,255,255,.22);
  backdrop-filter:blur(24px);
  box-shadow:0 0 40px rgba(0,240,255,.12), 0 12px 40px rgba(0,0,0,.5);
}

/* ─── Neon divider ─── */
.neon-line{
  width:100%;height:1px;margin:6px 0;
  background:linear-gradient(90deg,transparent,var(--c-ice),transparent);
  opacity:.5;
}

/* ─── Input ─── */
.neon-input{
  width:100%;text-align:center;font-family:'Exo 2',sans-serif;
  font-size:2.2rem;font-weight:900;letter-spacing:.25em;
  padding:14px;border-radius:16px;
  background:rgba(0,240,255,.06);
  color:var(--c-ice);border:2px solid rgba(0,240,255,.35);
  outline:none;transition:.2s;text-transform:uppercase;
  caret-color:var(--c-ice);
}
.neon-input:focus{
  border-color:var(--c-ice);
  box-shadow:0 0 24px rgba(0,240,255,.3),inset 0 0 12px rgba(0,240,255,.08);
}
.neon-input::placeholder{opacity:.3;}

/* ─── Buttons ─── */
.btn-main{
  width:100%;border:none;border-radius:18px;
  padding:16px 20px;font-family:'Exo 2',sans-serif;
  font-size:1.15rem;font-weight:900;cursor:pointer;
  transition:transform .2s, box-shadow .2s;color:#fff;
  letter-spacing:.04em;
}
.btn-main:hover:not(:disabled){transform:translateY(-3px);}
.btn-main:disabled{opacity:.4;cursor:not-allowed;}
.btn-ice{
  background:linear-gradient(135deg,#00d4ff,#0099cc);
  box-shadow:0 6px 24px rgba(0,212,255,.35);
}
.btn-ice:hover:not(:disabled){box-shadow:0 10px 32px rgba(0,212,255,.55);}
.btn-start{
  background:linear-gradient(135deg,var(--c-ice),var(--c-fairy));
  box-shadow:0 6px 24px rgba(255,77,166,.4);
}
.btn-start:hover:not(:disabled){box-shadow:0 10px 32px rgba(255,77,166,.6);}

/* ─── Leaderboard ─── */
.lb-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:10px 16px;border-radius:14px;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  transition:.2s;
}
.lb-row:hover{background:rgba(255,255,255,.1);}
.lb-medal{width:28px;text-align:center;font-size:1.2rem;}
.lb-initials{font-family:'Exo 2',sans-serif;font-weight:700;font-size:1.1rem;letter-spacing:.15em;}
.lb-wins{font-family:'Exo 2',sans-serif;font-weight:900;color:var(--c-gold);font-size:1rem;}

/* ─── Team select cards ─── */
.team-card{
  flex:1;position:relative;border-radius:28px;overflow:hidden;
  cursor:pointer;transition:transform .3s cubic-bezier(.175,.885,.32,1.275), box-shadow .3s;
  border:3px solid rgba(255,255,255,.1);
  min-height:140px;
}
.team-card:hover{transform:scale(1.04) translateY(-6px);}
.team-card.fairy:hover{border-color:var(--c-fairy);box-shadow:0 20px 50px rgba(255,77,166,.5);}
.team-card.dark:hover{border-color:var(--c-dark);box-shadow:0 20px 50px rgba(155,92,255,.5);}
.team-bg{
  position:absolute;inset:0;
  background-size:cover;background-position:center;
  background-color:#1a1a2e;transition:transform .5s;
}
.team-card:hover .team-bg{transform:scale(1.08);}
.team-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,.88) 0%,rgba(0,0,0,.25) 55%,transparent 100%);
  display:flex;flex-direction:column;justify-content:flex-end;
  align-items:center;padding-bottom:22px;gap:4px;
}
.team-label{
  font-family:'Exo 2',sans-serif;font-size:2rem;font-weight:900;font-style:italic;
  text-shadow:0 4px 16px rgba(0,0,0,.8);
}
.team-sub{font-size:.75rem;opacity:.65;font-weight:700;letter-spacing:.08em;}

/* ─── Order select ─── */
.order-slot{
  flex:1;aspect-ratio:1;border-radius:18px;
  background:rgba(255,255,255,.06);
  border:2px dashed rgba(255,255,255,.2);
  display:flex;align-items:center;justify-content:center;
  overflow:hidden;transition:.3s;
  font-size:1.6rem;opacity:.5;
}
.order-slot.filled{
  border-style:solid;opacity:1;
  box-shadow:0 0 16px rgba(0,240,255,.2);
}
.order-slot img{width:100%;height:100%;object-fit:cover;}

.char-btn{
  background:rgba(255,255,255,.07);
  border:2px solid rgba(255,255,255,.12);
  border-radius:20px;padding:12px 8px;
  text-align:center;cursor:pointer;transition:.25s;
  display:flex;flex-direction:column;align-items:center;gap:6px;
}
.char-btn:hover:not(.sel){
  background:rgba(255,255,255,.13);border-color:rgba(0,240,255,.5);
  transform:translateY(-3px);
}
.char-btn.sel{
  border-color:var(--c-ice);background:rgba(0,240,255,.08);
  opacity:.4;pointer-events:none;transform:scale(.93);
}
.char-portrait{
  width:68px;height:68px;border-radius:50%;object-fit:cover;
  border:3px solid rgba(255,255,255,.5);
  box-shadow:0 4px 14px rgba(0,0,0,.5);
  background:#333;
}

/* ─── In-game top UI ─── */
#inGameUI{
  position:absolute;inset:0 auto auto 0;width:100%;
  padding:12px 14px;display:flex;justify-content:space-between;
  align-items:flex-start;z-index:20;pointer-events:none;
}
.score-card{
  border-radius:20px;padding:12px 16px;min-width:190px;
  background:rgba(4,9,28,.82);border:1px solid rgba(255,255,255,.15);
  backdrop-filter:blur(18px);
  box-shadow:0 0 30px rgba(0,240,255,.1), 0 8px 24px rgba(0,0,0,.4);
}
.score-row{display:flex;justify-content:space-between;align-items:center;gap:10px;}
.score-label{font-size:.8rem;font-weight:800;letter-spacing:.04em;opacity:.9;}
.score-num{font-family:'Exo 2',sans-serif;font-size:1.8rem;font-weight:900;color:#fff;}
.badge-label{font-size:.65rem;font-weight:800;letter-spacing:.12em;opacity:.55;margin-bottom:8px;}

.turn-badge{
  border-radius:100px;padding:10px 18px;
  font-family:'Exo 2',sans-serif;font-size:.9rem;font-weight:900;
  backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.2);
  animation:pulseBadge 2s infinite;
  transition:background .5s;
}
@keyframes pulseBadge{
  0%,100%{transform:scale(1);}
  50%{transform:scale(1.06);}
}

.round-badge{
  margin-top:8px;padding:6px 14px;border-radius:100px;
  font-family:'Exo 2',sans-serif;font-size:.8rem;font-weight:900;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.8);letter-spacing:.08em;
  backdrop-filter:blur(12px);
}

/* ─── Guide bar ─── */
#bottomGuide{
  position:absolute;bottom:20px;width:100%;
  display:none;justify-content:center;z-index:20;pointer-events:none;
}
.guide-pill{
  padding:10px 22px;border-radius:100px;font-size:.85rem;font-weight:800;
  background:rgba(4,9,28,.8);border:1px solid rgba(0,240,255,.3);
  backdrop-filter:blur(16px);color:rgba(255,255,255,.85);
  box-shadow:0 0 20px rgba(0,240,255,.15);letter-spacing:.04em;
}

/* ─── Power meter ─── */
#powerMeter{
  position:absolute;bottom:68px;left:50%;transform:translateX(-50%);
  display:none;z-index:22;pointer-events:none;
  flex-direction:column;align-items:center;gap:4px;
}
.power-bar-bg{
  width:180px;height:10px;border-radius:100px;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.15);
  overflow:hidden;
}
.power-bar-fill{
  height:100%;border-radius:100px;transition:width .05s;
  background:linear-gradient(90deg,#00f0ff,#ff4da6,#ff2200);
}
.power-label{font-family:'Exo 2',sans-serif;font-size:.7rem;font-weight:900;
  color:rgba(255,255,255,.7);letter-spacing:.1em;}

/* ─── Character cutin ─── */
#characterCard{
  position:absolute;top:50%;left:50%;
  transform:translate(-50%,-50%) scale(.4) rotate(-12deg);
  width:88%;max-width:360px;border-radius:40px;padding:28px 24px;
  z-index:50;opacity:0;pointer-events:none;text-align:center;
  background:rgba(4,9,28,.88);
  box-shadow:0 30px 70px rgba(0,0,0,.6);
  transition:all .55s cubic-bezier(.175,.885,.32,1.275);
}
#characterCard.show{
  opacity:1;transform:translate(-50%,-50%) scale(1) rotate(0deg);
}
.card-portrait-wrap{
  width:130px;height:130px;margin:0 auto 14px;
  border-radius:50%;padding:5px;
  box-shadow:0 0 40px rgba(255,255,255,.3);
  animation:floatPortrait 2.5s ease-in-out infinite;
}
@keyframes floatPortrait{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}
.card-portrait{
  width:100%;height:100%;object-fit:cover;border-radius:50%;
  background:#2a2a3e;
}
.card-name{
  font-family:'Exo 2',sans-serif;font-size:2.4rem;font-weight:900;
  line-height:1;margin-bottom:4px;
  text-shadow:0 4px 20px rgba(0,0,0,.8);
}
.card-team{font-size:.9rem;font-weight:800;opacity:.75;letter-spacing:.06em;}
.card-skill{
  margin-top:18px;padding:9px 18px;border-radius:100px;
  font-size:.9rem;font-weight:900;letter-spacing:.04em;
  background:rgba(255,255,255,.12);
  border:1px solid rgba(255,255,255,.2);
  display:inline-block;
}

/* ─── Reaction pop ─── */
#reaction{
  position:absolute;left:50%;top:56%;
  transform:translateX(-50%);
  font-family:'Exo 2',sans-serif;font-size:2.2rem;font-weight:900;font-style:italic;
  z-index:60;opacity:0;pointer-events:none;
  text-shadow:0 4px 20px rgba(0,0,0,.5);
  letter-spacing:-.01em;
}
#reaction.show{animation:reactPop 1.4s ease forwards;}
@keyframes reactPop{
  0%{opacity:0;transform:translate(-50%,30px) scale(.5);}
  18%{opacity:1;transform:translate(-50%,-24px) scale(1.25);}
  70%{opacity:1;transform:translate(-50%,-40px) scale(1.1);}
  100%{opacity:0;transform:translate(-50%,-120px) scale(.9);}
}

/* ─── Winner modal ─── */
#winnerModal{
  position:absolute;inset:0;
  background:rgba(0,0,0,.78);backdrop-filter:blur(16px);
  z-index:100;display:none;justify-content:center;align-items:center;padding:20px;
}
.modal-card{
  width:100%;max-width:380px;border-radius:36px;padding:36px 28px;text-align:center;
  background:rgba(8,15,42,.92);
  border:1px solid rgba(255,255,255,.15);
  box-shadow:0 0 60px rgba(0,240,255,.15), 0 30px 60px rgba(0,0,0,.6);
  animation:modalIn .5s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes modalIn{from{transform:scale(.7) translateY(40px);opacity:0;}to{transform:scale(1) translateY(0);opacity:1;}}
.modal-emoji{font-size:5rem;margin-bottom:12px;display:block;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.modal-title{
  font-family:'Exo 2',sans-serif;font-size:2.4rem;font-weight:900;font-style:italic;
  margin-bottom:10px;
  background:linear-gradient(90deg,var(--c-ice),var(--c-fairy));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
}
.modal-desc{font-size:1rem;opacity:.8;line-height:1.7;margin-bottom:24px;}
.btn-reset{
  width:100%;border:none;border-radius:18px;
  padding:15px;font-family:'Exo 2',sans-serif;
  font-size:1.05rem;font-weight:900;cursor:pointer;
  background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);
  color:#fff;letter-spacing:.06em;transition:.2s;
}
.btn-reset:hover{background:rgba(255,255,255,.2);transform:translateY(-3px);}

/* ─── Particle canvas ─── */
#particleCanvas{
  position:absolute;inset:0;pointer-events:none;z-index:5;
  width:100%;height:100%;
}

/* ─── VS badge ─── */
.vs-badge{
  font-family:'Exo 2',sans-serif;font-size:1rem;font-weight:900;font-style:italic;
  letter-spacing:.1em;opacity:.4;padding:4px 0;
}

/* ─── Shimmer loading ─── */
.shimmer{
  background:linear-gradient(90deg,rgba(255,255,255,.05) 0%,rgba(255,255,255,.12) 50%,rgba(255,255,255,.05) 100%);
  background-size:200% 100%;animation:shimmer 1.5s infinite;
  height:48px;border-radius:12px;
}
@keyframes shimmer{0%{background-position:200% 0;}100%{background-position:-200% 0;}}

/* ─── Stone count ─── */
.stone-dots{display:flex;gap:4px;margin-top:6px;}
.stone-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.25);}
.stone-dot.active{background:var(--c-ice);box-shadow:0 0 6px var(--c-ice);}
</style>
</head>

<body>
<div id="gameWrap">

  <!-- Particle layer -->
  <canvas id="particleCanvas"></canvas>

  <!-- Game canvas -->
  <canvas id="gameCanvas"></canvas>

  <!-- ══════════════ SCREEN 0: LOGIN ══════════════ -->
  <div id="s-login" class="screen">
    <div style="margin-top:8vh;margin-bottom:24px;text-align:center;">
      <div class="neon-title" style="font-size:clamp(2.2rem,8vw,3rem);">SISTER SQUAD</div>
      <div class="neon-title" style="font-size:clamp(1.3rem,5vw,1.7rem);opacity:.85;">HYPER CURLING</div>
      <div style="margin-top:8px;font-size:.75rem;letter-spacing:.2em;opacity:.35;font-weight:700;">⬡ ICE ARENA EDITION ⬡</div>
    </div>

    <div class="glass-hi" style="width:100%;max-width:340px;border-radius:28px;padding:24px;margin-bottom:20px;">
      <div style="font-size:.7rem;font-weight:800;letter-spacing:.18em;opacity:.5;margin-bottom:10px;text-align:center;">PLAYER INITIALS (MAX 3)</div>
      <input id="initialsInput" class="neon-input" maxlength="3" placeholder="ABC"
        oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')"/>
      <div style="height:14px;"></div>
      <button class="btn-main btn-ice" onclick="submitInitials()">⬡ 접속하기</button>
    </div>

    <!-- Leaderboard -->
    <div class="glass" style="width:100%;max-width:340px;border-radius:24px;padding:20px;">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">
        <div style="font-size:1.1rem;">🏆</div>
        <div style="font-family:'Exo 2',sans-serif;font-weight:900;font-size:1rem;letter-spacing:.1em;">TOP 5 CHAMPIONS</div>
        <div id="lbSpinner" style="margin-left:auto;font-size:.9rem;animation:spin 1s linear infinite;display:inline-block;">⟳</div>
      </div>
      <div id="leaderboardList" style="display:flex;flex-direction:column;gap:8px;"></div>
    </div>
  </div>

  <!-- ══════════════ SCREEN 1: TEAM SELECT ══════════════ -->
  <div id="s-team" class="screen hidden">
    <div style="text-align:center;margin-bottom:20px;margin-top:8px;">
      <div class="neon-title" style="font-size:2.2rem;">TEAM SELECT</div>
      <div style="font-size:.8rem;opacity:.5;letter-spacing:.1em;margin-top:4px;font-weight:700;">플레이할 진영을 선택하세요</div>
    </div>

    <div style="display:flex;flex-direction:column;gap:14px;width:100%;max-width:360px;flex:1;padding-bottom:16px;">
      <div class="team-card fairy" onclick="selectTeam('fairy')">
        <div class="team-bg" style="background-image:url('/images/fairyteam.png');"></div>
        <div class="team-overlay" style="background:linear-gradient(to top,rgba(255,77,166,.6) 0%,rgba(0,0,0,.3) 50%,transparent 100%);">
          <div class="team-label" style="color:#fff;text-shadow:0 0 30px rgba(255,77,166,.9);">🧚 요정팀</div>
          <div class="team-sub" style="color:rgba(255,200,220,.8);">FAIRY SQUAD</div>
        </div>
      </div>

      <div class="vs-badge" style="text-align:center;">— VS —</div>

      <div class="team-card dark" onclick="selectTeam('dark')">
        <div class="team-bg" style="background-image:url('/images/darkteam.png');"></div>
        <div class="team-overlay" style="background:linear-gradient(to top,rgba(155,92,255,.6) 0%,rgba(0,0,0,.3) 50%,transparent 100%);">
          <div class="team-label" style="color:#fff;text-shadow:0 0 30px rgba(155,92,255,.9);">🌑 어둠팀</div>
          <div class="team-sub" style="color:rgba(200,180,255,.8);">DARK SQUAD</div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══════════════ SCREEN 2: ORDER SELECT ══════════════ -->
  <div id="s-order" class="screen hidden">
    <div style="text-align:center;margin-bottom:16px;">
      <div id="orderTitle" style="font-family:'Exo 2',sans-serif;font-size:1.5rem;font-weight:900;font-style:italic;">출전 순서 선택</div>
      <div style="font-size:.72rem;opacity:.45;letter-spacing:.08em;margin-top:4px;font-weight:700;">원하는 순서대로 4명의 영웅을 탭하세요</div>
    </div>

    <!-- Slots row -->
    <div id="slotRow" style="display:flex;gap:8px;width:100%;max-width:340px;margin-bottom:16px;"></div>

    <!-- Character roster -->
    <div id="rosterGrid" style="display:grid;grid-template-columns:1fr 1fr;gap:10px;width:100%;max-width:340px;flex:1;overflow-y:auto;"></div>

    <div style="width:100%;max-width:340px;padding-top:14px;">
      <button id="startBtn" class="btn-main btn-start" disabled onclick="startGame()">
        ⚡ 출격! GAME START
      </button>
    </div>
  </div>

  <!-- ══════════════ IN-GAME UI ══════════════ -->
  <div id="inGameUI" style="display:none;">
    <div>
      <div class="score-card">
        <div class="badge-label">BEST OF 3 — ROUND WINS</div>
        <div class="score-row" style="margin-bottom:6px;">
          <div class="score-label" style="color:var(--c-fairy);">🧚 요정팀</div>
          <div class="score-num" id="fairyScore">0</div>
        </div>
        <div class="neon-line"></div>
        <div class="score-row" style="margin-top:6px;">
          <div class="score-label" style="color:var(--c-dark);">🌑 어둠팀</div>
          <div class="score-num" id="darkScore">0</div>
        </div>
        <!-- Stone dots -->
        <div style="display:flex;justify-content:space-between;margin-top:10px;">
          <div class="stone-dots" id="fairyDots"></div>
          <div class="stone-dots" id="darkDots"></div>
        </div>
      </div>
      <div class="round-badge" id="roundText">ROUND 1</div>
    </div>
    <div>
      <div class="turn-badge glass-hi" id="turnBox">🧚 요정팀 TURN</div>
    </div>
  </div>

  <!-- Power meter -->
  <div id="powerMeter">

const particles = [];

class Particle {
  constructor(x, y, color, type = 'trail') {
    this.x = x; this.y = y; this.color = color;
    this.type = type;
    if (type === 'spark') {
      this.vx = (Math.random() - .5) * 12;
      this.vy = (Math.random() - .5) * 12;
      this.life = 1; this.decay = .06 + Math.random() * .05;
      this.size = 3 + Math.random() * 4;
    } else {
      this.vx = (Math.random() - .5) * 1.5;
      this.vy = (Math.random() - .5) * 1.5;
      this.life = 1; this.decay = .025 + Math.random() * .02;
      this.size = 4 + Math.random() * 6;
    }
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
    this.vx *= .94; this.vy *= .94;
    this.size *= .97;
  }
  draw(c) {
    c.save();
    c.globalAlpha = Math.max(0, this.life);
    if (this.type === 'spark') {
      c.fillStyle = this.color;
      c.shadowColor = this.color;
      c.shadowBlur = 8;
      c.beginPath();
      c.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
      c.fill();
    } else {
      c.fillStyle = this.color;
      c.shadowColor = this.color;
      c.shadowBlur = 12;
      c.beginPath();
      c.arc(this.x, this.y, this.size / 2, 0, Math.PI * 2);
      c.fill();
    }
    c.restore();
  }
}

function spawnSparks(x, y, color, count = 14) {
  for (let i = 0; i < count; i++) particles.push(new Particle(x, y, color, 'spark'));
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    particles[i].update();
    if (particles[i].life <= 0) particles.splice(i, 1);
  }
}

function drawParticles() {
  pCtx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
  particles.forEach(p => p.draw(pCtx));
}

// ══════════════════════════════════════════════════════
// STONE CLASS
// ══════════════════════════════════════════════════════
class Stone {
  constructor(x, y, team) {
    this.x = x; this.y = y; this.vx = 0; this.vy = 0;
    this.team = team; this.r = STONE_R; this.move = false;
    this.trail = [];
  }
  draw() {
    // Trail
    this.trail.forEach((t, i) => {
      const alpha = (i / this.trail.length) * 0.35;
      const size = this.r * (i / this.trail.length) * 0.7;
      ctx.beginPath();
      ctx.arc(t.x, t.y, size, 0, Math.PI * 2);
      ctx.fillStyle = this.team.color;
      ctx.globalAlpha = alpha;
      ctx.fill();
      ctx.globalAlpha = 1;
    });

    // Shadow
    ctx.beginPath();
    ctx.arc(this.x + 5, this.y + 6, this.r, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,.22)';
    ctx.fill();

    // Body gradient
    const grad = ctx.createRadialGradient(this.x - 7, this.y - 7, 2, this.x, this.y, this.r);
    grad.addColorStop(0, '#fff');
    grad.addColorStop(.25, this.team.color);
    grad.addColorStop(1, this.team.border);
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Rim glow
    ctx.lineWidth = 3;
    ctx.strokeStyle = 'rgba(255,255,255,.6)';
    ctx.stroke();

    // Outer glow
    ctx.beginPath();
    ctx.arc(this.x, this.y, this.r + 4, 0, Math.PI * 2);
    ctx.strokeStyle = this.team.color;
    ctx.lineWidth = 1.5;
    ctx.globalAlpha = .35;
    ctx.stroke();
    ctx.globalAlpha = 1;

    // Icon
    ctx.font = '20px serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = '#fff';
    ctx.fillText(this.team.icon, this.x, this.y + 2);
  }
  update() {
    const speed = Math.hypot(this.vx, this.vy);
    if (speed > .05) {
      this.move = true;

      // Save trail
      this.trail.push({ x: this.x, y: this.y });
      if (this.trail.length > 10) this.trail.shift();

      // Emit trail particles
      if (Math.random() < .4) {
        particles.push(new Particle(this.x + (Math.random()-.5)*8, this.y + (Math.random()-.5)*8, this.team.color + '88'));
      }

      const friction = .022;
      const ns = Math.max(0, speed - friction);
      this.vx *= ns / speed; this.vy *= ns / speed;
      this.x += this.vx; this.y += this.vy;

      if (this.x - this.r < 0) { this.x = this.r; this.vx *= -.85; spawnSparks(this.x, this.y, this.team.color); }
      if (this.x + this.r > LOGICAL_W) { this.x = LOGICAL_W - this.r; this.vx *= -.85; spawnSparks(this.x, this.y, this.team.color); }
      if (this.y - this.r < 0) { this.y = this.r; this.vy *= -.85; spawnSparks(this.x, this.y, this.team.color); }
      if (this.y + this.r > LOGICAL_H) { this.y = LOGICAL_H - this.r; this.vy *= -.85; spawnSparks(this.x, this.y, this.team.color); }
    } else {
      this.vx = 0; this.vy = 0; this.move = false; this.trail = [];
    }
  }
}

function spawnStone() {
  if (state.stonesLeft[state.currentTeam.id] <= 0) { endRound(); return; }
  state.activeStone = new Stone(START.x, START.y, state.currentTeam);

function executeAI() {
  if (state.phase !== 'aim') return;
  const tx = HOUSE.x + (Math.random() - .5) * 90;
  const ty = HOUSE.y + (Math.random() - .5) * 90;
  const dx = tx - START.x, dy = ty - START.y;
  const angle = Math.atan2(dy, dx);
  let power = Math.sqrt(Math.hypot(dx, dy) * .05) * (.9 + Math.random() * .2);
  state.activeStone.vx = Math.cos(angle) * power;
  state.activeStone.vy = Math.sin(angle) * power;
  state.phase = 'move';
  state.stonesLeft[state.currentTeam.id]--;
  showReaction();
}

// ─── Pointer events ───
function getPos(e) {
  const rect = canvas.getBoundingClientRect();
  return {
    x: (e.clientX - rect.left) * (canvas.width / rect.width),
    y: (e.clientY - rect.top) * (canvas.height / rect.height)
  };
}

canvas.addEventListener('pointerdown', e => {
  if (state.phase !== 'aim' || state.isAiTurn) return;
  const pos = getPos(e);
  if (Math.hypot(pos.x - state.activeStone.x, pos.y - state.activeStone.y) < 130) {
    state.dragging = true;
    state.dragStart = pos; state.dragNow = pos;
    document.getElementById('powerMeter').style.display = 'flex';
  }
});

canvas.addEventListener('pointermove', e => {
  if (!state.dragging) return;
  state.dragNow = getPos(e);
  const dist = Math.min(Math.hypot(state.dragStart.x - state.dragNow.x, state.dragStart.y - state.dragNow.y), 250);
  document.getElementById('powerFill').style.width = (dist / 250 * 100) + '%';
});

window.addEventListener('pointerup', () => {
  if (!state.dragging || state.isAiTurn) return;
  state.dragging = false;
  document.getElementById('powerMeter').style.display = 'none';
  document.getElementById('powerFill').style.width = '0%';
  const dx = state.dragStart.x - state.dragNow.x;
  const dy = state.dragStart.y - state.dragNow.y;
  const dist = Math.hypot(dx, dy);
  if (dist > 10) {
    const power = Math.min(dist, 250) * .12;
    const angle = Math.atan2(dy, dx);
    state.activeStone.vx = Math.cos(angle) * power;
    state.activeStone.vy = Math.sin(angle) * power;
    state.phase = 'move';
    state.stonesLeft[state.currentTeam.id]--;
    showReaction();
  }
});

// ─── Collision ───
function resolveCollisions() {
  for (let i = 0; i < state.stones.length; i++) {
    for (let j = i + 1; j < state.stones.length; j++) {
      const a = state.stones[i], b = state.stones[j];
      const dx = b.x - a.x, dy = b.y - a.y;
      const dist = Math.hypot(dx, dy);
      const min = a.r + b.r;
      if (dist < min && dist > 0) {
        const nx = dx / dist, ny = dy / dist;
        const overlap = min - dist;
        a.x -= nx * overlap / 2; b.x += nx * overlap / 2;
        a.y -= ny * overlap / 2; b.y += ny * overlap / 2;
        const kx = a.vx - b.vx, ky = a.vy - b.vy;
        const p = 2 * (nx * kx + ny * ky) / 2;
        a.vx = (a.vx - p * nx) * .9; a.vy = (a.vy - p * ny) * .9;
        b.vx = (b.vx + p * nx) * .9; b.vy = (b.vy + p * ny) * .9;
        // Collision sparks
        spawnSparks((a.x + b.x) / 2, (a.y + b.y) / 2, '#00f0ff', 10);
      }
    }
  }
}

// ─── Round end ───
function endRound() {
  const valid = state.stones
    .map(s => ({ stone: s, dist: Math.hypot(s.x - HOUSE.x, s.y - HOUSE.y) }))
    .filter(v => v.dist < HOUSE.r + STONE_R)
    .sort((a, b) => a.dist - b.dist);

  const winner = valid.length > 0 ? valid[0].stone.team : null;
  if (winner) {
    if (winner.id === 'fairy') state.fairyWins++;
    else state.darkWins++;
    updateUI();
    spawnSparks(HOUSE.x, HOUSE.y, winner.color, 30);
  }

  if (state.fairyWins >= 2 || state.darkWins >= 2) {
    showWinner(state.fairyWins >= 2 ? TEAMS.fairy : TEAMS.dark);
    return;
  }

  setTimeout(() => {
    state.round++;
    state.stones = [];
    state.stonesLeft = { fairy: 4, dark: 4 };
    state.currentTeam = state.playerTeam;
    spawnStone();
  }, 1800);
}

function showWinner(team) {
  const modal = document.getElementById('winnerModal');
  modal.style.display = 'flex';
  const isPlayer = team.id === state.playerTeam.id;
  document.getElementById('winEmoji').textContent = isPlayer ? '🏆' : '💀';
  document.getElementById('winTitle').textContent = `${team.name} 우승!`;
  document.getElementById('winTitle').style.background = `linear-gradient(90deg, ${team.color}, #fff)`;
  document.getElementById('winTitle').style.webkitBackgroundClip = 'text';

  if (isPlayer) {
    document.getElementById('winDesc').innerHTML = `축하합니다 <b>${state.playerInitials}</b>!<br/>${team.icon} 영광의 우승!<br/><br/><span id="saveStatus" style="color:var(--c-ice);font-size:.9rem;">⟳ 랭킹 저장 중...</span>`;
    recordWin().then(wins => {
      const el = document.getElementById('saveStatus');
      if (el) el.innerHTML = wins > 0 ? `<span style="color:var(--c-gold);font-weight:900;font-size:1.1rem;">✨ 총 ${wins}승 달성!</span>` : `<span style="color:#ff4444;font-size:.85rem;">저장 실패 ⚠</span>`;
    });
  } else {
    document.getElementById('winDesc').innerHTML = `아쉽네요!<br/>다음엔 꼭 이겨보세요. 💪`;
  }
}

function resetToMain() {
  document.getElementById('winnerModal').style.display = 'none';
  document.getElementById('inGameUI').style.display = 'none';
  document.getElementById('bottomGuide').style.display = 'none';
  Object.assign(state, {
    phase:'setup', stones:[], currentTeam:null, playerTeam:null,
    aiTeam:null, playerOrder:[], fairyWins:0, darkWins:0, round:1,
    stonesLeft:{fairy:4,dark:4}, activeStone:null, dragging:false
  });
  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').style.animation = 'none';
  loadLeaderboard();
  const ls = document.getElementById('s-login');
  ls.style.display = 'flex';
  ls.classList.remove('hidden','out');
}

// ══════════════════════════════════════════════════════
// DRAW ARENA
// ══════════════════════════════════════════════════════
let iceTime = 0;
const iceFlakes = Array.from({length:28}, () => ({
  x: Math.random() * LOGICAL_W,
  y: Math.random() * LOGICAL_H,
  r: .5 + Math.random() * 1.5,
  speed: .1 + Math.random() * .3,
  alpha: .1 + Math.random() * .25
}));

function drawArena() {
  iceTime += .008;

  // Ice gradient
  const grad = ctx.createLinearGradient(0, 0, 0, LOGICAL_H);
  grad.addColorStop(0, '#b8d4f0');
  grad.addColorStop(.3, '#dbeafe');
  grad.addColorStop(.65, '#eff6ff');
  grad.addColorStop(1, '#bfdbfe');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, LOGICAL_W, LOGICAL_H);

  // Ice texture lines
  ctx.save();
  ctx.globalAlpha = .06;
  for (let i = 0; i < 20; i++) {
    ctx.beginPath();
    ctx.moveTo(0, (i / 20) * LOGICAL_H + Math.sin(iceTime + i) * 4);
    ctx.lineTo(LOGICAL_W, (i / 20) * LOGICAL_H + Math.sin(iceTime + i + 1) * 4);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }
  ctx.restore();

  // Floating ice sparkles
  iceFlakes.forEach(f => {
    f.y -= f.speed;
    if (f.y < -5) f.y = LOGICAL_H + 5;
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = `rgba(255,255,255,${f.alpha})`;
    ctx.fill();
  });

  // House circles
  const circles = [
    { r: HOUSE.r, color: '#1d4ed8' },
    { r: HOUSE.r * .72, color: '#fff' },
    { r: HOUSE.r * .44, color: '#ef4444' },
    { r: HOUSE.r * .22, color: '#fff' },
    { r: HOUSE.r * .09, color: '#1d4ed8' }
  ];
  circles.forEach(c => {
    ctx.beginPath();
    ctx.arc(HOUSE.x, HOUSE.y, c.r, 0, Math.PI * 2);
    ctx.fillStyle = c.color;
    ctx.fill();
  });

  // House glow
  ctx.save();
  ctx.globalAlpha = .18 + Math.sin(iceTime * 2) * .05;
  const glowGrad = ctx.createRadialGradient(HOUSE.x, HOUSE.y, HOUSE.r * .3, HOUSE.x, HOUSE.y, HOUSE.r * 1.2);
  glowGrad.addColorStop(0, '#00f0ff');
  glowGrad.addColorStop(1, 'transparent');
  ctx.beginPath();
  ctx.arc(HOUSE.x, HOUSE.y, HOUSE.r * 1.2, 0, Math.PI * 2);
  ctx.fillStyle = glowGrad;
  ctx.fill();
  ctx.restore();

  // Center + side lines
  ctx.save();
  ctx.strokeStyle = 'rgba(0,0,0,.07)'; ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(HOUSE.x, 0); ctx.lineTo(HOUSE.x, LOGICAL_H); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0, HOUSE.y); ctx.lineTo(LOGICAL_W, HOUSE.y); ctx.stroke();
  ctx.restore();

  // Throw zone
  ctx.save();
  ctx.globalAlpha = .18;
  ctx.beginPath(); ctx.arc(START.x, START.y, 60, 0, Math.PI * 2);
  ctx.strokeStyle = '#1d4ed8'; ctx.lineWidth = 2; ctx.setLineDash([6,4]); ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();

  // Arrow target line
  if (state.phase === 'aim' && !state.isAiTurn && state.activeStone) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(START.x, HOUSE.y + HOUSE.r + 30);
    ctx.lineTo(START.x, START.y - STONE_R - 10);
    ctx.strokeStyle = 'rgba(29,78,216,.2)'; ctx.lineWidth = 1.5; ctx.setLineDash([5,6]); ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }

  // Drag arrow
  if (state.dragging && state.dragStart && state.dragNow && !state.isAiTurn && state.activeStone) {
    const dx = state.dragStart.x - state.dragNow.x;
    const dy = state.dragStart.y - state.dragNow.y;
    const angle = Math.atan2(dy, dx);
    const dist = Math.min(Math.hypot(dx, dy), 250);
    const ex = state.activeStone.x + Math.cos(angle) * dist * 1.6;
    const ey = state.activeStone.y + Math.sin(angle) * dist * 1.6;
    const arrowGrad = ctx.createLinearGradient(state.activeStone.x, state.activeStone.y, ex, ey);
    arrowGrad.addColorStop(0, state.currentTeam.color);
    arrowGrad.addColorStop(1, state.currentTeam.color + '00');
    ctx.save();
    ctx.beginPath(); ctx.moveTo(state.activeStone.x, state.activeStone.y); ctx.lineTo(ex, ey);
    ctx.strokeStyle = arrowGrad; ctx.lineWidth = 6;
    ctx.lineCap = 'round';
    ctx.shadowColor = state.currentTeam.color; ctx.shadowBlur = 18;
    ctx.stroke();
    // Arrowhead
    ctx.translate(ex, ey);
    ctx.rotate(angle);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-16,-8); ctx.lineTo(-16,8); ctx.closePath();
    ctx.fillStyle = state.currentTeam.color; ctx.fill();
    ctx.restore();

    // Distance dotted markers
    for (let d = 40; d <= dist * 1.6; d += 50) {
      const mx = state.activeStone.x + Math.cos(angle) * d;
      const my = state.activeStone.y + Math.sin(angle) * d;
      ctx.beginPath(); ctx.arc(mx, my, 3, 0, Math.PI * 2);
      ctx.fillStyle = state.currentTeam.color + '60'; ctx.fill();
    }
  }
}

// ══════════════════════════════════════════════════════
// GAME LOOP
// ══════════════════════════════════════════════════════
function gameLoop() {
  ctx.clearRect(0, 0, LOGICAL_W, LOGICAL_H);
  drawArena();

  if (state.phase !== 'setup') {
    if (state.phase === 'move') {
      let moving = false;
      state.stones.forEach(s => { s.update(); if (s.move) moving = true; });
      resolveCollisions();
      if (!moving) {
        state.currentTeam = state.currentTeam.id === 'fairy' ? TEAMS.dark : TEAMS.fairy;
        spawnStone();
      }
    }
    state.stones.forEach(s => s.draw());
  }

  updateParticles();
  drawParticles();
  requestAnimationFrame(gameLoop);
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
loadLeaderboard();
requestAnimationFrame(gameLoop);
</script>
