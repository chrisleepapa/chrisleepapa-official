<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>MAGIC CURLING: Fairy vs Crown</title>

<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Cinzel:wght@700;900&family=Exo+2:ital,wght@0,400;0,800;0,900;1,900&family=Noto+Sans+KR:wght@500;700;900&display=swap" rel="stylesheet"/>

<style>
:root{
  --c-fairy: #ff2a85;
  --c-fairy-glow: #ff7eb3;
  --c-dark: #6a00ff;
  --c-dark-glow: #a855f7;
  --c-ice: #00e5ff;
  --c-gold: #ffcf00;
  --bg-deep: #030305;
  --bg-mid: #0a0a12;
  --glass: rgba(15, 15, 25, 0.6);
  --glass-border: rgba(255, 255, 255, 0.1);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0;}

body{
  overflow:hidden;
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg-deep);
  color:#fff;
}

/* ─── Cinematic Texture ─── */
body::before{
  content:''; position:fixed; inset:0; z-index:0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
  opacity: 0.04; pointer-events:none;
}
body::after{
  content:''; position:fixed; inset:0; z-index:9999;
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.08) 2px,rgba(0,0,0,.08) 4px);
  pointer-events:none;
}

#gameWrap{
  position:relative; width:100%; max-width:520px; height:100dvh;
  margin:auto; overflow:hidden; z-index:1;
}

canvas{width:100%;height:100%;display:block;touch-action:none;position:absolute;inset:0;}
#gameCanvas { z-index:2; }
#effectCanvas { z-index:6; pointer-events:none; }
#particleCanvas { z-index:7; pointer-events:none; }

/* ─── UI Screens ─── */
.screen{
  position:absolute;inset:0;z-index:80;
  display:flex;flex-direction:column;align-items:center;
  padding:24px 20px 20px; overflow-y:auto; overflow-x:hidden;
  background:radial-gradient(circle at 50% 20%, #151025 0%, var(--bg-deep) 80%);
  transition:opacity .5s ease, transform .5s cubic-bezier(.175,.885,.32,1.275);
}
.screen.hidden{opacity:0;transform:scale(.95) translateY(20px);pointer-events:none;}
.screen.out{opacity:0;transform:scale(1.05) translateY(-20px);pointer-events:none;}

/* ─── Typography ─── */
.title-main {
  font-family:'Cinzel', serif; font-weight:900; font-size:clamp(2.5rem, 9vw, 3.5rem);
  text-align:center; line-height:1.1; margin-bottom:5px;
  background: linear-gradient(180deg, #fff, #b3b3b3);
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 15px rgba(255,255,255,0.2));
}
.title-sub {
  font-family:'Black Han Sans', sans-serif; font-size:clamp(1.8rem, 6vw, 2.2rem);
  text-align:center; letter-spacing:2px;
  background: linear-gradient(90deg, var(--c-fairy-glow), var(--c-ice), var(--c-dark-glow));
  -webkit-background-clip:text; -webkit-text-fill-color:transparent;
  filter:drop-shadow(0 0 20px rgba(0,229,255,0.4)); margin-bottom: 25px;
}

/* ─── Glass & Components ─── */
.glass-panel{
  background:var(--glass); border:1px solid var(--glass-border);
  backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px);
  border-radius:24px; box-shadow:0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.02);
}

.input-neon{
  width:100%; text-align:center; font-family:'Exo 2',sans-serif;
  font-size:2.5rem; font-weight:900; letter-spacing:0.2em;
  padding:15px; border-radius:16px; background:rgba(0,0,0,0.3);
  color:var(--c-ice); border:2px solid rgba(0,229,255,0.2);
  outline:none; transition:0.3s; text-transform:uppercase;
}
.input-neon:focus{
  border-color:var(--c-ice); box-shadow:0 0 30px rgba(0,229,255,0.3), inset 0 0 15px rgba(0,229,255,0.1);
}

.btn-magic{
  width:100%; border:none; border-radius:18px; padding:18px 20px;
  font-family:'Black Han Sans', sans-serif; font-size:1.4rem; cursor:pointer;
  transition:all 0.3s cubic-bezier(.175,.885,.32,1.275); color:#fff; letter-spacing:2px;
  background:linear-gradient(135deg, #00d2ff, #3a7bd5);
  box-shadow:0 10px 30px rgba(0,210,255,0.4), inset 0 0 10px rgba(255,255,255,0.3);
}
.btn-magic:hover:not(:disabled){transform:translateY(-4px); box-shadow:0 15px 40px rgba(0,210,255,0.6), inset 0 0 10px rgba(255,255,255,0.5);}
.btn-magic:disabled{background:#333; box-shadow:none; color:#888; cursor:not-allowed;}

/* ─── Leaderboard ─── */
.lb-row{
  display:flex; justify-content:space-between; align-items:center;
  padding:12px 18px; border-radius:16px; background:rgba(255,255,255,0.03);
  border:1px solid rgba(255,255,255,0.05); transition:0.2s; margin-bottom:8px;
}
.lb-row:hover{background:rgba(255,255,255,0.08); transform:translateX(5px);}
.lb-medal{width:30px; font-size:1.3rem; text-shadow: 0 0 10px rgba(255,255,255,0.5);}
.lb-initials{font-family:'Exo 2',sans-serif; font-weight:800; font-size:1.2rem; letter-spacing:0.15em;}
.lb-wins{font-family:'Exo 2',sans-serif; font-weight:900; color:var(--c-gold); font-size:1.1rem;}

/* ─── Team & Character Selection ─── */
.team-card{
  flex:1; position:relative; border-radius:24px; overflow:hidden;
  cursor:pointer; transition:all 0.4s cubic-bezier(.175,.885,.32,1.275);
  border:2px solid transparent; min-height:160px;
}
.team-card:hover{transform:scale(1.05) translateY(-5px); z-index:2;}
.team-card.fairy:hover{border-color:var(--c-fairy); box-shadow:0 20px 60px rgba(255,42,133,0.5);}
.team-card.dark:hover{border-color:var(--c-dark); box-shadow:0 20px 60px rgba(106,0,255,0.5);}
.team-bg{
  position:absolute; inset:0; background-size:cover; background-position:center;
  transition:transform 0.6s ease; filter:brightness(0.7) contrast(1.2);
}
.team-card:hover .team-bg{transform:scale(1.15) rotate(2deg); filter:brightness(1) contrast(1.2);}
.team-overlay{
  position:absolute; inset:0;
  background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.2) 60%, transparent 100%);
  display:flex; flex-direction:column; justify-content:flex-end; align-items:center; padding-bottom:20px;
}
.team-label{font-family:'Black Han Sans', sans-serif; font-size:2.2rem; text-shadow:0 5px 20px rgba(0,0,0,1);}

.char-btn{
  background:rgba(255,255,255,0.03); border:2px solid rgba(255,255,255,0.08);
  border-radius:20px; padding:15px 10px; text-align:center; cursor:pointer;
  transition:0.3s; display:flex; flex-direction:column; align-items:center; gap:8px;
}
.char-btn:hover:not(.sel){
  background:rgba(255,255,255,0.1); border-color:var(--c-ice); transform:translateY(-5px);
  box-shadow: 0 10px 20px rgba(0,229,255,0.2);
}
.char-btn.sel{
  border-color:var(--c-ice); background:rgba(0,229,255,0.1); opacity:0.3; pointer-events:none; transform:scale(0.9);
}
.char-portrait{
  width:75px; height:75px; border-radius:50%; object-fit:cover;
  border:3px solid rgba(255,255,255,0.8); box-shadow:0 5px 15px rgba(0,0,0,0.8);
}
.skill-tag {
  font-size: 0.65rem; font-weight: 900; background: linear-gradient(90deg, #ff007a, #7a00ff);
  padding: 3px 8px; border-radius: 10px; color: #fff; letter-spacing: 1px;
}

/* ─── In-Game UI ─── */
#inGameUI{
  position:absolute; inset:0 auto auto 0; width:100%;
  padding:15px; display:flex; justify-content:space-between; align-items:flex-start; z-index:20; pointer-events:none;
}
.score-board{
  border-radius:20px; padding:15px; min-width:180px;
  background:rgba(5,5,10,0.85); border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 10px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0,229,255,0.1);
  backdrop-filter:blur(10px);
}
.score-row{display:flex; justify-content:space-between; align-items:center; margin:8px 0;}
.score-num{font-family:'Cinzel', serif; font-size:2rem; font-weight:900;}

/* ─── Skill & Action UI ─── */
#skillContainer {
  position:absolute; bottom:85px; width:100%; display:flex; justify-content:center; z-index:30;
}
.skill-btn {
  position:relative; width:220px; height:55px; border-radius:30px; border:none;
  background:rgba(0,0,0,0.6); border:2px solid rgba(255,255,255,0.2);
  color:#fff; font-family:'Black Han Sans', sans-serif; font-size:1.3rem; letter-spacing:3px;
  cursor:pointer; overflow:hidden; backdrop-filter:blur(10px); pointer-events:auto;
  transition:all 0.3s cubic-bezier(.175,.885,.32,1.275);
}
.skill-btn .fill {
  position:absolute; top:0; left:0; height:100%; background:linear-gradient(90deg, #ff007a, #7a00ff);
  width:0%; transition:width 0.4s ease; z-index:1; opacity:0.8;
}
.skill-btn span { position:relative; z-index:2; text-shadow:0 2px 5px rgba(0,0,0,0.8); }
.skill-btn.ready {
  border-color:#fff; box-shadow:0 0 30px rgba(255,0,122,0.6); animation:pulseSkill 1s infinite alternate;
}
.skill-btn.ready .fill { background:linear-gradient(90deg, #00e5ff, #0055ff); opacity:1; }
.skill-btn.ready:hover { transform:scale(1.08); box-shadow:0 0 40px rgba(0,229,255,0.8); }

@keyframes pulseSkill { from {box-shadow:0 0 15px rgba(0,229,255,0.4);} to {box-shadow:0 0 35px rgba(0,229,255,0.8);} }

#bottomGuide{
  position:absolute; bottom:25px; width:100%; display:none; justify-content:center; z-index:20; pointer-events:none;
}
.guide-pill{
  padding:12px 28px; border-radius:30px; font-size:1rem; font-weight:800;
  background:rgba(0,0,0,0.8); border:1px solid var(--c-ice);
  color:#fff; box-shadow:0 0 20px rgba(0,229,255,0.3); letter-spacing:1px;
}

/* ─── Cinematic Skill Cut-in ─── */
#skillCutin {
  position:absolute; inset:0; background:rgba(0,0,0,0.85); z-index:100;
  display:none; flex-direction:column; align-items:center; justify-content:center;
  backdrop-filter:blur(8px); overflow:hidden;
}
.cutin-bg-stripe {
  position:absolute; width:200%; height:150px; background:linear-gradient(90deg, transparent, rgba(255,0,122,0.8), transparent);
  transform:rotate(-15deg); opacity:0; z-index:1;
}
.cutin-portrait {
  width:200px; height:200px; border-radius:50%; object-fit:cover; border:5px solid #fff;
  box-shadow:0 0 50px #fff; z-index:2; transform:scale(0) rotate(-45deg); opacity:0;
}
.cutin-name {
  font-family:'Black Han Sans', sans-serif; font-size:4.5rem; color:#fff;
  margin-top:20px; z-index:2; transform:translateX(100px); opacity:0; text-shadow:0 10px 30px rgba(0,0,0,1);
}
.cutin-skillname {
  font-family:'Noto Sans KR', sans-serif; font-weight:900; font-size:2rem; color:var(--c-gold);
  z-index:2; transform:translateX(-100px); opacity:0; letter-spacing:5px; text-shadow:0 5px 20px rgba(0,0,0,1);
}

/* Cut-in Animations */
#skillCutin.play .cutin-bg-stripe { animation: stripeFlash 1.5s ease-out forwards; }
#skillCutin.play .cutin-portrait { animation: popIn 1.5s cubic-bezier(.175,.885,.32,1.275) forwards; }
#skillCutin.play .cutin-name { animation: slideLeft 1.5s cubic-bezier(.175,.885,.32,1.275) forwards; }
#skillCutin.play .cutin-skillname { animation: slideRight 1.5s cubic-bezier(.175,.885,.32,1.275) forwards; }

@keyframes stripeFlash { 0%{opacity:0; transform:rotate(-15deg) translateY(-200px);} 20%{opacity:1; transform:rotate(-15deg) translateY(0);} 80%{opacity:1; transform:rotate(-15deg) translateY(0);} 100%{opacity:0; transform:rotate(-15deg) translateY(200px);} }
@keyframes popIn { 0%{transform:scale(0) rotate(-45deg); opacity:0;} 20%{transform:scale(1.2) rotate(10deg); opacity:1;} 80%{transform:scale(1) rotate(0deg); opacity:1;} 100%{transform:scale(2) rotate(20deg); opacity:0;} }
@keyframes slideLeft { 0%{transform:translateX(100px); opacity:0;} 20%{transform:translateX(0); opacity:1;} 80%{transform:translateX(0); opacity:1;} 100%{transform:translateX(-100px); opacity:0;} }
@keyframes slideRight { 0%{transform:translateX(-100px); opacity:0;} 20%{transform:translateX(0); opacity:1;} 80%{transform:translateX(0); opacity:1;} 100%{transform:translateX(100px); opacity:0;} }

/* ─── Screen Flash ─── */
#screenFlash {
  position:absolute; inset:0; background:#fff; z-index:90; opacity:0; pointer-events:none;
}

/* ─── Power Multiplier Alert ─── */
#buffAlert {
  position:absolute; top:35%; left:50%; transform:translate(-50%, -50%);
  font-family:'Black Han Sans', sans-serif; font-size:3rem; color:var(--c-gold);
  text-shadow:0 0 30px #ff007a; z-index:40; opacity:0; pointer-events:none;
}
@keyframes popAlert { 0%{transform:translate(-50%, -30%) scale(0.5); opacity:0;} 50%{transform:translate(-50%, -50%) scale(1.2); opacity:1;} 100%{transform:translate(-50%, -70%) scale(1); opacity:0;} }

/* ─── Modal ─── */
#winnerModal{
  position:absolute; inset:0; background:rgba(0,0,0,0.85); backdrop-filter:blur(20px);
  z-index:110; display:none; justify-content:center; align-items:center; padding:20px;
}
.modal-card{
  width:100%; max-width:400px; border-radius:30px; padding:40px 30px; text-align:center;
  background:rgba(10,10,20,0.9); border:2px solid rgba(255,255,255,0.1);
  box-shadow:0 30px 100px rgba(0,0,0,0.8), inset 0 0 30px rgba(255,255,255,0.05);
  animation:modalIn 0.6s cubic-bezier(.175,.885,.32,1.275) forwards;
}
@keyframes modalIn{from{transform:scale(0.8) translateY(50px); opacity:0;} to{transform:scale(1) translateY(0); opacity:1;}}
.modal-title{font-family:'Cinzel', serif; font-size:3rem; font-weight:900; margin-bottom:10px; text-shadow:0 0 20px rgba(255,255,255,0.5);}

</style>
</head>

<body>
<div id="gameWrap">

  <canvas id="particleCanvas"></canvas>
  <canvas id="gameCanvas"></canvas>
  <canvas id="effectCanvas"></canvas>
  
  <div id="screenFlash"></div>
  <div id="buffAlert">POWER UP! x1.5</div>

  <div id="s-login" class="screen">
    <div style="margin-top:6vh; margin-bottom:30px;">
      <div class="title-main">MAGIC CURLING</div>
      <div class="title-sub">FAIRY vs CROWN</div>
    </div>

    <div class="glass-panel" style="width:100%; max-width:360px; padding:30px 24px; margin-bottom:20px;">
      <div style="font-size:0.8rem; font-weight:700; letter-spacing:2px; opacity:0.6; margin-bottom:12px; text-align:center;">PLAYER INITIALS</div>
      <input id="initialsInput" class="input-neon" maxlength="3" placeholder="AAA" oninput="this.value=this.value.toUpperCase().replace(/[^A-Z]/g,'')"/>
      <div style="height:20px;"></div>
      <button class="btn-magic" onclick="submitInitials()">마법의 투기장 입장</button>
    </div>

    <div class="glass-panel" style="width:100%; max-width:360px; padding:20px;">
      <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:10px;">
        <div style="font-size:1.3rem;">👑</div>
        <div style="font-family:'Cinzel',serif; font-weight:900; font-size:1.2rem; letter-spacing:2px;">HALL OF FAME</div>
        <div id="lbSpinner" style="margin-left:auto; font-size:1rem; animation:spin 1s linear infinite;">⟳</div>
      </div>
      <div id="leaderboardList" style="display:flex; flex-direction:column;"></div>
    </div>
  </div>

  <div id="s-team" class="screen hidden">
    <div style="text-align:center; margin-top:20px; margin-bottom:30px;">
      <div class="title-main" style="font-size:2.5rem;">CHOOSE FACTION</div>
      <div style="font-size:0.9rem; opacity:0.6; letter-spacing:2px;">빛과 어둠, 당신의 진영은?</div>
    </div>

    <div style="display:flex; flex-direction:column; gap:20px; width:100%; max-width:380px; flex:1; padding-bottom:20px;">
      <div class="team-card fairy" onclick="selectTeam('fairy')">
        <div class="team-bg" style="background-image:url('/images/fairyteam.jpg');"></div>
        <div class="team-overlay">
          <div class="team-label" style="color:var(--c-fairy-glow);">요정 연합</div>
          <div style="font-family:'Cinzel',serif; font-weight:700; opacity:0.8;">FAIRY SQUAD</div>
        </div>
      </div>
      
      <div style="text-align:center; font-family:'Cinzel',serif; font-size:1.5rem; font-weight:900; opacity:0.5;">VS</div>

      <div class="team-card dark" onclick="selectTeam('dark')">
        <div class="team-bg" style="background-image:url('/images/darkteam.jpg');"></div>
        <div class="team-overlay">
          <div class="team-label" style="color:var(--c-dark-glow);">어둠의 왕관</div>
          <div style="font-family:'Cinzel',serif; font-weight:700; opacity:0.8;">CROWN SQUAD</div>
        </div>
      </div>
    </div>
  </div>

  <div id="s-order" class="screen hidden">
    <div style="text-align:center; margin-top:10px; margin-bottom:20px;">
      <div id="orderTitle" class="title-main" style="font-size:2rem; margin-bottom:0;">출전 순서</div>
      <div style="font-size:0.8rem; opacity:0.6; letter-spacing:1px; margin-top:5px;">4명의 마법사를 탭하여 순서를 정하세요</div>
    </div>

    <div id="slotRow" style="display:flex; gap:10px; width:100%; max-width:380px; margin-bottom:20px;"></div>

    <div id="rosterGrid" style="display:grid; grid-template-columns:1fr 1fr; gap:15px; width:100%; max-width:380px; flex:1; overflow-y:auto; padding-bottom:10px;"></div>

    <div style="width:100%; max-width:380px; padding:20px 0;">
      <button id="startBtn" class="btn-magic" disabled onclick="startGame()">전투 시작</button>
    </div>
  </div>

  <div id="inGameUI" style="display:none;">
    <div class="score-board">
      <div style="font-size:0.7rem; font-weight:900; letter-spacing:2px; opacity:0.5; margin-bottom:10px; border-bottom:1px solid rgba(255,255,255,0.1); padding-bottom:5px;">BEST OF 3</div>
      <div class="score-row">
        <div style="font-weight:900; color:var(--c-fairy-glow);">요정 연합</div>
        <div class="score-num" id="fairyScore">0</div>
      </div>
      <div class="score-row">
        <div style="font-weight:900; color:var(--c-dark-glow);">어둠의 왕관</div>
        <div class="score-num" id="darkScore">0</div>
      </div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:flex-end; gap:10px;">
      <div style="padding:10px 20px; background:rgba(0,0,0,0.8); border:1px solid rgba(255,255,255,0.2); border-radius:20px; font-family:'Black Han Sans',sans-serif; font-size:1.2rem;" id="turnBox">요정턴</div>
      <div style="font-family:'Cinzel',serif; font-weight:900; font-size:1.2rem; text-shadow:0 2px 5px #000;" id="roundText">ROUND 1</div>
    </div>
  </div>

  <div id="skillContainer" style="display:none;">
    <button id="skillBtn" class="skill-btn" onclick="activateSkill()">
      <div class="fill" id="skillFill"></div>
      <span id="skillBtnText">CHARGING...</span>
    </button>
  </div>

  <div id="bottomGuide"><div class="guide-pill" id="guideText">🎯 드래그하여 스톤 발사</div></div>

  <div id="skillCutin">
    <div class="cutin-bg-stripe" id="cutinStripe"></div>
    <img class="cutin-portrait" id="cutinPortrait" src="" alt="">
    <div class="cutin-name" id="cutinName">이름</div>
    <div class="cutin-skillname" id="cutinSkillName">스킬명</div>
  </div>

  <div id="winnerModal">
    <div class="modal-card">
      <div style="font-size:4rem; margin-bottom:10px;" id="winEmoji">🏆</div>
      <div class="modal-title" id="winTitle">VICTORY</div>
      <div style="font-size:1.1rem; line-height:1.6; opacity:0.9; margin-bottom:30px;" id="winDesc">승리!</div>
      <button class="btn-magic" onclick="resetToMain()" style="font-size:1.1rem; padding:15px;">전장 이탈 (메뉴)</button>
    </div>
  </div>

</div>

<script>
// ══════════════════════════════════════════════════════

class Particle {
  constructor(x, y, color, type='spark', speedMult=1) {
    this.x = x; this.y = y; this.color = color; this.type = type;
    const a = Math.random() * Math.PI * 2;
    const s = (Math.random() * 5 + 2) * speedMult;
    this.vx = Math.cos(a) * s; this.vy = Math.sin(a) * s;
    this.life = 1; this.decay = 0.02 + Math.random() * 0.04;
    this.size = 3 + Math.random() * 5;
  }
  update() {
    this.x += this.vx; this.y += this.vy; this.life -= this.decay;
    this.vx *= 0.92; this.vy *= 0.92; this.size *= 0.95;
  }
  draw(c) {
    c.globalAlpha = Math.max(0, this.life); c.fillStyle = this.color;
    c.shadowColor = this.color; c.shadowBlur = 10;
    c.beginPath(); c.arc(this.x, this.y, this.size, 0, Math.PI*2); c.fill();
    c.globalAlpha = 1; c.shadowBlur = 0;
  }
}
function spawnSparks(x, y, color, count=15, speed=1) {
  for(let i=0; i<count; i++) particles.push(new Particle(x, y, color, 'spark', speed));
}

async function loadLeaderboard() {
  const list = document.getElementById('leaderboardList');
  try {
    const res = await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?select=*&order=wins.desc&limit=5`, { headers:{ apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}` }});
    const data = await res.json();
    document.getElementById('lbSpinner').style.display = 'none';
    list.innerHTML = '';
    if (!data.length) { list.innerHTML = '<div style="text-align:center; opacity:0.5; padding:10px;">기록이 없습니다.</div>'; return; }
    const medals = ['🥇','🥈','🥉','4','5'];
    data.forEach((e, i) => {
      list.innerHTML += `<div class="lb-row"><div style="display:flex; gap:15px; align-items:center;"><div class="lb-medal">${medals[i]}</div><div class="lb-initials">${e.initials}</div></div><div class="lb-wins">${e.wins} WINS</div></div>`;
    });
  } catch {
    document.getElementById('lbSpinner').textContent = '⚠';
    list.innerHTML = '<div style="text-align:center; opacity:0.5; padding:10px;">DB 연결 실패</div>';
  }
}

async function recordWin() {
  if (!state.playerInitials) return 0;
  try {
    const r = await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?initials=eq.${state.playerInitials}`, { headers:{ apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}` }});
    const existing = await r.json();
    let wins = 1;
    if (existing.length > 0) {
      wins = existing[0].wins + 1;
      await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?initials=eq.${state.playerInitials}`, { method:'PATCH', headers:{ apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json' }, body: JSON.stringify({ wins }) });
    } else {
      await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}`, { method:'POST', headers:{ apikey:SUPA_KEY, Authorization:`Bearer ${SUPA_KEY}`, 'Content-Type':'application/json' }, body: JSON.stringify({ initials: state.playerInitials, wins: 1 }) });
    }
    loadLeaderboard(); return wins;
  } catch { return 0; }
}

// ══════════════════════════════════════════════════════
// STONE CLASS
// ══════════════════════════════════════════════════════
class Stone {
  constructor(x, y, team) {
    this.x = x; this.y = y; this.vx = 0; this.vy = 0;
    this.team = team; this.r = STONE_R; this.move = false;
    this.glow = 0; // 버프 시 빛나는 효과
  }
  draw() {
    ctx.beginPath(); ctx.arc(this.x + 4, this.y + 4, this.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();

    const grad = ctx.createRadialGradient(this.x-5, this.y-5, 2, this.x, this.y, this.r);
    grad.addColorStop(0, '#fff'); grad.addColorStop(0.3, this.team.color); grad.addColorStop(1, this.team.border);
    
    ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2);
    ctx.fillStyle = grad; ctx.fill();
    ctx.lineWidth = 3; ctx.strokeStyle = 'rgba(255,255,255,0.8)'; ctx.stroke();
    
    if(this.glow > 0) {
      ctx.beginPath(); ctx.arc(this.x, this.y, this.r + 5, 0, Math.PI*2);
      ctx.strokeStyle = '#ffcf00'; ctx.lineWidth = 2; ctx.globalAlpha = 0.6 + Math.sin(Date.now()/100)*0.4;
      ctx.stroke(); ctx.globalAlpha = 1;
    }

    ctx.font = '20px sans-serif'; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(this.team.icon, this.x, this.y + 2);
  }
  update() {
    const speed = Math.hypot(this.vx, this.vy);
    if (speed > 0.05) {
      this.move = true;
      if (Math.random() < 0.3) spawnSparks(this.x, this.y, this.team.color, 1);
      const ns = Math.max(0, speed - 0.025);
      this.vx *= ns/speed; this.vy *= ns/speed;
      this.x += this.vx; this.y += this.vy;

      if (this.x-this.r < 0) { this.x=this.r; this.vx*=-0.8; spawnSparks(this.x,this.y,this.team.color,5); }
      if (this.x+this.r > LOGICAL_W) { this.x=LOGICAL_W-this.r; this.vx*=-0.8; spawnSparks(this.x,this.y,this.team.color,5); }
      if (this.y-this.r < 0) { this.y=this.r; this.vy*=-0.8; spawnSparks(this.x,this.y,this.team.color,5); }
      if (this.y+this.r > LOGICAL_H) { this.y=LOGICAL_H-this.r; this.vy*=-0.8; spawnSparks(this.x,this.y,this.team.color,5); }
    } else { this.vx = 0; this.vy = 0; this.move = false; }
  }
}

// 스킬 활성화 (버튼 클릭 시)
window.activateSkill = function() {
  const team = state.currentTeam;
  if (state.skillCharge[team.id] < 2 || state.phase !== 'aim') return;
  state.skillCharge[team.id] = 0;
  state.phase = 'skill'; // 스킬 사용 중 조작 불가
  
  const member = getActiveMember(team);
  showSkillCutin(member, team);
  
  setTimeout(() => {
    executeSkillEffect(member.id, team);
    updateUI();
  }, 1500); // 컷인 이후 효과 발동
}

// 특정 대상에게 물리력 부여 헬퍼
function applyImpulse(targetRule, conditionRule, magnitude) {
  state.stones.forEach(s => {
    const isAlly = s.team.id === state.currentTeam.id;
    if((targetRule==='enemy' && !isAlly) || (targetRule==='ally' && isAlly) || targetRule==='all') {
      const dist = Math.hypot(s.x - HOUSE.x, s.y - HOUSE.y);
      if(conditionRule==='in_house' && dist <= HOUSE.r + STONE_R) {
        const angle = Math.atan2(s.y - HOUSE.y, s.x - HOUSE.x);
        s.vx += Math.cos(angle) * magnitude; s.vy += Math.sin(angle) * magnitude; s.move = true;
      }
    }
  });
}

// 실제 스킬 효과 실행

  shakeMag = 10; shakeTime = 20;

  switch(skillId) {
    case 'pretty': // 빛의 화살 (적 밀어내기)

    case 'cuty': // 응원의 하트 (버프)
      state.powerBuff[team.id] = 2;
      spawnSparks(START.x, START.y, '#ff69b4', 40, 1.5);
      showBuffAlert();
      break;
    case 'brook': // 불의 망치 (지진)
      shakeMag = 20; shakeTime = 30;
      spawnSparks(HOUSE.x, HOUSE.y, '#ff4500', 60, 3);
      applyImpulse('enemy', 'in_house', 18);
      break;
    case 'elion': // 장로의 기도 (밖의 아군 안으로)
      activeForces.push({ teamId: team.id, target:'ally', cond:'out_house', type:'pull', life:120 });
      break;
    case 'knight': // 어둠의 기운 (버프)
      state.powerBuff[team.id] = 1;
      spawnSparks(START.x, START.y, '#6a00ff', 40, 1.5);
      showBuffAlert();
      break;
    case 'vane': // 검신의 함성 (적 밀어내기)
      shakeMag = 15; shakeTime = 25;
      applyImpulse('enemy', 'in_house', 15);
      break;
    case 'crown': // 대지진 (초강력 적 방출)
      shakeMag = 30; shakeTime = 40;
      spawnSparks(HOUSE.x, HOUSE.y, '#000', 80, 4);
      applyImpulse('enemy', 'in_house', 25);
      break;
    case 'angel': // 소용돌이 (모든 아군 안으로)
      activeForces.push({ teamId: team.id, target:'ally', cond:'all', type:'pull', life:150 });
      break;
  }
  
  // 스킬 발동 후 자연스럽게 투구 페이즈로
  setTimeout(() => { state.phase = 'aim'; if(state.isAiTurn) executeAIThrow(); }, 1000);
}

function showBuffAlert() {
  const a = document.getElementById('buffAlert');
  a.style.animation = 'none'; void a.offsetWidth; a.style.animation = 'popAlert 2s forwards';
  if(state.activeStone) state.activeStone.glow = 1;
}

function spawnStone() {
  if (state.stonesLeft[state.currentTeam.id] <= 0) { endRound(); return; }
  state.activeStone = new Stone(START.x, START.y, state.currentTeam);
  if(state.powerBuff[state.currentTeam.id] > 0) state.activeStone.glow = 1;
  state.stones.push(state.activeStone);
  state.phase = 'aim';
  state.isAiTurn = state.currentTeam.id === state.aiTeam.id;
  updateUI();
  
  if (state.isAiTurn) {
    setTimeout(() => {
      if(state.skillCharge[state.currentTeam.id] >= 2) activateSkill(); // AI 스킬 사용
      else executeAIThrow(); // AI 일반 투구
    }, 1500);
  }
}

function executeAIThrow() {
  if (state.phase !== 'aim') return;
  const tx = HOUSE.x + (Math.random() - 0.5) * 80;
  const ty = HOUSE.y + (Math.random() - 0.5) * 80;
  const dx = tx - START.x, dy = ty - START.y;
  const angle = Math.atan2(dy, dx);
  let power = Math.sqrt(Math.hypot(dx, dy) * 0.05) * (0.9 + Math.random() * 0.2);
  
  if(state.powerBuff[state.currentTeam.id] > 0) { power *= 1.5; state.powerBuff[state.currentTeam.id]--; }
  
  state.activeStone.vx = Math.cos(angle) * power; state.activeStone.vy = Math.sin(angle) * power;
  finishThrow();
}

// ─── Input Handling ───
function getPos(e) { const r = canvas.getBoundingClientRect(); return { x: (e.clientX - r.left) * (LOGICAL_W / r.width), y: (e.clientY - r.top) * (LOGICAL_H / r.height) }; }

canvas.addEventListener('pointerdown', e => {
  if (state.phase !== 'aim' || state.isAiTurn) return;
  const pos = getPos(e);
  if (Math.hypot(pos.x - state.activeStone.x, pos.y - state.activeStone.y) < 100) { state.dragging = true; state.dragStart = pos; state.dragNow = pos; }
});
canvas.addEventListener('pointermove', e => { if (state.dragging) state.dragNow = getPos(e); });
window.addEventListener('pointerup', () => {
  if (!state.dragging || state.isAiTurn) return;
  state.dragging = false;
  const dx = state.dragStart.x - state.dragNow.x, dy = state.dragStart.y - state.dragNow.y;
  const dist = Math.hypot(dx, dy);
  if (dist > 10) {
    let power = Math.min(dist, 250) * 0.12;
    if(state.powerBuff[state.currentTeam.id] > 0) { power *= 1.5; state.powerBuff[state.currentTeam.id]--; }
    const angle = Math.atan2(dy, dx);
    state.activeStone.vx = Math.cos(angle) * power; state.activeStone.vy = Math.sin(angle) * power;
    finishThrow();
  }
});

function finishThrow() {
  state.phase = 'move';
  state.activeStone.glow = 0;
  state.stonesLeft[state.currentTeam.id]--;
  state.skillCharge[state.currentTeam.id] = Math.min(2, state.skillCharge[state.currentTeam.id] + 1); // 게이지 50% 증가
  updateUI();
}

// ─── Collision & Forces ───
function resolveCollisions() {
  for (let i = 0; i < state.stones.length; i++) {
    for (let j = i + 1; j < state.stones.length; j++) {
      const a = state.stones[i], b = state.stones[j];
      const dx = b.x - a.x, dy = b.y - a.y, dist = Math.hypot(dx, dy), min = a.r + b.r;
      if (dist < min && dist > 0) {
        const nx = dx/dist, ny = dy/dist, overlap = min - dist;
        a.x -= nx*overlap/2; b.x += nx*overlap/2; a.y -= ny*overlap/2; b.y += ny*overlap/2;
        const p = 2 * (nx*(a.vx-b.vx) + ny*(a.vy-b.vy)) / 2;
        a.vx = (a.vx - p*nx)*0.9; a.vy = (a.vy - p*ny)*0.9; b.vx = (b.vx + p*nx)*0.9; b.vy = (b.vy + p*ny)*0.9;
        spawnSparks((a.x+b.x)/2, (a.y+b.y)/2, '#fff', 5);
      }
    }
  }
}

function applyContinuousForces() {
  activeForces.forEach(f => {
    f.life--;
    if(f.life % 5 === 0) spawnSparks(HOUSE.x, HOUSE.y, '#a855f7', 2); // 블랙홀 이펙트
    state.stones.forEach(s => {
      const isAlly = s.team.id === f.teamId;
      if((f.target==='ally' && isAlly) || f.target==='all') {
        const dx = HOUSE.x - s.x, dy = HOUSE.y - s.y, dist = Math.hypot(dx, dy);
        if(f.cond==='out_house' && dist < HOUSE.r) return;
        if(dist > 10) {
          s.vx += (dx/dist) * 0.3; s.vy += (dy/dist) * 0.3; s.move = true;
        }
      }
    });
  });
  activeForces = activeForces.filter(f => f.life > 0);
}

function endRound() {
  const valid = state.stones.map(s => ({ stone: s, dist: Math.hypot(s.x - HOUSE.x, s.y - HOUSE.y) })).filter(v => v.dist < HOUSE.r + STONE_R).sort((a, b) => a.dist - b.dist);
  const winner = valid.length > 0 ? valid[0].stone.team : null;
  if (winner) {
    if (winner.id === 'fairy') state.fairyWins++; else state.darkWins++;
    spawnSparks(HOUSE.x, HOUSE.y, winner.color, 40, 3);
  }
  updateUI();

  if (state.fairyWins >= 2 || state.darkWins >= 2) { showWinner(state.fairyWins >= 2 ? TEAMS.fairy : TEAMS.dark); return; }
  setTimeout(() => {
    state.round++; state.stones = []; state.stonesLeft = { fairy: 4, dark: 4 };
    state.currentTeam = state.playerTeam; spawnStone();
  }, 2000);
}

function showWinner(team) {
  const modal = document.getElementById('winnerModal'); modal.style.display = 'flex';
  const isP = team.id === state.playerTeam.id;
  document.getElementById('winEmoji').textContent = isP ? '🏆' : '💀';
  document.getElementById('winTitle').textContent = `${team.name} 승리!`;
  document.getElementById('winTitle').style.color = team.color;
  
  if (isP) {
    document.getElementById('winDesc').innerHTML = `최고의 마법사 <b>${state.playerInitials}</b>!<br>빛나는 우승을 차지했습니다.<br><br><span style="color:var(--c-ice); font-size:0.9rem;" id="saveStatus">기록 동기화 중...</span>`;
    recordWin().then(w => {
      const el = document.getElementById('saveStatus');
      if(el) el.innerHTML = w > 0 ? `<b style="color:var(--c-gold);">총 ${w}승 달성!</b>` : `<span style="color:red;">기록 실패</span>`;
    });
  } else { document.getElementById('winDesc').innerHTML = `어둠에 패배했습니다...<br>다시 도전하세요.`; }
}

function resetToMain() {
  document.getElementById('winnerModal').style.display = 'none'; document.getElementById('inGameUI').style.display = 'none';
  document.getElementById('bottomGuide').style.display = 'none'; document.getElementById('skillContainer').style.display = 'none';
  state.phase='setup'; state.stones=[]; state.fairyWins=0; state.darkWins=0; state.round=1; state.stonesLeft={fairy:4,dark:4};
  state.skillCharge={fairy:0, dark:0}; state.powerBuff={fairy:0, dark:0};
  loadLeaderboard(); showScreen('s-login');
}

// ══════════════════════════════════════════════════════
// DRAW ARENA
// ══════════════════════════════════════════════════════
let bgTime = 0;
function drawArena() {
  bgTime += 0.01;
  ctx.clearRect(0,0,LOGICAL_W,LOGICAL_H);

  // Deep Magic Background
  const bgGrad = ctx.createRadialGradient(LOGICAL_W/2, LOGICAL_H/2, 50, LOGICAL_W/2, LOGICAL_H/2, LOGICAL_H);
  bgGrad.addColorStop(0, '#151525'); bgGrad.addColorStop(1, '#050508');
  ctx.fillStyle = bgGrad; ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);

  // Magic Runes (Rotating Circle)
  ctx.save(); ctx.translate(HOUSE.x, HOUSE.y); ctx.rotate(bgTime * 0.2);
  ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 2; ctx.setLineDash([15, 10]);
  ctx.beginPath(); ctx.arc(0,0, HOUSE.r * 1.5, 0, Math.PI*2); ctx.stroke();
  ctx.setLineDash([]); ctx.restore();

  // House Rings
  const rings = [ {r:HOUSE.r, c:'#110a22'}, {r:HOUSE.r*0.75, c:'#1a1033'}, {r:HOUSE.r*0.45, c:'#ff2a85'}, {r:HOUSE.r*0.2, c:'#00e5ff'} ];
  rings.forEach(ring => {
    ctx.beginPath(); ctx.arc(HOUSE.x, HOUSE.y, ring.r, 0, Math.PI*2);
    ctx.fillStyle = ring.c; ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth=1; ctx.stroke();
  });

  // Target glow
  ctx.globalAlpha = 0.3 + Math.sin(bgTime*3)*0.1;
  const glow = ctx.createRadialGradient(HOUSE.x, HOUSE.y, 0, HOUSE.x, HOUSE.y, HOUSE.r);
  glow.addColorStop(0, 'rgba(0,229,255,0.5)'); glow.addColorStop(1, 'transparent');
  ctx.fillStyle = glow; ctx.beginPath(); ctx.arc(HOUSE.x, HOUSE.y, HOUSE.r, 0, Math.PI*2); ctx.fill(); ctx.globalAlpha = 1;

  // Center Line
  ctx.strokeStyle='rgba(255,255,255,0.05)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(HOUSE.x, 0); ctx.lineTo(HOUSE.x, LOGICAL_H); ctx.stroke();

  // Throw Zone
  ctx.beginPath(); ctx.arc(START.x, START.y, 50, 0, Math.PI*2);
  ctx.strokeStyle='rgba(0,229,255,0.3)'; ctx.lineWidth=2; ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);

  // Drag Arrow
  if (state.dragging && state.dragStart && state.dragNow && !state.isAiTurn && state.activeStone) {
    const dx = state.dragStart.x - state.dragNow.x, dy = state.dragStart.y - state.dragNow.y;
    const angle = Math.atan2(dy, dx);
    let dist = Math.min(Math.hypot(dx, dy), 250);
    if(state.powerBuff[state.currentTeam.id] > 0) dist *= 1.5; // 버프 시 가이드라인도 길게
    
    const ex = state.activeStone.x + Math.cos(angle)*dist*1.5, ey = state.activeStone.y + Math.sin(angle)*dist*1.5;
    const grad = ctx.createLinearGradient(state.activeStone.x, state.activeStone.y, ex, ey);
    grad.addColorStop(0, state.currentTeam.color); grad.addColorStop(1, 'transparent');
    
    ctx.save(); ctx.beginPath(); ctx.moveTo(state.activeStone.x, state.activeStone.y); ctx.lineTo(ex,ey);
    ctx.strokeStyle=grad; ctx.lineWidth=6; ctx.lineCap='round'; ctx.stroke();
    
    ctx.translate(ex, ey); ctx.rotate(angle);
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(-15,-10); ctx.lineTo(-15,10); ctx.closePath();
    ctx.fillStyle = state.currentTeam.color; ctx.shadowBlur=15; ctx.shadowColor=ctx.fillStyle; ctx.fill();
    ctx.restore();
  }
}

// ══════════════════════════════════════════════════════
// MAIN LOOP
// ══════════════════════════════════════════════════════
function gameLoop() {
  // Screen Shake 적용
  ctx.save(); pCtx.save();
  if (shakeTime > 0) {
    const sx = (Math.random()-0.5) * shakeMag; const sy = (Math.random()-0.5) * shakeMag;
    ctx.translate(sx, sy); pCtx.translate(sx, sy); shakeTime--;
  }

  drawArena();
  if (state.phase !== 'setup') {
    if (state.phase === 'move' || activeForces.length > 0) {
      applyContinuousForces();
      let moving = false;
      state.stones.forEach(s => { s.update(); if (s.move) moving = true; });
      resolveCollisions();
      if (!moving && state.phase === 'move') {
        state.currentTeam = state.currentTeam.id === 'fairy' ? TEAMS.dark : TEAMS.fairy;
        spawnStone();
      }
    }
    state.stones.forEach(s => s.draw());
  }

  pCtx.clearRect(0,0,LOGICAL_W,LOGICAL_H);
  for(let i=particles.length-1; i>=0; i--) { particles[i].update(); particles[i].draw(pCtx); if(particles[i].life<=0) particles.splice(i,1); }
  
  ctx.restore(); pCtx.restore();
  requestAnimationFrame(gameLoop);
}

loadLeaderboard();
requestAnimationFrame(gameLoop);
</script>
