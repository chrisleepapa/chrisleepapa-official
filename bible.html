<!DOCTYPE html>
<html lang="ko">
<head>
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#030305">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/favicon.png">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3207219520058740" crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NBGELYQ4TZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-NBGELYQ4TZ');
      gtag('config', 'GT-5MJDBTR2');
    </script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="images/favicon.png" type="image/png">
    <title>Bible in my hand - Chris LEE.PAPA</title>

    <script src="js/main.js" defer></script>

    <style>
        /* [페이지 전용 스타일] 기존 bible.html의 CSS를 유지합니다. */
        :root { --gold: #c9a84c; --bg: #030305; --card-bg: #0a0a0c; --text: #e0e0e0; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Cormorant Garamond', 'Noto Sans KR', serif; margin:0; }
        
        .bible-reader-wrap { max-width: 900px; margin: 100px auto 60px; padding: 0 20px; min-height: 80vh; }
        .reader-header { text-align: center; margin-bottom: 40px; }
        .reader-header h1 { font-family: 'Cinzel', serif; font-size: 2.5rem; color: var(--gold); letter-spacing: 2px; }

        .search-container { background: var(--card-bg); border: 1px solid #222; padding: 25px; border-radius: 4px; margin-bottom: 40px; display: flex; flex-wrap: wrap; gap: 15px; align-items: center; justify-content: center; }
        .search-container select, .search-container input { background: #000; border: 1px solid #333; color: #fff; padding: 10px 15px; font-size: 1rem; outline: none; border-radius: 4px; }
        .search-container select:focus, .search-container input:focus { border-color: var(--gold); }
        .btn-search { background: var(--gold); color: #000; border: none; padding: 10px 25px; font-weight: bold; cursor: pointer; border-radius: 4px; transition: 0.3s; }
        .btn-search:hover { background: #e0bc5a; }

        .bible-list { display: flex; flex-direction: column; gap: 15px; }
        .verse-item { background: var(--card-bg); border: 1px solid #1a1a1a; padding: 20px; border-radius: 4px; position: relative; transition: 0.3s; cursor: pointer; }
        .verse-item:hover { border-color: var(--gold); background: #0f0f12; }
        .verse-num { color: var(--gold); font-size: 0.9rem; margin-bottom: 8px; font-family: 'Cinzel', serif; }
        .verse-content { line-height: 1.7; font-size: 1.1rem; color: #ccc; }

        /* 캡처 모달 스타일 (페이지 전용) */
        .capture-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.9); display: none; z-index: 2000; align-items: center; justify-content: center; padding: 20px; }
        .capture-overlay.show { display: flex; }
        .capture-card { background: #000; border: 1px solid var(--gold); padding: 40px; max-width: 500px; width: 100%; position: relative; text-align: center; box-shadow: 0 0 30px rgba(201, 168, 76, 0.2); }
        .cap-ref { font-family: 'Cinzel', serif; color: var(--gold); font-size: 1.2rem; margin-bottom: 20px; }
        .cap-text { font-size: 1.25rem; line-height: 1.8; color: #fff; word-break: keep-all; margin-bottom: 30px; }
        .cap-footer { font-size: 0.8rem; color: #555; letter-spacing: 2px; }
        .capture-btns { margin-top: 30px; display: flex; gap: 10px; justify-content: center; }
        .btn-cap { padding: 10px 20px; border: 1px solid var(--gold); background: transparent; color: var(--gold); cursor: pointer; transition: 0.3s; }
        .btn-cap:hover { background: var(--gold); color: #000; }
    </style>
</head>
<body>

    <div id="site-nav"></div>

    <main class="bible-reader-wrap">
        <div class="reader-header">
            <h1 data-i18n="bible_title">Bible in my hand</h1>
        </div>

        <div class="search-container">
            <select id="bookSelect"></select>
            <input type="number" id="chapterInput" placeholder="Chapter" min="1" value="1" style="width: 100px;">
            <button class="btn-search" onclick="filterBible()" data-i18n="bible_btn_search">Search</button>
        </div>

        <div id="bibleList" class="bible-list">
            </div>
    </main>

    <div id="captureOverlay" class="capture-overlay" onclick="closeCaptureModal(event)">
        <div class="capture-card" id="captureTarget">
            <div class="cap-ref" id="capRef">GENESIS 1:1</div>
            <div class="cap-text" id="capText">태초에 하나님이 천지를 창조하시니라</div>
            <div class="cap-footer">CHRIS LEE.PAPA ARCHIVE</div>
        </div>
        <div class="capture-btns" onclick="event.stopPropagation()">
            <button class="btn-cap" onclick="saveVerseAsImage()">Save Image</button>
            <button class="btn-cap" onclick="shareVerseAsImage()">Share</button>
            <button class="btn-cap" onclick="closeCaptureModal(null)">Close</button>
        </div>
    </div>

    <div id="site-footer"></div>

    <script>
        // [페이지 전용 설정 및 다국어]
        window.PAGE_I18N = {
            ko: { 
                bible_title: "내 손안의 성경",
                bible_btn_search: "검색",
                toast_copy: "이미지 공유 미지원 브라우저입니다. 텍스트가 복사되었습니다 ✓",
                toast_fail: "이미지 저장에 실패했습니다."
            },
            en: { 
                bible_title: "Bible in my hand",
                bible_btn_search: "Search",
                toast_copy: "Text copied ✓",
                toast_fail: "Failed to save image."
            }
        };

        const bibleBooks = [
            {ko:"창세기", en:"Genesis", val:"창"}, {ko:"출애굽기", en:"Exodus", val:"출"},
            {ko:"레위기", en:"Leviticus", val:"레"}, {ko:"민수기", en:"Numbers", val:"민"},
            {ko:"신명기", en:"Deuteronomy", val:"신"}, {ko:"여호수아", en:"Joshua", val:"여"},
            {ko:"사사기", en:"Judges", val:"삿"}, {ko:"룻기", en:"Ruth", val:"룻"},
            {ko:"사무엘상", en:"1 Samuel", val:"삼상"}, {ko:"사무엘하", en:"2 Samuel", val:"삼하"},
            {ko:"열왕기상", en:"1 Kings", val:"왕상"}, {ko:"열왕기하", en:"2 Kings", val:"왕하"},
            {ko:"역대상", en:"1 Chronicles", val:"대상"}, {ko:"역대하", en:"2 Chronicles", val:"대하"},
            {ko:"에스라", en:"Ezra", val:"라"}, {ko:"느헤미야", en:"Nehemiah", val:"느"},
            {ko:"에스더", en:"Esther", val:"더"}, {ko:"욥기", en:"Job", val:"욥"},
            {ko:"시편", en:"Psalms", val:"시"}, {ko:"잠언", en:"Proverbs", val:"잠"},
            {ko:"전도서", en:"Ecclesiastes", val:"전"}, {ko:"아가", en:"Song of Songs", val:"아"},
            {ko:"이사야", en:"Isaiah", val:"사"}, {ko:"예레미야", en:"Jeremiah", val:"렘"},
            {ko:"예레미야 애가", en:"Lamentations", val:"애"}, {ko:"에스겔", en:"Ezekiel", val:"겔"},
            {ko:"다니엘", en:"Daniel", val:"단"}, {ko:"호세아", en:"Hosea", val:"호"},
            {ko:"요엘", en:"Joel", val:"욜"}, {ko:"아모스", en:"Amos", val:"암"},
            {ko:"오바디야", en:"Obadiah", val:"옵"}, {ko:"요나", en:"Jonah", val:"욘"},
            {ko:"미가", en:"Micah", val:"미"}, {ko:"나훔", en:"Nahum", val:"나"},
            {ko:"하박국", en:"Habakkuk", val:"합"}, {ko:"스바냐", en:"Zephaniah", val:"습"},
            {ko:"학개", en:"Haggai", val:"학"}, {ko:"스가랴", en:"Zechariah", val:"슥"},
            {ko:"말라기", en:"Malachi", val:"말"}, {ko:"마태복음", en:"Matthew", val:"마"},
            {ko:"마가복음", en:"Mark", val:"막"}, {ko:"누가복음", en:"Luke", val:"눅"},
            {ko:"요한복음", en:"John", val:"요"}, {ko:"사도행전", en:"Acts", val:"행"},
            {ko:"로마서", en:"Romans", val:"롬"}, {ko:"고린도전서", en:"1 Corinthians", val:"고전"},
            {ko:"고린도후서", en:"2 Corinthians", val:"고후"}, {ko:"갈라디아서", en:"Galatians", val:"갈"},
            {ko:"에베소서", en:"Ephesians", val:"엡"}, {ko:"빌립보서", en:"Philippians", val:"빌"},
            {ko:"골로새서", en:"Colossians", val:"골"}, {ko:"데살로니가전서", en:"1 Thessalonians", val:"살전"},
            {ko:"데살로니가후서", en:"2 Thessalonians", val:"살후"}, {ko:"디모데전서", en:"1 Timothy", val:"딤전"},
            {ko:"디모데후서", en:"2 Timothy", val:"딤후"}, {ko:"디도서", en:"Titus", val:"딛"},
            {ko:"빌레몬서", en:"Philemon", val:"몬"}, {ko:"히브리서", en:"Hebrews", val:"히"},
            {ko:"야고보서", James:"James", val:"약"}, {ko:"베드로전서", en:"1 Peter", val:"벧전"},
            {ko:"베드로후서", en:"2 Peter", val:"벧후"}, {ko:"요한일서", en:"1 John", val:"요일"},
            {ko:"요한이서", en:"2 John", val:"요이"}, {ko:"요한삼서", en:"3 John", val:"요삼"},
            {ko:"유다서", en:"Jude", val:"유"}, {ko:"요한계시록", en:"Revelation", val:"계"}
        ];

        let fullBibleData = [];

        // main.js 로드 완료 후 실행될 로직
        window.onMainReady = function() {
            initBookSelect();
            fetch('bible_structured.json')
                .then(res => res.json())
                .then(data => {
                    fullBibleData = data;
                    filterBible(); // 초기 로드 (창세기 1장)
                });
        };

        function initBookSelect() {
            const select = document.getElementById('bookSelect');
            const currentLang = localStorage.getItem('preferredLang') || 'ko';
            select.innerHTML = bibleBooks.map(b => `<option value="${b.val}">${currentLang === 'ko' ? b.ko : b.en}</option>`).join('');
        }

        function filterBible() {
            const book = document.getElementById('bookSelect').value;
            const chapter = parseInt(document.getElementById('chapterInput').value);
            const filtered = fullBibleData.filter(v => v.book === book && v.chapter === chapter);
            renderBibleList(filtered);
        }

        function renderBibleList(data) {
            const list = document.getElementById('bibleList');
            const bookObj = bibleBooks.find(b => b.val === data[0]?.book);
            const currentLang = localStorage.getItem('preferredLang') || 'ko';
            const bookName = bookObj ? (currentLang === 'ko' ? bookObj.ko : bookObj.en) : "";

            list.innerHTML = data.map(v => `
                <div class="verse-item" onclick="openCaptureModal('${bookName} ${v.chapter}:${v.verse}', '${v.content}')">
                    <div class="verse-num">${v.verse}</div>
                    <div class="verse-content">${v.content}</div>
                </div>
            `).join('');
        }

        function openCaptureModal(ref, text) {
            document.getElementById('capRef').textContent = ref;
            document.getElementById('capText').textContent = text;
            document.getElementById('captureOverlay').classList.add('show');
        }

        function closeCaptureModal(e) {
            if (!e || e.target.id === 'captureOverlay') {
                document.getElementById('captureOverlay').classList.remove('show');
            }
        }

        async function saveVerseAsImage() {
            try {
                const canvas = await html2canvas(document.getElementById('captureTarget'), { backgroundColor: '#000' });
                const link = document.createElement('a');
                link.download = `bible_${Date.now()}.png`;
                link.href = canvas.toDataURL();
                link.click();
            } catch (err) {
                if (window.showToast) showToast(window.PAGE_I18N[localStorage.getItem('preferredLang') || 'ko'].toast_fail);
            }
        }

        async function shareVerseAsImage() {
            try {
                const canvas = await html2canvas(document.getElementById('captureTarget'), { backgroundColor: '#000' });
                canvas.toBlob(async (blob) => {
                    const file = new File([blob], 'verse.png', { type: 'image/png' });
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        await navigator.share({ files: [file] });
                    } else {
                        const shareText = `[Bible Verse]\n${document.getElementById('capRef').textContent}\n\n${document.getElementById('capText').textContent}`;
                        navigator.clipboard.writeText(shareText);
                        if (window.showToast) showToast(window.PAGE_I18N[localStorage.getItem('preferredLang') || 'ko'].toast_copy);
                    }
                });
            } catch (err) { console.error(err); }
        }
    </script>
</body>
</html>
