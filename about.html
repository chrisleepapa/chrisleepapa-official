    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root { --gold: #c9a84c; --gold-light: #e8d08a; --bg: #030305; --text: #f0ece4; }
        
        body {
            background-color: var(--bg); color: var(--text);
            font-family: 'Pretendard', sans-serif;
            background-image: radial-gradient(circle at top right, rgba(20, 20, 40, 0.8), transparent 60%),
                              radial-gradient(circle at bottom left, rgba(10, 10, 20, 0.9), transparent 60%);
            min-height: 100vh; display: flex; flex-direction: column;
            
            /* 드래그 및 선택 방지 */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }

        img {
            -webkit-user-drag: none; /* 이미지 드래그 방지 */
        }

        /* ── 공통 네비게이션 ── */
        nav {
            position: fixed; top: 0; width: 100%; padding: 20px 50px;
            display: flex; justify-content: space-between; align-items: center; z-index: 1000;
            background: rgba(3, 3, 5, 0.7); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .brand-logo { font-family: 'Cinzel', serif; font-size: 1.4rem; font-weight: 800; letter-spacing: 1.5px; color: #e0e0ff; text-decoration: none; }
        .nav-links { display: flex; gap: 35px; }
        .nav-links a { font-family: 'Cinzel', serif; font-size: 0.95rem; color: #a0a0b5; text-decoration: none; transition: 0.3s; letter-spacing: 1px; }
        .nav-links a:hover { color: #ffffff; text-shadow: 0 0 10px rgba(255,255,255,0.5); }

        /* ── 중앙 콘텐츠 (Glass Card) ── */
        .page-wrapper {
            flex: 1; display: flex; align-items: center; justify-content: center;
            padding: 120px 20px; position: relative;
        }

        .glass-card {
            background: rgba(15, 15, 20, 0.4);
            border: 1px solid rgba(201,168,76,0.3);
            border-radius: 24px; padding: 60px 50px;
            text-align: center; max-width: 700px; width: 100%;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 30px rgba(201,168,76,0.05);
            animation: fadeUp 1s ease both;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .title { font-family: 'Cinzel', serif; font-size: 3rem; font-weight: 600; letter-spacing: 0.2em; color: var(--gold-light); margin-bottom: 30px; }
        .content-text { font-size: 1.1rem; line-height: 2; color: rgba(240,236,228,0.9); margin-bottom: 40px; word-break: keep-all; font-weight: 300; }
        .highlight { color: #ffffff; font-weight: 600; }

        .link-container { display: flex; justify-content: center; gap: 20px; flex-wrap: wrap; }
        .action-btn {
            font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 600; letter-spacing: 0.1em;
            padding: 12px 30px; border-radius: 30px; text-decoration: none; transition: 0.3s;
            border: 1px solid rgba(201,168,76,0.4); color: var(--gold-light); background: rgba(201,168,76,0.05);
        }
        .action-btn:hover { background: var(--gold); color: #000; box-shadow: 0 0 20px rgba(201,168,76,0.4); }

        footer { text-align: center; padding: 30px; font-family: 'Cinzel', serif; font-size: 0.75rem; letter-spacing: 2px; color: #555; border-top: 1px solid rgba(255,255,255,0.05); }

        @media (max-width: 768px) {
            nav { padding: 15px 20px; flex-direction: column; gap: 10px; }
            .glass-card { padding: 40px 20px; }
            .title { font-size: 2.2rem; }
        }
    </style>
</head>
<body>

                <a href="https://www.youtube.com/@chrisleepapaofficial" target="_blank" rel="noopener" class="action-btn">YouTube</a>
            </div>
        </div>
    </div>

    <script>
        // ── 우클릭, 복사, 캡처 및 개발자도구 방지 스크립트 ──
        
        // 1. 우클릭 방지
        document.addEventListener('contextmenu', function(e) {
            e.preventDefault();
        });

        // 2. 복사 방지
        document.addEventListener('copy', function(e) {
            e.preventDefault();
        });

        // 3. 단축키 방지 (개발자 도구, 복사, 저장, 인쇄 등)
        document.addEventListener('keydown', function(e) {
            if (e.key === 'F12' || 
               (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) || 
               (e.ctrlKey && (e.key === 'U' || e.key === 'u'))) {
                e.preventDefault();
            }
            if (e.ctrlKey && (e.key === 'c' || e.key === 'C' || e.key === 's' || e.key === 'S' || e.key === 'p' || e.key === 'P')) {
                e.preventDefault();
            }
            if (e.key === 'PrintScreen') {
                navigator.clipboard.writeText('');
            }
        });
    </script>
