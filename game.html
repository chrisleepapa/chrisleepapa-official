<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>✨ Sister Squad — 놀라운 자매들의 대모험</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&display=swap" rel="stylesheet">
<style>
:root{--gold:#FFD700;--pink:#FF69B4;--purple:#9B59B6;--blue:#4A90D9;--dark:#110828;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow-x:hidden;}
body{min-height:100vh;background:var(--dark);font-family:'Nunito',sans-serif;color:#fff;position:relative;}
.sf{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse at 20% 20%,rgba(60,20,130,.8),transparent 55%),radial-gradient(ellipse at 80% 80%,rgba(10,40,90,.9),transparent 55%),#110828;}
.sl{position:fixed;inset:0;z-index:0;pointer-events:none;}
.st{position:absolute;border-radius:50%;background:#fff;animation:twk var(--d,3s) ease-in-out var(--dl,0s) infinite;}
@keyframes twk{0%,100%{opacity:.15;transform:scale(1);}50%{opacity:1;transform:scale(1.8);}}
#fx{position:fixed;inset:0;pointer-events:none;z-index:55;}
.wr{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;padding:14px;min-height:100vh;}
.gtitle{text-align:center;margin-bottom:10px;}
.gtitle h1{font-family:'Fredoka One',cursive;font-size:clamp(20px,5vw,38px);background:linear-gradient(135deg,#FFD700,#FF69B4,#C9A6FF);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 18px rgba(255,215,0,.45));letter-spacing:2px;}
.gtitle p{color:#C9A6FF;font-size:12px;font-weight:700;}
.gl{display:flex;gap:14px;align-items:flex-start;width:100%;max-width:960px;flex-wrap:wrap;justify-content:center;}
.board{display:grid;grid-template-columns:repeat(7,1fr);grid-template-rows:repeat(7,1fr);gap:5px;width:min(510px,92vw);aspect-ratio:1;background:rgba(8,4,22,.85);border-radius:20px;padding:6px;border:2px solid rgba(255,215,0,.2);box-shadow:0 0 60px rgba(155,89,182,.4),inset 0 0 40px rgba(0,0,0,.5);}
.cell{border-radius:8px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2px;position:relative;overflow:hidden;border:1.5px solid transparent;transition:transform .15s,box-shadow .15s;}
.cell:hover{transform:scale(1.07);z-index:10;box-shadow:0 0 14px rgba(255,255,255,.25);}
.cell.corner{border-radius:12px;border-width:2px;}
.tc{background:radial-gradient(circle at 30% 30%,#FFFBE6,#D4A000);border-color:#FFD700;box-shadow:0 0 16px rgba(255,215,0,.55);}
.te{background:radial-gradient(circle at 30% 30%,#D6F5E1,#27AE60);border-color:#27AE60;box-shadow:0 0 8px rgba(46,204,113,.35);}
.tt{background:radial-gradient(circle at 30% 30%,#FDE8E8,#E74C3C);border-color:#E74C3C;box-shadow:0 0 8px rgba(231,76,60,.35);}
.tb{background:radial-gradient(circle at 30% 30%,#FEF0D6,#E67E22);border-color:#E67E22;box-shadow:0 0 8px rgba(230,126,34,.35);}
.cem{font-size:clamp(10px,2vw,20px);line-height:1;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4));}
.cnm{font-size:clamp(5px,.82vw,7.5px);font-weight:800;color:#1a1a1a;text-align:center;line-height:1.15;word-break:keep-all;}
.ctk{position:absolute;top:2px;right:2px;display:flex;flex-direction:column;gap:1px;}
.tok{display:block;transition:filter .3s; z-index: 5;}
.tok.a0{filter:drop-shadow(0 0 5px #4A90D9) drop-shadow(0 0 10px #4A90D9);animation:tbounce .6s ease-in-out infinite;}
.tok.a1{filter:drop-shadow(0 0 5px #FF69B4) drop-shadow(0 0 10px #FF69B4);animation:tbounce .6s ease-in-out .3s infinite;}
@keyframes tbounce{0%,100%{transform:translateY(0);}50%{transform:translateY(-3px);}}
.cell.shk{animation:shake .5s;}
.cell.lnd{animation:pulse .4s;}
.cp{grid-column:2/7;grid-row:2/7;background:linear-gradient(160deg,rgba(18,6,46,.97),rgba(6,22,52,.97));border-radius:16px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px;gap:7px;border:1px solid rgba(255,215,0,.18);overflow:hidden;position:relative;}
.cbk{font-size:clamp(20px,3.5vw,34px);filter:drop-shadow(0 0 14px rgba(255,215,0,.7));animation:fl 3s ease-in-out infinite;}
@keyframes fl{0%,100%{transform:translateY(0) rotate(-2deg);}50%{transform:translateY(-5px) rotate(2deg);}}
.ctit{font-family:'Fredoka One',cursive;font-size:clamp(10px,1.9vw,17px);background:linear-gradient(135deg,#FFD700,#FF69B4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:1px;text-align:center;}
.csub{color:#C9A6FF;font-size:clamp(7px,1vw,9.5px);font-weight:700;}
.scs{display:flex;gap:7px;}
.sc{background:rgba(255,255,255,.05);border:1.5px solid rgba(255,255,255,.1);border-radius:12px;padding:6px 9px;text-align:center;transition:all .3s;min-width:56px;}
.sc.cur{background:rgba(255,215,0,.14);border-color:rgba(255,215,0,.55);box-shadow:0 0 14px rgba(255,215,0,.22);}
.spi{display:block;transition:transform .3s;}
.sc.cur .spi{transform:scale(1.18);}
.spn{color:#fff;font-size:clamp(7px,1vw,10px);font-weight:800; margin-top:2px;}
.sps{color:var(--gold);font-size:clamp(9px,1.5vw,14px);font-weight:900;}
.spsk{color:#FF6B6B;font-size:6.5px;font-weight:800;}
.pbs{width:82%;display:flex;flex-direction:column;gap:4px;}
.pbr{display:flex;align-items:center;gap:4px;}
.pbt{flex:1;height:7px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;}
.pbf{height:100%;border-radius:4px;transition:width .6s cubic-bezier(.34,1.56,.64,1);}
.pbl{font-size:clamp(7px,1vw,9px);font-weight:900;color:var(--gold);min-width:24px;text-align:right;}
.sb{display:flex;flex-direction:column;gap:10px;width:172px;flex-shrink:0;}
.sp{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:16px;padding:13px;text-align:center;backdrop-filter:blur(8px);}
.sp.gd{border-color:rgba(255,215,0,.35);background:rgba(255,215,0,.04);}
.pl{color:#C9A6FF;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px;}
.por{width:78px;height:88px;margin:0 auto 7px;border-radius:50%;overflow:hidden;border:2px solid rgba(255,215,0,.4);box-shadow:0 0 20px rgba(255,215,0,.25);background:rgba(0,0,0,.3);transition:all .4s;}
.por svg, .por div{width:100%;height:100%;}
.pnm{color:var(--gold);font-size:17px;font-weight:900;font-family:'Fredoka One',cursive;}
.pds{color:rgba(255,255,255,.45);font-size:9.5px;margin-top:2px;}
.psk{color:#FF6B6B;font-size:9.5px;font-weight:800;margin-top:5px;background:rgba(231,76,60,.14);border-radius:7px;padding:2px 7px;display:inline-block;}
.dcr{display:flex;justify-content:center;gap:10px;margin-bottom:7px;}
.die{font-size:32px;display:inline-block;}
.die.rl{animation:dr .12s ease-in-out infinite;}
@keyframes dr{0%{transform:rotate(-15deg) scale(1.1);}50%{transform:rotate(15deg) scale(.9);}100%{transform:rotate(-15deg) scale(1.1);}}
.dsum{color:var(--gold);font-size:13px;font-weight:900;margin-bottom:9px;}
.rbtn{width:100%;padding:11px 0;background:linear-gradient(135deg,#FF69B4,#9B59B6);border:none;border-radius:12px;color:#fff;font-size:12.5px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;box-shadow:0 4px 18px rgba(233,30,99,.4);transition:transform .2s,box-shadow .2s;overflow:hidden;position:relative;}
.rbtn:disabled{background:#3a3a5a;cursor:not-allowed;box-shadow:none;opacity:.65;}
.lgp{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);border-radius:14px;padding:9px;text-align:left;max-height:185px;overflow-y:auto;}
.lgt{color:#C9A6FF;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1px;margin-bottom:5px;}
.lge{font-size:9.5px;line-height:1.5;padding:2px 0;border-bottom:1px solid rgba(255,255,255,.05);}
.lge.fr{color:#fff;font-weight:800;}
.lge.ol{color:rgba(255,255,255,.35);font-weight:400;}
.lgd{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:8px 10px;text-align:left;}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.82);backdrop-filter:blur(6px);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px;opacity:0;pointer-events:none;transition:opacity .3s;}
.ov.vis{opacity:1;pointer-events:all;}
.ecard{background:linear-gradient(160deg,#1E0B4E,#0A1F55);border-radius:22px;max-width:440px;width:100%;overflow:hidden;border:2px solid rgba(255,215,0,.3);box-shadow:0 0 70px rgba(255,215,0,.25),0 30px 80px rgba(0,0,0,.7);transform:scale(.7) translateY(50px);transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
.ov.vis .ecard{transform:scale(1) translateY(0);}
.ehdg{position:relative;height:175px;display:flex;align-items:flex-end;justify-content:space-between;padding:14px;overflow:hidden;}
.ehbg{position:absolute;inset:0;opacity:.92;}
.echar{position:relative;z-index:2;width:125px;height:158px;flex-shrink:0;animation:cfl 3s ease-in-out infinite;}
@keyframes cfl{0%,100%{transform:translateY(0);}50%{transform:translateY(-7px);}}
.ehdgt{position:relative;z-index:2;text-align:right;flex:1;padding-left:8px;}
.esem{font-size:44px;display:block;margin-bottom:2px;}
.esnm{font-family:'Fredoka One',cursive;font-size:24px;color:var(--gold);line-height:1.1;}
.ebody{padding:18px 22px 22px;}
.dlg{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:13px;padding:12px 14px;margin-bottom:14px;}
.dlgt{color:#E8D5FF;font-size:14px;line-height:1.75;}
.efx{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:16px;justify-content:center;}
.efb{padding:7px 14px;border-radius:20px;font-size:14px;font-weight:900;border:1.5px solid transparent;}
.efb.sp{background:rgba(255,215,0,.14);color:var(--gold);border-color:rgba(255,215,0,.38);}
.efb.sn{background:rgba(231,76,60,.14);color:#FF6B6B;border-color:rgba(231,76,60,.38);}
.cbtn{width:100%;padding:13px;background:linear-gradient(135deg,#FF69B4,#9B59B6);border:none;border-radius:13px;color:#fff;font-size:15px;font-weight:900;font-family:'Nunito',sans-serif;cursor:pointer;}

/* ══ CINEMATIC FULLSCREEN PC 최적화 ══ */
#cine{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:0;pointer-events:none;transition:opacity .5s ease;background:#000;}
#cine.on{opacity:1;pointer-events:all;}
#cine-img{position:absolute;inset:0;background-size:contain;background-repeat:no-repeat;background-position:center center;transform:scale(1.1);transition:transform 5s ease-out;}
#cine.on #cine-img{transform:scale(1);}
#cine.evil #cine-img{filter:brightness(.35) saturate(2) hue-rotate(-15deg);}
#cine-vig{position:absolute;inset:0;background:radial-gradient(ellipse 80% 80% at 50% 50%,transparent 25%,rgba(0,0,0,.6) 100%);}
#cine-body{position:absolute;bottom:0;left:0;right:0;z-index:5;text-align:center;padding:60px 20px 40px;background:linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.7) 60%, transparent 100%);opacity:0;transform:translateY(50px);transition:opacity .7s .5s,transform .7s .5s cubic-bezier(.34,1.56,.64,1);}
#cine.on #cine-body{opacity:1;transform:translateY(0);}
#cine-name{font-family:'Fredoka One',cursive;font-size:clamp(34px,7vw,72px);color:#FFD700;text-shadow:2px 2px 0 rgba(0,0,0,0.8);margin-bottom:10px;}
#cine.evil #cine-name{color:#FF2222;}
#cine-sub{font-size:clamp(14px,2vw,20px);font-weight:700;color:#fff;line-height:1.6;max-width:800px;margin:0 auto 20px;text-shadow:1px 1px 3px rgba(0,0,0,0.8);}
#cine-tag{font-family:'Fredoka One',cursive;font-size:12px;letter-spacing:5px;color:rgba(255,255,255,0.6);margin-bottom:10px;}

/* ══ SPRITES ══ */
.sprite-char {width:100%;height:100%;background-size:500% 100%;background-position:0% 0%;background-repeat:no-repeat;}
.sprite-yul { background-image: url('./images/yul_spritesheet.png'); }
.sprite-jeong { background-image: url('./images/jeong_spritesheet.png'); }
.sprite-anim { animation: sprite-run 0.8s infinite; }
@keyframes sprite-run {
  0%, 19.99% { background-position: 0% 0%; }
  20%, 39.99% { background-position: 25% 0%; }
  40%, 59.99% { background-position: 50% 0%; }
  60%, 79.99% { background-position: 75% 0%; }
  80%, 100% { background-position: 100% 0%; }
}
.tok-img-wrap {width:clamp(24px, 4vw, 36px);height:clamp(24px, 4vw, 36px);border-radius:50%;border:1.5px solid white;box-shadow:0 0 6px rgba(0,0,0,0.6);overflow:hidden;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;margin:0 auto;}

#is{position:fixed;inset:0;z-index:500;background:linear-gradient(160deg,#110828,#061434);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
#is.hd{opacity:0;pointer-events:none;transition:opacity .5s;}
.stbtn{padding:16px 56px;background:linear-gradient(135deg,#FF69B4,#9B59B6);border:none;border-radius:18px;color:#fff;font-size:20px;font-weight:900;cursor:pointer;}
</style>
</head>
<body>
<div id="cine" onclick="cineDismiss()">
  <div id="cine-img"></div>
  <div id="cine-vig"></div>
  <div id="cine-body">
    <div id="cine-tag"></div>
    <div id="cine-name"></div>
    <div id="cine-sub"></div>
    <div style="color:rgba(255,255,255,0.4); font-size:12px; letter-spacing:2px;">▶ 클릭하여 계속하기</div>
  </div>
  <canvas id="cfx" style="position:absolute; inset:0; pointer-events:none; z-index:2;"></canvas>
</div>

<div class="sf"></div>
<div class="sl" id="sl"></div>
<canvas id="fx"></canvas>

<div id="is">
  <div style="font-family:'Fredoka One',cursive; font-size:40px; color:#FFD700; margin-bottom:20px;">SISTER SQUAD</div>
  <button class="stbtn" onclick="startGame()">🌟 모험 시작!</button>
</div>

<div class="wr">
  <div class="gtitle">
    <h1>✨ Sister Squad Board Game ✨</h1>
    <p>별 10개를 먼저 모으는 자매가 승리합니다! 🌟</p>
  </div>
  <div class="gl">
    <div class="board" id="board">
      <div class="cp">
        <div class="cbk">📖</div>
        <div class="ctit">SISTER SQUAD</div>
        <div class="scs">
          <div class="sc cur" id="sc0">
            <div class="spi"><div class="tok-img-wrap"><div class="sprite-char sprite-yul sprite-anim"></div></div></div>
            <div class="spn">율이</div>
            <div class="sps" id="ss0">⭐0</div>
          </div>
          <div class="sc" id="sc1">
            <div class="spi"><div class="tok-img-wrap"><div class="sprite-char sprite-jeong sprite-anim"></div></div></div>
            <div class="spn">정이</div>
            <div class="sps" id="ss1">⭐0</div>
          </div>
        </div>
      </div>
    </div>
    <div class="sb">
      <div class="sp gd">
        <div class="pl">현재 차례</div>
        <div class="por" id="por"></div>
        <div class="pnm" id="pnm">율이</div>
        <button class="rbtn" id="rb" onclick="handleRoll()" style="margin-top:10px;">🎲 주사위 굴리기</button>
      </div>
      <div class="lgp" id="lgp"><div class="lgt">📜 모험 일지</div></div>
    </div>
  </div>
</div>

<div class="ov" id="eov">
  <div class="ecard" id="ec">
    <div class="ehdg" id="ehdg">
      <div class="ehbg" id="ehbg"></div>
      <div class="echar" id="ech"></div>
      <div class="ehdgt">
        <span class="esem" id="esem"></span>
        <div class="esnm" id="esnm"></div>
      </div>
    </div>
    <div class="ebody">
      <div class="dlg"><div class="dlgt" id="edlg"></div></div>
      <div class="efx" id="efx"></div>
      <button class="cbtn" onclick="confirmEvent()">✨ 계속하기!</button>
    </div>
  </div>
</div>

<script>
/* ══ 기본 로직 & 데이터 ══ */
var pos=[0,12],stars=[0,0],cur=0,dice=[1,1],rolling=false,ev=null,over=false,moving=false;
var SV={
  yul:'<div class="sprite-char sprite-yul sprite-anim"></div>',
  jung:'<div class="sprite-char sprite-jeong sprite-anim"></div>'
};

var SP=[
  {id:0, t:'c',nm:'출발!', em:'🏠',bg:'#D4A000',char:'yul',cn:'시스템',cd:'모험의 시작입니다!'},
  {id:1, t:'e',nm:'버섯숲', em:'🍄',bg:'#2ECC71',char:'yul',cn:'요정',cd:'신비한 버섯을 발견했어요! 별 +1', st:1},
  {id:2, t:'e',nm:'요정여왕', em:'👸',bg:'#9B59B6',char:'jung',cn:'루미나',cd:'내 축복을 받으렴! 별 +2', st:2},
  {id:3, t:'t',nm:'어둠기사', em:'⚡',bg:'#E74C3C',char:'yul',cn:'기사',cd:'길이 막혔습니다! 뒤로 2칸', mv:-2},
  {id:4, t:'b',nm:'대장간', em:'🔨',bg:'#E67E22',char:'yul',cn:'브룩',cd:'장비를 점검해요! 한 번 더!', xr:true},
  {id:5, t:'e',nm:'나비정원', em:'🦋',bg:'#3498DB',char:'jung',cn:'나비',cd:'나비가 별을 가져왔어요! 별 +1', st:1},
  {id:6, t:'c',nm:'요정마을', em:'🌸',bg:'#FF69B4',char:'jung',cn:'마을',cd:'마을 축제입니다! 별 +2', st:2},
  {id:7, t:'e',nm:'달빛숲', em:'🌙',bg:'#5D6D7E',char:'yul',cn:'현자',cd:'달의 기운이 느껴집니다. 별 +1', st:1},
  {id:8, t:'t',nm:'함정', em:'⚔️',bg:'#566573',char:'yul',cn:'경비',cd:'별을 잃어버렸습니다! 별 -1', st:-1},
  {id:9, t:'b',nm:'지름길', em:'🧙',bg:'#8E44AD',char:'yul',cn:'마법사',cd:'포탈을 이용하세요! 앞으로 3칸', mv:3},
  {id:10,t:'e',nm:'꽃밭', em:'🌺',bg:'#E91E63',char:'jung',cn:'정이',cd:'언니랑 같이 별 찾기! 별 +1', st:1},
  {id:11,t:'t',nm:'마왕성', em:'🌪️',bg:'#95A5A6',char:'yul',cn:'크라운',cd:'마왕의 폭풍이다! 뒤로 3칸', mv:-3},
  {id:12,t:'c',nm:'검신의성', em:'🏰',bg:'#2C3E50',char:'yul',cn:'베인',cd:'조심하세요! 별 -1', st:-1},
  {id:13,t:'e',nm:'별자리', em:'⭐',bg:'#F39C12',char:'yul',cn:'율이',cd:'마법책에서 본 별자리예요! 별 +2', st:2},
  {id:14,t:'t',nm:'얼음방', em:'🧊',bg:'#5DADE2',char:'yul',cn:'냉기',cd:'추워요! 뒤로 1칸', mv:-1},
  {id:15,t:'e',nm:'파티', em:'🎉',bg:'#E91E63',char:'jung',cn:'요정',cd:'축하해요! 별 +1', st:1},
  {id:16,t:'e',nm:'수정', em:'💎',bg:'#1ABC9C',char:'yul',cn:'광부',cd:'귀한 수정을 찾았어요! 별 +2', st:2},
  {id:17,t:'b',nm:'별똥별', em:'🌠',bg:'#F1C40F',char:'yul',cn:'하늘',cd:'소원을 빌어요! 한 번 더!', xr:true},
  {id:18,t:'c',nm:'도서관', em:'📚',bg:'#8B6914',char:'yul',cn:'아빠',cd:'공부하는 아이들에게 주는 선물! 별 +2', st:2},
  {id:19,t:'e',nm:'부엌', em:'🍪',bg:'#E67E22',char:'yul',cn:'엄마',cd:'맛있는 쿠키와 별 선물! 별 +1', st:1},
  {id:20,t:'b',nm:'서재', em:'📖',bg:'#2980B9',char:'yul',cn:'아빠',cd:'책 속의 지혜! 한 번 더!', xr:true},
  {id:21,t:'t',nm:'물약방', em:'🧪',bg:'#27AE60',char:'yul',cn:'기사',cd:'이상한 물약이다! 뒤로 2칸', mv:-2},
  {id:22,t:'e',nm:'친구', em:'✨',bg:'#F39C12',char:'jung',cn:'친구',cd:'새 친구와 함께! 별 +1', st:1},
  {id:23,t:'b',nm:'비밀문', em:'🚪',bg:'#9B59B6',char:'yul',cn:'현자',cd:'비밀 통로입니다! 앞으로 3칸', mv:3}
];

var GR={0:{c:1,r:7},1:{c:2,r:7},2:{c:3,r:7},3:{c:4,r:7},4:{c:5,r:7},5:{c:6,r:7},6:{c:7,r:7},7:{c:7,r:6},8:{c:7,r:5},9:{c:7,r:4},10:{c:7,r:3},11:{c:7,r:2},12:{c:7,r:1},13:{c:6,r:1},14:{c:5,r:1},15:{c:4,r:1},16:{c:3,r:1},17:{c:2,r:1},18:{c:1,r:1},19:{c:1,r:2},20:{c:1,r:3},21:{c:1,r:4},22:{c:1,r:5},23:{c:1,r:6}};

var CINE_DATA={
  19:{type:'good', img:'./images/mom.jpeg', tag:'💝 SPECIAL ENCOUNTER 💝', name:'엄마의 부엌', sub:'"우리 딸들 왔니? 방금 구운 쿠키 먹고 기운 내렴!"'},
  20:{type:'good', img:'./images/chris05.jpg', tag:'📖 SPECIAL ENCOUNTER 📖', name:'아빠의 서재', sub:'"오! 벌써 이만큼이나 왔구나. 아빠가 응원할게!"'},
  11:{type:'evil', img:'./images/crown.jpg', tag:'☠ BOSS ENCOUNTER ☠', name:'마왕 크라운', sub:'"크하하! 이 폭풍을 견뎌낼 수 있겠느냐!"'},
  12:{type:'evil', img:'./images/bain.jpg', tag:'⚔ BOSS ENCOUNTER ⚔', name:'검신 베인', sub:'"어둠 속에서 길을 잃게 될 것이다..."'}
};

/* ══ 게임 초기화 & 렌더링 ══ */
function buildBoard(){
  var b=document.getElementById('board');
  SP.forEach(function(sp){
    var g=GR[sp.id],d=document.createElement('div');
    d.className='cell '+(sp.t==='c'?'tc corner':sp.t==='e'?'te':sp.t==='t'?'tt':'tb');
    d.id='c'+sp.id; d.style.gridColumn=g.c; d.style.gridRow=g.r;
    d.innerHTML='<div class="cem">'+sp.em+'</div><div class="cnm">'+sp.nm+'</div><div class="ctk" id="tk'+sp.id+'"></div>';
    b.appendChild(d);
  });
  renderAll();
}

function renderAll(){
  SP.forEach(function(sp){
    var tk=document.getElementById('tk'+sp.id); tk.innerHTML='';
    if(pos[0]===sp.id) tk.innerHTML+='<div class="tok a0"><div class="tok-img-wrap">'+SV.yul+'</div></div>';
    if(pos[1]===sp.id) tk.innerHTML+='<div class="tok a1"><div class="tok-img-wrap">'+SV.jung+'</div></div>';
  });
  document.getElementById('sc0').className='sc'+(cur===0?' cur':'');
  document.getElementById('sc1').className='sc'+(cur===1?' cur':'');
  document.getElementById('ss0').textContent='⭐'+stars[0];
  document.getElementById('ss1').textContent='⭐'+stars[1];
  document.getElementById('por').innerHTML=cur===0?SV.yul:SV.jung;
  document.getElementById('pnm').textContent=cur===0?'율이':'정이';
  document.getElementById('rb').disabled=rolling||moving||ev;
}

function addLog(m){
  var l=document.getElementById('lgp');
  var d=document.createElement('div'); d.className='lge fr'; d.textContent=m;
  l.insertBefore(d, l.firstChild.nextSibling);
}

/* ══ 주사위 및 이동 ══ */
function handleRoll(){
  if(rolling||moving||ev) return;
  rolling=true; renderAll();
  var t=0;
  var iv=setInterval(function(){
    dice=[Math.ceil(Math.random()*6), Math.ceil(Math.random()*6)];
    t++; if(t>10){
      clearInterval(iv); rolling=false;
      movePlayer(dice[0]+dice[1]);
    }
  },80);
}

function movePlayer(s){
  moving=true; addLog((cur===0?'율이':'정이')+' 주사위: '+s);
  var step=0, from=pos[cur];
  var iv=setInterval(function(){
    step++; pos[cur]=(from+step)%24; renderAll();
    if(step>=s){ clearInterval(iv); moving=false; triggerEvent(pos[cur]); }
  },250);
}

/* ══ 이벤트 처리 ══ */
function triggerEvent(sid){
  var sp=SP[sid]; ev=sp;
  if(CINE_DATA[sid]) cineShow(sid, function(){ openEventCard(sid); });
  else openEventCard(sid);
}

function openEventCard(sid){
  var sp=SP[sid];
  document.getElementById('ehbg').style.background=sp.bg;
  document.getElementById('ech').innerHTML=SV[sp.char];
  document.getElementById('esem').textContent=sp.em;
  document.getElementById('esnm').textContent=sp.nm;
  document.getElementById('edlg').textContent=sp.cd;
  var fx=document.getElementById('efx'); fx.innerHTML='';
  if(sp.st) fx.innerHTML+='<div class="efb sp">별 '+(sp.st>0?'+':'')+sp.st+'</div>';
  if(sp.xr) fx.innerHTML+='<div class="efb sp">한 번 더!</div>';
  if(sp.mv) fx.innerHTML+='<div class="efb sn">이동 '+(sp.mv>0?'+':'')+sp.mv+'</div>';
  document.getElementById('eov').classList.add('vis');
}

function confirmEvent(){
  var sp=ev; ev=null;
  document.getElementById('eov').classList.remove('vis');
  if(sp.st) stars[cur]=Math.max(0, stars[cur]+sp.st);
  if(stars[cur]>=10) alert((cur===0?'율이':'정이')+' 승리! 🎉');
  
  if(sp.mv){
    movePlayer(Math.abs(sp.mv)); // 단순화된 이동 처리
  } else if(!sp.xr){
    cur=1-cur;
  }
  renderAll();
}

/* ══ 시네마틱 함수 ══ */
var cineNext=null;
function cineShow(sid, cb){
  var cfg=CINE_DATA[sid]; cineNext=cb;
  var el=document.getElementById('cine'); el.className=cfg.type;
  document.getElementById('cine-img').style.backgroundImage='url("'+cfg.img+'")';
  document.getElementById('cine-tag').textContent=cfg.tag;
  document.getElementById('cine-name').textContent=cfg.name;
  document.getElementById('cine-sub').textContent=cfg.sub;
  el.classList.add('on');
}
function cineDismiss(){
  if(!cineNext) return;
  document.getElementById('cine').classList.remove('on');
  var cb=cineNext; cineNext=null; setTimeout(cb, 500);
}

function startGame(){
  document.getElementById('is').classList.add('hd');
}

buildBoard();
</script>
