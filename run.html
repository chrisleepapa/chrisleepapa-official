<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>SisterSquad Runner</title>
<style>
body {
  margin: 0;
  overflow: hidden;
  background: linear-gradient(#87CEEB, #fff);
}
canvas { display: block; }

#ui {
  position: absolute;
  top: 10px;
  left: 10px;
}

/* 모바일 버튼 */
.controls {
  position: absolute;
  bottom: 20px;
  width: 100%;
  display: flex;
  justify-content: center;
  gap: 20px;
}
.btn {
  width: 70px;
  height: 70px;
  background: rgba(0,0,0,0.4);
  color: white;
  font-size: 24px;
  border-radius: 50%;
  display:flex;
  align-items:center;
  justify-content:center;
}
</style>
</head>
<body>

<canvas id="game"></canvas>
<div id="ui"></div>

<div class="controls">
  <div class="btn" id="jump">⤴</div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
canvas.width = innerWidth;
canvas.height = innerHeight;

// ✅ 스프라이트 로드
const yulImg = new Image();
yulImg.src = "/images/yul_spritesheet.png";

const jeongImg = new Image();
jeongImg.src = "/images/jeong_spritesheet.png";

let currentCharacter = "yul";

// 🎞️ 스프라이트 설정
const FRAME_COUNT = 6;   // 👈 너 이미지에 맞게 수정
let frameIndex = 0;
let frameTick = 0;

// 플레이어
let player = {
  x: 150,
  y: 300,
  w: 100,
  h: 100,
  dy: 0,
  jumping: false,
  fairies: 0,
  score: 0
};

let gravity = 0.7;
let speed = 8;
let objects = [];
let gameOver = false;

// 점프
function jump(){
  if(!player.jumping){
    player.dy = -15;
    player.jumping = true;
  }
}

jumpBtn = document.getElementById("jump");
jumpBtn.ontouchstart = jump;
document.addEventListener("keydown", e=>{
  if(e.key===" ") jump();
  if(e.key==="1") currentCharacter="yul";
  if(e.key==="2") currentCharacter="jeong";
});

// 오브젝트 생성 (오른쪽에서 등장 → 왼쪽으로 이동)
function spawnObject(){
  let types=["enemy","fairy","food","obstacle"];
  let type=types[Math.floor(Math.random()*types.length)];

  objects.push({
    x: canvas.width + 50,
    y: 300,
    w: 60,
    h: 60,
    type
  });
}

// 충돌
function collide(a,b){
  return a.x < b.x + b.w &&
         a.x + a.w > b.x &&
         a.y < b.y + b.h &&
         a.y + a.h > b.y;
}

// 업데이트
let frame=0;
function update(){
  if(gameOver) return;

  frame++;

  // 속도 증가
  if(frame % 300 === 0) speed += 0.5;

  // 점프 물리
  player.dy += gravity;
  player.y += player.dy;

  if(player.y > 300){
    player.y = 300;
    player.jumping = false;
  }

  // 생성
  if(frame % 70 === 0) spawnObject();

  // 이동 (횡스크롤 핵심)
  objects.forEach(o => o.x -= speed);

  // 충돌
  objects.forEach((o,i)=>{
    if(collide(player,o)){
      if(o.type==="fairy"){ player.fairies++; player.score+=50; }
      else if(o.type==="food"){ player.score+=100; }
      else if(o.type==="enemy"){ player.fairies=Math.max(0,player.fairies-1); }
      else if(o.type==="obstacle"){ gameOver=true; }

      objects.splice(i,1);
    }
  });

  objects = objects.filter(o=>o.x>-100);

  // 애니메이션 프레임
  frameTick++;
  if(frameTick > 5){
    frameIndex = (frameIndex + 1) % FRAME_COUNT;
    frameTick = 0;
  }

  player.score++;
}

// 그리기
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // 바닥
  ctx.fillStyle="#444";
  ctx.fillRect(0,380,canvas.width,10);

  // 캐릭터 이미지 선택
  let img = currentCharacter==="yul" ? yulImg : jeongImg;

  // 프레임 계산
  let frameWidth = img.width / FRAME_COUNT;
  let frameHeight = img.height;

  ctx.drawImage(
    img,
    frameIndex * frameWidth, 0,
    frameWidth, frameHeight,
    player.x, player.y,
    player.w, player.h
  );

  // 오브젝트
  objects.forEach(o=>{
    if(o.type==="enemy") ctx.fillStyle="black";
    if(o.type==="fairy") ctx.fillStyle="yellow";
    if(o.type==="food") ctx.fillStyle="green";
    if(o.type==="obstacle") ctx.fillStyle="brown";

    ctx.fillRect(o.x, o.y, o.w, o.h);
  });

  // UI
  document.getElementById("ui").innerHTML =
    `Score: ${player.score}<br>Fairies: ${player.fairies}<br>${currentCharacter}`;

  if(gameOver){
    ctx.fillStyle="black";
    ctx.font="50px sans-serif";
    ctx.fillText("GAME OVER", canvas.width/2-150, canvas.height/2);
  }
}

// 루프
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}
loop();
</script>

</body>
</html>
