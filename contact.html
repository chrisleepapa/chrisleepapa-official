    <style>
        /* ── contact.html 전용 스타일 ── */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --gold: #c9a84c;
            --gold-light: #e8d08a;
            --cyan: #4a90e2;
            --cyan-light: #e0e0ff;
            --bg: #030305;
            --text: #f0ece4;
            --nav-height: 70px;
        }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Pretendard', sans-serif;
            background-image:
                radial-gradient(circle at top right, rgba(20, 20, 40, 0.8), transparent 60%),
                radial-gradient(circle at bottom left, rgba(10, 10, 20, 0.9), transparent 60%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
        }
        img { -webkit-user-drag: none; }

        .page-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 120px 20px;
            position: relative;
        }
        .glass-card {
            background: rgba(15, 15, 20, 0.4);
            border: 1px solid rgba(74, 144, 226, 0.3);
            border-radius: 24px;
            padding: 60px 50px;
            text-align: center;
            max-width: 700px;
            width: 100%;
            backdrop-filter: blur(20px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 0 30px rgba(74, 144, 226, 0.05);
            animation: fadeUp 1s ease both;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(30px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .title {
            font-family: 'Cinzel', serif;
            font-size: 3rem;
            font-weight: 600;
            letter-spacing: 0.2em;
            color: var(--cyan-light);
            margin-bottom: 30px;
            text-shadow: 0 0 20px rgba(74, 144, 226, 0.4);
        }
        .content-text {
            font-size: 1.1rem;
            line-height: 2;
            color: rgba(240,236,228,0.9);
            margin-bottom: 25px;
            word-break: keep-all;
            font-weight: 300;
        }

        .contact-notice {
            display: inline-block;
            font-size: 0.85rem;
            color: #a0a0b5;
            margin-bottom: 40px;
            letter-spacing: 1px;
            background: rgba(255,255,255,0.05);
            padding: 8px 20px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .link-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }
        .action-btn {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 600;
            letter-spacing: 0.1em;
            padding: 12px 30px;
            border-radius: 30px;
            text-decoration: none;
            transition: 0.3s;
            border: 1px solid rgba(74, 144, 226, 0.4);
            color: var(--cyan-light);
            background: rgba(74, 144, 226, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .btn-icon { margin-right: 8px; font-size: 1.1rem; }
        .action-btn:hover {
            background: var(--cyan);
            color: #fff;
            box-shadow: 0 0 20px rgba(74, 144, 226, 0.4);
        }

        @media (max-width: 900px) {
            .glass-card { padding: 40px 20px; }
            .title { font-size: 2.2rem; }
        }
