        async function fetchComments() {
            const list = document.getElementById('cm-list');
            if (!list) return;
            try {
                const res = await fetch(`${SUPA_URL}/rest/v1/comments?page=eq.${encodeURIComponent(PAGE_ID)}&order=created_at.desc`, {

        async function submitComment() {
            const ni = document.getElementById('cm-name');

            const t = window.PAGE_I18N[lang];

        // ── 별 캔버스 ──
        function initStarCanvas() {
            const canvas = document.getElementById('stars-canvas');
            const ctx = canvas ? canvas.getContext('2d') : null;
            if (!ctx) return;
            let stars = [];
            function resize() { canvas.width = window.innerWidth; canvas.height = 350; initStars(); }
            function initStars() {
                stars = [];
                const count = (canvas.width * canvas.height) / 6000;
                for (let i = 0; i < count; i++) stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5 + 0.2, opacity: Math.random(), speed: Math.random() * 0.02 + 0.005 });
            }
            function draw() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                stars.forEach(s => {
                    s.opacity += s.speed;
                    if (s.opacity > 1 || s.opacity < 0) s.speed = -s.speed;
                    ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 255, 255, ${Math.max(0, s.opacity)})`; ctx.fill();
                });
                requestAnimationFrame(draw);
            }
            window.addEventListener('resize', resize); resize(); draw();
        }

        // ── 영상 플레이어 ──
        function expandToLandscape() {
            const iframe = document.getElementById('main-video-player'); if (!iframe) return;
            if (iframe.requestFullscreen) iframe.requestFullscreen().then(lockLandscape);
            else if (iframe.webkitRequestFullscreen) { iframe.webkitRequestFullscreen(); lockLandscape(); }
        }
        function lockLandscape() {
            if (window.screen && screen.orientation && screen.orientation.lock) screen.orientation.lock('landscape').catch(() => {});
        }

        function updateMainVideoInfo() {
            const lang = window.__currentLang || 'ko';
            const v = videoData[activeVideoIndex]; if (!v) return;
            const mainTitle = document.getElementById('main-video-title');
            const mainBadge = document.getElementById('main-video-badge');
            const mainDesc  = document.getElementById('main-video-desc');
            if (mainTitle) mainTitle.textContent = v[`title_${lang}`];

        function renderCarousel() {
            const lang = window.__currentLang || 'ko';
            const carouselList = document.getElementById('carousel-list');
            if (!carouselList) return;
            carouselList.innerHTML = videoData.map((v, i) => `

                    <div class="thumb-overlay"><span class="thumb-title">${v[`title_${lang}`]}</span></div>

        function loadMainVideo(i) {
            activeVideoIndex = i;
            const v = videoData[i];
            const mainPlayer = document.getElementById('main-video-player');
            if (mainPlayer && mainPlayer.src.indexOf(v.id) === -1) {

            }
            updateMainVideoInfo(); renderCarousel();
            const tw = document.querySelector('.theater-wrapper');
            if (tw) window.scrollTo({ top: tw.offsetTop - 120, behavior: 'smooth' });
