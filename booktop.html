<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아빠의 서재 - 책 쌓기</title>
    <!-- Matter.js 물리 엔진 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');

        body {
            font-family: 'Noto Serif KR', serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            background-color: #1a1a1a;
        }

        /* --- 아빠의 서재 배경 --- */
        #room-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1e2b22;
            background-image:
                linear-gradient(to bottom, rgba(8, 5, 3, 0.18), rgba(8, 5, 3, 0.58)),
                url('images/bookstore.jpg');
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            filter: blur(8px) brightness(0.78) saturate(0.9);
            transform: scale(1.05);
            transform-origin: center;
            z-index: -3;
        }

        #wood-panel {
            position: fixed;
            left: 0; width: 100%; height: 40vh;
            background: linear-gradient(to bottom, rgba(62, 34, 17, 0.12) 0%, rgba(15, 7, 3, 0.68) 100%);
            box-shadow: inset 0 20px 30px rgba(0,0,0,0.45);
            z-index: -2;
        }

        #lamp-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(255, 190, 90, 0.15) 0%, rgba(0, 0, 0, 0.7) 100%);
            pointer-events: none;
            z-index: 5;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0px 20px 20px rgba(0,0,0,0.7));
        }

        /* UI 오버레이 */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud-panel {
            background: rgba(20, 15, 10, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            pointer-events: auto;
            color: #e5e7eb;
        }

        .score-text {
            color: #d4af37;
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        #controls-hint {
            position: absolute;
            bottom: 80px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            animation: pulse 2s infinite;
            pointer-events: none;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
            z-index: 10;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.3; transform: scale(0.98); }
        }

        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #302018, #1c110b);
            padding: 30px;
            border-radius: 6px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 0 2px rgba(212, 175, 55, 0.1);
            text-align: center;
            pointer-events: auto;
            display: none;
            z-index: 100;
            border: 4px solid #4a2e1b;
            width: 90%;
            max-width: 380px;
            color: #e5e7eb;
        }

        .btn-gold {
            background: linear-gradient(to bottom, #c5a059, #8a6c31);
            border: 1px solid #e8ce8a;
            color: #1a0f08;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            transition: all 0.2s;
            text-shadow: 0 1px 1px rgba(255,255,255,0.4);
        }
        .btn-gold:hover {
            background: linear-gradient(to bottom, #dcb770, #a1803b);
            transform: translateY(-2px);
        }
        .btn-gold:active {
            transform: translateY(1px);
        }
        
        #celebration-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 80;
            overflow: hidden;
        }

        .cheer-banner {
            position: absolute;
            top: 22%;
            left: 50%;
            width: min(92vw, 560px);
            transform: translate(-50%, -50%) scale(0.7);
            padding: 18px 22px;
            border: 2px solid rgba(255, 245, 180, 0.42);
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(255, 244, 170, 0.34), rgba(255, 151, 91, 0.28), rgba(211, 82, 255, 0.25));
            box-shadow: 0 0 28px rgba(255, 221, 87, 0.42), 0 0 58px rgba(147, 51, 234, 0.24);
            color: rgba(255, 250, 230, 0.74);
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 10px rgba(43, 17, 6, 0.45);
            opacity: 0;
            animation: cheerPop 1.8s ease-out forwards;
        }

        .cheer-banner .cheer-count {
            display: block;
            font-size: clamp(2.3rem, 9vw, 4.8rem);
            line-height: 1;
        }

        .cheer-banner .cheer-message {
            display: block;
            margin-top: 6px;
            font-size: clamp(1rem, 4vw, 1.45rem);
        }

        .sparkle {
            position: absolute;
            width: var(--size);
            height: var(--size);
            left: var(--x);
            top: var(--y);
            border-radius: 50%;
            background: hsla(var(--hue), 95%, 62%, 0.58);
            box-shadow: 0 0 18px hsla(var(--hue), 95%, 70%, 0.5);
            animation: sparkleBurst var(--duration) ease-out forwards;
        }

        .ribbon {
            position: absolute;
            width: 10px;
            height: 28px;
            left: var(--x);
            top: -40px;
            border-radius: 4px;
            background: hsla(var(--hue), 95%, 58%, 0.48);
            transform: rotate(var(--rotate));
            animation: ribbonFall var(--duration) cubic-bezier(.17,.67,.31,.99) forwards;
        }

        @keyframes cheerPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.45) rotate(-4deg); }
            16% { opacity: 0.78; transform: translate(-50%, -50%) scale(1.08) rotate(2deg); }
            28% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            76% { opacity: 0.72; }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(0.98); }
        }

        @keyframes sparkleBurst {
            0% { opacity: 0.68; transform: translate(0, 0) scale(0.45); }
            70% { opacity: 0.55; }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.25); }
        }

        @keyframes ribbonFall {
            0% { opacity: 0.58; transform: translateY(0) rotate(var(--rotate)); }
            100% { opacity: 0; transform: translateY(110vh) rotate(calc(var(--rotate) + 520deg)); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-3px, -2px) rotate(-1deg); }
            20%, 40%, 60%, 80% { transform: translate(3px, 2px) rotate(1deg); }
        }
    </style>
</head>
<body>

    <!-- 서재 배경 요소들 -->
    <div id="room-bg"></div>
    <div id="wood-panel"></div>
    <div id="lamp-glow"></div>
    <div id="celebration-layer" aria-live="polite"></div>

    <div id="game-container">
        <!-- 메인 UI 레이어 -->
        <div id="ui-layer" class="p-3 sm:p-5 flex justify-between items-start pointer-events-none">
            
            <!-- 좌측: Top 5 랭킹 (항상 노출) -->
            <div class="hud-panel w-32 sm:w-40 flex flex-col gap-1 text-sm pointer-events-auto">
                <div class="text-yellow-500 font-bold border-b border-yellow-700/50 pb-1 mb-1 text-center tracking-widest">🏆 TOP 5</div>
                <ul id="top5-list" class="flex flex-col gap-1 text-gray-300">
                    <!-- JS로 동적 생성 -->
                </ul>
            </div>

            <!-- 우측: 현재 상태 및 버튼 -->
            <div class="flex flex-col items-end gap-3 pointer-events-auto">
                <div class="hud-panel flex flex-col items-end gap-1 min-w-[100px]">
                    <div class="text-sm sm:text-base font-bold text-gray-400">현재 높이</div>
                    <div class="score-text text-3xl sm:text-4xl"><span id="score">0</span><span class="text-base text-gray-300 ml-1">권</span></div>
                </div>
                
                <button id="btn-restart-top" class="hud-panel hover:bg-white hover:bg-opacity-10 text-gray-300 font-bold active:scale-95 transition hidden text-sm w-full text-center">
                    처음부터
                </button>
            </div>
        </div>

        <div id="controls-hint" style="display: none;">
            👆 화면을 누른 상태로 조준하고<br>
            <span class="text-yellow-400 font-bold mt-2 inline-block">손을 떼면 책을 내려놓습니다.</span>
        </div>

        <!-- 시작 모달 -->
        <div id="start-modal" class="modal" style="display: block;">
            <h1 class="text-4xl font-bold text-yellow-500 mb-2" style="text-shadow: 0 2px 4px rgba(0,0,0,1);">아빠의 서재</h1>
            <p class="text-gray-400 mb-6 text-xs tracking-widest font-sans">BOOK STACKING CHALLENGE</p>
            
            <div class="bg-black bg-opacity-40 p-4 rounded mb-6 border border-gray-700/50">
                <label class="block text-gray-300 text-sm mb-2">랭킹에 등록할 이니셜 (영문 3자리)</label>
                <input type="text" id="player-initial" maxlength="3" 
                       class="w-full bg-transparent border-b-2 border-yellow-600/50 text-yellow-400 text-center text-4xl py-2 uppercase focus:outline-none focus:border-yellow-400 transition" 
                       placeholder="AAA" autocomplete="off">
                <div id="initial-error" class="text-red-400 text-xs mt-2 hidden">영문 3자리를 정확히 입력해주세요.</div>
            </div>
            
            <button id="btn-start" class="btn-gold w-full font-bold py-4 px-6 rounded shadow-lg text-xl">
                책 쌓기 시작
            </button>
        </div>

        <!-- 게임 오버 모달 -->
        <div id="gameover-modal" class="modal">
            <h2 class="text-3xl font-bold text-red-400 mb-2">무너졌습니다!</h2>
            <p class="text-gray-400 mb-6 text-lg">책상 아래로 책이 떨어졌습니다.</p>
            
            <div class="bg-black bg-opacity-60 p-6 rounded mb-8 border border-gray-700 shadow-inner relative">
                <p class="text-sm text-gray-400"><span id="final-initial" class="text-yellow-500 font-bold text-lg"></span> 님의 기록</p>
                <p class="text-6xl font-bold score-text mt-2 mb-2"><span id="final-score">0</span></p>
                
                <p class="text-sm text-yellow-400 mt-3 font-bold animate-pulse" id="new-record-msg" style="display: none;">🏆 서재 1위 달성! 🏆</p>
                <p class="text-sm text-blue-300 mt-3 font-bold" id="top5-entry-msg" style="display: none;">⭐ TOP 5 진입! ⭐</p>
            </div>

            <button id="btn-restart" class="btn-gold w-full font-bold py-4 px-6 rounded shadow-lg text-xl">
                다시 쌓기
            </button>
        </div>
    </div>

    <script>
        // --- Matter.js 초기화 ---
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,
              Composite = Matter.Composite,
              Events = Matter.Events,
              Body = Matter.Body;

        let engine, render, runner;
        let books = [];
        let currentActiveBook = null; 
        let score = 0;
        let currentInitial = "";
        
        // localStorage에서 Top 5 기록 불러오기 (없으면 빈 배열)
        let top5Records = JSON.parse(localStorage.getItem('studyRoomBookTop5')) || [];
        
        let gameState = 'START';
        
        let width = window.innerWidth;
        let height = window.innerHeight;
        let ground;
        
        let currentBounds = { min: { x: 0, y: 0 }, max: { x: width, y: height } };

        const scoreEl = document.getElementById('score');
        const finalScoreEl = document.getElementById('final-score');
        const startModal = document.getElementById('start-modal');
        const gameoverModal = document.getElementById('gameover-modal');
        const controlsHint = document.getElementById('controls-hint');
        const newRecordMsg = document.getElementById('new-record-msg');
        const top5EntryMsg = document.getElementById('top5-entry-msg');
        const btnRestartTop = document.getElementById('btn-restart-top');

        const woodPanel = document.getElementById('wood-panel');
        const roomBg = document.getElementById('room-bg');
        const celebrationLayer = document.getElementById('celebration-layer');

        const CELEBRATION_MILESTONES = new Set([1, 10, 15, 20, 25, 30, 35, 40, 45, 50]);
        const CHEER_MESSAGES = [
            '완벽한 출발이에요!',
            '책탑이 반짝반짝 빛나요!',
            '정말 멋지게 쌓고 있어요!',
            '아빠의 서재가 환호합니다!',
            '집중력 최고! 계속 가요!'
        ];

        // --- Top 5 UI 렌더링 ---
        function renderTop5() {
            const listContainer = document.getElementById('top5-list');
            listContainer.innerHTML = '';
            
            if (top5Records.length === 0) {
                listContainer.innerHTML = '<li class="text-center text-gray-500 text-xs py-2">기록 없음</li>';
                return;
            }

            top5Records.forEach((record, index) => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center py-0.5';
                
                // 순위별 색상 지정
                let rankStyle = 'text-gray-400';
                if (index === 0) rankStyle = 'text-yellow-400 font-bold';
                else if (index === 1) rankStyle = 'text-gray-200 font-semibold';
                else if (index === 2) rankStyle = 'text-orange-300';
                
                li.innerHTML = `
                    <span class="${rankStyle}">${index + 1}. ${record.initial}</span>
                    <span class="${rankStyle}">${record.score}</span>
                `;
                listContainer.appendChild(li);
            });
        }
        renderTop5(); // 초기 렌더링

        // 이니셜 입력 제한 (영문만)
        const initialInput = document.getElementById('player-initial');
        initialInput.addEventListener('input', (e) => {
            e.target.value = e.target.value.replace(/[^a-zA-Z]/g, '').toUpperCase();
        });

        // --- 텍스처 생성기 (Canvas API) ---
        function createRealisticBookTexture(w, h) {
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');

            const isVintage = Math.random() > 0.3; // 양장본 확률 높임
            const hues = [10, 20, 200, 350, 140, 40]; // 가죽, 버건디, 네이비 등
            const baseHue = hues[Math.floor(Math.random() * hues.length)];
            const saturation = isVintage ? (20 + Math.random() * 20) : (40 + Math.random() * 20);
            const lightness = isVintage ? (15 + Math.random() * 15) : (25 + Math.random() * 15);
            
            const coverColor = `hsl(${baseHue}, ${saturation}%, ${lightness}%)`;
            const pagesColor = isVintage ? '#c2b38e' : '#e6dfd1'; // 빛바랜 종이색

            ctx.fillStyle = coverColor;
            ctx.fillRect(0, 0, w, h);

            for(let i=0; i<w*h*0.15; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.2})`;
                ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
            }

            const spineWidth = Math.max(14, w * 0.12);
            const coverThickness = Math.max(5, h * 0.15);

            ctx.fillStyle = pagesColor;
            ctx.fillRect(spineWidth, coverThickness, w - spineWidth - 4, h - (coverThickness * 2));

            ctx.strokeStyle = isVintage ? 'rgba(70, 50, 30, 0.4)' : 'rgba(0, 0, 0, 0.2)';
            ctx.lineWidth = 1;
            for (let y = coverThickness + 2; y < h - coverThickness; y += 3) {
                ctx.beginPath();
                ctx.moveTo(spineWidth, y); ctx.lineTo(w - 4, y);
                ctx.stroke();
            }

            const spineGrad = ctx.createLinearGradient(0, 0, spineWidth, 0);
            spineGrad.addColorStop(0, 'rgba(0,0,0,0.8)');
            spineGrad.addColorStop(0.3, 'rgba(255,255,255,0.15)');
            spineGrad.addColorStop(0.7, 'rgba(0,0,0,0)');
            spineGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = spineGrad;
            ctx.fillRect(0, 0, spineWidth, h);

            ctx.fillStyle = 'rgba(212, 175, 55, 0.8)'; // 금박
            ctx.fillRect(0, h * 0.15, spineWidth, 2);
            ctx.fillRect(0, h * 0.25, spineWidth, 4);
            ctx.fillRect(0, h * 0.8, spineWidth, 2);

            const volumeGrad = ctx.createLinearGradient(0, 0, 0, h);
            volumeGrad.addColorStop(0, 'rgba(255,255,255,0.3)'); 
            volumeGrad.addColorStop(0.1, 'rgba(255,255,255,0.05)');
            volumeGrad.addColorStop(0.9, 'rgba(0,0,0,0.3)');
            volumeGrad.addColorStop(1, 'rgba(0,0,0,0.8)'); 
            ctx.fillStyle = volumeGrad;
            ctx.fillRect(0, 0, w, h);

            const rightShadow = ctx.createLinearGradient(w - 6, 0, w, 0);
            rightShadow.addColorStop(0, 'rgba(0,0,0,0)');
            rightShadow.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = rightShadow;
            ctx.fillRect(w - 6, 0, 6, h);

            return canvas.toDataURL('image/png');
        }

        // 고풍스러운 책상(바닥) 텍스처
        function createWoodTexture(w, h) {
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#2c1508';
            ctx.fillRect(0, 0, w, h);

            ctx.fillStyle = '#1c0c04';
            for(let i=0; i<400; i++) {
                const rectW = Math.random() * 100 + 30;
                const rectH = Math.random() * 4 + 1;
                ctx.fillRect(Math.random() * w, Math.random() * h, rectW, rectH);
            }

            const lightReflect = ctx.createLinearGradient(0,0,0,h);
            lightReflect.addColorStop(0, 'rgba(255, 200, 150, 0.15)');
            lightReflect.addColorStop(0.2, 'rgba(0,0,0,0)');
            lightReflect.addColorStop(1, 'rgba(0,0,0,0.5)');
            ctx.fillStyle = lightReflect;
            ctx.fillRect(0, 0, w, h);

            return canvas.toDataURL('image/png');
        }

        // --- 물리 엔진 & 카메라 로직 ---
        function initPhysics() {
            if (engine) {
                Render.stop(render); Runner.stop(runner);
                render.canvas.remove(); engine = null;
            }

            engine = Engine.create();
            engine.gravity.y = 1.8; 
            engine.positionIterations = 8;
            engine.velocityIterations = 8;

            render = Render.create({
                element: document.getElementById('game-container'),
                engine: engine,
                options: {
                    width: width, height: height,
                    wireframes: false, background: 'transparent',
                    pixelRatio: window.devicePixelRatio,
                    hasBounds: true
                }
            });

            currentBounds = { min: { x: 0, y: 0 }, max: { x: width, y: height } };
            Render.lookAt(render, currentBounds);

            const deskWidth = Math.min(width * 0.9, 450);
            const deskHeight = 120;
            const woodTexture = createWoodTexture(deskWidth, deskHeight);

            ground = Bodies.rectangle(width / 2, height - (deskHeight/2), deskWidth, deskHeight, { 
                isStatic: true,
                render: { sprite: { texture: woodTexture } },
                friction: 1.0, restitution: 0.0, label: 'ground'
            });

            Composite.add(engine.world, [ground]);

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            Events.on(engine, 'collisionStart', handleCollision);
            Events.on(engine, 'beforeUpdate', updateCamera);
            Events.on(render, 'afterRender', drawDropGuide);
        }

        function drawDropGuide() {
            if (gameState === 'PLAYING' && currentActiveBook && isDown) {
                 const ctx = render.context;
                 const scale = (currentBounds.max.x - currentBounds.min.x) / width;
                 
                 ctx.beginPath();
                 ctx.setLineDash([15 * scale, 10 * scale]);
                 ctx.moveTo(currentActiveBook.position.x, currentActiveBook.position.y);
                 ctx.lineTo(currentActiveBook.position.x, ground.position.y);
                 ctx.strokeStyle = 'rgba(255, 215, 120, 0.4)'; // 스탠드 조명빛 가이드
                 ctx.lineWidth = Math.max(1, 2 * scale);
                 ctx.stroke();
                 ctx.setLineDash([]);
            }
        }

        function spawnNewBook() {
            if (gameState !== 'PLAYING') return;

            const w = Math.floor(Math.random() * 60) + 120; 
            const h = Math.floor(Math.random() * 20) + 25;
            const texture = createRealisticBookTexture(w, h);
            
            const scale = (currentBounds.max.y - currentBounds.min.y) / height;
            const spawnY = currentBounds.min.y + (130 * scale);
            const spawnX = currentBounds.min.x + ((currentBounds.max.x - currentBounds.min.x) / 2);

            currentActiveBook = Bodies.rectangle(spawnX, spawnY, w, h, {
                isStatic: true, 
                render: { sprite: { texture: texture } },
                friction: 0.9, restitution: 0.02, density: 0.02, label: 'book'
            });

            Composite.add(engine.world, currentActiveBook);
            books.push(currentActiveBook);
            
            if (score === 0) controlsHint.style.display = 'block';
        }

        function dropBook() {
            if (!currentActiveBook || gameState !== 'PLAYING') return;

            Body.setStatic(currentActiveBook, false); 
            
            const randomAngularVelocity = (Math.random() - 0.5) * 0.03;
            Body.setAngularVelocity(currentActiveBook, randomAngularVelocity);

            currentActiveBook = null;
            controlsHint.style.display = 'none';

            score++;
            scoreEl.textContent = score;

            if (CELEBRATION_MILESTONES.has(score)) {
                setTimeout(() => triggerCelebration(score), 520);
            }
            
            playWhooshSound();
            setTimeout(spawnNewBook, 1200);
        }

        function moveActiveBook(screenX) {
            if (!currentActiveBook || gameState !== 'PLAYING') return;
            
            const scale = (currentBounds.max.x - currentBounds.min.x) / width;
            const worldX = currentBounds.min.x + (screenX * scale);
            const bookHalfWidth = (currentActiveBook.bounds.max.x - currentActiveBook.bounds.min.x) / 2;
            const safeX = Math.max(currentBounds.min.x + bookHalfWidth, Math.min(worldX, currentBounds.max.x - bookHalfWidth));
            
            Body.setPosition(currentActiveBook, { x: safeX, y: currentActiveBook.position.y });
        }

        function handleCollision(event) {
            if (gameState !== 'PLAYING') return;
            const pairs = event.pairs;
            for (let i = 0; i < pairs.length; i++) {
                const a = pairs[i].bodyA, b = pairs[i].bodyB;
                if ((a.label === 'book' || a.label === 'ground') && (b.label === 'book' || b.label === 'ground')) {
                     const velocity = Math.abs(a.velocity.y) + Math.abs(b.velocity.y);
                     if(velocity > 1.5) playThudSound(velocity);
                }
            }
        }

        // 스마트 카메라 & 패럴랙스 배경 스크롤
        function updateCamera() {
            if (gameState !== 'PLAYING') return;

            let highestY = ground.position.y; 

            for (let i = 0; i < books.length; i++) {
                const book = books[i];
                if (book === currentActiveBook) continue;

                if (book.position.y > ground.position.y + 300) {
                    gameOver(); return;
                }
                if (book.speed < 2 && book.position.y < highestY) {
                    highestY = book.position.y;
                }
            }

            let targetMinY = highestY - 350;
            let neededHeight = (ground.position.y + 100) - targetMinY;
            let targetViewHeight = Math.max(height, neededHeight);
            
            const MAX_ZOOM = 2.5; 
            if (targetViewHeight > height * MAX_ZOOM) {
                targetViewHeight = height * MAX_ZOOM;
            } else {
                targetMinY = (ground.position.y + 100) - targetViewHeight;
            }

            let targetViewWidth = targetViewHeight * (width / height);
            let targetMinX = (width - targetViewWidth) / 2;

            currentBounds.min.x += (targetMinX - currentBounds.min.x) * 0.08;
            currentBounds.min.y += (targetMinY - currentBounds.min.y) * 0.08;
            currentBounds.max.x = currentBounds.min.x + targetViewWidth;
            currentBounds.max.y = currentBounds.min.y + targetViewHeight;

            Render.lookAt(render, currentBounds);

            // --- CSS 배경 패럴랙스 처리 ---
            const scale = height / (currentBounds.max.y - currentBounds.min.y);
            roomBg.style.backgroundPositionY = `${-currentBounds.min.y * 0.3 * scale}px`;

            const deskScreenY = (ground.position.y - currentBounds.min.y) * scale;
            if (deskScreenY < height + 100) {
                woodPanel.style.top = `${deskScreenY}px`;
                woodPanel.style.height = `${Math.max(0, height - deskScreenY)}px`;
            } else {
                woodPanel.style.height = `0px`;
            }
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            controlsHint.style.display = 'none';
            btnRestartTop.style.display = 'none';
            celebrationLayer.replaceChildren();
            
            playCrashSound();
            document.body.style.animation = 'shake 0.5s';
            setTimeout(() => document.body.style.animation = '', 500);

            const finalScore = Math.max(0, score - 1);
            finalScoreEl.textContent = finalScore;
            document.getElementById('final-initial').textContent = currentInitial;

            // --- Top 5 랭킹 시스템 처리 ---
            let isNewRecord = false;
            let isTop5Entry = false;
            const previousBest = top5Records.length > 0 ? top5Records[0].score : 0;

            if (finalScore > 0) {
                const currentRecord = { initial: currentInitial, score: finalScore, time: Date.now() };
                top5Records.push(currentRecord);
                
                // 점수 내림차순, 점수가 같으면 시간 오름차순(먼저 등록한 사람 우선)
                top5Records.sort((a, b) => {
                    if (b.score === a.score) return a.time - b.time;
                    return b.score - a.score;
                });

                const rankIndex = top5Records.indexOf(currentRecord);

                if (rankIndex === 0 && finalScore > previousBest) {
                    isNewRecord = true;
                } else if (rankIndex < 5) {
                    isTop5Entry = true;
                }

                // 5개까지만 유지하고 저장
                top5Records = top5Records.slice(0, 5);
                localStorage.setItem('studyRoomBookTop5', JSON.stringify(top5Records));
                renderTop5();
            }

            newRecordMsg.style.display = isNewRecord ? 'block' : 'none';
            top5EntryMsg.style.display = (!isNewRecord && isTop5Entry) ? 'block' : 'none';

            setTimeout(() => gameoverModal.style.display = 'block', 700);
        }

        function startGame(isFirstStart = false) {
            // 처음 시작할 때만 이니셜 검증 수행
            if (isFirstStart) {
                const initialVal = document.getElementById('player-initial').value;
                if (initialVal.length !== 3) {
                    document.getElementById('initial-error').classList.remove('hidden');
                    return; // 3자리가 아니면 시작 중단
                }
                document.getElementById('initial-error').classList.add('hidden');
                currentInitial = initialVal;
            }

            startModal.style.display = 'none';
            gameoverModal.style.display = 'none';
            btnRestartTop.style.display = 'block';
            
            score = 0; scoreEl.textContent = score;
            books = [];
            celebrationLayer.replaceChildren();
            
            initPhysics();
            gameState = 'PLAYING';
            spawnNewBook();
        }

        function triggerCelebration(count) {
            if (gameState !== 'PLAYING') return;

            celebrationLayer.replaceChildren();

            const banner = document.createElement('div');
            const message = CHEER_MESSAGES[Math.floor(Math.random() * CHEER_MESSAGES.length)];
            banner.className = 'cheer-banner';
            banner.innerHTML = `
                <span class="cheer-count">${count}권 달성!</span>
                <span class="cheer-message">🎉 ${message} 🎉</span>
            `;
            celebrationLayer.appendChild(banner);

            for (let i = 0; i < 36; i++) {
                const sparkle = document.createElement('span');
                sparkle.className = 'sparkle';
                sparkle.style.setProperty('--x', `${42 + Math.random() * 16}%`);
                sparkle.style.setProperty('--y', `${24 + Math.random() * 22}%`);
                sparkle.style.setProperty('--dx', `${(Math.random() - 0.5) * 90}vw`);
                sparkle.style.setProperty('--dy', `${(Math.random() - 0.8) * 70}vh`);
                sparkle.style.setProperty('--size', `${6 + Math.random() * 14}px`);
                sparkle.style.setProperty('--hue', Math.floor(Math.random() * 360));
                sparkle.style.setProperty('--duration', `${0.9 + Math.random() * 0.8}s`);
                celebrationLayer.appendChild(sparkle);
            }

            for (let i = 0; i < 42; i++) {
                const ribbon = document.createElement('span');
                ribbon.className = 'ribbon';
                ribbon.style.setProperty('--x', `${Math.random() * 100}%`);
                ribbon.style.setProperty('--hue', Math.floor(Math.random() * 360));
                ribbon.style.setProperty('--rotate', `${Math.random() * 360}deg`);
                ribbon.style.setProperty('--duration', `${1.8 + Math.random() * 1.1}s`);
                celebrationLayer.appendChild(ribbon);
            }

            playCelebrationSound();
            setTimeout(() => celebrationLayer.replaceChildren(), 3200);
        }
        
        // --- 조작 (마우스/터치) ---
        let isDown = false;
        const gameContainer = document.getElementById('game-container');

        gameContainer.addEventListener('pointerdown', (e) => {
            if (gameState !== 'PLAYING') return;
            isDown = true;
            controlsHint.style.display = 'none';
            moveActiveBook(e.clientX);
        });

        gameContainer.addEventListener('pointermove', (e) => {
            if (isDown && gameState === 'PLAYING') moveActiveBook(e.clientX);
        });

        gameContainer.addEventListener('pointerup', () => {
            if (isDown && gameState === 'PLAYING') { isDown = false; dropBook(); }
        });

        gameContainer.addEventListener('pointercancel', () => {
             if (isDown && gameState === 'PLAYING') { isDown = false; dropBook(); }
        });

        // 버튼 이벤트 바인딩
        document.getElementById('btn-start').addEventListener('click', () => startGame(true));
        document.getElementById('btn-restart').addEventListener('click', () => startGame(false));
        btnRestartTop.addEventListener('click', () => {
            // 진행중일 때 경고창 대신 즉시 리스타트 (iframe 환경 고려)
            startGame(false);
        });

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            if (render) {
                render.canvas.width = width; render.canvas.height = height;
                render.options.width = width; render.options.height = height;
            }
            if (ground) Body.setPosition(ground, { x: width / 2, y: ground.position.y });
            currentBounds.max.x = currentBounds.min.x + (currentBounds.max.y - currentBounds.min.y) * (width/height);
        });

        // --- 효과음 ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        
        function playWhooshSound() {
            try {
                const ctx = new AudioContext();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(180, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.04, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch(e){}
        }

        function playThudSound(intensity) {
            try {
                const ctx = new AudioContext();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'triangle'; osc.frequency.setValueAtTime(80, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(20, ctx.currentTime + 0.12);
                const volume = Math.min(0.4, intensity * 0.06);
                gain.gain.setValueAtTime(volume, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.12);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.12);
            } catch(e){}
        }

        function playCelebrationSound() {
            try {
                const ctx = new AudioContext();
                const notes = [523.25, 659.25, 783.99, 1046.5];
                notes.forEach((note, index) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    const startAt = ctx.currentTime + (index * 0.08);

                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(note, startAt);
                    gain.gain.setValueAtTime(0.001, startAt);
                    gain.gain.exponentialRampToValueAtTime(0.12, startAt + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, startAt + 0.22);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(startAt); osc.stop(startAt + 0.24);
                });
            } catch(e){}
        }
        
        function playCrashSound() {
            try {
                const ctx = new AudioContext();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sawtooth'; osc.frequency.setValueAtTime(70, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(10, ctx.currentTime + 0.35);
                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.35);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.35);
            } catch(e){}
        }
    </script>
</body>
