<html lang="ko">
<head>

    <meta name="theme-color" content="#030305">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="images/favicon.png">
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3207219520058740"
     crossorigin="anonymous"></script>
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-NBGELYQ4TZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-NBGELYQ4TZ');

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>아빠의 서재 - 책 쌓기</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700;900&display=swap');

        body {
            font-family: 'Noto Serif KR', serif;
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            background-color: #1a1a1a;
        }

        /* --- 아빠의 서재 배경 --- */
        #room-bg {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #1e2b22;
            background-image:
                linear-gradient(to bottom, rgba(8, 5, 3, 0.18), rgba(8, 5, 3, 0.58)),
                url('images/bookstore.jpg');
            background-position: center center;
            background-size: cover;
            background-repeat: no-repeat;
            filter: blur(8px) brightness(0.78) saturate(0.9);
            transform: scale(1.05);
            transform-origin: center;
            z-index: -3;
        }

        /* 책상 주변을 어둡게 잡아주는 하단 음영 */
        #wood-panel {
            position: fixed;
            left: 0; width: 100%; height: 40vh;
            background: linear-gradient(to bottom, rgba(62, 34, 17, 0.12) 0%, rgba(15, 7, 3, 0.68) 100%);
            box-shadow: inset 0 20px 30px rgba(0,0,0,0.45);
            z-index: -2;
        }

        /* 서재 스탠드 조명 (은은하고 따뜻한 광원) */
        #lamp-glow {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 30%, rgba(255, 190, 90, 0.15) 0%, rgba(0, 0, 0, 0.7) 100%);
            pointer-events: none;
            z-index: 5;
        }

        #game-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            z-index: 1;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0px 20px 20px rgba(0,0,0,0.7));
        }

        /* UI 오버레이 */
        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        .hud-panel {
            background: rgba(20, 15, 10, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 8px;
            padding: 12px 16px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8);
            pointer-events: auto;
            color: #e5e7eb;
        }

        .score-text {
            color: #d4af37; /* 클래식 골드 */
            text-shadow: 0 2px 4px rgba(0,0,0,0.9);
        }

        #controls-hint {
            position: absolute;
            bottom: 80px;
            left: 0;
            width: 100%;
            text-align: center;
            color: rgba(255,255,255,0.8);
            font-size: 1.1rem;
            animation: pulse 2s infinite;
            pointer-events: none;
            text-shadow: 0 2px 5px rgba(0,0,0,1);
            z-index: 10;
        }

        @keyframes pulse {
            0% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1); }
            100% { opacity: 0.3; transform: scale(0.98); }
        }

        /* 🌟 오목 스타일 플로팅 멘트 애니메이션 🌟 */
        @keyframes floatChat {
            0% { opacity: 0; transform: translate(-50%, 20px) scale(0.5) rotate(-10deg); }
            20% { opacity: 1; transform: translate(-50%, 0px) scale(1.2) rotate(5deg); }
            40% { opacity: 1; transform: translate(-50%, -10px) scale(1) rotate(0deg); }
            80% { opacity: 1; transform: translate(-50%, -20px) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -40px) scale(0.8); }
        }

        .floating-chat {
            position: absolute;
            pointer-events: none;
            z-index: 150;
            font-size: 28px;
            font-weight: 900;
            font-family: 'Comic Sans MS', 'Pretendard', sans-serif;
            text-shadow: 3px 3px 0 #000, -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000;
            animation: floatChat 1.5s ease-out forwards;
            white-space: nowrap;
        }

        .chat-success { color: #f1c40f; }
        
        .chat-fail { 
            color: #e74c3c; 
            font-size: clamp(3.5rem, 12vw, 6rem); 
            animation-duration: 2.5s; 
            z-index: 200; 
        }

        /* 모달 창 */
        .modal {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: linear-gradient(145deg, #302018, #1c110b);
            padding: 30px;
            border-radius: 6px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 0 2px rgba(212, 175, 55, 0.1);
            text-align: center;
            pointer-events: auto;
            display: none;
            z-index: 100;
            border: 4px solid #4a2e1b;
            width: 90%;
            max-width: 380px;
            color: #e5e7eb;
        }

        .btn-gold {
            background: linear-gradient(to bottom, #c5a059, #8a6c31);
            border: 1px solid #e8ce8a;
            color: #1a0f08;
            box-shadow: 0 4px 10px rgba(0,0,0,0.6);
            transition: all 0.2s;
            text-shadow: 0 1px 1px rgba(255,255,255,0.4);
        }
        .btn-gold:hover {
            background: linear-gradient(to bottom, #dcb770, #a1803b);
            transform: translateY(-2px);
        }
        .btn-gold:active {
            transform: translateY(1px);
        }
        
        #celebration-layer {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 80;
            overflow: hidden;
        }

        .cheer-banner {
            position: absolute;
            top: 22%;
            left: 50%;
            width: min(92vw, 560px);
            transform: translate(-50%, -50%) scale(0.7);
            padding: 18px 22px;
            border: 2px solid rgba(255, 245, 180, 0.42);
            border-radius: 999px;
            background: linear-gradient(135deg, rgba(255, 244, 170, 0.34), rgba(255, 151, 91, 0.28), rgba(211, 82, 255, 0.25));
            box-shadow: 0 0 28px rgba(255, 221, 87, 0.42), 0 0 58px rgba(147, 51, 234, 0.24);
            color: rgba(255, 250, 230, 0.74);
            font-weight: 700;
            text-align: center;
            text-shadow: 0 2px 10px rgba(43, 17, 6, 0.45);
            opacity: 0;
            animation: cheerPop 1.8s ease-out forwards;
        }

        .cheer-banner .cheer-count {
            display: block;
            font-size: clamp(2.3rem, 9vw, 4.8rem);
            line-height: 1;
        }

        .cheer-banner .cheer-message {
            display: block;
            margin-top: 6px;
            font-size: clamp(1rem, 4vw, 1.45rem);
        }

        .sparkle {
            position: absolute;
            width: var(--size);
            height: var(--size);
            left: var(--x);
            top: var(--y);
            border-radius: 50%;
            background: hsla(var(--hue), 95%, 62%, 0.58);
            box-shadow: 0 0 18px hsla(var(--hue), 95%, 70%, 0.5);
            animation: sparkleBurst var(--duration) ease-out forwards;
        }

        .ribbon {
            position: absolute;
            width: 10px;
            height: 28px;
            left: var(--x);
            top: -40px;
            border-radius: 4px;
            background: hsla(var(--hue), 95%, 58%, 0.48);
            transform: rotate(var(--rotate));
            animation: ribbonFall var(--duration) cubic-bezier(.17,.67,.31,.99) forwards;
        }

        @keyframes cheerPop {
            0% { opacity: 0; transform: translate(-50%, -50%) scale(0.45) rotate(-4deg); }
            16% { opacity: 0.78; transform: translate(-50%, -50%) scale(1.08) rotate(2deg); }
            28% { transform: translate(-50%, -50%) scale(1) rotate(0deg); }
            76% { opacity: 0.72; }
            100% { opacity: 0; transform: translate(-50%, -70%) scale(0.98); }
        }

        @keyframes sparkleBurst {
            0% { opacity: 0.68; transform: translate(0, 0) scale(0.45); }
            70% { opacity: 0.55; }
            100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(1.25); }
        }

        @keyframes ribbonFall {
            0% { opacity: 0.58; transform: translateY(0) rotate(var(--rotate)); }
            100% { opacity: 0; transform: translateY(110vh) rotate(calc(var(--rotate) + 520deg)); }
        }
        
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10%, 30%, 50%, 70%, 90% { transform: translate(-3px, -2px) rotate(-1deg); }
            20%, 40%, 60%, 80% { transform: translate(3px, 2px) rotate(1deg); }
        }

        /* 유튜브 플레이어 영역 (안보임) */
        #yt-player-container {
            position: absolute; width: 1px; height: 1px; overflow: hidden; opacity: 0; pointer-events: none; z-index: -1;
        }
    </style>
</head>
<body>

    <div id="yt-player-container"></div>

    <div id="room-bg"></div>
    <div id="wood-panel"></div>
    <div id="lamp-glow"></div>
    <div id="celebration-layer" aria-live="polite"></div>

    <div id="game-container">
        <div id="ui-layer" class="p-3 sm:p-5 flex justify-between items-start pointer-events-none">
            
            <div id="top5-panel" class="flex flex-col gap-1 pointer-events-auto" style="min-width: 130px; text-shadow: 1px 2px 4px rgba(0,0,0,0.95), 0 0 2px rgba(0,0,0,1);">
                <div class="flex items-center justify-center gap-2 border-b border-yellow-500/30 pb-2 mb-1 text-center">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse shadow-[0_0_8px_rgba(34,197,94,1)]"></div>
                    <div class="text-xs text-yellow-400 font-extrabold tracking-widest">TOP 5</div>
                </div>
                <ul id="top5-list" class="flex flex-col gap-1 text-gray-100 font-bold">
                    <li class="text-center text-gray-300 text-xs py-2 drop-shadow-md">로딩중...</li>
                </ul>
            </div>

            <div class="flex flex-col items-end gap-2 pointer-events-auto">
                <div class="hud-panel flex flex-col items-end gap-1 min-w-[100px]">
                    <div class="text-sm sm:text-base font-bold text-gray-400">현재 높이</div>
                    <div class="score-text text-3xl sm:text-4xl"><span id="score">0</span><span class="text-base text-gray-300 ml-1">권</span></div>
                </div>
                
                <button id="btn-restart-top" class="hud-panel hover:bg-white hover:bg-opacity-10 text-gray-300 font-bold active:scale-95 transition hidden text-sm w-full text-center">
                    초기화
                </button>
            </div>
        </div>

        <div id="controls-hint" style="display: none;">
            👆 화면을 누른 상태로 조준하고<br>
            <span class="text-yellow-400 font-bold mt-2 inline-block">손을 떼면 책을 내려놓습니다.</span>
        </div>

        <div id="start-modal" class="modal" style="display: block;">
            <h1 class="text-4xl font-bold text-yellow-500 mb-2" style="text-shadow: 0 2px 4px rgba(0,0,0,1);">아빠의 서재</h1>
            <p class="text-gray-400 mb-6 text-xs tracking-widest font-sans">MULTIPLAYER CHALLENGE</p>
            
            <div class="bg-black bg-opacity-40 p-4 rounded mb-6 border border-gray-700/50">
                <label class="block text-gray-300 text-sm mb-2">랭킹 등록용 이니셜 (영문 3자리)</label>
                <input type="text" id="player-initial" maxlength="3" 
                       class="w-full bg-transparent border-b-2 border-yellow-600/50 text-yellow-400 text-center text-4xl py-2 uppercase focus:outline-none focus:border-yellow-400 transition" 
                       placeholder="AAA" autocomplete="off">
                <div id="initial-error" class="text-red-400 text-xs mt-2" style="display: none;">영문 3자리를 정확히 입력해주세요.</div>
            </div>
            
            <button id="btn-start" class="btn-gold w-full font-bold py-4 px-6 rounded shadow-lg text-xl">
                책 쌓기 시작
            </button>
        </div>

        <div id="gameover-modal" class="modal">
            <h2 class="text-3xl font-bold text-red-400 mb-2">무너졌습니다!</h2>
            <p class="text-gray-400 mb-6 text-lg">책상 아래로 책이 떨어졌습니다.</p>
            
            <div class="bg-black bg-opacity-60 p-6 rounded mb-8 border border-gray-700 shadow-inner">
                <p class="text-sm text-gray-400"><span id="final-initial" class="text-yellow-500 font-bold text-lg"></span> 님의 기록</p>
                <p class="text-6xl font-bold score-text mt-2 mb-2"><span id="final-score">0</span></p>
                
                <p class="text-sm text-yellow-400 mt-3 font-bold animate-pulse" id="new-record-msg" style="display: none;">🏆 글로벌 1위 달성! 🏆</p>
                <p class="text-sm text-blue-300 mt-3 font-bold" id="top5-entry-msg" style="display: none;">⭐ 글로벌 TOP 5 진입! ⭐</p>
            </div>

            <button id="btn-restart" class="btn-gold w-full font-bold py-4 px-6 rounded shadow-lg text-xl">
                다시 쌓기
            </button>
        </div>
    </div>

    <script>
        // ══════════════════════════════════════════════════════
        // YOUTUBE BGM PLAYER (오목과 동일한 재생목록 & 랜덤 셔플)
        // ══════════════════════════════════════════════════════
        let ytPlayer;
        let isYtReady = false;

        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        window.onYouTubeIframeAPIReady = function() {
            ytPlayer = new YT.Player('yt-player-container', {
                height: '0',
                width: '0',
                playerVars: {
                    'autoplay': 0, 
                    'controls': 0,
                    'disablekb': 1,
                    'listType': 'playlist', 
                    'list': 'PL3p0Se-Sm12SdPoWcevuXVd5pAMfpOGxY', 
                    'playsinline': 1
                },
                events: {
                    'onReady': function(event) {
                        isYtReady = true;
                        event.target.setVolume(25); 
                    },
                    'onStateChange': function(event) {
                        if (event.data === YT.PlayerState.ENDED) {
                            ytPlayer.nextVideo();
                        }
                    }
                }
            });
        };

        const SUPA_URL = 'https://cvfmkcxmxkmemmshfttn.supabase.co';
        const SUPA_KEY = 'sb_publishable_Bb_GkRPWRFeAPvIduwPTJg_O1z_sStm';
        
        let globalTop5 = [];
        let currentInitial = "";

        const top5ListEl = document.getElementById('top5-list');
        const initialInput = document.getElementById('player-initial');

        // 🌟 오목 스타일 멘트로 변경 🌟
        const SUCCESS_MSGS = ['대박!', '와우!', '언빌리버블!', '나이스~', '이건 몰랐지?', '천재 아냐?', '간닷!', '완벽해!', '우효~', '폼 미쳤다잉~'];
        const FAIL_MSGS = ['오 노우!!', '뭐야~', '안돼~', '헐...', '너무해 ㅠㅠ', '와르르...', '이럴수가!', '헉!', '비상사태!', '방심했다...'];

        if(initialInput) {
            initialInput.addEventListener('input', (e) => {
                e.target.value = e.target.value.replace(/[^a-zA-Z]/g, '').toUpperCase();
            });
        }

        async function fetchTop5() {
            try {
                const res = await fetch(`${SUPA_URL}/rest/v1/booktop_scores?select=*&order=score.desc,created_at.asc&limit=5`, {
                    headers: {
                        apikey: SUPA_KEY,
                        Authorization: `Bearer ${SUPA_KEY}`
                    }
                });
                
                if (res.ok) {
                    globalTop5 = await res.json();
                    renderTop5();
                }
            } catch (e) {
                console.error("Top 5 로드 실패:", e);
                top5ListEl.innerHTML = '<li class="text-center text-gray-500 text-xs py-2">연결 오류</li>';
            }
        }

        // 🌟 수정된 기록 저장 로직 (UNIQUE 제약조건 완벽 대응) 🌟
        async function saveScoreToDB(initial, score) {
            if (score <= 0) return;
            try {
                // 1. 해당 이니셜의 기존 기록을 조회합니다.
                const getRes = await fetch(`${SUPA_URL}/rest/v1/booktop_scores?initial=eq.${initial}`, {
                    headers: {
                        apikey: SUPA_KEY,
                        Authorization: `Bearer ${SUPA_KEY}`
                    }
                });
                const existingData = await getRes.json();

                if (existingData && existingData.length > 0) {
                    // 2. 기존 기록의 점수를 확인합니다.
                    const currentBest = existingData[0].score;
                    
                    if (score > currentBest) {
                        // 3. UNIQUE 제약조건이 있으므로, 충돌을 피하기 위해 기존 데이터를 수정(PATCH) 합니다.
                        await fetch(`${SUPA_URL}/rest/v1/booktop_scores?initial=eq.${initial}`, {
                            method: 'PATCH',
                            headers: {
                                apikey: SUPA_KEY,
                                Authorization: `Bearer ${SUPA_KEY}`,
                                'Content-Type': 'application/json',
                                'Prefer': 'return=minimal'
                            },
                            body: JSON.stringify({ score: score })
                        });
                        
                        await fetchTop5();
                    }
                } else {
                    // 4. 기존 기록이 아예 없으면 새로 추가 (POST)
                    const res = await fetch(`${SUPA_URL}/rest/v1/booktop_scores`, {
                        method: 'POST',
                        headers: {
                            apikey: SUPA_KEY,
                            Authorization: `Bearer ${SUPA_KEY}`,
                            'Content-Type': 'application/json',
                            'Prefer': 'return=minimal'
                        },
                        body: JSON.stringify({
                            initial: initial,
                            score: score
                        })
                    });

                    if (res.ok || res.status === 201) {
                        await fetchTop5();
                    }
                }
            } catch (e) {
                console.error("점수 저장 실패:", e);
            }
        }

        function renderTop5() {
            top5ListEl.innerHTML = '';
            
            if (globalTop5.length === 0) {
                top5ListEl.innerHTML = '<li class="text-center text-gray-300 text-xs py-2 drop-shadow-md">기록 없음</li>';
                return;
            }

            globalTop5.forEach((record, index) => {
                const li = document.createElement('li');
                li.className = 'flex justify-between items-center text-sm py-1 px-1 mb-1 drop-shadow-md';
                
                let rankIcon = `<span class="inline-block w-4 text-center font-bold text-gray-300">${index + 1}</span>`;
                let rankStyle = 'text-gray-100';
                
                if (index === 0) { rankIcon = '🥇'; rankStyle = 'text-yellow-300 font-extrabold'; }
                else if (index === 1) { rankIcon = '🥈'; rankStyle = 'text-gray-200 font-bold'; }
                else if (index === 2) { rankIcon = '🥉'; rankStyle = 'text-orange-200 font-bold'; }
                
                li.innerHTML = `
                    <div class="flex items-center gap-2">
                        ${rankIcon}
                        <span class="${rankStyle} tracking-widest">${record.initial}</span>
                    </div>
                    <span class="${rankStyle} font-bold text-base">${record.score}</span>
                `;
                top5ListEl.appendChild(li);
            });
        }

        fetchTop5(); 

        // 🌟 플로팅 방식 변경 🌟
        function showPopupMessage(x, y, type) {
            const el = document.createElement('div');
            
            if (type === 'success') {
                const msg = SUCCESS_MSGS[Math.floor(Math.random() * SUCCESS_MSGS.length)];
                el.innerText = msg;
                el.className = 'floating-chat chat-success';
                
                // 오목 스타일로 약간의 랜덤한 오프셋 추가
                const offsetX = (Math.random() - 0.5) * 80;
                const offsetY = (Math.random() - 0.5) * 40 - 20;
                
                el.style.left = `${x + offsetX}px`;
                el.style.top = `${y + offsetY}px`;
                
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 1500);
                
            } else if (type === 'fail') {
                const msg = FAIL_MSGS[Math.floor(Math.random() * FAIL_MSGS.length)];
                el.innerText = msg;
                el.className = 'floating-chat chat-fail';
                
                // 실패 시 화면 중앙에서 매우 크게 팝업
                el.style.left = '50%';
                el.style.top = '40%';
                
                document.body.appendChild(el);
                setTimeout(() => el.remove(), 2500); 
            }
        }

        // --- 10권 이상 달성 시 발생하는 화려한 이펙트 ---
        function createFlashyEffect(x, y) {
            const container = document.getElementById('celebration-layer');
            if(!container) return;

            // 황금빛/무지개빛 파티클 폭발
            for (let i = 0; i < 20; i++) {
                const sparkle = document.createElement('span');
                sparkle.className = 'sparkle';

        // --- Matter.js 물리 엔진 ---
        const Engine = Matter.Engine,
              Render = Matter.Render,
              Runner = Matter.Runner,
              Bodies = Matter.Bodies,

        const CELEBRATION_MILESTONES = new Set([1, 10, 15, 20, 25, 30, 35, 40, 45, 50, 60, 70]);
        // 🌟 축하 멘트도 오목 스타일로 변경 🌟
        const CHEER_MESSAGES = [
            '오~ 폼 미쳤다잉! 🚀',
            '이 구역의 책쌓기 달인! 😎',
            '대박! 재능 발견?! 🎉',

            '완벽 그 자체! 나이스! 👍'

        // --- 텍스처 생성기 (Canvas API) ---
        function createRealisticBookTexture(w, h) {
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');

            const isVintage = Math.random() > 0.3; 
            const hues = [10, 20, 200, 350, 140, 40]; 
            const baseHue = hues[Math.floor(Math.random() * hues.length)];
            const saturation = isVintage ? (20 + Math.random() * 20) : (40 + Math.random() * 20);
            const lightness = isVintage ? (15 + Math.random() * 15) : (25 + Math.random() * 15);
            
            const coverColor = `hsl(${baseHue}, ${saturation}%, ${lightness}%)`;
            const pagesColor = isVintage ? '#c2b38e' : '#e6dfd1'; 

            ctx.fillStyle = coverColor;
            ctx.fillRect(0, 0, w, h);

            for(let i=0; i<w*h*0.15; i++) {
                ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.2})`;
                ctx.fillRect(Math.random() * w, Math.random() * h, 1, 1);
            }

            const spineWidth = Math.max(14, w * 0.12);
            const coverThickness = Math.max(5, h * 0.15);

            ctx.fillStyle = pagesColor;
            ctx.fillRect(spineWidth, coverThickness, w - spineWidth - 4, h - (coverThickness * 2));

            ctx.strokeStyle = isVintage ? 'rgba(70, 50, 30, 0.4)' : 'rgba(0, 0, 0, 0.2)';
            ctx.lineWidth = 1;
            for (let y = coverThickness + 2; y < h - coverThickness; y += 3) {
                ctx.beginPath();
                ctx.moveTo(spineWidth, y); ctx.lineTo(w - 4, y);
                ctx.stroke();
            }

            const spineGrad = ctx.createLinearGradient(0, 0, spineWidth, 0);
            spineGrad.addColorStop(0, 'rgba(0,0,0,0.8)');
            spineGrad.addColorStop(0.3, 'rgba(255,255,255,0.15)');
            spineGrad.addColorStop(0.7, 'rgba(0,0,0,0)');
            spineGrad.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = spineGrad;
            ctx.fillRect(0, 0, spineWidth, h);

            ctx.fillStyle = 'rgba(212, 175, 55, 0.8)'; 
            ctx.fillRect(0, h * 0.15, spineWidth, 2);
            ctx.fillRect(0, h * 0.25, spineWidth, 4);
            ctx.fillRect(0, h * 0.8, spineWidth, 2);

            const volumeGrad = ctx.createLinearGradient(0, 0, 0, h);
            volumeGrad.addColorStop(0, 'rgba(255,255,255,0.3)'); 
            volumeGrad.addColorStop(0.1, 'rgba(255,255,255,0.05)');
            volumeGrad.addColorStop(0.9, 'rgba(0,0,0,0.3)');
            volumeGrad.addColorStop(1, 'rgba(0,0,0,0.8)'); 
            ctx.fillStyle = volumeGrad;
            ctx.fillRect(0, 0, w, h);

            const rightShadow = ctx.createLinearGradient(w - 6, 0, w, 0);
            rightShadow.addColorStop(0, 'rgba(0,0,0,0)');
            rightShadow.addColorStop(1, 'rgba(0,0,0,0.6)');
            ctx.fillStyle = rightShadow;
            ctx.fillRect(w - 6, 0, 6, h);

            return canvas.toDataURL('image/png');
        }

        function createWoodTexture(w, h) {
            const canvas = document.createElement('canvas');
            canvas.width = w; canvas.height = h;
            const ctx = canvas.getContext('2d');

            ctx.fillStyle = '#2c1508';
            ctx.fillRect(0, 0, w, h);

            ctx.fillStyle = '#1c0c04';
            for(let i=0; i<400; i++) {
                const rectW = Math.random() * 100 + 30;
                const rectH = Math.random() * 4 + 1;
                ctx.fillRect(Math.random() * w, Math.random() * h, rectW, rectH);
            }

            const lightReflect = ctx.createLinearGradient(0,0,0,h);
            lightReflect.addColorStop(0, 'rgba(255, 200, 150, 0.15)');
            lightReflect.addColorStop(0.2, 'rgba(0,0,0,0)');
            lightReflect.addColorStop(1, 'rgba(0,0,0,0.5)');
            ctx.fillStyle = lightReflect;
            ctx.fillRect(0, 0, w, h);

            return canvas.toDataURL('image/png');
        }

        // --- 물리 엔진 & 카메라 로직 ---
        function initPhysics() {
            width = window.innerWidth;
            height = window.innerHeight;

            if (engine) {
                Render.stop(render); Runner.stop(runner);
                render.canvas.remove(); engine = null;
            }

            engine = Engine.create();
            engine.gravity.y = 1.8; 
            engine.positionIterations = 8;
            engine.velocityIterations = 8;

            render = Render.create({
                element: document.getElementById('game-container'),
                engine: engine,
                options: {
                    width: width, height: height,
                    wireframes: false, background: 'transparent',
                    pixelRatio: 1, 
                    hasBounds: true
                }
            });

            currentBounds = { min: { x: 0, y: 0 }, max: { x: width, y: height } };
            Render.lookAt(render, currentBounds);

            const deskWidth = Math.min(width * 0.9, 450);
            const deskHeight = 120;
            const woodTexture = createWoodTexture(deskWidth, deskHeight);

            ground = Bodies.rectangle(width / 2, height - (deskHeight/2), deskWidth, deskHeight, { 
                isStatic: true,
                render: { sprite: { texture: woodTexture } },
                friction: 1.0, restitution: 0.0, label: 'ground'
            });

            Composite.add(engine.world, [ground]);

            Render.run(render);
            runner = Runner.create();
            Runner.run(runner, engine);

            Events.on(engine, 'collisionStart', handleCollision);
            Events.on(engine, 'beforeUpdate', updateCamera);
            Events.on(render, 'afterRender', drawDropGuide);
        }

        function drawDropGuide() {
            if (gameState === 'PLAYING' && currentActiveBook && isDown) {
                 const ctx = render.context;
                 const scale = (currentBounds.max.x - currentBounds.min.x) / width;
                 
                 ctx.beginPath();
                 ctx.setLineDash([15 * scale, 10 * scale]);
                 ctx.moveTo(currentActiveBook.position.x, currentActiveBook.position.y);
                 ctx.lineTo(currentActiveBook.position.x, ground.position.y);
                 ctx.strokeStyle = 'rgba(255, 215, 120, 0.4)'; 
                 ctx.lineWidth = Math.max(1, 2 * scale);
                 ctx.stroke();
                 ctx.setLineDash([]);
            }
        }

        function spawnNewBook() {
            if (gameState !== 'PLAYING') return;

            const w = Math.floor(Math.random() * 60) + 120; 
            const h = Math.floor(Math.random() * 20) + 25;
            const texture = createRealisticBookTexture(w, h);
            
            const scale = (currentBounds.max.y - currentBounds.min.y) / height;
            const spawnY = currentBounds.min.y + (130 * scale);
            const spawnX = currentBounds.min.x + ((currentBounds.max.x - currentBounds.min.x) / 2);

            currentActiveBook = Bodies.rectangle(spawnX, spawnY, w, h, {
                isStatic: true, 
                render: { sprite: { texture: texture } },
                friction: 0.9, restitution: 0.02, density: 0.02, label: 'book'
            });

            Composite.add(engine.world, currentActiveBook);
            books.push(currentActiveBook);
            
            if (score === 0) controlsHint.style.display = 'block';
        }

        function dropBook() {
            if (!currentActiveBook || gameState !== 'PLAYING') return;

            Body.setStatic(currentActiveBook, false); 
            
            const randomAngularVelocity = (Math.random() - 0.5) * 0.03;
            Body.setAngularVelocity(currentActiveBook, randomAngularVelocity);

            // 팝업 텍스트를 위한 화면 좌표 변환
            const scaleX = width / (currentBounds.max.x - currentBounds.min.x);
            const scaleY = height / (currentBounds.max.y - currentBounds.min.y);
            const screenX = (currentActiveBook.position.x - currentBounds.min.x) * scaleX;
            const screenY = (currentActiveBook.position.y - currentBounds.min.y) * scaleY;
            
            // 🌟 확률적으로 성공 메시지 띄우기 (너무 자주 뜨면 번잡하므로 70% 확률 적용)
            if (Math.random() > 0.3) {
                showPopupMessage(screenX, screenY, 'success');
            }

            currentActiveBook = null;
            controlsHint.style.display = 'none';

            score++;
            scoreEl.textContent = score;

            // 🌟 10개 이상 쌓았을 때 놓을 때마다 화려한 효과 및 콤보 효과음 발생
            if (score >= 10) {
                createFlashyEffect(screenX, screenY);
                playMagicComboSound(score);
            }

            if (CELEBRATION_MILESTONES.has(score)) {
                setTimeout(() => triggerCelebration(score), 520);
            }
            
            playWhooshSound();
            setTimeout(spawnNewBook, 1200);
        }

        function moveActiveBook(screenX) {
            if (!currentActiveBook || gameState !== 'PLAYING') return;
            
            const scale = (currentBounds.max.x - currentBounds.min.x) / width;
            const worldX = currentBounds.min.x + (screenX * scale);
            const bookHalfWidth = (currentActiveBook.bounds.max.x - currentActiveBook.bounds.min.x) / 2;
            const safeX = Math.max(currentBounds.min.x + bookHalfWidth, Math.min(worldX, currentBounds.max.x - bookHalfWidth));
            
            Body.setPosition(currentActiveBook, { x: safeX, y: currentActiveBook.position.y });
        }

        function handleCollision(event) {
            if (gameState !== 'PLAYING') return;
            const pairs = event.pairs;
            for (let i = 0; i < pairs.length; i++) {
                const a = pairs[i].bodyA, b = pairs[i].bodyB;
                if ((a.label === 'book' || a.label === 'ground') && (b.label === 'book' || b.label === 'ground')) {
                     const velocity = Math.abs(a.velocity.y) + Math.abs(b.velocity.y);
                     if(velocity > 1.5) playThudSound(velocity);
                }
            }
        }

        function updateCamera() {
            if (gameState !== 'PLAYING') return;

            let highestY = ground.position.y; 

            for (let i = 0; i < books.length; i++) {
                const book = books[i];
                if (book === currentActiveBook) continue;

                if (book.position.y > ground.position.y + 300) {
                    gameOver(); return;
                }
                if (book.speed < 2 && book.position.y < highestY) {
                    highestY = book.position.y;
                }
            }

            let targetMinY = highestY - 350;
            let neededHeight = (ground.position.y + 100) - targetMinY;
            let targetViewHeight = Math.max(height, neededHeight);
            
            const MAX_ZOOM = 2.5; 
            if (targetViewHeight > height * MAX_ZOOM) {
                targetViewHeight = height * MAX_ZOOM;
            } else {
                targetMinY = (ground.position.y + 100) - targetViewHeight;
            }

            let targetViewWidth = targetViewHeight * (width / height);
            let targetMinX = (width - targetViewWidth) / 2;

            currentBounds.min.x += (targetMinX - currentBounds.min.x) * 0.08;
            currentBounds.min.y += (targetMinY - currentBounds.min.y) * 0.08;
            currentBounds.max.x = currentBounds.min.x + targetViewWidth;
            currentBounds.max.y = currentBounds.min.y + targetViewHeight;

            Render.lookAt(render, currentBounds);

            const scale = height / (currentBounds.max.y - currentBounds.min.y);
            
            roomBg.style.backgroundPositionY = `${-currentBounds.min.y * 0.3 * scale}px`;

            const deskScreenY = (ground.position.y - currentBounds.min.y) * scale;
            if (deskScreenY < height + 100) {
                woodPanel.style.top = `${deskScreenY}px`;
                woodPanel.style.height = `${Math.max(0, height - deskScreenY)}px`;
            } else {
                woodPanel.style.height = `0px`;
            }
        }

        function gameOver() {
            gameState = 'GAMEOVER';
            
            // ★ 게임 오버 시 BGM 일시정지
            if (isYtReady && ytPlayer) ytPlayer.pauseVideo();

            playCrashSound();
            document.body.style.animation = 'shake 0.5s';

            const finalScore = Math.max(0, score - 1);
            finalScoreEl.textContent = finalScore;
            document.getElementById('final-initial').textContent = currentInitial;

            let isNewRecord = false;
            let isTop5Entry = false;
            
            if (finalScore > 0) {
                const previousBest = globalTop5.length > 0 ? globalTop5[0].score : 0;
                const lowestTop5 = globalTop5.length === 5 ? globalTop5[4].score : 0;

                if (finalScore > previousBest) {
                    isNewRecord = true;
                } else if (globalTop5.length < 5 || finalScore > lowestTop5) {
                    isTop5Entry = true;
                }
                
                saveScoreToDB(currentInitial, finalScore);
            }

            newRecordMsg.style.display = isNewRecord ? 'block' : 'none';
            top5EntryMsg.style.display = (!isNewRecord && isTop5Entry) ? 'block' : 'none';

            setTimeout(() => gameoverModal.style.display = 'block', 1800);
        }

        // 게임 시작 검증 및 로직
        function startGame(isFirstStart = false) {
            if (isFirstStart) {
                const initialVal = initialInput.value;
                if (initialVal.length !== 3) {
                    document.getElementById('initial-error').style.display = 'block';

                }
                document.getElementById('initial-error').style.display = 'none';
                currentInitial = initialVal;

                    ytPlayer.setShuffle(true);
                    ytPlayer.setLoop(true);
                    ytPlayer.nextVideo();
                    ytPlayer.playVideo();

            } else {
                // ★ 다시 하기 시 BGM 다시 재생
                if (isYtReady && ytPlayer) ytPlayer.playVideo();
            }

            startModal.style.display = 'none';
            gameoverModal.style.display = 'none';
            btnRestartTop.style.display = 'block';
            
            // 🌟 화면에 남아있는 플로팅 텍스트 모두 삭제
            document.querySelectorAll('.floating-chat').forEach(el => el.remove());

            score = 0; scoreEl.textContent = score;
            books = [];
            celebrationLayer.replaceChildren();
            
            initPhysics();
            gameState = 'PLAYING';
            spawnNewBook();
        }

        function triggerCelebration(count) {

                sparkle.style.setProperty('--dx', `${(Math.random() - 0.5) * 90}vw`);
                sparkle.style.setProperty('--dy', `${(Math.random() - 0.8) * 70}vh`);
                sparkle.style.setProperty('--size', `${6 + Math.random() * 14}px`);

                ribbon.style.setProperty('--hue', Math.floor(Math.random() * 360));
                ribbon.style.setProperty('--rotate', `${Math.random() * 360}deg`);
                ribbon.style.setProperty('--duration', `${1.8 + Math.random() * 1.1}s`);

        // --- 조작 (마우스/터치) ---
        let isDown = false;
        const gameContainer = document.getElementById('game-container');

        gameContainer.addEventListener('pointerdown', (e) => {
            if (gameState !== 'PLAYING') return;
            isDown = true;
            controlsHint.style.display = 'none';

        });

        window.addEventListener('resize', () => {
            width = window.innerWidth; height = window.innerHeight;
            if (render) {
                render.canvas.width = width; render.canvas.height = height;
                render.options.width = width; render.options.height = height;
            }
            if (ground) Body.setPosition(ground, { x: width / 2, y: ground.position.y });
            currentBounds.max.x = currentBounds.min.x + (currentBounds.max.y - currentBounds.min.y) * (width/height);
        });

        // --- 오디오 / 효과음 로직 (AudioContext) ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        
        function playWhooshSound() {
            try {
                const ctx = new AudioContext();
                const osc = ctx.createOscillator(); const gain = ctx.createGain();
                osc.type = 'sine'; osc.frequency.setValueAtTime(180, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.04, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch(e){}
        }

        function playThudSound(intensity) {
            try {
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.type = 'square'; 
                osc.frequency.setValueAtTime(120, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(40, ctx.currentTime + 0.1);

                const filter = ctx.createBiquadFilter();
                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(800, ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + 0.1);

                const volume = Math.min(0.5, intensity * 0.08);
                gain.gain.setValueAtTime(volume, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.1);

                osc.connect(filter); 
                filter.connect(gain); 
                gain.connect(ctx.destination);
                
                osc.start(); osc.stop(ctx.currentTime + 0.1);
            } catch(e){}
        }

        function playMagicComboSound(currentScore) {
            try {
                const ctx = new AudioContext();
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                osc.type = 'sine';
                
                const baseFreq = 400 + (Math.min(currentScore, 50) * 15);
                osc.frequency.setValueAtTime(baseFreq, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(baseFreq * 1.5, ctx.currentTime + 0.15);
                
                gain.gain.setValueAtTime(0.08, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
                
                osc.connect(gain); gain.connect(ctx.destination);
                osc.start(); osc.stop(ctx.currentTime + 0.15);
            } catch(e){}
        }

        function playCelebrationSound() {
            try {
                const ctx = new AudioContext();
                const notes = [523.25, 659.25, 783.99, 1046.5];
                notes.forEach((note, index) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    const startAt = ctx.currentTime + (index * 0.08);

                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(note, startAt);
                    gain.gain.setValueAtTime(0.001, startAt);
                    gain.gain.exponentialRampToValueAtTime(0.12, startAt + 0.02);
                    gain.gain.exponentialRampToValueAtTime(0.001, startAt + 0.22);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(startAt); osc.stop(startAt + 0.24);
                });
            } catch(e){}
        }
        
        function playCrashSound() {
            try {
                const ctx = new AudioContext();
                const osc1 = ctx.createOscillator();
                const osc2 = ctx.createOscillator();
                const gain = ctx.createGain();

                osc1.type = 'sawtooth';
                osc2.type = 'square';

                osc1.frequency.setValueAtTime(250, ctx.currentTime);
                osc1.frequency.exponentialRampToValueAtTime(30, ctx.currentTime + 0.8);

                osc2.frequency.setValueAtTime(180, ctx.currentTime);
                osc2.frequency.exponentialRampToValueAtTime(20, ctx.currentTime + 0.8);

                gain.gain.setValueAtTime(0.5, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.8);

                osc1.connect(gain);
                osc2.connect(gain);
                gain.connect(ctx.destination);

                osc1.start(); osc1.stop(ctx.currentTime + 0.8);
                osc2.start(); osc2.stop(ctx.currentTime + 0.8);
            } catch(e){}
        }
    </script>
