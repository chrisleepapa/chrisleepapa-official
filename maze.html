<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🏃 Sistersquad Run! 🏃</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
  :root { --gold: #FFD700; --pink: #FF69B4; }
  body { margin: 0; overflow: hidden; background: #87CEEB; font-family: sans-serif; user-select: none; touch-action: none; }
  
  #game-canvas { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; z-index: 1; }
  
  /* 캐릭터 스프라이트 - 하단 중앙 배치 */
  #player-sprite {
    position: absolute; bottom: 10%; left: 50%;
    width: 180px; height: 180px; transform: translateX(-50%);
    background-size: 500% 100%; background-position: 0% 0%;
    z-index: 15; pointer-events: none; display: none;
    filter: drop-shadow(0 10px 10px rgba(0,0,0,0.3));
  }
  .sprite-yul { background-image: url('/images/yul_spritesheet.png'); }
  .sprite-jung { background-image: url('/images/jeong_spritesheet.png'); }

  /* UI 레이어 */
  #ui {
    position: absolute; top: 20px; left: 0; width: 100%;
    z-index: 20; display: flex; justify-content: space-between; padding: 0 20px;
    box-sizing: border-box; pointer-events: none;
  }
  .hud { background: rgba(0,0,0,0.5); color: white; padding: 10px 20px; border-radius: 20px; border: 2px solid var(--gold); font-weight: bold; }

  /* 모바일 컨트롤러 */
  #controls {
    position: absolute; bottom: 40px; left: 0; width: 100%;
    display: flex; justify-content: space-around; align-items: center;
    z-index: 30; padding: 0 20px; box-sizing: border-box;
  }
  .btn {
    width: 80px; height: 80px; background: rgba(255,255,255,0.3);
    border-radius: 50%; display: flex; align-items: center; justify-content: center;
    color: white; font-size: 30px; border: 3px solid white; backdrop-filter: blur(5px);
    pointer-events: auto;
  }
  .btn:active { background: rgba(255,255,255,0.6); transform: scale(0.9); }
  #attack-btn { width: 100px; height: 100px; background: rgba(255, 105, 180, 0.6); font-size: 20px; font-weight: 900; }

  /* 모달 */
  .modal {
    position: fixed; inset: 0; background: rgba(0,0,0,0.8);
    display: flex; align-items: center; justify-content: center; z-index: 100;
  }
  .modal-content {
    background: white; padding: 40px; border-radius: 30px; text-align: center;
    max-width: 400px; border: 5px solid var(--gold);
  }
  .char-select { display: flex; gap: 20px; justify-content: center; margin: 20px 0; }
  .char-card { border: 3px solid #ccc; padding: 10px; border-radius: 15px; cursor: pointer; }
  .char-card.active { border-color: var(--pink); background: #fff0f5; }
</style>
</head>
<body>

<div id="game-canvas"></div>
<div id="player-sprite"></div>

<div id="ui" style="display: none;">
  <div class="hud">HP: <span id="hp">❤️❤️❤️</span></div>
  <div class="hud">🔑 <span id="score">0 / 10</span></div>
</div>

<div id="controls" style="display: none;">
  <div class="btn" onpointerdown="moveLane(-1)">◀</div>
  <div id="attack-btn" class="btn" onpointerdown="attack()">공격</div>
  <div class="btn" onpointerdown="moveLane(1)">▶</div>
</div>

<div id="start-modal" class="modal">
  <div class="modal-content">
    <h1 style="font-family:'Fredoka One'; color:#333;">SISTERS RUN!</h1>
    <p>장애물을 피하고 열쇠 10개를 모으세요!</p>
    <div class="char-select">
      <div id="sel-yul" class="char-card active" onclick="selectChar('yul')">율이</div>
      <div id="sel-jung" class="char-card" onclick="selectChar('jung')">정이</div>
    </div>
    <button onclick="startGame()" style="background:var(--pink); color:white; border:none; padding:15px 40px; border-radius:15px; font-size:20px; font-weight:bold; cursor:pointer;">질주 시작!</button>
  </div>
</div>

<script>
let scene, camera, renderer, clock, isPlaying = false;
let playerHealth = 3, score = 0, currentLane = 0; // -1, 0, 1
let selectedChar = 'yul';
let objects = [], projectiles = [];
let gameSpeed = 40;
const LANE_WIDTH = 5;

function selectChar(char) {
  selectedChar = char;
  document.getElementById('sel-yul').className = char === 'yul' ? 'char-card active' : 'char-card';
  document.getElementById('sel-jung').className = char === 'jung' ? 'char-card active' : 'char-card';
}

function startGame() {
  document.getElementById('start-modal').style.display = 'none';
  document.getElementById('ui').style.display = 'flex';
  document.getElementById('controls').style.display = 'flex';
  document.getElementById('player-sprite').style.display = 'block';
  document.getElementById('player-sprite').className = 'sprite-' + selectedChar;
  
  initThree();
  isPlaying = true;
  animate();
}

function initThree() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x87CEEB);
  scene.fog = new THREE.Fog(0x87CEEB, 20, 100);
  
  camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
  camera.position.set(0, 5, 10);
  camera.lookAt(0, 2, -5);

  renderer = new THREE.WebGLRenderer({ antialias: true });
  renderer.setSize(window.innerWidth, window.innerHeight);
  document.getElementById('game-canvas').appendChild(renderer.domElement);

  const light = new THREE.DirectionalLight(0xffffff, 1);
  light.position.set(5, 10, 5);
  scene.add(light, new THREE.AmbientLight(0xffffff, 0.6));

  // 무한 도로 (격자 무늬)
  const groundGeo = new THREE.PlaneGeometry(20, 2000);
  const groundMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
  const ground = new THREE.Mesh(groundGeo, groundMat);
  ground.rotation.x = -Math.PI / 2;
  scene.add(ground);
  
  const grid = new THREE.GridHelper(2000, 200, 0xaaaaaa, 0xcccccc);
  grid.position.y = 0.05;
  scene.add(grid);

  clock = new THREE.Clock();
  
  // 키보드 지원
  window.addEventListener('keydown', e => {
    if(e.key === 'ArrowLeft' || e.key === 'a') moveLane(-1);
    if(e.key === 'ArrowRight' || e.key === 'd') moveLane(1);
    if(e.key === ' ') attack();
  });
}

function moveLane(dir) {
  currentLane = Math.max(-1, Math.min(1, currentLane + dir));
}

function attack() {
  const p = new THREE.Mesh(
    new THREE.SphereGeometry(0.5), 
    new THREE.MeshBasicMaterial({ color: selectedChar === 'yul' ? 0xff4500 : 0x00ffff })
  );
  p.position.set(currentLane * LANE_WIDTH, 1.5, -2);
  scene.add(p);
  projectiles.push(p);
}

function spawnObject() {
  if (Math.random() > 0.95) { // 장애물 또는 아이템 생성
    const lane = Math.floor(Math.random() * 3) - 1;
    const isEnemy = Math.random() > 0.3;
    
    let obj;
    if (isEnemy) {
      obj = new THREE.Mesh(new THREE.BoxGeometry(2, 2, 2), new THREE.MeshStandardMaterial({ color: 0x330066 }));
      obj.userData = { type: 'enemy' };
    } else {
      obj = new THREE.Mesh(new THREE.TorusGeometry(0.5, 0.2), new THREE.MeshStandardMaterial({ color: 0xFFD700 }));
      obj.userData = { type: 'key' };
    }
    
    obj.position.set(lane * LANE_WIDTH, 1, -100);
    scene.add(obj);
    objects.push(obj);
  }
}

function animate() {
  if (!isPlaying) return;
  requestAnimationFrame(animate);
  const delta = clock.getDelta();
  
  // 장애물 생성
  spawnObject();

  // 물체 이동 및 충돌 체크
  for (let i = objects.length - 1; i >= 0; i--) {
    const obj = objects[i];
    obj.position.z += gameSpeed * delta;

    // 캐릭터와의 충돌 (대략 z=0 지점)
    if (obj.position.z > -1 && obj.position.z < 1) {
      if (Math.abs(obj.position.x - (currentLane * LANE_WIDTH)) < 2) {
        if (obj.userData.type === 'key') {
          score++;
          document.getElementById('score').innerText = `${score} / 10`;
          if(score >= 10) { alert("탈출 성공!"); location.reload(); }
        } else {
          playerHealth--;
          document.getElementById('hp').innerText = "❤️".repeat(Math.max(0, playerHealth)) + "🖤".repeat(3 - playerHealth);
          if(playerHealth <= 0) { isPlaying = false; alert("게임 오버!"); location.reload(); }
        }
        scene.remove(obj);
        objects.splice(i, 1);
        continue;
      }
    }

    if (obj.position.z > 10) {
      scene.remove(obj);
      objects.splice(i, 1);
    }
  }

  // 투사체 이동
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.position.z -= 60 * delta;
    
    // 적 처치 체크
    objects.forEach((obj, objIdx) => {
      if (obj.userData.type === 'enemy' && p.position.distanceTo(obj.position) < 2) {
        scene.remove(obj);
        objects.splice(objIdx, 1);
        p.position.z = -1000; // 제거용
      }
    });

    if (p.position.z < -100) {
      scene.remove(p);
      projectiles.splice(i, 1);
    }
  }

  // 스프라이트 위치 부드럽게 업데이트 (라인 이동)
  const targetX = (window.innerWidth / 2) + (currentLane * 60);
  document.getElementById('player-sprite').style.left = targetX + 'px';
  
  // 달리는 애니메이션 (프레임 교체)
  const frame = Math.floor(Date.now() / 100) % 5;
  document.getElementById('player-sprite').style.backgroundPosition = `${frame * 25}% 0`;

  renderer.render(scene, camera);
}
</script>
</body>
</html>
