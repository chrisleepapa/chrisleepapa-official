<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

<title>Sister Squad Hyper Curling</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
*{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
}

body{
    margin:0;
    overflow:hidden;
    font-family:'Pretendard',sans-serif;
    background:
        radial-gradient(circle at top,#7c3aed 0%,transparent 30%),
        radial-gradient(circle at bottom,#06b6d4 0%,transparent 30%),
        linear-gradient(180deg,#050816 0%,#0f172a 100%);
    color:white;
}

#gameWrap{
    position:relative;
    width:100%;
    max-width:520px;
    height:100vh;
    margin:auto;
    overflow:hidden;
    background:
        linear-gradient(180deg,#0ea5e9 0%,#dbeafe 45%,#e0f2fe 100%);
    box-shadow:
        0 0 60px rgba(0,0,0,.55),
        inset 0 0 80px rgba(255,255,255,.2);
}

#gameWrap::before{
    content:'';
    position:absolute;
    inset:0;
    background-image:
        linear-gradient(rgba(255,255,255,.08) 1px, transparent 1px),
        linear-gradient(90deg,rgba(255,255,255,.08) 1px, transparent 1px);
    background-size:40px 40px;
    pointer-events:none;
}

/* Screen overlays: 모바일 스크롤 및 Flex 대응 */
.screen{
    position:absolute;
    inset:0;
    z-index:80;
    display:flex;
    flex-direction:column;
    padding:20px 20px;
    background:rgba(15, 23, 42, 0.95);
    backdrop-filter:blur(15px);
    transition: opacity 0.4s, transform 0.4s;
    overflow-y: auto;
    overflow-x: hidden;
}

canvas{
    width:100%;
    height:100%;
    display:block;
    touch-action:none;
}

.topUI{
    position:absolute;
    inset:0 auto auto 0;
    width:100%;
    padding:14px;
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    z-index:20;
    pointer-events:none;
}

.glass{
    background:rgba(255,255,255,.12);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.18);
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}

.scoreBox{
    padding:12px 14px;
    min-width:180px;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

.turnBox{
    border-radius:999px;
    padding:10px 18px;
    font-weight:900;
    animation:pulse 1.8s infinite;
    text-shadow: 0 2px 4px rgba(0,0,0,0.5);
}

.roundBox{
    margin-top:10px;
    padding:8px 14px;
    font-size:16px;
    font-weight:900;
    text-shadow: 0 2px 8px rgba(0,0,0,0.8);
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.05);}
    100%{transform:scale(1);}
}

/* ---------------- 캐릭터 스킬 컷인 (Character Card) ---------------- */
.characterCard{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%) scale(0.5) rotate(-10deg);
    width:90%;
    max-width:380px;
    border-radius:40px;
    padding:30px;
    z-index:50;
    opacity:0;
    pointer-events:none;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), inset 0 0 20px rgba(255,255,255,0.4);
    transition:all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

.characterCard.show{
    opacity:1;
    transform:translate(-50%,-50%) scale(1) rotate(0deg);
}

.characterImageWrapper {
    position: relative;
    width: 140px;
    height: 140px;
    margin: 0 auto 15px;
    border-radius: 50%;
    padding: 6px;
    background: linear-gradient(135deg, rgba(255,255,255,0.8), rgba(255,255,255,0.2));
    box-shadow: 0 0 30px rgba(255,255,255,0.6);
    animation: floatAnim 2s ease-in-out infinite;
}

@keyframes floatAnim {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-10px); }
}

.characterPortrait {
    width: 100%;
    height: 100%;
    object-fit: cover;
    border-radius: 50%;
    background-color: #333;
}

.characterName{
    font-size:40px;
    font-weight:900;
    margin-bottom:4px;
    text-shadow: 0 4px 10px rgba(0,0,0,0.6);
    letter-spacing: -1px;
}

.characterRole{
    font-size:18px;
    font-weight: 700;
    text-shadow: 0 2px 4px rgba(0,0,0,0.8);
    opacity: 0.9;
}

.characterSkill{
    margin-top:20px;
    font-size:16px;
    font-weight: 800;
    line-height:1.6;
    padding: 8px 16px;
    border-radius: 20px;
    background: rgba(0,0,0,0.4);
    display: inline-block;
    box-shadow: 0 4px 15px rgba(0,0,0,0.3);
}

/* ---------------- 리액션 텍스트 ---------------- */
.reaction{
    position:absolute;
    left:50%;
    top:58%;
    transform:translateX(-50%);
    font-size:40px;
    font-weight:900;
    z-index:60;
    opacity:0;
    pointer-events:none;
    text-shadow:0 10px 30px rgba(0,0,0,.4);
}

.reaction.show{
    animation:reactionAnim 1.2s ease forwards;
}

@keyframes reactionAnim{
    0%{ opacity:0; transform:translate(-50%,20px) scale(.6); }
    20%{ opacity:1; transform:translate(-50%,-20px) scale(1.2); }
    100%{ opacity:0; transform:translate(-50%,-100px) scale(1); }
}

.bottomGuide{
    position:absolute;
    bottom:20px;
    width:100%;
    display:flex;
    justify-content:center;
    z-index:20;
    pointer-events:none;
    transition: opacity 0.3s;
}

.guideBox{
    border-radius:999px;
    padding:12px 18px;
    font-size:14px;
    font-weight:700;
}

/* ---------------- 팀 선택 카드 (모바일 대응) ---------------- */
.teamSelectCard {
    position: relative;
    width: 100%;
    flex: 1;
    min-height: 120px;
    border-radius: 24px;
    overflow: hidden;
    cursor: pointer;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
    border: 4px solid transparent;
}

.teamSelectCard:hover { transform: scale(1.03) translateY(-5px); }
.teamSelectCard.fairy:hover { border-color: #f472b6; box-shadow: 0 15px 40px rgba(244,114,182,0.6); }
.teamSelectCard.dark:hover { border-color: #8b5cf6; box-shadow: 0 15px 40px rgba(139,92,246,0.6); }

.teamImgBg {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    background-color: #2a2a2a;
    transition: transform 0.5s;
}
.teamSelectCard:hover .teamImgBg { transform: scale(1.1); }

.teamOverlay {
    position: absolute;
    inset: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, rgba(0,0,0,0.3) 50%, rgba(0,0,0,0.1) 100%);
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    align-items: center;
    padding-bottom: 20px;
}

/* ---------------- 캐릭터 선택 슬롯 (모바일 대응) ---------------- */
.charSelectBtn {
    background: rgba(255, 255, 255, 0.1);
    border: 2px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 10px;
    text-align: center;
    cursor: pointer;
    transition: 0.2s;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
}
.charSelectBtn.selected {
    border-color: #22d3ee;
    background: rgba(34, 211, 238, 0.15);
    opacity: 0.4;
    pointer-events: none;
    transform: scale(0.95);
}

.selectPortrait {
    width: 70px;
    height: 70px;
    border-radius: 50%;
    object-fit: cover;
    margin: 0 auto 6px;
    border: 3px solid white;
    background-color: #444;
    box-shadow: 0 4px 10px rgba(0,0,0,0.5);
}

.orderSlot {
    flex: 1;
    background: rgba(255,255,255,0.1);
    border: 2px dashed rgba(255,255,255,0.3);
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    aspect-ratio: 1 / 1;
}

.orderSlotImg {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

.btn{
    border:none;
    width:100%;
    border-radius:22px;
    padding:16px;
    font-size:20px;
    font-weight:900;
    cursor:pointer;
    transition:.2s;
    color:white;
}
.btn:hover:not(:disabled){ transform:translateY(-4px); }
.btn:disabled{ opacity:0.5; cursor:not-allowed; }

.fairyGlow{ background:linear-gradient(135deg,#f472b6,#ec4899); }
.darkGlow{ background:linear-gradient(135deg,#8b5cf6,#7c3aed); }
.neon{
    background:linear-gradient(90deg,#22d3ee,#f472b6,#facc15);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

#winnerModal{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,.72);
    backdrop-filter:blur(12px);
    z-index:100;
    display:none;
    justify-content:center;
    align-items:center;
    padding:20px;
}
.modalCard{ width:100%; max-width:380px; border-radius:36px; padding:30px; text-align:center; }
.winTitle{ font-size:42px; font-weight:900; margin-bottom:14px; }
#saveLoading { display: inline-block; margin-top: 10px; font-size: 16px; font-weight: bold; }
</style>
</head>

<body>

<div id="gameWrap">

    <!-- 0. 로그인 및 리더보드 화면 -->
    <div id="loginScreen" class="screen justify-center items-center">
        <h1 class="text-4xl sm:text-5xl font-black neon mb-8 text-center leading-tight">
            SISTER SQUAD<br/>CURLING
        </h1>
        
        <div class="glass p-6 w-full max-w-sm rounded-3xl flex flex-col gap-4 shadow-2xl mb-6">
            <div class="text-center">
                <label class="block text-sm font-bold mb-2 opacity-80">영문 이니셜 (최대 3글자)</label>
                <input type="text" id="initialsInput" maxlength="3" 
                    class="w-full text-center text-3xl font-black p-4 rounded-xl bg-black/40 text-white border border-white/20 uppercase focus:outline-none focus:border-cyan-400 transition" 
                    placeholder="ABC" 
                    oninput="this.value = this.value.toUpperCase().replace(/[^A-Z]/g, '')">
            </div>
            <button class="btn bg-cyan-500 hover:bg-cyan-600 shadow-[0_0_15px_rgba(34,211,238,0.4)]" onclick="submitInitials()">
                접속하기
            </button>
        </div>

        <div class="glass p-5 w-full max-w-sm rounded-3xl">
            <h2 class="text-xl font-black mb-4 text-center text-yellow-400 drop-shadow-md">🏆 TOP 5 WINS <span id="loadingCloud"></span></h2>
            <div id="leaderboardList" class="flex flex-col gap-2">
                <!-- JS로 렌더링 -->
            </div>
        </div>
    </div>

    <!-- 1. 팀 선택 화면 -->
    <div id="teamSelectScreen" class="screen justify-center" style="display:none; transform: scale(1.05); opacity: 0;">
        <div class="text-center mt-2 mb-6 shrink-0">
            <h1 class="text-4xl sm:text-5xl font-black neon mb-2">TEAM SELECT</h1>
            <p class="text-sm sm:text-lg opacity-80 font-bold">플레이할 진영을 선택하세요</p>
        </div>
        
        <div class="flex flex-col gap-4 w-full max-w-sm mx-auto flex-1 min-h-[40vh] pb-4">
            <div class="teamSelectCard fairy" onclick="selectTeam('fairy')">
                <div class="teamImgBg" style="background-image: url('/images/fairyteam.jpg');"></div>
                <div class="teamOverlay">
                    <span class="text-3xl sm:text-4xl font-black text-white" style="text-shadow: 0 4px 10px rgba(236,72,153,0.8);">🧚 요정팀</span>
                </div>
            </div>

            <div class="text-center text-xl font-black opacity-50 italic shrink-0 py-1">VS</div>

            <div class="teamSelectCard dark" onclick="selectTeam('dark')">
                <div class="teamImgBg" style="background-image: url('/images/darkteam.jpg');"></div>
                <div class="teamOverlay">
                    <span class="text-3xl sm:text-4xl font-black text-white" style="text-shadow: 0 4px 10px rgba(139,92,246,0.8);">🌑 어둠팀</span>
                </div>
            </div>
        </div>
    </div>

    <!-- 2. 순서 선택 화면 -->
    <div id="orderSelectScreen" class="screen" style="display:none; transform: scale(1.05); opacity: 0;">
        <div class="text-center mt-2 mb-4 shrink-0">
            <h1 class="text-2xl sm:text-3xl font-black text-white mb-1" id="orderSelectTitle">출전 순서 선택</h1>
            <p class="text-xs sm:text-sm opacity-80">원하는 순서대로 4명의 영웅을 탭하세요.</p>
        </div>

        <div class="flex justify-between gap-2 mb-4 shrink-0 px-2" id="selectedSlots">
            <!-- JS로 채워짐 -->
        </div>

        <div class="grid grid-cols-2 gap-3 mb-4 flex-1 overflow-y-auto" id="characterRoster">
            <!-- JS로 채워짐 -->
        </div>

        <div class="shrink-0 pt-2 pb-4">
            <button id="startGameBtn" class="btn bg-cyan-500 hover:bg-cyan-600 shadow-[0_0_20px_rgba(34,211,238,0.5)]" disabled onclick="startGame()">
                출격! (GAME START)
            </button>
        </div>
    </div>

    <!-- 3. 인게임 UI -->
    <div class="topUI" id="inGameUI" style="display:none;">
        <div>
            <div class="scoreBox">
                <div class="text-xs font-black text-white/80 mb-1 tracking-wider">3판 2선승제 (BEST OF 3)</div>
                <div class="flex items-center justify-between gap-5 mb-2">
                    <div class="font-black text-pink-300 drop-shadow-md">🧚 요정팀</div>
                    <div id="fairyScore" class="text-3xl font-black text-white">0</div>
                </div>
                <div class="flex items-center justify-between gap-5">
                    <div class="font-black text-violet-300 drop-shadow-md">🌑 어둠팀</div>
                    <div id="darkScore" class="text-3xl font-black text-white">0</div>
                </div>
            </div>
            <div class="roundBox text-white" id="roundText">ROUND 1</div>
        </div>
        <div class="glass turnBox" id="turnBox">요정팀 TURN</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div class="bottomGuide" id="bottomGuide" style="display:none;">
        <div class="glass guideBox" id="guideText">
            🎯 뒤로 당겨 발사!
        </div>
    </div>

    <!-- 캐릭터 스킬 컷인 카드 -->
    <div id="characterCard" class="characterCard glass"></div>
    <div id="reaction" class="reaction"></div>

    <!-- 결과 모달 -->
    <div id="winnerModal">
        <div class="glass modalCard">
            <div id="winnerEmoji" class="text-7xl mb-4">🏆</div>
            <div id="winnerTitle" class="winTitle neon">GAME SET</div>
            <div id="winnerDesc" class="text-xl opacity-80 mb-6">승리!</div>
            <button class="btn bg-white/20 hover:bg-white/30 text-white border border-white/40 shadow-lg" onclick="resetToMain()">
                처음으로 (메뉴)
            </button>
        </div>
    </div>

</div>

<script>
const canvas=document.getElementById('gameCanvas');
const ctx=canvas.getContext('2d');

const LOGICAL_W=520;
const LOGICAL_H=900;
canvas.width=LOGICAL_W;
canvas.height=LOGICAL_H;

const HOUSE={x:LOGICAL_W/2, y:210, r:150};
const START={x:LOGICAL_W/2, y:760};
const STONE_R=22;

const reactionTexts=["GO GO GO!!","하이퍼 샷!!","밀어붙여!!","슈퍼 컬링!!","나이스 샷!!","빙판을 지배해!!","POWER SWEEP!!","레츠 고!!!"];

// Supabase DB 정보
const SUPA_URL = 'https://cvfmkcxmxkmemmshfttn.supabase.co';
const SUPA_KEY = 'sb_publishable_Bb_GkRPWRFeAPvIduwPTJg_O1z_sStm';
const TABLE_NAME = 'curling_ranking'; // 컬링 전용 테이블 이름 적용

// 캐릭터 설정
const TEAMS={
    fairy:{
        id:'fairy', name:'요정팀', color:'#f472b6', border:'#ec4899', icon:'🧚',
        members:[
            {name:'프리티', img:'/images/pretty.jpg', skill:'스타라이트 드라이브'},
            {name:'큐티', img:'/images/cuty.jpg', skill:'핑크 스파클 샷'},
            {name:'브룩', img:'/images/brook.png', skill:'아쿠아 스핀'},
            {name:'엘리온', img:'/images/grandmagic.png', skill:'문라이트 커브'}
        ]
    },
    dark:{
        id:'dark', name:'어둠팀', color:'#8b5cf6', border:'#7c3aed', icon:'🌑',
        members:[
            {name:'어둠기사', img:'/images/darknight.png', skill:'다크 슬래시'},
            {name:'베인', img:'/images/bain.jpg', skill:'쉐도우 크래시'},
            {name:'크라운', img:'/images/crown.jpg', skill:'킹덤 임팩트'},
            {name:'천사', img:'/images/angel.jpeg', skill:'폴른 윙 스핀'}
        ]
    }
};

let state={
    phase: 'setup',
    playerInitials: '',
    stones:[],
    currentTeam:null,
    playerTeam:null,
    aiTeam:null,
    playerOrder:[], 
    aiOrder:[0, 1, 2, 3],
    fairyWins:0,
    darkWins:0,
    round:1,
    stonesLeft:{fairy:4, dark:4},
    activeStone:null,
    dragging:false,
    dragStart:null,
    dragNow:null,
    isAiTurn: false
};

// ==========================================
// DB 및 리더보드 로직
// ==========================================

async function loadLeaderboard() {
    const listEl = document.getElementById('leaderboardList');
    const loadingCloud = document.getElementById('loadingCloud');
    if(loadingCloud) loadingCloud.innerText = "🔄";
    
    try {
        const res = await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?select=*&order=wins.desc&limit=5`, {
            headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
        });
        if (!res.ok) throw new Error("DB 연결 에러");
        const data = await res.json();
        
        if(loadingCloud) loadingCloud.innerText = "";
        listEl.innerHTML = '';
        
        if (!Array.isArray(data) || data.length === 0) {
            listEl.innerHTML = '<div class="text-center opacity-50 py-4 font-bold text-sm">아직 등록된 챔피언이 없습니다.</div>';
            return;
        }
        
        data.forEach((entry, index) => {
            let medal = `<span class="opacity-50 text-sm ml-1">${index+1}</span>`;
            if(index === 0) medal = '🥇';
            else if(index === 1) medal = '🥈';
            else if(index === 2) medal = '🥉';

            listEl.innerHTML += `
                <div class="flex justify-between items-center bg-white/10 rounded-xl p-3 border border-white/5">
                    <div class="flex items-center gap-3">
                        <div class="w-6 text-center text-xl">${medal}</div>
                        <div class="font-bold tracking-widest text-lg">${entry.initials}</div>
                    </div>
                    <div class="font-black text-cyan-300">${entry.wins} WINS</div>
                </div>
            `;
        });
    } catch (e) {
        console.error('랭킹 불러오기 실패:', e);
        if(loadingCloud) loadingCloud.innerText = "⚠";
        listEl.innerHTML = '<div class="text-center opacity-50 py-4 font-bold text-sm">DB 연결에 실패했습니다.<br>Supabase 테이블 설정을 확인해주세요.</div>';
    }
}

async function recordWinToLeaderboard() {
    if (!state.playerInitials) return 0;
    try {
        const getRes = await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?initials=eq.${state.playerInitials}`, {
            headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}` }
        });
        const existingData = await getRes.json();
        let newWins = 1;
        
        if (existingData && existingData.length > 0) {
            newWins = existingData[0].wins + 1;
            await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}?initials=eq.${state.playerInitials}`, {
                method: 'PATCH',
                headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ wins: newWins })
            });
        } else {
            await fetch(`${SUPA_URL}/rest/v1/${TABLE_NAME}`, {
                method: 'POST',
                headers: { 'apikey': SUPA_KEY, 'Authorization': `Bearer ${SUPA_KEY}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ initials: state.playerInitials, wins: 1 })
            });
        }
        
        // 랭킹 바로 새로고침
        loadLeaderboard();
        return newWins;
    } catch (err) {
        console.error("랭킹 업데이트 실패:", err);
        return 0;
    }
}


// ==========================================
// 설정 및 UI 로직
// ==========================================

function submitInitials() {
    const input = document.getElementById('initialsInput');
    const val = input.value.trim();
    if(!val) {
        alert("이니셜을 입력해주세요!");
        input.focus();
        return;
    }
    state.playerInitials = val;

    const screen = document.getElementById('loginScreen');
    screen.style.opacity = '0';
    screen.style.pointerEvents = 'none';

    setTimeout(() => {
        screen.style.display = 'none';
        const teamScreen = document.getElementById('teamSelectScreen');
        teamScreen.style.display = 'flex';
        void teamScreen.offsetWidth;
        teamScreen.style.opacity = '1';
        teamScreen.style.transform = 'scale(1)';
        teamScreen.style.pointerEvents = 'auto';
    }, 400);
}

function selectTeam(teamId) {
    state.playerTeam = TEAMS[teamId];
    state.aiTeam = teamId === 'fairy' ? TEAMS.dark : TEAMS.fairy;
    
    const teamScreen = document.getElementById('teamSelectScreen');
    const orderScreen = document.getElementById('orderSelectScreen');

    teamScreen.style.opacity = '0';
    teamScreen.style.pointerEvents = 'none';
    
    setTimeout(() => {
        teamScreen.style.display = 'none';
        
        document.getElementById('orderSelectTitle').innerHTML = `${state.playerTeam.icon} ${state.playerTeam.name} 출전 순서`;
        document.getElementById('orderSelectTitle').style.color = state.playerTeam.color;

        orderScreen.style.display = 'flex';
        void orderScreen.offsetWidth;
        orderScreen.style.opacity = '1';
        orderScreen.style.transform = 'scale(1)';
        orderScreen.style.pointerEvents = 'auto';
        
        renderOrderSelectUI();
    }, 400);
}

function renderOrderSelectUI() {
    const slots = document.getElementById('selectedSlots');
    slots.innerHTML = '';
    for(let i=0; i<4; i++) {
        let content = '';
        let borderStyle = '';
        if (state.playerOrder[i] !== undefined) {
            const member = state.playerTeam.members[state.playerOrder[i]];
            const imgFallback = `onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23666\\'/><text x=\\'50%\\' y=\\'50%\\' font-size=\\'12\\' text-anchor=\\'middle\\' alignment-baseline=\\'middle\\' fill=\\'white\\'>이미지</text></svg>'"`;
            content = `<img src="${member.img}" class="orderSlotImg" alt="${member.name}" ${imgFallback}>`;
            borderStyle = `border-style: solid; border-color: ${state.playerTeam.color}; box-shadow: 0 0 12px ${state.playerTeam.color}80;`;
        }
        slots.innerHTML += `
            <div class="orderSlot" style="${borderStyle}">
                ${content ? content : `<span class="opacity-30 text-2xl font-bold">${i+1}</span>`}
            </div>
        `;
    }

    const roster = document.getElementById('characterRoster');
    roster.innerHTML = '';
    state.playerTeam.members.forEach((member, index) => {
        const isSelected = state.playerOrder.includes(index);
        const imgFallback = `onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23666\\'/></svg>'"`;

        roster.innerHTML += `
            <div class="charSelectBtn ${isSelected ? 'selected' : ''}" onclick="pickCharacter(${index})">
                <img src="${member.img}" class="selectPortrait" alt="${member.name}" ${imgFallback}>
                <div class="font-bold text-base sm:text-lg">${member.name}</div>
                <div class="text-[11px] sm:text-xs opacity-70 mt-1 truncate w-full px-1">${member.skill}</div>
            </div>
        `;
    });

    const startBtn = document.getElementById('startGameBtn');
    if(state.playerOrder.length === 4) {
        startBtn.disabled = false;
        startBtn.classList.add('animate-bounce');
    }
}

function pickCharacter(index) {
    if (state.playerOrder.length < 4 && !state.playerOrder.includes(index)) {
        state.playerOrder.push(index);
        renderOrderSelectUI();
    }
}

function startGame() {
    const orderScreen = document.getElementById('orderSelectScreen');
    orderScreen.style.opacity = '0';
    orderScreen.style.transform = 'scale(1.1)';
    orderScreen.style.pointerEvents = 'none';
    
    setTimeout(() => {
        orderScreen.style.display = 'none';
        document.getElementById('inGameUI').style.display = 'flex';
        document.getElementById('bottomGuide').style.display = 'flex';
        
        state.currentTeam = state.playerTeam;
        state.phase = 'aim';
        spawnStone();
    }, 400);
}


// ==========================================
// 인게임 클래스 및 로직
// ==========================================

class Stone{
    constructor(x,y,team){
        this.x=x; this.y=y; this.vx=0; this.vy=0;
        this.team=team; this.r=STONE_R; this.move=false;
    }
    draw(){
        ctx.beginPath(); ctx.arc(this.x+5,this.y+5,this.r,0,Math.PI*2); ctx.fillStyle='rgba(0,0,0,.18)'; ctx.fill();

        const grad=ctx.createRadialGradient(this.x-5,this.y-5,5, this.x,this.y,this.r);
        grad.addColorStop(0,'#fff');
        grad.addColorStop(.3,this.team.color);
        grad.addColorStop(1,this.team.border);

        ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fillStyle=grad; ctx.fill();

        ctx.lineWidth=4; ctx.strokeStyle='rgba(255,255,255,.8)'; ctx.stroke();

        ctx.font='22px serif'; ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle = '#fff';
        ctx.fillText(this.team.icon,this.x,this.y+2);
    }
    update(){
        const speed=Math.hypot(this.vx,this.vy);
        if(speed>.05){
            this.move=true;
            const friction=.025;
            const ns=Math.max(0,speed-friction);
            this.vx*=ns/speed; this.vy*=ns/speed;
            this.x+=this.vx; this.y+=this.vy;

            if(this.x-this.r<0){ this.x=this.r; this.vx*=-.88; }
            if(this.x+this.r>LOGICAL_W){ this.x=LOGICAL_W-this.r; this.vx*=-.88; }
            if(this.y-this.r<0){ this.y=this.r; this.vy*=-.88; }
            if(this.y+this.r>LOGICAL_H){ this.y=LOGICAL_H-this.r; this.vy*=-.88; }
        } else {
            this.vx=0; this.vy=0; this.move=false;
        }
    }
}

function showReaction(){
    const el=document.getElementById('reaction');
    el.innerText=reactionTexts[Math.floor(Math.random()*reactionTexts.length)];
    el.classList.remove('show'); void el.offsetWidth; el.classList.add('show');
}

function getActiveMember() {
    const turnNum = 4 - state.stonesLeft[state.currentTeam.id];
    if (state.currentTeam.id === state.playerTeam.id) {
        return state.currentTeam.members[state.playerOrder[turnNum]];
    } else {
        return state.currentTeam.members[state.aiOrder[turnNum]];
    }
}

function showCharacterCard(){
    const card=document.getElementById('characterCard');
    const team=state.currentTeam;
    const member = getActiveMember();

    const imgFallback = `onerror="this.src='data:image/svg+xml;utf8,<svg xmlns=\\'http://www.w3.org/2000/svg\\'><rect width=\\'100%\\' height=\\'100%\\' fill=\\'%23666\\'/></svg>'"`;

    card.innerHTML=`
        <div class="characterImageWrapper" style="box-shadow: 0 0 30px ${team.color}80;">
            <img src="${member.img}" class="characterPortrait" alt="${member.name}" ${imgFallback} />
        </div>
        <div class="characterName" style="color: ${team.color}; text-shadow: 2px 2px 0px #fff;">${member.name}</div>
        <div class="characterRole">${team.icon} ${team.name}</div>
        <div class="characterSkill">⚡ ${member.skill}</div>
    `;
    
    card.style.background = team.id === 'fairy'
        ? `linear-gradient(135deg, rgba(244,114,182,.4), rgba(15,23,42,.8))`
        : `linear-gradient(135deg, rgba(139,92,246,.4), rgba(15,23,42,.8))`;
    card.style.borderColor = team.color;
    
    card.classList.add('show');
    setTimeout(()=> card.classList.remove('show'), 1600);
}

function updateUI(){
    document.getElementById('fairyScore').innerText=state.fairyWins;
    document.getElementById('darkScore').innerText=state.darkWins;
    document.getElementById('roundText').innerText=`ROUND ${state.round}`;

    const turnBox=document.getElementById('turnBox');
    const guideText=document.getElementById('guideText');

    turnBox.innerHTML=`${state.currentTeam.icon} ${state.currentTeam.name} TURN`;
    turnBox.style.background= state.currentTeam.id==='fairy' ?'rgba(236,72,153,.78)' :'rgba(124,58,237,.78)';

    if (state.isAiTurn) {
        guideText.innerHTML = "🤖 <span style='opacity:0.8'>상대방이 조준 중입니다...</span>";
        guideText.parentElement.style.opacity = '0.7';
    } else {
        guideText.innerText = "🎯 뒤로 당겨 발사!";
        guideText.parentElement.style.opacity = '1';
    }
}

function spawnStone(){
    if(state.stonesLeft[state.currentTeam.id]<=0){
        endRound();
        return;
    }
    
    state.activeStone=new Stone(START.x, START.y, state.currentTeam);
    state.stones.push(state.activeStone);
    state.phase='aim';
    state.isAiTurn = (state.currentTeam.id === state.aiTeam.id);
    
    showCharacterCard();
    updateUI();

    if(state.isAiTurn) setTimeout(executeAITurn, 2000);
}

function executeAITurn() {
    if(state.phase !== 'aim') return;

    const targetX = HOUSE.x + (Math.random() - 0.5) * 80;
    const targetY = HOUSE.y + (Math.random() - 0.5) * 80;
    const dx = targetX - START.x; const dy = targetY - START.y;
    const angle = Math.atan2(dy, dx);
    const dist = Math.hypot(dx, dy);

    let power = Math.sqrt(dist * 0.05);
    power *= (0.92 + Math.random() * 0.15);

    state.activeStone.vx = Math.cos(angle) * power;
    state.activeStone.vy = Math.sin(angle) * power;
    
    state.phase = 'move';
    state.stonesLeft[state.currentTeam.id]--;
    showReaction();
}

canvas.addEventListener('pointerdown',e=>{
    if(state.phase!=='aim' || state.isAiTurn) return;
    const pos=getPos(e);
    if(Math.hypot(pos.x-state.activeStone.x, pos.y-state.activeStone.y)<120){
        state.dragging=true; state.dragStart=pos; state.dragNow=pos;
    }
});

canvas.addEventListener('pointermove',e=>{
    if(!state.dragging) return;
    state.dragNow=getPos(e);
});

window.addEventListener('pointerup',()=>{
    if(!state.dragging || state.isAiTurn) return;
    
    const dx=state.dragStart.x-state.dragNow.x;
    const dy=state.dragStart.y-state.dragNow.y;
    const dist=Math.hypot(dx,dy);

    if(dist>10){
        const power=Math.min(dist,250)*.12;
        const angle=Math.atan2(dy,dx);
        state.activeStone.vx=Math.cos(angle)*power;
        state.activeStone.vy=Math.sin(angle)*power;
        state.phase='move';
        state.stonesLeft[state.currentTeam.id]--;
        showReaction();
    }
    state.dragging=false;
});

function getPos(e){
    const rect=canvas.getBoundingClientRect();
    return{
        x:(e.clientX-rect.left)*(canvas.width/rect.width),
        y:(e.clientY-rect.top)*(canvas.height/rect.height)
    };
}

function resolveCollisions(){
    for(let i=0;i<state.stones.length;i++){
        for(let j=i+1;j<state.stones.length;j++){
            const a=state.stones[i]; const b=state.stones[j];
            const dx=b.x-a.x; const dy=b.y-a.y;
            const dist=Math.hypot(dx,dy);
            const min=a.r+b.r;

            if(dist<min && dist>0){
                const nx=dx/dist; const ny=dy/dist;
                const overlap=min-dist;
                a.x-=nx*overlap/2; b.x+=nx*overlap/2;
                a.y-=ny*overlap/2; b.y+=ny*overlap/2;
                
                const kx=a.vx-b.vx; const ky=a.vy-b.vy;
                const p=2*(nx*kx+ny*ky)/2;
                a.vx=(a.vx-p*nx)*.92; a.vy=(a.vy-p*ny)*.92;
                b.vx=(b.vx+p*nx)*.92; b.vy=(b.vy+p*ny)*.92;
            }
        }
    }
}

function endRound(){
    let valid=state.stones.map(s=>({
        stone:s, dist:Math.hypot(s.x-HOUSE.x,s.y-HOUSE.y)
    })).filter(v=>v.dist<HOUSE.r+STONE_R);

    valid.sort((a,b)=>a.dist-b.dist);

    let winner=null;
    if(valid.length>0) winner=valid[0].stone.team;

    if(winner){
        if(winner.id==='fairy') state.fairyWins++;
        else state.darkWins++;
    }

    if(state.fairyWins>=2 || state.darkWins>=2){
        showWinner(state.fairyWins>=2 ? TEAMS.fairy : TEAMS.dark);
        return;
    }

    setTimeout(()=>{
        state.round++;
        state.stones=[];
        state.stonesLeft={fairy:4, dark:4};
        state.currentTeam=state.playerTeam;
        spawnStone();
    },1800);
}

function showWinner(team){
    const modal = document.getElementById('winnerModal');
    modal.style.display = 'flex';
    
    const isPlayerWin = (team.id === state.playerTeam.id);
    
    document.getElementById('winnerTitle').innerText = `${team.name} 우승!`;
    document.getElementById('winnerTitle').style.color = team.color;
    
    if (isPlayerWin) {
        document.getElementById('winnerDesc').innerHTML = `
            축하합니다 <b>${state.playerInitials}</b>!<br/>
            ${team.icon} 3판 2선승제 영광의 우승!<br/><br/>
            <span id="saveLoading" class="text-cyan-300">랭킹 서버에 기록 중... 🔄</span>
        `;
        
        // Supabase DB 기록 요청
        recordWinToLeaderboard().then(wins => {
            const loadingText = document.getElementById('saveLoading');
            if(loadingText) {
                if(wins > 0) {
                    loadingText.innerHTML = `<span class="text-yellow-400 text-2xl font-black drop-shadow-md">총 ${wins}승 달성! 🏆</span>`;
                } else {
                    loadingText.innerHTML = `<span class="text-red-400">기록 저장 실패 ⚠ (DB 연결 오류)</span>`;
                }
            }
        });
    } else {
        document.getElementById('winnerDesc').innerHTML = `AI의 승리입니다!<br/>다음에는 꼭 이겨보세요!`;
    }
}

function resetToMain() {
    // 모달 숨기기 및 인게임 UI 숨기기
    document.getElementById('winnerModal').style.display='none';
    document.getElementById('inGameUI').style.display='none';
    document.getElementById('bottomGuide').style.display='none';

    // 상태 초기화 (이니셜은 그대로 유지)
    state.phase = 'setup';
    state.stones = [];
    state.currentTeam = null;
    state.playerTeam = null;
    state.aiTeam = null;
    state.playerOrder = [];
    state.fairyWins = 0;
    state.darkWins = 0;
    state.round = 1;
    state.stonesLeft = {fairy:4, dark:4};
    state.activeStone = null;
    state.dragging = false;

    // 리더보드 렌더링 후 로그인 화면 다시 띄우기
    loadLeaderboard();
    
    const loginScreen = document.getElementById('loginScreen');
    loginScreen.style.display = 'flex';
    void loginScreen.offsetWidth;
    loginScreen.style.opacity = '1';
    loginScreen.style.transform = 'scale(1)';
    loginScreen.style.pointerEvents = 'auto';
    
    // 버튼 초기화
    const startBtn = document.getElementById('startGameBtn');
    startBtn.disabled = true;
    startBtn.classList.remove('animate-bounce');
}

function drawArena(){
    ctx.clearRect(0,0,LOGICAL_W,LOGICAL_H);
    const grad=ctx.createLinearGradient(0,0,0,LOGICAL_H);
    grad.addColorStop(0,'#dbeafe'); grad.addColorStop(.4,'#eff6ff'); grad.addColorStop(1,'#bfdbfe');
    ctx.fillStyle=grad; ctx.fillRect(0,0,LOGICAL_W,LOGICAL_H);

    ctx.beginPath(); ctx.arc(HOUSE.x,HOUSE.y,HOUSE.r,0,Math.PI*2); ctx.fillStyle='#1d4ed8'; ctx.fill();
    ctx.beginPath(); ctx.arc(HOUSE.x,HOUSE.y,HOUSE.r*.72,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();
    ctx.beginPath(); ctx.arc(HOUSE.x,HOUSE.y,HOUSE.r*.42,0,Math.PI*2); ctx.fillStyle='#ef4444'; ctx.fill();
    ctx.beginPath(); ctx.arc(HOUSE.x,HOUSE.y,HOUSE.r*.12,0,Math.PI*2); ctx.fillStyle='#fff'; ctx.fill();

    ctx.beginPath(); ctx.moveTo(HOUSE.x,0); ctx.lineTo(HOUSE.x,LOGICAL_H); ctx.strokeStyle='rgba(0,0,0,.08)'; ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0,HOUSE.y); ctx.lineTo(LOGICAL_W,HOUSE.y); ctx.stroke();

    if(state.dragging && !state.isAiTurn){
        const dx=state.dragStart.x-state.dragNow.x;
        const dy=state.dragStart.y-state.dragNow.y;
        const angle=Math.atan2(dy,dx);
        const dist=Math.min(Math.hypot(dx,dy),250);
        const ex=state.activeStone.x+Math.cos(angle)*dist*1.5;
        const ey=state.activeStone.y+Math.sin(angle)*dist*1.5;

        ctx.beginPath(); ctx.moveTo(state.activeStone.x, state.activeStone.y); ctx.lineTo(ex,ey);
        ctx.strokeStyle=state.currentTeam.color; ctx.lineWidth=5; ctx.lineCap='round'; ctx.stroke();
    }
}

function gameLoop(){
    if(state.phase==='move'){
        let moving=false;
        state.stones.forEach(s=>{ s.update(); if(s.move) moving=true; });
        resolveCollisions();
        if(!moving){
            state.currentTeam = state.currentTeam.id === 'fairy' ? TEAMS.dark : TEAMS.fairy;
            spawnStone();
        }
    }
    
    // 배경은 게임 전반적으로 항상 그리기
    drawArena();
    if(state.phase !== 'setup') {
        state.stones.forEach(s=>s.draw());
    }
    
    requestAnimationFrame(gameLoop);
}

// 최초 실행: 리더보드 그리기 및 루프 시작
loadLeaderboard();
requestAnimationFrame(gameLoop);

</script>
